name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDICAL_BATTALION_TRACKER }}"
          channelId: live
          projectId: medical-battalion-tracker
      - name: Deploy Firestore rules
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/service-account.json
          npx firebase-tools deploy --only firestore:rules --project medical-battalion-tracker
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDICAL_BATTALION_TRACKER }}"
      # 索引部署跟規則部署分開一個步驟、且允許失敗（continue-on-error）：
      # 部署實際用的服務帳戶是 firebase-adminsdk-fbsvc@medical-battalion-
      # tracker.iam.gserviceaccount.com（2026-07-13 debug 步驟確認過），
      # 沒有 datastore.indexes.create 這個 IAM 權限，部署索引會直接被
      # Firestore API 回 403 拒絕（實際發生過兩次）；continue-on-error 讓
      # 步驟顯示成功，不影響後面的 Cloud Functions 部署，但不代表索引真的
      # 有建立成功——這只是「失敗了也不擋住其他部署」，不是「解決了權限
      # 問題」。要讓索引真的生效，這個帳號需要被授予「Cloud Datastore
      # Index Admin」角色（Google Cloud Console → IAM），或者專案擁有者
      # 自行到 Firebase 主控台的 Firestore → 索引 手動建立
      # （見 firestore.indexes.json 列出的欄位組合）。
      - name: Deploy Firestore indexes（若服務帳戶權限不足會失敗，不影響後續部署）
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/service-account.json
          npx firebase-tools deploy --only firestore:indexes --project medical-battalion-tracker
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDICAL_BATTALION_TRACKER }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Cloud Functions dependencies
        run: npm install --prefix functions
      - name: Deploy Cloud Functions（推播通知後端）
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/service-account.json
          npx firebase-tools deploy --only functions --project medical-battalion-tracker --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDICAL_BATTALION_TRACKER }}"
