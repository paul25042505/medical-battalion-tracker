        <div class="topbar-bottom-row">
          <div class="topbar-sub">
            <span class="name">${esc(p.displayName||p.email).split(' ')[0]}</span>${p.rank ? `<span class="rank">${esc(p.rank)}</span>` : ''}
          </div>
          <div class="topbar-icons">
            <button class="topbar-icon-btn" onclick="window.__nav({name:'notifications'})">${icon('bell',25)}</button>
            <button class="topbar-icon-btn" onclick="window.__nav({name:'profile'})">${icon('user',25)}</button>
          </div>
        </div>
      </div>
    </div>
    <main>${body}</main>
    <div class="bottomnav">
      ${NAV_ITEMS.map(n => `
        <button class="navbtn ${state.route.name===n.name?'active':''}" style="${state.route.name===n.name?`color:${n.accent};`:''}" onclick="window.__nav({name:'${n.name}'})">
          <span class="navicon">${icon(n.iconName,24)}</span><span class="navlabel">${n.label}</span>
        </button>`).join("")}
    </div>
    ${viewBaseDataModal()}
    <div id="toast" class="toast"></div>
  `;
}

/* =========================================================
   20) 全域事件掛載（供 inline onclick 使用）
   ========================================================= */
window.__login = doLogin;
window.__logout = doLogout;
window.__refreshProfile = () => { if (profilePoll) profilePoll.refreshNow(); };
window.__nav = nav;
window.__startRolePreview = (role, unit) => startRolePreview(role, unit);
window.__endRolePreview = () => endRolePreview();
window.__startReport = (taskId, type) => { state.reportDraft = { taskId, type }; render(); };
window.__cancelReport = () => { state.reportDraft = null; render(); };
window.__resetReportTime = () => {
  const el = document.getElementById("rf-time");
  if (el) el.value = hhmmValue(new Date());
};
window.__submitReport = (taskId, type) => {
  const mileageEl = document.getElementById("rf-mileage");
  const fuelEl = document.getElementById("rf-fuel");
  const noteEl = document.getElementById("rf-note");
  const timeEl = document.getElementById("rf-time");
  const locationEl = document.getElementById("rf-location");
  const extra = {};
  if (mileageEl && mileageEl.value !== "") extra.mileage = Number(mileageEl.value);
  if (noteEl && noteEl.value) extra.note = noteEl.value;
  if (fuelEl && fuelEl.value) extra.endFuel = fuelEl.value;
  if (timeEl && timeEl.value) extra.timestamp = todayAt(timeEl.value);
  if (locationEl && locationEl.value) extra.location = locationEl.value;
  state.reportDraft = null;
  const evs = taskEvents(taskId);
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  // 從「已抵達現場」狀態選擇前往下一個地點或返回營區時，自動補一筆離開現場。
  if (lastType === "ARRIVED_SCENE" && (type === "ARRIVED_SCENE" || type === "RETURNING")) {
    reportDepartThenContinue(taskId, type, extra);
  } else {
    addEvent(taskId, type, extra);
  }
};
window.__editEvent = (id) => { state.eventEditId = id; render(); };
window.__cancelEditEvent = () => { state.eventEditId = null; render(); };
window.__submitEditEvent = (id) => {
  const ev = state.events.find(e => e.id === id);
  const locationEl = document.getElementById("ee-location");
  const timeEl = document.getElementById("ee-time");
  const mileageEl = document.getElementById("ee-mileage");
  const fuelEl = document.getElementById("ee-fuel");
  const noteEl = document.getElementById("ee-note");
  const fields = {};
  if (timeEl && timeEl.value && ev) fields.timestamp = dateAt(ev.ts, timeEl.value);
  if (mileageEl && mileageEl.value !== "") fields.mileage = Number(mileageEl.value);
  if (locationEl) fields.location = locationEl.value || "";
  if (fuelEl) fields.endFuel = fuelEl.value || "";
  if (noteEl) fields.note = noteEl.value || "";
  state.eventEditId = null;
  updateEvent(id, fields).catch(err => showToast(`更新失敗：[${err.code||'?'}] ${err.message||err}`));
};
window.__setAdminTab = (t) => { state.adminTab = t; state._usersCache = null; render(); };
window.__deleteTask = (id) => { if (confirm("確定刪除此任務？此動作無法復原。")) deleteTask(id); };
window.__forceEndTask = (id) => { if (confirm("確定強制結束此勤務？此動作無法復原。")) forceEndTask(id); };
window.__exportTasks = () => exportTasksCsv();
window.__setRole = (uid) => {
  const role = document.getElementById(`role-${uid}`).value;
  const unit = document.getElementById(`unit-${uid}`).value;
  setUserRole(uid, role, unit).then(() => { state._usersCache = null; render(); });
};
window.__setBaseDataUnit = (code) => { state.baseDataUnit = code; state.baseDataModal = null; render(); };
window.__setBaseDataTab = (key) => { state.baseDataTab = key; state.baseDataModal = null; render(); };
function baseDataErr(err){ showToast(`操作失敗：[${err.code||'?'}] ${err.message||err}`); console.error("基礎資料操作失敗", err); }
window.__toggleBaseData = (coll, id, active) => toggleBaseDataActive(coll, id, active).catch(baseDataErr);
window.__deleteBaseData = (coll, id) => { if (confirm("確定刪除此筆資料？此動作無法復原。")) deleteBaseData(coll, id).catch(baseDataErr); };
window.__openBaseDataModal = (coll, id, unit) => { state.baseDataModal = { coll, id: id||null, unit }; render(); };
window.__closeBaseDataModal = () => { state.baseDataModal = null; render(); };
window.__submitBaseDataModal = (ev, coll, unit, id) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const action = id
    ? (coll === "personnel" ? updateBaseData(coll, id, { name: f.get("name"), title: f.get("title"), phone: f.get("phone")||"" })
       : coll === "vehicles" ? updateBaseData(coll, id, { plate: f.get("plate"), type: f.get("type") })
       : updateBaseData(coll, id, { code: f.get("code") }))
    : (coll === "personnel" ? addPersonnel(unit, f.get("name"), f.get("title"), f.get("phone"))
       : coll === "vehicles" ? addVehicle(unit, f.get("plate"), f.get("type"))
       : addRecorder(unit, f.get("code")));
  action.then(() => { state.baseDataModal = null; render(); }).catch(baseDataErr);
};
window.__editProfile = () => { state.profileEditing = true; render(); };
window.__cancelEditProfile = () => { state.profileEditing = false; render(); };
window.__saveProfile = (ev) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  updateOwnProfile(f.get("displayName"), f.get("rank"), f.get("phone")).then(() => {
    state.profileEditing = false; render();
  }).catch(err => showToast(`個人資料儲存失敗：[${err.code||'?'}] ${err.message||err}`));
};
window.__setRecordsFilter = (key, value) => { state.recordsFilter[key] = value; render(); };
window.__toggleRecordsFilters = () => { state.recordsFiltersExpanded = !state.recordsFiltersExpanded; render(); };
window.__runRecordsQuery = () => { state.recordsApplied = { ...state.recordsFilter }; render(); };
window.__clearRecordsQuery = () => {
  state.recordsFilter = { period: "today", unit: "", vehicle: "", title: "", location: "", status: "", person: "", customDate: "" };
  state.recordsApplied = null;
  render();
};
window.__setTasksTab = (key) => { state.tasksTab = key; render(); };
window.__setStatsPeriod = (key) => { state.statsPeriod = key; render(); };
window.__setCreateTaskUnit = (code) => { state.createTaskUnit = code; render(); };
window.__createTask = (ev, unit) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const recorders = f.getAll("recorders");
  const startMileage = f.get("startMileage");
  createTask({
    unit, title: f.get("title"), vehicle: f.get("vehicle"), location: f.get("location"),
    crewLeader: f.get("crewLeader"), driver: f.get("driver"), recorders,
    startMileage: startMileage ? Number(startMileage) : null,
    startFuel: f.get("startFuel"), notes: f.get("notes")
  });
  ev.target.reset();
  nav({ name: "tasks" });
};
window.__saveTaskEdit = (ev, taskId) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const recorders = f.getAll("recorders");
  const startMileage = f.get("startMileage");
  updateTask(taskId, {
    title: f.get("title"), vehicle: f.get("vehicle"), location: f.get("location"),
    crewLeader: f.get("crewLeader"), driver: f.get("driver"), recorders,
    startMileage: startMileage ? Number(startMileage) : null,
    startFuel: f.get("startFuel"), notes: f.get("notes")
  }).then(() => nav({ name: "task", id: taskId }))
    .catch(err => showToast(`更新失敗：[${err.code||'?'}] ${err.message}`));
};

render();
</script>
</body>
</html>
