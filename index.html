<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>衛生營車輛人員動態管制系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F5F8;
    --panel:#FFFFFF;
    --panel-2:#F3F4F7;
    --border:#E7E8EE;
    --border-strong:#D8DAE3;
    --text:#15161B;
    --muted:#8A8D98;
    --amber:#FF9500;
    --red:#FF3B30;
    --green:#34C759;
    --blue:#0066FF;
    --gray:#8E8E93;
    --topbar-fade: rgba(255,255,255,0.92);
    --navbar-bg: rgba(255,255,255,0.96);
    --bottomnav-h:66px;
    --radius-sm:10px;
    --radius-md:14px;
    --radius-lg:18px;
    --shadow-xs: 0 1px 2px rgba(15,15,20,0.04);
    --shadow-sm: 0 1px 2px rgba(15,15,20,0.05), 0 2px 8px rgba(15,15,20,0.05);
    --shadow-md: 0 6px 20px rgba(15,15,20,0.08), 0 1px 3px rgba(15,15,20,0.05);
    --card-shadow: var(--shadow-sm);
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); height:100%; font-size:17px; overflow-x:hidden; max-width:100%; -webkit-font-smoothing:antialiased;}
  body{ padding-bottom:env(safe-area-inset-bottom); }
  #app{min-height:100vh; display:flex; flex-direction:column;}
  button{font-family:var(--sans); cursor:pointer; transition:transform 0.12s ease, opacity 0.12s ease;}
  button:active{transform:scale(0.96);}
  button:disabled{cursor:default;}
  .tab2, .task-card, .service-row{transition:transform 0.12s ease, box-shadow 0.12s ease;}
  .tab2:active, .task-card:active, .service-row:active{transform:scale(0.985);}

  /* ---- 固定頂部區塊（預覽 banner + topbar 一起 sticky，避免疊在一起） ---- */
  .sticky-head{position:sticky; top:0; z-index:20;}
  .preview-banner{
    background:var(--amber); color:#1A1200;
    padding:10px 14px; padding-top:calc(10px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
    font-size:13px; font-weight:700; text-align:center;
  }
  .preview-banner button{
    background:#1A1200; color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:12.5px; font-weight:700;
  }

  /* ---- 電話號碼 ---- */
  .phone-link{color:var(--blue); text-decoration:underline;}

  /* ---- top status strip ---- */
  .topbar{
    background:linear-gradient(180deg, var(--panel) 0%, var(--topbar-fade) 100%);
    backdrop-filter:blur(10px);
    box-shadow:0 1px 0 var(--border), 0 4px 16px rgba(15,15,20,0.03);
    padding:17px 19px calc(14px + env(safe-area-inset-top)) 19px;
    padding-top:calc(17px + env(safe-area-inset-top));
  }
  .topbar-title-row{min-width:0;}
  .topbar-bottom-row{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:9px;}
  .topbar-icons{display:flex; align-items:center; gap:6px; flex-shrink:0;}
  .topbar h1{font-size:clamp(19px, 5.8vw, 25px); font-weight:700; margin:0; letter-spacing:0.01em; line-height:1.3; white-space:nowrap;}
  .topbar-en{
    font-family:var(--mono); font-size:clamp(8px, 2.5vw, 12px); font-weight:600; color:var(--muted);
    letter-spacing:0.03em; text-transform:none; margin-top:4px; white-space:nowrap;
  }
  .topbar-sub{
    color:var(--text); min-width:0;
    display:flex; align-items:center; gap:9px;
  }
  .topbar-sub .name{font-family:'Noto Serif TC','Songti TC','Songti SC','PMingLiU','STSong',serif; font-size:21px; font-weight:700;}
  .topbar-sub .rank{
    font-family:var(--sans); font-size:12px; font-weight:700; color:var(--muted);
    background:var(--panel-2); padding:3px 10px; border-radius:999px; letter-spacing:0.02em;
  }
  .topbar-icon-btn{background:var(--panel-2); border:none; color:var(--text); width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .topbar-icon-btn:active{background:var(--border); transform:scale(0.92);}

  main{flex:1; padding:16px 16px 100px 16px; max-width:680px; width:100%; margin:0 auto;}

  /* ---- login ---- */
  .login-wrap{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
  .login-mark{font-family:var(--mono); font-size:13px; letter-spacing:0.25em; color:var(--blue); margin-bottom:12px;}
  .login-title{font-size:32px; font-weight:800; line-height:1.3; margin:0 0 8px 0; letter-spacing:-0.01em;}
  .login-sub{color:var(--muted); font-size:16.5px; margin-bottom:38px;}
  .btn-google{
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:#fff; color:#1F2937; font-weight:600; font-size:17.5px;
    padding:17px 23px; border-radius:var(--radius-md); border:1px solid var(--border); width:100%; max-width:340px;
    box-shadow:var(--shadow-sm);
  }
  .pending-box{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; max-width:360px; margin-top:22px; box-shadow:var(--shadow-sm);}
  .pending-box p{color:var(--text); font-size:15.5px; line-height:1.7; margin:0;}

  /* ---- cards ---- */
  .section-label{font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--muted); letter-spacing:0.09em; text-transform:uppercase; margin:26px 4px 13px 4px;}
  .section-label:first-child{margin-top:0;}
  .task-card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:20px; margin-bottom:14px; position:relative; overflow:hidden; box-shadow:var(--shadow-sm);
  }
  .task-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:0 4px 4px 0;}
  .task-card.s-pending::before{background:var(--gray);}
  .task-card.s-dispatch::before{background:var(--red);}
  .task-card.s-onscene::before{background:var(--amber);}
  .task-card.s-transit::before{background:#6B23C7;}
  .task-card.s-returning::before{background:var(--blue);}
  .task-card.s-completed::before{background:var(--green);}
  .task-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .task-title{font-size:19px; font-weight:700; margin:0 0 4px 0; letter-spacing:-0.01em;}
  .task-meta{color:var(--muted); font-size:14.5px; font-family:var(--mono); font-weight:500;}
  .badge{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-family:var(--mono); font-weight:700;
    padding:7px 13px; border-radius:var(--radius-sm); white-space:nowrap;
  }
  .badge .dot{width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0;}
  .badge.pending{background:rgba(142,142,147,0.13); color:var(--gray);}
  .badge.dispatch{background:rgba(255,59,48,0.12); color:var(--red);}
  .badge.onscene{background:rgba(255,149,0,0.13); color:#B45F00;}
  .badge.transit{background:rgba(107,35,199,0.12); color:#6B23C7;}
  .badge.returning{background:rgba(0,102,255,0.12); color:var(--blue);}
  .badge.completed{background:rgba(52,199,89,0.13); color:#177A34;}
  .task-foot{display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-size:13.5px; color:var(--muted);}
  .task-crew{display:flex; flex-direction:column; gap:6px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); font-size:14px; color:var(--text); font-family:var(--mono); font-weight:500;}
  .empty{color:var(--muted); font-size:15.5px; text-align:center; padding:46px 22px; border:1px dashed var(--border-strong); border-radius:var(--radius-lg);}

  /* ---- home ---- */
  .home-date{font-size:15px; color:var(--muted); font-weight:600; font-family:var(--mono); margin-bottom:16px;}
  .weather-card{
    display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:16px 18px; margin-bottom:18px; color:var(--muted); font-size:14px; box-shadow:var(--shadow-xs);
  }
  .weather-card .emoji{font-size:30px;}
  .hazard-banner{margin-bottom:14px;}
  .hazard-row{
    display:flex; align-items:flex-start; gap:10px; color:var(--red);
    background:rgba(255,59,48,0.08); border:1px solid rgba(255,59,48,0.22);
    border-radius:var(--radius-md); padding:12px 14px; margin-bottom:8px;
  }
  .hazard-row:last-child{margin-bottom:0;}
  .hazard-txt{flex:1; min-width:0;}
  .hazard-name{font-weight:700; font-size:14.5px; color:var(--text);}
  .hazard-time{font-size:12.5px; color:var(--muted); font-family:var(--mono); margin-top:2px;}
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:8px;}
  .stat-tile{border-radius:var(--radius-md); padding:18px 10px; text-align:center; box-shadow:var(--shadow-xs); border:1px solid transparent;}
  .stat-tile .num{font-size:27px; font-weight:800; font-family:var(--mono); letter-spacing:-0.02em;}
  .stat-tile .lbl{font-size:13px; font-weight:600; margin-top:5px;}
  .stat-tile.t-blue{background:#EAF1FF;} .stat-tile.t-blue .num{color:#0052E0;} .stat-tile.t-blue .lbl{color:#0052E0; opacity:0.7;}
  .stat-tile.t-orange{background:#FFF3E3;} .stat-tile.t-orange .num{color:#B45F00;} .stat-tile.t-orange .lbl{color:#B45F00; opacity:0.7;}
  .stat-tile.t-green{background:#E9F9EF;} .stat-tile.t-green .num{color:#177A34;} .stat-tile.t-green .lbl{color:#177A34; opacity:0.7;}
  .stat-tile.t-purple{background:#F3EEFE;} .stat-tile.t-purple .num{color:#6B23C7;} .stat-tile.t-purple .lbl{color:#6B23C7; opacity:0.7;}
  .quick-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px;
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-md); padding:18px 8px;
    color:var(--text); font-size:13.5px; font-weight:600; box-shadow:var(--shadow-xs);
  }
  .quick-icon-wrap{width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .quick-btn .navicon{font-size:26px;}
  .fab{
    position:fixed; right:22px; bottom:calc(84px + env(safe-area-inset-bottom));
    width:58px; height:58px; border-radius:50%; background:var(--blue); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,102,255,0.35); z-index:25;
  }

  /* ---- task detail ---- */
  .back-row{display:flex; align-items:center; gap:8px; margin-bottom:16px; color:var(--blue); font-size:15.5px; font-weight:600;}
  .back-row button{background:none; border:none; color:var(--blue); font-size:15.5px; font-weight:600; padding:6px 0; font-family:var(--sans);}
  .detail-head{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:18px; box-shadow:var(--shadow-sm);}
  .detail-head .task-title{font-size:20px;}
  .kv{display:grid; grid-template-columns:96px 1fr; gap:12px 12px; margin-top:14px; font-size:15px;}
  .kv .k{color:var(--muted); font-weight:600; font-family:var(--mono); font-size:12px; padding-top:2px; text-transform:uppercase; letter-spacing:0.04em;}
  .kv .v{color:var(--text);}

  .no-permission{color:var(--muted); font-size:14.5px; text-align:center; padding:16px; border:1px dashed var(--border-strong); border-radius:var(--radius-md); margin-bottom:20px;}

  /* ---- 勤務進度 Stepper（融合實際回報內容＋未來步驟預覽） ---- */
  .stepper{position:relative; padding-left:32px; margin:14px 0 20px 0;}
  .stepper::before{content:''; position:absolute; left:9px; top:8px; bottom:8px; width:2px; background:var(--border);}
  .step-item{position:relative; padding-bottom:20px; display:flex; align-items:flex-start; gap:12px;}
  .step-item:last-child{padding-bottom:0;}
  .step-dot{
    position:absolute; left:-32px; top:0; width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel); border:2px solid var(--border-strong); color:#fff; z-index:1;
  }
  .step-item.done .step-dot{background:var(--green); border-color:var(--green);}
  .step-item.current .step-dot{background:var(--blue); border-color:var(--blue); box-shadow:0 0 0 4px rgba(0,102,255,0.16);}
  .step-label{font-size:14.5px; font-weight:600; color:var(--muted);}
  .step-item.done .step-label{color:var(--text);}
  .step-item.current .step-label{color:var(--blue); font-weight:700;}
  .step-body{flex:1; min-width:0; padding-top:1px;}
  .step-head{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .step-meta{font-family:var(--mono); font-size:13px; color:var(--muted); font-weight:500; margin-top:3px;}
  .step-note{font-size:14px; color:var(--text); margin-top:5px;}

  /* ---- Sticky Bottom Action Bar：主要回報按鈕固定在畫面底部，方便單手操作 ---- */
  .sticky-action-bar{
    position:fixed; left:0; right:0; bottom:calc(var(--bottomnav-h) + env(safe-area-inset-bottom)); z-index:26;
    background:var(--navbar-bg); backdrop-filter:blur(14px);
    box-shadow:0 -1px 0 var(--border), 0 -8px 20px rgba(15,15,20,0.05);
    padding:12px 16px; display:flex; gap:10px;
  }
  .sticky-action-bar .btn-primary, .sticky-action-bar .btn-ghost{
    flex:1; margin-top:0; padding:16px; font-size:16px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-primary.green{background:var(--green); box-shadow:0 4px 14px rgba(52,199,89,0.25);}
  .sticky-bar-spacer{height:78px;}
  .btn-ghost{background:none; border:1.5px solid var(--border); color:var(--text); font-weight:600; border-radius:var(--radius-sm); padding:15px; font-size:16px; font-family:var(--sans);}

  .tl-edit-btn{background:none; border:none; color:var(--blue); font-size:13px; font-weight:600; padding:2px 0; flex-shrink:0;}

  /* ---- forms / admin ---- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:7px; font-family:var(--mono); letter-spacing:0.02em;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:13px 14px; border-radius:var(--radius-sm); font-size:16px; font-family:var(--sans);
    transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,102,255,0.14);
  }
  .field textarea{resize:vertical; min-height:72px;}
  .field input:disabled{color:var(--muted); background:var(--bg);}
  /* iOS Safari 的 time/date 原生控制項有時會忽略外層寬度限制而撐出版面，強制鎖定尺寸 */
  input[type="date"], input[type="time"]{
    font-size:16px !important;
    box-sizing:border-box !important;
    -webkit-appearance:none !important;
    width:100% !important;
    height:44px;
    display:block;
  }
  .btn-primary{width:100%; background:var(--blue); color:#fff; font-weight:700; border:none; padding:15px; border-radius:var(--radius-sm); font-size:16px; margin-top:4px; box-shadow:0 4px 14px rgba(0,102,255,0.25);}
  .admin-row{display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--border); padding:14px 16px; border-radius:var(--radius-md); margin-bottom:10px; box-shadow:var(--shadow-xs);}
  .admin-row .name{font-size:15px; font-weight:600; word-break:break-word;}
  .admin-row .sub{font-size:13.5px; color:var(--muted); font-family:var(--mono); word-break:break-word;}
  .admin-row > div:first-child{min-width:0; flex:1 1 160px;}
  .icon-btn{background:var(--panel-2); border:1px solid var(--border); color:var(--text); font-weight:600; border-radius:var(--radius-sm); padding:9px 13px; font-size:14px; display:inline-flex; align-items:center; gap:5px;}
  .icon-btn.danger{color:var(--red); border-color:rgba(255,59,48,0.25); background:rgba(255,59,48,0.06);}
  .icon-btn.primary{color:#fff; background:var(--blue); border-color:var(--blue);}
  .role-select{background:var(--panel-2); border:1px solid var(--border); color:var(--text); font-size:13.5px; border-radius:var(--radius-sm); padding:8px 10px; font-family:var(--mono); min-width:0; max-width:100%;}
  .role-controls{display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; width:100%;}
  .role-controls select{flex:1 1 120px; min-width:0;}
  .tabs2{display:flex; gap:4px; margin-bottom:18px; background:var(--panel-2); padding:4px; border-radius:var(--radius-md);}
  .tab2{flex:1; text-align:center; padding:10px; border-radius:calc(var(--radius-md) - 4px); font-size:13.5px; font-weight:600; color:var(--muted); white-space:nowrap;}
  .tab2.active{background:var(--panel); color:var(--text); box-shadow:var(--shadow-xs);}
  .tab2-count{margin-left:5px; opacity:0.65; font-weight:700;}
  /* 頁籤數量較多（例如任務狀態篩選）時改成可橫向滑動的膠囊列，每個頁籤依內容寬度排列，
     不會被擠壓到文字換行。 */
  .tabs2.scroll{overflow-x:auto; scrollbar-width:none;}
  .tabs2.scroll::-webkit-scrollbar{display:none;}
  .tabs2.scroll .tab2{flex:0 0 auto; padding:9px 15px;}

  /* ---- records search ---- */
  .search-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;}
  .search-grid .field{margin-bottom:0;}
  .search-grid .full{grid-column:1 / -1;}
  .pill-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
  .pill{
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    font-weight:600; font-size:13.5px; padding:8px 15px; border-radius:var(--radius-sm); font-family:var(--sans);
    box-shadow:var(--shadow-xs);
  }
  .pill.active{background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 3px 10px rgba(0,102,255,0.25);}
  .filters-toggle{
    display:flex; align-items:center; justify-content:center; gap:6px; width:100%;
    background:none; border:none; padding:6px 2px; margin-bottom:2px;
    color:var(--muted); font-weight:600; font-size:14px; font-family:var(--sans);
  }
  .filters-toggle .chev{transition:transform 0.2s;}
  .filters-toggle.open .chev{transform:rotate(180deg);}

  /* ---- profile / 更多 ---- */
  .hub-head{display:flex; flex-direction:column; align-items:center; text-align:center; padding:14px 0 10px 0;}
  .hub-avatar{width:88px; height:88px; border-radius:50%; object-fit:cover; box-shadow:var(--shadow-sm); background:var(--panel-2); display:flex; align-items:center; justify-content:center; color:var(--muted);}
  .hub-name{margin-top:14px; font-family:'Noto Serif TC','Songti TC','Songti SC','PMingLiU','STSong',serif; font-size:22px; font-weight:700; color:var(--text);}
  .hub-sub{margin-top:4px; font-size:14px; color:var(--muted);}
  .hub-icon-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:22px 0;}
  .service-row{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-md); padding:15px 16px; margin-bottom:10px; box-shadow:var(--shadow-xs); cursor:pointer;}
  .service-row .icon-wrap{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .service-row .txt{flex:1; min-width:0;}
  .service-row .txt .t1{font-weight:600; font-size:15px; color:var(--text);}
  .service-row .txt .t2{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .service-row .chev{color:var(--muted); flex-shrink:0; font-size:20px;}

  /* ---- stats / charts ---- */
  .chart-card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; margin-bottom:18px; box-shadow:var(--shadow-sm);}
  .chart-title{font-size:14.5px; font-weight:700; margin-bottom:16px; color:var(--text);}
  .bar-row{display:flex; align-items:center; gap:12px; margin-bottom:14px; font-size:14px;}
  .bar-row .bar-label{width:88px; flex-shrink:0; color:var(--muted); font-weight:600; font-family:var(--mono); font-size:13px;}

  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged

/* =========================================================
   1) Firebase 設定 — 請填入你自己的專案設定
   Firebase Console → 專案設定 → 一般 → 你的應用程式
   ========================================================= */
const BUILD_TAG = "2026-07-04-73-fix-time-input-overflow";

const firebaseConfig = {
  apiKey: "AIzaSyDHJ_ZVLwl9-bD-ZPCTsBcfSjK1A15oJN4",

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

/* =========================================================
   1b) Firestore REST 用戶端
   部分行動網路環境會干擾 Firestore SDK 預設的長連線/串流協定，
   導致一直卡在 "client is offline"；這裡改用一般的 HTTPS REST
   請求存取 Firestore，即時同步則改為定時輪詢。
   ========================================================= */
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents`;

function toFsValue(v){
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (v instanceof Date) return { timestampValue: v.toISOString() };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFsValue) } };
  if (typeof v === "object") return { mapValue: { fields: toFsFields(v) } };
  return { stringValue: String(v) };
}
function toFsFields(obj){
  const out = {};
  for (const k in obj) if (obj[k] !== undefined) out[k] = toFsValue(obj[k]);
  return out;
}
function fromFsValue(v){
  if (!v) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("integerValue" in v) return parseInt(v.integerValue, 10);
  if ("doubleValue" in v) return v.doubleValue;
  if ("timestampValue" in v) return v.timestampValue;
  if ("nullValue" in v) return null;
  if ("arrayValue" in v) return (v.arrayValue.values||[]).map(fromFsValue);
  if ("mapValue" in v) return fromFsFields(v.mapValue.fields||{});
  return null;
}
function fromFsFields(fields){
  const out = {};
  for (const k in fields||{}) out[k] = fromFsValue(fields[k]);
  return out;
}

async function fsFetch(path, options={}, allow404=false){
  const idToken = await auth.currentUser.getIdToken();
  const res = await fetch(`${FIRESTORE_BASE}/${path}`, {
    ...options,
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json", ...(options.headers||{}) }
  });
  // 404 只有在「讀取單一文件、文件不存在」時才是合理狀態；
  // 寫入（PATCH/POST/DELETE）如果也回傳 404，一定是真的出錯了，
  // 必須丟出例外，不能被這裡靜默吃掉，否則會誤以為寫入成功。
  if (!res.ok && !(allow404 && res.status === 404)) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
  return res;
}
async function fsGetDoc(path){
  const res = await fsFetch(path, {}, true);
  if (res.status === 404) return null;
  const data = await res.json();
  return fromFsFields(data.fields);
}
async function fsSetDoc(path, obj){
  const mask = Object.keys(obj).map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join("&");
  await fsFetch(`${path}?${mask}`, { method: "PATCH", body: JSON.stringify({ fields: toFsFields(obj) }) });
}
async function fsAddDoc(collectionPath, obj){
  const res = await fsFetch(collectionPath, { method: "POST", body: JSON.stringify({ fields: toFsFields(obj) }) });
  const data = await res.json();
  return { id: data.name.split("/").pop(), ...fromFsFields(data.fields) };
}
async function fsDeleteDoc(path){
  await fsFetch(path, { method: "DELETE" });
}
async function fsListCollection(collectionPath){
  const res = await fsFetch(`${collectionPath}?pageSize=300`);
  const data = await res.json();
  return (data.documents||[]).map(d => ({ id: d.name.split("/").pop(), ...fromFsFields(d.fields) }));
}

// 不再定時自動輪詢（使用者反應一直背景更新很干擾）。改成只在建立時抓一次，
// 之後只有畫面切換／使用者做出寫入動作時才會呼叫 refreshNow() 手動刷新一次，
// 沒有任何背景計時器會自己觸發重繪。
function poll(fn){
  let stopped = false;
  async function tick(){
    if (stopped) return;
    try { await fn(); } catch(e){ console.error("刷新失敗", e); }
  }
  tick();
  return {
    stop(){ stopped = true; },
    refreshNow(){ if (!stopped) tick(); }
  };
}

/* =========================================================
   2) Event 類型定義
   ========================================================= */
const EVENT_TYPES = [
  { type: "DISPATCH",      label: "出勤",     icon: "alert",       statusKey: "dispatch",  hint: "從營區出發" },
  { type: "ARRIVED_SCENE", label: "抵達現場", icon: "pin",         statusKey: "onscene",   hint: "抵達勤務目的地" },
  { type: "DEPART_SCENE",  label: "離開現場", icon: "depart",      statusKey: "transit",   hint: "離開目前地點，前往下一個地點" },
  { type: "RETURNING",     label: "返營",     icon: "returnArrow", statusKey: "returning", hint: "處置完畢，返回營區" },
  { type: "COMPLETED",     label: "抵達營區", icon: "flag",        statusKey: "completed", hint: "完成勤務，回報最終里程與油量" }
];
// 勤務進度 Stepper 固定的 5 個步驟（依 EVENT_TYPES 順序），抵達現場／離開現場
// 若同一趟勤務重複多次，Stepper 一律以「最新一筆事件」決定目前走到第幾步。
const STEP_TYPES = EVENT_TYPES.map(e => e.type);
const STATUS_LABEL = {
  pending:   "待出勤",
  dispatch:  "出勤中",
  onscene:   "已抵達現場",
  transit:   "前往下一地點",
  returning: "返營中",
  completed: "已完成"
};
// 順序決定「下一個建議動作」，但不強制封鎖其他按鈕（保留調度彈性）
const STATUS_ORDER = ["pending","dispatch","onscene","transit","returning","completed"];

const ROLE_LABEL = {
  admin: "管理員", duty_officer: "高勤官", commander: "主官管",
  member: "一般成員", pending: "待審核", disabled: "已停用"
};

/* =========================================================
   2b) 單位（Unit）定義
   目前固定為營部／第一連／第二連三個單位；所有人員、車輛、
   行車紀錄器、勤務皆綁定 unit 欄位，並依角色＋單位做資料範圍限制。
   ========================================================= */
const UNITS = [
  { code: "hq",  label: "營部" },
  { code: "co1", label: "第一連" },
  { code: "co2", label: "第二連" }
];
function unitLabel(code){ return (UNITS.find(u => u.code === code) || {}).label || code || "未設定"; }

/* =========================================================
   2d) 氣象預報（中央氣象署 CWA 開放資料平臺，依單位對應縣市）
   ========================================================= */
const CWA_API_KEY = "CWA-C471B712-733E-4115-9AD2-0E1D96D3A10E";
const UNIT_WEATHER_LOCATION = { hq: "臺中市", co1: "臺中市", co2: "嘉義縣" };

/* =========================================================
   2c) 階級（依權重排序，數字越小階級越高）
   ========================================================= */
const RANKS = ["中校","少校","上尉","中尉","少尉","士官長","上士","中士","下士","上等兵","一等兵","二等兵"];
function rankWeight(rank){ const i = RANKS.indexOf(rank); return i === -1 ? RANKS.length : i; }

const VEHICLE_TYPES = ["城市型救護車","野戰型救護車","悍馬型救護車","中型戰術輪車","輕型戰術輪車","1.75貨車"];

const FUEL_LEVELS = ["1/4","1/2","3/4","滿油"];
function fuelOptions(sel){
  return `<option value="">請選擇油量</option>${FUEL_LEVELS.map(f => `<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join("")}`;
}

/* =========================================================
   3) 全域狀態
   ========================================================= */
const state = {
  user: null, profile: null, tasks: [], events: [],
  personnel: [], vehicles: [], recorders: [],
  route: { name: "home" }, adminTab: "tasks",
  reportDraft: null, // { taskId, type }
  eventEditId: null, // 正在編輯哪一筆已回報事件（時間/里程填錯時修正用）
  recordsFilter: { period: "today", unit: "", vehicle: "", title: "", location: "", status: "", person: "", customDate: "" },
  recordsFiltersExpanded: false,
  recordsApplied: null, // 查詢後的篩選條件快照；null 代表尚未按下查詢
  tasksTab: "all",
  statsPeriod: "today",
  profileEditing: false,
  baseDataUnit: "", baseDataTab: "personnel", baseDataModal: null, // 基礎資料管理頁籤狀態；baseDataModal: {coll, id, unit} | null
  createTaskUnit: "", // 建立勤務頁面：admin/高勤官可切換的單位
  previewActive: false, realRoleUnit: null, // 角色權限預覽（僅限 admin）
  weather: null, // 首頁氣象預報（依單位對應縣市，見 ensureWeatherLoaded）
  hazards: null // 首頁天氣特報／陸上警報（依單位對應縣市，見 ensureHazardsLoaded）
};
let tasksPoll = null, eventsPoll = null, profilePoll = null;
let personnelPoll = null, vehiclesPoll = null, recordersPoll = null;
// 只有資料真的變動時才重繪畫面，避免每次背景輪詢都整頁重畫造成畫面閃爍/捲動位置跳動。
const lastJson = {};
function changedSince(cacheKey, value){
  const json = JSON.stringify(value);
  const changed = json !== lastJson[cacheKey];
  lastJson[cacheKey] = json;
  return changed;
}

/* =========================================================
   4) 狀態推導（純函式：Event 陣列 → 狀態）
   ========================================================= */
function deriveStatus(taskId) {
  const evs = state.events.filter(e => e.taskId === taskId).sort((a,b) => (a.ts||0) - (b.ts||0));
  if (evs.length === 0) return "pending";
  const last = evs[evs.length - 1];
  const def = EVENT_TYPES.find(t => t.type === last.type);
  return def ? def.statusKey : "pending";
}
function taskEvents(taskId) {
  return state.events.filter(e => e.taskId === taskId).sort((a,b) => (a.ts||0) - (b.ts||0));
}
function eventByType(taskId, type){
  return taskEvents(taskId).find(e => e.type === type) || null;
}
// Workflow 導向：除了已抵達現場之後（可能前往下一個地點、也可能直接返營，
// 真正需要分岔）以外，任何時候都只有「一個」下一步動作，讓使用者不用自己
// 判斷流程，只要照系統提示做下一步就好。
// 「離開現場」不再是使用者要另外確認的一個步驟——離開現場一定跟前一筆抵達
// 同一個地點、同一個里程，沒有東西好額外填，所以改成在使用者選擇「前往
// 下一個地點」或「返回營區」時自動、安靜地補寫在後面（見 addEvent 呼叫端
// 的 reportDepartThenContinue），避免同樣的時間/里程要填兩次。
function reportableTypes(taskId){
  if (deriveStatus(taskId) === "completed") return [];
  const evs = taskEvents(taskId);
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  if (!lastType || lastType === "DISPATCH") return ["ARRIVED_SCENE"];
  if (lastType === "ARRIVED_SCENE" || lastType === "DEPART_SCENE") return ["ARRIVED_SCENE", "RETURNING"]; // 唯一的分岔點
  if (lastType === "RETURNING") return ["COMPLETED"];
  return [];
}
function isSameDay(ms, ref){
  if (!ms) return false;
  const a = new Date(ms), b = ref;
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function durationLabel(ms){
  if (ms == null || ms < 0) return "—";
  const mins = Math.round(ms/60000);
  if (mins < 60) return `${mins} 分鐘`;
  const h = Math.floor(mins/60), m = mins%60;
  return `${h} 小時 ${m} 分鐘`;
}

/* =========================================================
   5) RBAC
   ========================================================= */
// 舊資料相容：早期版本把連級主官管存成 "company_commander"，統一正規化成 "commander"。
function normalizeRole(role){ return role === "company_commander" ? "commander" : role; }
function myRole(p){ return p ? normalizeRole(p.role) : ""; }
function myUnit(p){ return (p && p.unit) || ""; }
function isActive(p){ const r = myRole(p); return p && r !== "pending" && r !== "disabled"; }
function canSeeAllUnits(p){ const r = myRole(p); return r === "admin" || r === "duty_officer"; }
function canManageUsers(p){ return myRole(p) === "admin"; }
// 任務管理／基礎資料管理：admin、高勤官（全單位），連級主官管（僅自己單位）皆可進入管理後台
function canManageTasks(p){ const r = myRole(p); return r === "admin" || r === "duty_officer" || r === "commander"; }
function canManageBaseData(p){ return canManageTasks(p); }
function canSeeAllTasks(p){ return canSeeAllUnits(p); }
// 高勤官、主官管對勤務只有查看權限：不可編輯、不可強制結束，僅 admin 可操作。
function canDeleteTask(p){ return myRole(p) === "admin"; }
function canForceEndTask(p){ return myRole(p) === "admin"; }
function canCreateTask(p){ const r = myRole(p); return r === "admin" || r === "duty_officer" || r === "commander"; } // 一般成員不可建立勤務，僅可回報
function canEditTask(p, t){ return myRole(p) === "admin"; }
// 回報（出勤/抵達現場/返營/抵達營區）僅開放給實際執行勤務的一般成員，以及 admin（後台支援用）；
// 高勤官、主官管屬於督導/查看角色，不進行第一線回報操作。
function canReport(p, task){ const r = myRole(p); return r === "admin" || r === "member"; }
function visibleTasks(p, tasks){
  if (!p) return [];
  if (canSeeAllUnits(p)) return tasks;
  return tasks.filter(t => t.unit === myUnit(p));
}

/* =========================================================
   5b) 角色權限預覽（僅限 admin）
   只切換畫面顯示用的 role/unit，讓管理員能檢視「換成別的角色/單位
   登入後預設會看到什麼」，不會真的變更帳號、也不影響 Firestore
   實際的讀寫權限（那些永遠依照真實登入帳號的 role/unit 判斷）。
   ========================================================= */
const PREVIEW_OPTIONS = [
  { role:"duty_officer", unit:"", label:"高勤官" },
  { role:"commander", unit:"hq", label:"營部主官管" },
  { role:"member", unit:"hq", label:"營部一般成員" },
  { role:"commander", unit:"co1", label:"第一連主官管" },
  { role:"member", unit:"co1", label:"第一連一般成員" },
  { role:"commander", unit:"co2", label:"第二連主官管" },
  { role:"member", unit:"co2", label:"第二連一般成員" }
];
function startRolePreview(role, unit){
  if (!state.realRoleUnit) state.realRoleUnit = { role: state.profile.role, unit: state.profile.unit };
  state.profile.role = role;
  state.profile.unit = unit || "";
  state.previewActive = true;
  nav({ name: "home" });
}
function endRolePreview(){
  if (state.realRoleUnit) {
    state.profile.role = state.realRoleUnit.role;
    state.profile.unit = state.realRoleUnit.unit;
    state.realRoleUnit = null;
  }
  state.previewActive = false;
  nav({ name: "profile" });
}

/* =========================================================
   6) Firestore 動作
   ========================================================= */
async function addEvent(taskId, type, extra, opts){
  const task = state.tasks.find(t => t.id === taskId);
  await fsAddDoc("events", {
    taskId, type, unit: task ? task.unit : "",
    timestamp: new Date(),
    userId: state.user.uid,
    userName: state.profile.displayName || state.user.displayName || state.user.email,
    ...extra
  });
  if (!opts?.silent) {
    showToast(`已回報：${EVENT_TYPES.find(t=>t.type===type).label}`);
    if (eventsPoll) eventsPoll.refreshNow();
  }

// 「離開現場」一定跟前一筆抵達同一個地點、同一個里程，沒有東西好額外填，
// 所以選擇「前往下一個地點」或「返回營區」時自動在背後補寫一筆離開現場
// （沿用最後一筆已知里程；若是直接返營，時間也直接沿用返營當下送出的
// 時間，因為兩者本來就是同一刻），使用者不需要把同樣的時間/里程填兩次。
async function reportDepartThenContinue(taskId, nextType, extra){
  const evs = taskEvents(taskId);
  const lastMileageEv = evs.slice().reverse().find(e => e.mileage != null);
  const departExtra = { mileage: lastMileageEv ? lastMileageEv.mileage : null };
  if (nextType === "RETURNING" && extra.timestamp) departExtra.timestamp = extra.timestamp;
  await addEvent(taskId, "DEPART_SCENE", departExtra, { silent: true });
  await addEvent(taskId, nextType, extra);
}

// 帳號已綁定單位，理應自動出現在該單位的人員名冊（基礎資料管理／建立勤務下拉選單），
// 不必再由管理員手動重複輸入一次姓名。以 uid 作為 personnel 文件 id 做鏡射同步。
async function syncPersonnelFromUsers(users){
  let firstError = null;
  for (const u of users) {
    const r = normalizeRole(u.role);
    if (!u.unit) { // 未指派單位：若先前有鏡射資料需一併移除，避免殘留
      if (state.personnel.find(x => x.id === u.id)) { try { await fsDeleteDoc(`personnel/${u.id}`); } catch(e){ firstError = firstError || e; } }
      continue;
    }
    const active = r !== "pending" && r !== "disabled";
    const name = u.displayName || u.email || u.id;
    const title = u.rank || ROLE_LABEL[r] || "";
    const phone = u.phone || "";
    const existing = state.personnel.find(x => x.id === u.id);
    if (existing && existing.unit === u.unit && existing.active === active && existing.name === name && existing.title === title && (existing.phone||"") === phone) continue;
    try { await fsSetDoc(`personnel/${u.id}`, { unit: u.unit, name, title, phone, active }); } catch(e){ console.error("同步人員資料失敗", e); firstError = firstError || e; }
  }
  if (personnelPoll) personnelPoll.refreshNow();
  // 同步失敗最常見的原因是 Firestore 規則還沒發布到最新版本（personnel 集合不在
  // 舊規則裡，會被預設拒絕），這裡明確提示出來，避免又變成「看起來沒反應」的靜默失敗。
  if (firstError) showToast(`人員資料同步失敗：[${firstError.code||'?'}] ${firstError.message||firstError}（可能是 Firestore 規則尚未更新）`);
}

onAuthStateChanged(auth, async (user) => {
  cleanupListeners();
  state.user = user;
  if (!user) { state.profile = null; render(); return; }

  render(); // 立即顯示 spinner，避免畫面停留在登入頁

  try {
    const path = `users/${user.uid}`;
    let data = await fsGetDoc(path);
    if (!data) {
      data = { email: user.email, displayName: user.displayName, role: "pending", unit: "", createdAt: new Date() };
      await fsSetDoc(path, data);
    }
    state.profile = { uid: user.uid, ...data };
    if (state.profile.role !== "pending") startDataListeners();
    render();

    profilePoll = poll(async () => {
      const p = await fsGetDoc(path);
      if (!p) return;
      const wasPending = state.profile && state.profile.role === "pending";
      const changed = changedSince("profile", p);
      if (state.previewActive) {
        // 預覽模式進行中：背景保持同步真實角色/單位，但不覆蓋畫面上正在預覽的狀態
        state.realRoleUnit = { role: p.role, unit: p.unit };
        state.profile = { ...state.profile, uid: user.uid, displayName: p.displayName, email: p.email, rank: p.rank, createdAt: p.createdAt };
      } else {
        state.profile = { uid: user.uid, ...p };
      }
      if (wasPending && state.profile.role !== "pending") startDataListeners();
      if (changed || (wasPending && state.profile.role !== "pending")) safeRender();
    });
  } catch (err) {
    console.error("登入後初始化失敗", err);
    showToast(`登入後初始化失敗：[${err.code||'?'}] ${err.message} · build:${BUILD_TAG}`);
  }
});

function startDataListeners(){
  if (tasksPoll || eventsPoll) return;
  tasksPoll = poll(async () => {
    const docs = await fsListCollection("tasks");
    docs.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    const changed = changedSince("tasks", docs);
    state.tasks = docs;
    if (changed) safeRender();
  });
  eventsPoll = poll(async () => {
    const docs = await fsListCollection("events");
    docs.forEach(d => { d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });
    docs.sort((a,b) => a.ts - b.ts);
    const changed = changedSince("events", docs);
    state.events = docs;
    if (changed) safeRender();
  });
  personnelPoll = poll(async () => {
    const docs = await fsListCollection("personnel");
    const changed = changedSince("personnel", docs);
    state.personnel = docs;
    if (changed) safeRender();
  });
  vehiclesPoll = poll(async () => {
    const docs = await fsListCollection("vehicles");
    const changed = changedSince("vehicles", docs);
    state.vehicles = docs;
    if (changed) safeRender();
  });
  recordersPoll = poll(async () => {
    const docs = await fsListCollection("recorders");
    const changed = changedSince("recorders", docs);
    state.recorders = docs;
    if (changed) safeRender();
  });
  ensureUnitsSeeded();
}
function cleanupListeners(){
  [tasksPoll, eventsPoll, profilePoll, personnelPoll, vehiclesPoll, recordersPoll].forEach(p => p && p.stop());
  for (const k in lastJson) delete lastJson[k];
  tasksPoll = eventsPoll = profilePoll = personnelPoll = vehiclesPoll = recordersPoll = null;
  state.tasks = []; state.events = []; state.personnel = []; state.vehicles = []; state.recorders = [];
  state.previewActive = false; state.realRoleUnit = null;
}

let unitsSeeded = false;
async function ensureUnitsSeeded(){
  if (unitsSeeded) return;
  unitsSeeded = true;
  try {
    const existing = await fsListCollection("units");
    const have = new Set(existing.map(u => u.id));
    for (const u of UNITS) {
      if (!have.has(u.code)) await fsSetDoc(`units/${u.code}`, { name: u.label, order: UNITS.indexOf(u) });

}

/* =========================================================
   7b) 氣象預報（中央氣象署 CWA 開放資料 API，直接從瀏覽器端呼叫；
   縣市層級 36 小時天氣預報，快取 30 分鐘，只在切換單位或首頁重新
   整理時才會重抓，不使用背景計時器）
   ========================================================= */
const weatherCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let weatherLoadingCounty = null;
async function fetchWeather(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const loc = json?.records?.location?.[0];
  if (!loc) throw new Error("查無天氣資料");
  const els = {};
  loc.weatherElement.forEach(e => { els[e.elementName] = e.time; });
  return {
    county,
    wx: els.Wx?.[0]?.parameter?.parameterName || "—",
    pop: els.PoP?.[0]?.parameter?.parameterName ?? null,
    minT: els.MinT?.[0]?.parameter?.parameterName ?? null,
    maxT: els.MaxT?.[0]?.parameter?.parameterName ?? null
  };
}
function ensureWeatherLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = weatherCache[county];
  if (cached && Date.now() - cached.fetchedAt < 30*60*1000) { state.weather = cached.data; return; }
  if (weatherLoadingCounty === county) return;
  weatherLoadingCounty = county;
  fetchWeather(county).then(data => {
    weatherCache[county] = { data, fetchedAt: Date.now() };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣資訊載入失敗", err);
    state.weather = { error: true, county, message: err.message || String(err) };
    weatherLoadingCounty = null;
    safeRender();
  });
}
function weatherIconFor(wx){
  if (!wx) return "cloud";
  if (wx.includes("雷") || wx.includes("雨")) return "rain";
  if (wx.startsWith("晴") && !wx.includes("多雲") && !wx.includes("陰")) return "sun";
  return "cloud";
}

// 天氣特報（W-C0033-001，各縣市目前有效的天氣警特報，含颱風陸上警報／大雨特報等）。
// 縣市層級的特報 feed 本身就會涵蓋「颱風陸上警報」：陸上警報生效時，受影響縣市會
// 出現在這份清單裡，不需要另外接颱風警報單的資料集。
const hazardCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let hazardLoadingCounty = null;
async function fetchHazards(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0033-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  console.log("[天氣特報原始回應]", county, json);
  const locs = json?.records?.location || [];
  const loc = locs.find(l => l.locationName === county) || locs[0];
  const hazards = loc?.hazardConditions?.hazards || [];
  return hazards.map(h => ({
    phenomena: h.info?.phenomena || "天氣特報",
    significance: h.info?.significance || "",
    startTime: h.validTime?.startTime || null,
    endTime: h.validTime?.endTime || null
  }));
}
function ensureHazardsLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = hazardCache[county];
  if (cached && Date.now() - cached.fetchedAt < 10*60*1000) { state.hazards = { county, list: cached.data }; return; }
  if (hazardLoadingCounty === county) return;
  hazardLoadingCounty = county;
  fetchHazards(county).then(data => {
    hazardCache[county] = { data, fetchedAt: Date.now() };
    state.hazards = { county, list: data };
    hazardLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣特報載入失敗", err);
    state.hazards = { county, error: true, message: err.message || String(err) };
    hazardLoadingCounty = null;
    safeRender();
  });
}

function timeAgo(ms){
  if (!ms) return "—";
  const diff = Math.max(0, Date.now() - ms);
  const m = Math.floor(diff/60000);
  if (m < 1) return "剛剛";
  if (m < 60) return `${m} 分鐘前`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} 小時前`;
  return `${Math.floor(h/24)} 天前`;
}
function fmtTime(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
}
function fmtDate(d){
  return d.toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
// 回報表單的時間欄位只顯示「時:分」不顯示日期（勤務都是當天的），
// 送出時再跟今天的日期組合成完整時間。
function hhmmValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
// 把「HH:mm」字串跟今天的日期組合成完整的本地時間 Date。
function todayAt(hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
// 編輯既有回報時，時間欄位一樣只顯示「時:分」，但要沿用該筆回報「原本
// 的日期」（可能不是今天），不能用 todayAt()，否則修正時間會被誤改到
// 今天的日期。
function dateAt(baseMs, hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date(baseMs);
  d.setHours(h, m, 0, 0);
  return d;
}
function showToast(msg){
  let t = document.getElementById("toast");
  if (!t){ t = document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove("show"), 2200);
}

function statusBadge(statusKey){
  const cls = { pending:"pending", dispatch:"dispatch", onscene:"onscene", transit:"transit", returning:"returning", completed:"completed" }[statusKey];
  return `<span class="badge ${cls}"><i class="dot"></i>${STATUS_LABEL[statusKey]}</span>`;
}
function taskCardClass(statusKey){
  return { pending:"s-pending", dispatch:"s-dispatch", onscene:"s-onscene", transit:"s-transit", returning:"s-returning", completed:"s-completed" }[statusKey];
}
// 依姓名＋單位查該人員的電話（人員資料由帳號同步或基礎資料管理手動維護）。
// 舊資料（單位欄位、下拉選單上線前）可能沒有 unit，姓名也常跟階級直接連寫成
// 一串，例如「林伯霖上士」，對不上人員名冊裡單純的姓名「林伯霖」。這裡先在
// 同單位內精準比對、再開頭比對；都找不到的話（通常是舊資料缺 unit）才放寬
// 成全部單位一起找，讓舊任務也能顯示電話。
function findPersonnelByName(pool, name){
  return pool.find(x => x.name === name) || pool.find(x => x.name && name.startsWith(x.name));
}
function findPersonnel(name, unit){
  if (!name) return null;
  const scoped = unit ? state.personnel.filter(x => x.unit === unit) : state.personnel;
  return findPersonnelByName(scoped, name) || (unit ? findPersonnelByName(state.personnel, name) : null);
}
// 姓名 + 階級（若姓名本身沒有帶階級，如新版下拉選單只存姓名，才補上人員名冊的階級）。
// 凡是畫面上會出現人名的地方都套用，讓階級一律跟著姓名顯示。
function nameWithRank(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const rank = (match && match.title && !name.includes(match.title)) ? ' ' + match.title : '';
  return esc(name) + esc(rank);
}
// 姓名 + 階級 + 電話（可點擊撥打），給車長/駕駛這種需要聯絡方式的欄位用。
// iOS Safari 對 tel: 連結一律會跳出「已阻擋此網站自動開始通話」的系統提示，不管
// 連結上有沒有掛 JS、也不管有沒有先跳自訂確認視窗，這是瀏覽器層級的行為，網頁端
// 無法繞過，加一層自訂確認視窗只是多一次點擊而已，所以還是用最單純的寫法。
function crewLabel(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  return `${nameWithRank(name, unit)}${phone ? ` <a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''}`;
}
function taskCard(t){
  const s = deriveStatus(t.id);
  const evs = taskEvents(t.id);
  const last = evs[evs.length-1];
  return `
  <div class="task-card ${taskCardClass(s)}" onclick="if(!event.target.closest('a')) window.__nav({name:'task', id:'${t.id}'})">
    <div class="task-top">
      <div>
        <p class="task-title">${esc(t.title)}</p>
        <div class="task-meta">${esc(t.vehicle||'—')} · ${esc(t.location||'—')}</div>
      </div>
      ${statusBadge(s)}
    </div>
    <div class="task-crew">
      <span>車長：${crewLabel(t.crewLeader, t.unit)}</span>
      <span>駕駛：${crewLabel(t.driver, t.unit)}</span>
    </div>
    <div class="task-foot" style="justify-content:${last ? 'flex-end' : 'flex-start'};">
      <span>${last ? timeAgo(last.ts) : '尚無回報'}</span>
    </div>
  </div>`;
}

function renderWeatherCard(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const w = state.weather;
  if (!w) return `<div class="weather-card"><span class="emoji">${icon('cloud',30)}</span><div>天氣資訊載入中…</div></div>`;
  if (w.error || w.county !== county) return `<div class="weather-card"><span class="emoji">${icon('cloud',30)}</span><div>${esc(county)}天氣資訊載入失敗${w.message ? '：'+esc(w.message) : ''}</div></div>`;
  const range = (w.minT!=null && w.maxT!=null) ? `${w.minT}° - ${w.maxT}°` : "";
  return `
    <div class="weather-card">
      <span class="emoji">${icon(weatherIconFor(w.wx),30)}</span>
      <div>
        <div style="color:var(--text); font-weight:700; font-size:15px;">${esc(county)} · ${esc(w.wx)}</div>
        <div style="margin-top:2px;">${range}${w.pop!=null ? (range?' · ':'')+'降雨機率 '+w.pop+'%' : ''}</div>
      </div>
    </div>`;
}
function renderHazardBanner(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const h = state.hazards;
  // 尚未載入完成或載入失敗時安靜略過，不影響首頁其他內容顯示
  // （天氣卡片本身已經有自己的載入中／失敗狀態，不需要重複顯示）。
  if (!h || h.county !== county || h.error || !h.list || !h.list.length) return "";
  return `
    <div class="hazard-banner">
      ${h.list.map(x => `
        <div class="hazard-row">
          ${icon('alert',18)}
          <div class="hazard-txt">
            <div class="hazard-name">${esc(county)} ${esc(x.phenomena)}${esc(x.significance)}</div>
            ${x.startTime ? `<div class="hazard-time">${fmtTime(new Date(x.startTime).getTime())}${x.endTime?' 至 '+fmtTime(new Date(x.endTime).getTime()):''}</div>` : ""}
          </div>
        </div>`).join("")}
    </div>`;
}
function viewHome(){
  const p = state.profile;
  const unit = myUnit(p);
  ensureWeatherLoaded(unit);
  ensureHazardsLoaded(unit);
  const tasks = visibleTasks(p, state.tasks);
  const today = new Date();
  const todayTasks = tasks.filter(t => isSameDay(new Date(t.createdAt||0).getTime(), today));
  const todayDone = todayTasks.filter(t => deriveStatus(t.id) === "completed");

  // 車輛動態＝目前所有進行中的勤務（一輛車理論上同時只會有一個進行中任務，
  // 但測試資料常會讓同一車號被多筆任務共用，所以直接以「任務」為單位列出，
  // 不要用「車輛」去找對應任務，否則同一車號的第二筆任務會被吃掉不顯示）。
  // 「進行中」統計直接沿用這份清單的數量，確保上面數字跟下面實際列出的
  // 卡片一定對得上；不能只算「今天建立」的任務，否則跨日還在進行中的
  // 勤務（例如昨天出勤、今天還沒返營）會出現在下面清單卻沒被算進數字。
  const activeTasks = tasks
    .filter(t => deriveStatus(t.id) !== "completed")
    .sort((a,b) => unitLabel(a.unit).localeCompare(unitLabel(b.unit)));
  const fleetSection = activeTasks.length
    ? activeTasks.map(taskCard).join("")
    : `<div class="empty">目前沒有車輛執行中</div>`;

  return `
    <div class="home-date">${fmtDate(today)}</div>
    ${renderHazardBanner(unit)}
    ${renderWeatherCard(unit)}
    <div class="section-label">今日概況</div>
    <div class="stat-grid">
      <div class="stat-tile t-blue"><div class="num">${todayTasks.length}</div><div class="lbl">今日勤務數</div></div>
      <div class="stat-tile t-orange"><div class="num">${activeTasks.length}</div><div class="lbl">進行中</div></div>
      <div class="stat-tile t-green"><div class="num">${todayDone.length}</div><div class="lbl">已完成</div></div>
    </div>
    <div class="section-label">車輛動態</div>
    ${fleetSection}
  `;
}

// 完成的勤務不能直接從清單裡消失、找不到——除了「全部」跟各進行中狀態頁籤

// 就查得到剛完成的勤務，不用跳去「紀錄」頁另外查詢。
const TASKS_TABS = [
  { key:"all", label:"全部" },
  { key:"dispatch", label:"出勤中" },
  { key:"onscene", label:"現場中" },
  { key:"transit", label:"前往中" },
  { key:"returning", label:"返營中" },
  { key:"completed", label:"已完成" }
];
function viewTasks(){
  const p = state.profile;
  const visible = visibleTasks(p, state.tasks);
  const active = visible.filter(t => deriveStatus(t.id) !== "completed");
  const completedTasks = visible.filter(t => deriveStatus(t.id) === "completed");
  const shown = state.tasksTab === "all" ? active
    : state.tasksTab === "completed" ? completedTasks
    : active.filter(t => deriveStatus(t.id) === state.tasksTab);

  const tabs = `
    <div class="tabs2 scroll">
      ${TASKS_TABS.map(tb => {
        const count = tb.key === "all" ? active.length
          : tb.key === "completed" ? completedTasks.length
          : active.filter(t=>deriveStatus(t.id)===tb.key).length;
        return `
        <div class="tab2 ${state.tasksTab===tb.key?'active':''}" onclick="window.__setTasksTab('${tb.key}')">
          ${tb.label}<span class="tab2-count">${count}</span>
        </div>`;
      }).join("")}
    </div>`;

  return `
    ${tabs}
    ${shown.length ? shown.map(taskCard).join("") : `<div class="empty">目前沒有符合條件的勤務</div>`}
    ${canCreateTask(p) ? `<button class="fab" onclick="window.__nav({name:'createTask'})">${icon('plus',26)}</button>` : ""}

}

function viewTaskDetail(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const p = state.profile;
  const s = deriveStatus(taskId);
  const evs = taskEvents(taskId);

  // 勤務資訊：出發/抵達/返營/最終里程與油量、自動計算行駛公里數與任務耗時
  // （抵達現場可能有多筆，因為同一趟勤務可能去兩個以上的地點）
  const dispatchEv = eventByType(taskId, "DISPATCH");
  const arrivedEvs = evs.filter(e => e.type === "ARRIVED_SCENE");
  const departEvs = evs.filter(e => e.type === "DEPART_SCENE");
  // 多地點時每一站分開列成自己的一列（不要用頓號串在同一行），才看得出來
  // 抵達／離開的流水時間線，一眼就知道第幾站對應哪個里程。
  const arrivalRows = arrivedEvs.length
    ? arrivedEvs.map((e,i) => `<div class="k">抵達里程${arrivedEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}${e.location?'（'+esc(e.location)+'）':''}</div>`).join("")
    : `<div class="k">抵達里程</div><div class="v">—</div>`;
  const departRows = departEvs.length
    ? departEvs.map((e,i) => `<div class="k">離開里程${departEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}</div>`).join("")
    : `<div class="k">離開里程</div><div class="v">—</div>`;
  const returningEv = eventByType(taskId, "RETURNING");
  const completedEv = eventByType(taskId, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? null;
  const finalMileage = completedEv?.mileage ?? null;
  const distance = (startMileage != null && finalMileage != null) ? (finalMileage - startMileage) : null;
  const duration = completedEv ? (completedEv.ts - (dispatchEv?.ts ?? new Date(t.createdAt||0).getTime())) : null;

  const draft = state.reportDraft && state.reportDraft.taskId === taskId ? state.reportDraft : null;
  const canDoReport = canReport(p, t);

  // ---- 勤務進度：把「勤務進度」跟「勤務時間軸」合併成同一份清單——已發生的
  // 事件直接顯示實際回報內容（時間/回報人/里程/備註/編輯按鈕），還沒發生的
  // 步驟接在後面用灰色佔位顯示，一次就看得出走到哪一步、之前每一步的細節、
  // 下一步是什麼，不用分開看兩份內容重複的區塊。
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  const lastIdx = lastType ? STEP_TYPES.indexOf(lastType) : -1;
  const isTaskDone = s === "completed";
  const upcomingSteps = EVENT_TYPES.filter((def, i) => i > lastIdx);
  const progressHtml = `
    <div class="section-label">勤務進度</div>
    <div class="stepper">
      ${evs.map((e, idx) => {
        const def = EVENT_TYPES.find(d=>d.type===e.type);
        const cls = (idx === evs.length - 1 && !isTaskDone) ? "current" : "done";
        return `
        <div class="step-item ${cls}">
          <div class="step-dot">${cls === "done" ? icon("check", 11) : ""}</div>
          <div class="step-body">
            <div class="step-head">
              <div class="step-label">${def ? icon(def.icon,15) : ''} ${def?.label}${e.location ? '：'+esc(e.location) : ''}</div>
              ${canDoReport ? `<button class="tl-edit-btn" onclick="window.__editEvent('${e.id}')">編輯</button>` : ""}
            </div>
            <div class="step-meta">${fmtTime(e.ts)} · ${nameWithRank(e.userName, e.unit)}${e.mileage!=null ? ' · ' + e.mileage + ' km' : ''}</div>
            ${e.note ? `<div class="step-note">${esc(e.note)}</div>` : ""}
          </div>
        </div>`;
      }).join("")}
      ${upcomingSteps.map(def => `
        <div class="step-item upcoming">
          <div class="step-dot"></div>
          <div class="step-body"><div class="step-label">${icon(def.icon,15)} ${def.label}</div></div>
        </div>`).join("")}
    </div>`;

  // ---- 目前狀態／下一步（純資訊，任何看得到此任務的人都看得到，不受回報權限影響）----
  const rTypes = canDoReport ? reportableTypes(taskId) : [];
  let nextStepText;
  if (!canDoReport) nextStepText = "—（沒有回報權限）";
  else if (s === "completed") nextStepText = "勤務已完成";
  else if (lastType === "ARRIVED_SCENE" || lastType === "DEPART_SCENE") nextStepText = "前往下一個地點，或直接返回營區";
  else nextStepText = rTypes.length ? EVENT_TYPES.find(e=>e.type===rTypes[0]).label : "—";

  const statusBlock = `
    <div class="detail-head">
      <div class="kv">
        <div class="k">目前狀態</div><div class="v">${STATUS_LABEL[s]}</div>
        <div class="k">下一步</div><div class="v">${esc(nextStepText)}</div>
      </div>
    </div>`;

  // ---- 回報表單／Sticky Bottom Action Bar ----
  let reportModal = "";
  let stickyBar = "";
  if (canDoReport && draft) {
    const def = EVENT_TYPES.find(e=>e.type===draft.type);
    const isFinal = draft.type === "COMPLETED";
    const lastEv = evs[evs.length - 1];
    const minBase = lastEv?.ts ?? dispatchEv?.ts ?? null;
    const minTime = minBase ? hhmmValue(new Date(minBase)) : "";
    // 第一次抵達的地點已經在建立勤務時填過了（任務本身的「地點」欄位），
    // 不用再問一次；只有離開後前往第二個（含以後）地點時才需要重新輸入，
    // 表單標題也改叫「抵達下一個地點」，跟第一次抵達做出區別。
    const isNextStop = draft.type === "ARRIVED_SCENE" && arrivedEvs.length > 0;
    const formTitle = isNextStop ? "抵達下一個地點" : def.label;
    // 開始返營時，車輛都還沒有移動（人剛在原地回報），里程理論上跟上一筆回報
    // 的里程一樣，直接帶入避免重複輸入；前往下一個地點時雖然會開車移動，但
    // 先帶入上一筆已知里程當作起始值，使用者只要接著往上改，不用從零開始
    // 整串重打一次；抵達營區才是完全空白，需要手動輸入。
    // （離開現場已經改成自動補寫，見 __submitReport）
    const lastMileageEv = evs.slice().reverse().find(e => e.mileage != null);
    const prefillMileage = (draft.type === "RETURNING" || isNextStop) && lastMileageEv ? lastMileageEv.mileage : null;
    // 回報表單改用彈窗（跟基礎資料管理的新增/編輯彈窗同一套元件），避免表單
    // 內容被固定在畫面底部的 Sticky Action Bar 擋住看不到。
    // 除了備註以外都是必填欄位，避免漏填造成紀錄不完整。
    reportModal = `
      <div class="modal-overlay" onclick="if(event.target===this) window.__cancelReport()">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${icon(def.icon,19)} 回報：${formTitle}</div>
          <form onsubmit="event.preventDefault(); window.__submitReport('${t.id}','${draft.type}')">
            ${isNextStop ? `<div class="field"><label>地點</label><input id="rf-location" placeholder="例如：加油站、OO超商" required></div>` : ""}
            <div class="field">
              <label>時間</label>
              <div style="display:flex; gap:8px;">
                <input id="rf-time" type="time" style="flex:1;" ${minTime?`min="${minTime}"`:""} value="${hhmmValue(new Date())}" required>
                <button type="button" class="icon-btn" style="flex-shrink:0;" onclick="window.__resetReportTime()">套用目前</button>
              </div>
            </div>
            <div class="field"><label>里程（公里）</label><input id="rf-mileage" type="number" inputmode="decimal" placeholder="目前里程" value="${prefillMileage != null ? prefillMileage : ''}" required></div>
            ${isFinal ? `<div class="field"><label>剩餘油量</label><select id="rf-fuel" required>${fuelOptions("")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="rf-note" placeholder="備註"></div>
            <button class="btn-primary" type="submit">確認送出</button>
            <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__cancelReport()">取消</button>
          </form>
        </div>
      </div>`;
  } else if (canDoReport && !draft && rTypes.length === 1) {
    const def = EVENT_TYPES.find(e=>e.type===rTypes[0]);
    stickyBar = `
      <div class="sticky-action-bar">
        <button class="btn-primary" onclick="window.__startReport('${t.id}','${rTypes[0]}')">${icon(def.icon,20)} ${def.label}</button>
      </div>
      <div class="sticky-bar-spacer"></div>`;
  } else if (canDoReport && !draft && rTypes.length === 2) {
    // 唯一的分岔點：離開現場之後，前往下一個地點或直接返回營區
    stickyBar = `
      <div class="sticky-action-bar">
        <button class="btn-primary" onclick="window.__startReport('${t.id}','ARRIVED_SCENE')">${icon('pin',20)} 前往下一個地點</button>
        <button class="btn-primary green" onclick="window.__startReport('${t.id}','RETURNING')">${icon('home',20)} 返回營區</button>
      </div>
      <div class="sticky-bar-spacer"></div>`;
  }

  // ---- 編輯既有回報（時間/里程有時候會填錯，需要能修正）----
  const editingEvent = canDoReport && state.eventEditId ? evs.find(e => e.id === state.eventEditId) : null;
  let eventEditModal = "";
  if (editingEvent) {
    const def = EVENT_TYPES.find(x=>x.type===editingEvent.type);
    const isFinalEv = editingEvent.type === "COMPLETED";
    const hasLocationField = editingEvent.type === "ARRIVED_SCENE";
    eventEditModal = `
      <div class="modal-overlay" onclick="if(event.target===this) window.__cancelEditEvent()">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${icon(def.icon,19)} 編輯回報：${def.label}</div>
          <form onsubmit="event.preventDefault(); window.__submitEditEvent('${editingEvent.id}')">
            ${hasLocationField ? `<div class="field"><label>地點</label><input id="ee-location" value="${esc(editingEvent.location||'')}" placeholder="例如：加油站、OO超商"></div>` : ""}
            <div class="field"><label>時間</label><input id="ee-time" type="time" value="${hhmmValue(new Date(editingEvent.ts))}" required></div>
            <div class="field"><label>里程（公里）</label><input id="ee-mileage" type="number" inputmode="decimal" value="${editingEvent.mileage!=null?editingEvent.mileage:''}" required></div>
            ${isFinalEv ? `<div class="field"><label>剩餘油量</label><select id="ee-fuel" required>${fuelOptions(editingEvent.endFuel||"")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="ee-note" value="${esc(editingEvent.note||'')}" placeholder="備註"></div>
            <button class="btn-primary" type="submit">儲存修正</button>
            <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__cancelEditEvent()">取消</button>
          </form>
        </div>
      </div>`;
  }

  return `
    <div class="back-row" style="justify-content:space-between;">
      <button onclick="window.__nav({name:'tasks'})">‹ 返回列表</button>
      ${canEditTask(p, t) ? `<button class="icon-btn" onclick="window.__nav({name:'editTask', id:'${t.id}'})">編輯勤務</button>` : ""}
    </div>
    ${progressHtml}
    ${statusBlock}
    <div class="detail-head">
      <div class="task-top">
        <p class="task-title">${esc(t.title)}</p>
        ${statusBadge(s)}
      </div>
      <div class="kv">
        <div class="k">車號</div><div class="v">${esc(t.vehicle||'—')}</div>
        <div class="k">地點</div><div class="v">${esc(t.location||'—')}</div>
        <div class="k">車長</div><div class="v">${crewLabel(t.crewLeader, t.unit)}</div>
        <div class="k">駕駛</div><div class="v">${crewLabel(t.driver, t.unit)}</div>
        <div class="k">紀錄器</div><div class="v">${esc((t.recorders||[]).join('、') || '—')}</div>
        <div class="k">建立人</div><div class="v">${nameWithRank(t.createdByName, t.unit)}</div>
        <div class="k">建立時間</div><div class="v">${fmtTime(new Date(t.createdAt||0).getTime())}</div>
      </div>
    </div>
    ${canDoReport ? `
    <div class="section-label">勤務資訊</div>
    <div class="detail-head">
      <div class="kv">
        <div class="k">出發里程</div><div class="v">${startMileage!=null ? startMileage+' km' : '—'}</div>
        ${arrivalRows}
        ${departRows}
        <div class="k">返營里程</div><div class="v">${returningEv?.mileage!=null ? returningEv.mileage+' km' : '—'}</div>
        <div class="k">最終里程</div><div class="v">${finalMileage!=null ? finalMileage+' km' : '—'}</div>
        <div class="k">出發油量</div><div class="v">${esc(t.startFuel||'—')}</div>
        <div class="k">剩餘油量</div><div class="v">${esc(completedEv?.endFuel||'—')}</div>
        <div class="k">行駛公里</div><div class="v">${distance!=null ? distance+' km' : '—'}</div>
        <div class="k">任務耗時</div><div class="v">${duration!=null ? durationLabel(duration) : '—'}</div>
      </div>
    </div>` : ""}
    ${stickyBar}
    ${reportModal}
    ${eventEditModal}
  `;
}

/* =========================================================
   15) 畫面：勤務紀錄搜尋
   ========================================================= */
const RECORDS_PERIODS = [
  { key:"today", label:"今天" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }, { key:"custom", label:"自訂日期" }
];
function runRecordsFilter(p, f){
  let tasks = visibleTasks(p, state.tasks);
  if (f.period === "custom") {
    if (f.customDate) tasks = tasks.filter(t => {
      const d = new Date(t.createdAt||0);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return iso === f.customDate;
    });
  } else {
    tasks = tasksInPeriod(tasks, f.period);
  }
  if (f.unit) tasks = tasks.filter(t => t.unit === f.unit);
  if (f.vehicle) tasks = tasks.filter(t => t.vehicle === f.vehicle);
  if (f.title) tasks = tasks.filter(t => (t.title||"").toLowerCase().includes(f.title.toLowerCase()));
  if (f.location) tasks = tasks.filter(t => (t.location||"").toLowerCase().includes(f.location.toLowerCase()));
  if (f.status) tasks = tasks.filter(t => deriveStatus(t.id) === f.status);
  if (f.person) tasks = tasks.filter(t => t.crewLeader === f.person || t.driver === f.person);
  return tasks;
}
function viewRecords(){
  const p = state.profile;
  const f = state.recordsFilter;

  const statusOptions = ["", ...STATUS_ORDER].map(s => `<option value="${s}" ${f.status===s?'selected':''}>${s?STATUS_LABEL[s]:'全部狀態'}</option>`).join("");

  // 車號／人員下拉選單：依目前單位篩選（或全部單位）動態列出，不再手打文字搜尋
  const vehiclePool = (f.unit ? state.vehicles.filter(v => v.unit === f.unit) : state.vehicles);
  const personPool = (f.unit ? state.personnel.filter(x => x.unit === f.unit) : state.personnel);
  const vehicleOptions = [`<option value="">全部車號</option>`, ...vehiclePool.map(v => `<option value="${esc(v.plate)}" ${f.vehicle===v.plate?'selected':''}>${esc(v.plate)}</option>`)].join("");
  const personOptions = [`<option value="">全部人員</option>`, ...personPool.map(x => `<option value="${esc(x.name)}" ${f.person===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`)].join("");

  const periodPills = `
    <div class="pill-row">
      ${RECORDS_PERIODS.map(pd => `<button class="pill ${f.period===pd.key?'active':''}" onclick="window.__setRecordsFilter('period','${pd.key}')">${pd.label}</button>`).join("")}
    </div>
    ${f.period === "custom" ? `<div class="field"><input type="date" value="${f.customDate}" oninput="window.__setRecordsFilter('customDate', this.value)"></div>` : ""}`;
  const unitPills = canSeeAllUnits(p) ? `
    <div class="pill-row">
      <button class="pill ${!f.unit?'active':''}" onclick="window.__setRecordsFilter('unit','')">全部單位</button>
      ${UNITS.map(u => `<button class="pill ${f.unit===u.code?'active':''}" onclick="window.__setRecordsFilter('unit','${u.code}')">${u.label}</button>`).join("")}
    </div>` : "";

  const expanded = state.recordsFiltersExpanded;
  const applied = state.recordsApplied;
  const tasks = applied ? runRecordsFilter(p, applied) : [];

  return `
    ${periodPills}
    ${unitPills}
    <button class="filters-toggle ${expanded?'open':''}" onclick="window.__toggleRecordsFilters()">
      ${icon('chevronDown',16).replace('<svg ', '<svg class="chev" ')} 更多篩選
    </button>
    ${expanded ? `
    <div class="search-grid">
      <div class="field"><label>車號</label><select onchange="window.__setRecordsFilter('vehicle', this.value)">${vehicleOptions}</select></div>
      <div class="field"><label>人員（車長/駕駛）</label><select onchange="window.__setRecordsFilter('person', this.value)">${personOptions}</select></div>
      <div class="field"><label>狀態</label><select onchange="window.__setRecordsFilter('status', this.value)">${statusOptions}</select></div>
      <div class="field"><label>任務名稱</label><input value="${esc(f.title)}" oninput="window.__setRecordsFilter('title', this.value)"></div>
      <div class="field full"><label>地點</label><input value="${esc(f.location)}" oninput="window.__setRecordsFilter('location', this.value)"></div>
    </div>` : ""}
    <div class="row" style="display:flex; gap:10px; margin:12px 0;">
      <button class="btn-ghost" style="flex:0 0 auto; padding:15px 22px;" onclick="window.__clearRecordsQuery()">清除</button>
      <button class="btn-primary" style="flex:1; margin-top:0;" onclick="window.__runRecordsQuery()">查詢</button>
    </div>
    ${!applied ? `<div class="empty">${icon('records',32)}<div style="margin-top:10px;">選擇篩選條件後按「查詢」</div></div>` : `
      <div class="section-label">結果 · ${tasks.length}</div>
      ${tasks.length ? tasks.map(taskCard).join("") : `<div class="empty">找不到符合條件的勤務紀錄</div>`}
    `}
  `;
}

/* =========================================================
   15b) 畫面：統計分析
   ========================================================= */
const STATUS_COLOR = { pending:"#8E8E93", dispatch:"#FF3B30", onscene:"#FF9500", transit:"#6B23C7", returning:"#0066FF", completed:"#34C759" };
function tasksInPeriod(tasks, period){
  const now = new Date();
  return tasks.filter(t => {
    const d = new Date(t.createdAt||0);
    if (period === "today") return isSameDay(d.getTime(), now);
    if (period === "week") { const diff = (now - d) / 86400000; return diff >= 0 && diff < 7; }
    if (period === "month") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    return true;
  });
}
function viewStats(){
  const p = state.profile;
  const base = visibleTasks(p, state.tasks);
  const tasks = tasksInPeriod(base, state.statsPeriod);

  const periods = [
    { key:"today", label:"今日" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }
  ];

  // 各車輛出勤次數（依 DISPATCH 事件計算，同一車輛可能執行多趟勤務）
  const vehicleCounts = {};
  tasks.forEach(t => {
    const d = eventByType(t.id, "DISPATCH");
    if (!d) return;
    const key = t.vehicle || "未填車號";
    vehicleCounts[key] = (vehicleCounts[key]||0) + 1;
  });
  const vehicleEntries = Object.entries(vehicleCounts).sort((a,b) => b[1]-a[1]);
  const maxCount = Math.max(1, ...vehicleEntries.map(e=>e[1]));

  const CHART_CAT_COLORS = ["#007AFF", "#FF9500", "#34C759", "#6B23C7", "#FF3B30", "#00A3A3"];
  const barChart = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">各車輛出勤次數</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="bar-row">
          <div class="bar-label">${esc(veh)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%; background:${CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]};"></div></div>
          <div class="bar-val">${count}</div>
        </div>`).join("")}
    </div>` : `<div class="chart-card"><div class="chart-title">各車輛出勤次數</div><div class="empty">此區間尚無出勤紀錄</div></div>`;

  const rankList = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">車輛使用次數排行</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="rank-name">${esc(veh)}</div>
          <div class="rank-count">${count} 次</div>
        </div>`).join("")}
    </div>` : "";

  // 任務狀態比例（part-to-whole → 橫向堆疊長條，不用圓餅圖）
  const statusCounts = {};
  STATUS_ORDER.forEach(s => statusCounts[s] = 0);
  tasks.forEach(t => { const s = deriveStatus(t.id); statusCounts[s] = (statusCounts[s]||0) + 1; });
  const totalTasks = tasks.length || 1;
  const stackSegs = STATUS_ORDER.filter(s => statusCounts[s] > 0).map(s => `
    <div class="seg" style="width:${(statusCounts[s]/totalTasks*100).toFixed(1)}%; background:${STATUS_COLOR[s]};"></div>`).join("");
  const legendRows = STATUS_ORDER.map(s => `
    <div class="leg-row">
      <span class="leg-dot" style="background:${STATUS_COLOR[s]};"></span>
      <span class="leg-name">${STATUS_LABEL[s]}</span>
      <span class="leg-val">${statusCounts[s]}（${Math.round(statusCounts[s]/totalTasks*100)}%）</span>
    </div>`).join("");

  const statusChart = `
    <div class="chart-card">
      <div class="chart-title">任務狀態比例</div>
      <div class="stackbar">${stackSegs}</div>
      <div class="stack-legend">${legendRows}</div>
    </div>`;

function taskToCsvRow(t){
  const s = deriveStatus(t.id);
  const dispatchEv = eventByType(t.id, "DISPATCH");
  const completedEv = eventByType(t.id, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? "";
  const finalMileage = completedEv?.mileage ?? "";
  const distance = (startMileage !== "" && finalMileage !== "") ? (finalMileage - startMileage) : "";
  return [t.title, t.vehicle, t.location, t.crewLeader, t.driver, STATUS_LABEL[s], fmtTime(new Date(t.createdAt||0).getTime()), startMileage, finalMileage, distance]
    .map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",");
}
function exportTasksCsv(){
  const header = ["任務名稱","車號","地點","車長","駕駛","狀態","建立時間","出發里程","最終里程","行駛公里"].join(",");
  const rows = visibleTasks(state.profile, state.tasks).map(taskToCsvRow);
  const csv = "﻿" + [header, ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `勤務紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// 背景輪詢用：畫面會整個重繪（innerHTML 全部換掉），如果使用者正在輸入框
// 打字，重繪會讓輸入框元素被整個換掉，導致輸入焦點與鍵盤被打斷。輪詢觸發的
// 重繪一律呼叫這個函式，偵測到目前有輸入中的欄位就先跳過，等使用者打完離開
// 該欄位（或下一次輪詢/使用者操作觸發真正的 render）再更新畫面。
//
// 只檢查當下有沒有 focus 在輸入框還不夠：手機上切換欄位、跳出鍵盤工具列等
// 動作都可能讓輸入框短暫失焦，若輪詢剛好在那個空檔觸發，整個表單會被重繪回
// 伺服器上的舊資料，使用者還沒送出的內容就會憑空消失。因此只要使用者正處於
// 任何編輯中的表單（個人資料、基礎資料管理、任務回報草稿），一律跳過背景重繪，
// 直到儲存/取消離開編輯狀態為止。
function safeRender(){
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.tagName === "SELECT")) return;
  if (state.profileEditing || state.baseDataModal || state.reportDraft || state.eventEditId) return;
  render();
}

  if (state.profile.role === "pending") { app.innerHTML = viewPending(); return; }
  if (state.profile.role === "disabled") { app.innerHTML = viewDisabled(); return; }

  const view = ROUTE_VIEWS[state.route.name] || viewHome;

  const p = state.profile;
  const previewBanner = state.previewActive ? `

      <button onclick="window.__endRolePreview()">結束預覽</button>
    </div>` : "";
  app.innerHTML = `
    <div class="sticky-head">
      ${previewBanner}
      <div class="topbar">
        <div class="topbar-title-row">
          <h1>衛生營車輛人員動態管制系統</h1>
