function viewEditTask(taskId){
  const p = state.profile;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  if (!canEditTask(p, t)) return `<div class="empty">您沒有編輯此勤務的權限</div>`;

  const isLiaison = t.type === "liaison";
  const unit = t.unit;
  // 車長／駕駛／洽公人員都可跨單位選人，對應的人員選擇器打開時會直接讀取
  // 當下的 state.personnel 動態建立候選名單（並保留目前已指派的人選，即使
  // 現在被排除規則擋住）。
  const vehicleOpts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const recorderOpts = state.recorders.filter(x => x.unit === unit && x.active !== false);
  const outSet = dispatchedVehiclePlates();
  const currentRecorders = t.recorders || [];
  const currentPersonnel = t.personnel || [];
  // 車輛跨單位借用不常見，但既有勤務可能早就借了別的單位的車，編輯時要
  // 判斷目前指派的車是不是跨單位借來的，是的話「跨單位借車」預設打勾、
  // 車號下拉也要一開始就展開列出所有單位的車，不然選單裡會找不到它。
  const currentVehicleRecord = t.vehicle ? state.vehicles.find(v => v.plate === t.vehicle) : null;
  const isCrossUnitVehicle = !!(currentVehicleRecord && currentVehicleRecord.unit !== unit);
  const currentMilitaryItems = t.militaryItems || [];
  const currentMilitaryQtyByName = {};
  currentMilitaryItems.forEach(x => { currentMilitaryQtyByName[x.name] = x.qty; });

  return `
    <div class="back-row">${backBtn({name:'task', id:taskId})}</div>
    <div class="section-label">編輯${isLiaison?'洽公':'勤務'}</div>
    <form onsubmit="window.__saveTaskEdit(event,'${taskId}')">
      ${!isLiaison ? `
      <div class="field"><label>營內／營外 *</label>
        ${chipGroup('scope', TASK_SCOPE_OPTIONS, taskScope(t), false)}
      </div>` : ""}
      <div class="field"><label>單位</label><input value="${unitLabel(unit)}" disabled></div>
      <div class="field"><label>任務名稱 *</label><input name="title" required value="${esc(t.title||'')}"></div>
      <div class="field"><label>地點${isLiaison?'（可多個，用頓號分隔）':''}</label><input name="location" value="${esc(t.location||'')}"></div>
      ${isLiaison ? `
      <div class="field"><label>人員（可複選）*</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openMultiPersonPicker(this)">
          <span class="picker-field-text${currentPersonnel.length?'':' placeholder'}">${currentPersonnel.length ? esc(currentPersonnel.join('、')) : '請選擇人員'}</span>${icon('chevronDown',16)}
        </button>
        <div class="personnel-hidden-checkboxes">${currentPersonnel.map(name => `<input type="checkbox" name="personnel" value="${esc(name)}" checked style="display:none">`).join("")}</div>
      </div>` : `
      <div class="field"><label>車號</label>
        <select name="vehicle" data-unit="${unit}">
          ${isCrossUnitVehicle ? vehicleSelectOptionsAllUnits(t.vehicle) : `<option value="">請選擇車輛</option>` + vehicleOptionsByType(vehicleOpts, v => `<option value="${esc(v.plate)}" ${t.vehicle===v.plate?'selected':''}>${esc(vehicleOptionLabel(v.plate, outSet))}</option>`)}
        </select>
        <label class="checkbox-inline"><input type="checkbox" ${isCrossUnitVehicle?'checked':''} onchange="window.__toggleCrossUnitVehicle(this)"> 跨單位借車</label>
      </div>
      <div class="field"><label>車長</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('crewLeader', this)">
          <span class="picker-field-text${t.crewLeader?'':' placeholder'}">${t.crewLeader ? esc(crewDisplayLabel(t.crewLeader, unit)) : '請選擇車長'}</span>${icon('chevronDown',16)}
        </button>
        <input type="hidden" name="crewLeader" value="${esc(t.crewLeader||'')}">
      </div>
      <div class="field"><label>駕駛</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('driver', this)">
          <span class="picker-field-text${t.driver?'':' placeholder'}">${t.driver ? esc(crewDisplayLabel(t.driver, unit)) : '請選擇駕駛'}</span>${icon('chevronDown',16)}
        </button>
        <input type="hidden" name="driver" value="${esc(t.driver||'')}">
      </div>
      ${t.erStandbyKey ? `
      <div class="field"><label>值班醫官（選填）</label>
        <select name="dutyOfficer">
          <option value="">請選擇醫官</option>
          ${state.doctors.filter(x=>x.active!==false).map(x => `<option value="${esc(x.name)}" ${t.dutyOfficer===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`).join("")}
        </select>
      </div>` : ""}
      <div class="field"><label>行車紀錄器（可多選）</label>
        <select name="recorders" multiple size="${Math.min(4, Math.max(2, recorderOpts.length || 2))}">
          ${recorderOpts.map(x => `<option value="${esc(x.code)}" ${currentRecorders.includes(x.code)?'selected':''}>${esc(x.code)}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>出發前里程（公里）</label><input name="startMileage" type="number" inputmode="decimal" value="${t.startMileage!=null?t.startMileage:''}"></div>
      <div class="field"><label>出發前油量</label><select name="startFuel">${fuelOptions(t.startFuel||"")}</select></div>
      ${militaryCarrySectionHtml(!!currentMilitaryItems.length, currentMilitaryQtyByName)}`}
      <div class="field"><label>備註（選填）</label><textarea name="notes">${esc(t.notes||'')}</textarea></div>
      <button class="btn-primary" type="submit">儲存變更</button>
    </form>
  `;
}

/* =========================================================
   13b) 畫面：患者紀錄（獨立頁面，不是彈窗——欄位比照救護紀錄表補齊後
   資料量變多，改成一頁一頁分區顯示，比塞在彈窗裡好操作）
   ========================================================= */
function viewVitalsPage(taskId, id, adding){
  const p = state.profile;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const canDoReport = canReport(p, t);
  const taskVitals = state.vitals.filter(v => v.taskId === taskId).sort(eventOrderCompare);
  const hasPatient = taskVitals.length > 0;
  // hasPatient＝這筆任務有沒有任何患者紀錄史（含已結案的舊案件），決定
  // 看得到看不到；hasActivePatient＝目前有沒有「還沒離開醫務所」的患者，
  // 決定新增紀錄要當成新案件的初評、還是既有案件的複測（見 vitalsEpisodes）。
  const hasActivePatient = activeEpisodeVitals(taskVitals).length > 0;
  if (!canDoReport && !hasPatient) return `<div class="empty">您沒有記錄患者狀況的權限</div>`;

  const editingVitals = id ? taskVitals.find(v => v.id === id) : null;
  // isFirstVitals：這筆任務完全沒有任何紀錄史（連已結案的舊案件都沒有），
  // 表單才會自動出現，不用先點「新增紀錄」按鈕——單純判斷「要不要自動show
  // 表單」，跟下面「新增的這筆算不算初評」是兩件事，已結案舊案件仍然算
  // 「有紀錄史」，不能自動跳表單（要先看到歷史清單才能點新增）。
  const isFirstVitals = !editingVitals && !hasPatient;
  // 「初評」＝該案件的第一筆生命徵象紀錄，比照救護紀錄表完整記錄患者基本
  // 資料、結構化主訴、過去病史、過敏史；「複測」＝同一案件的後續紀錄，只
  // 需要生命徵象與本次處置，前面那些不用每次重問；一筆任務可能依序處理
  // 過好幾個案件，判斷基準是「這筆紀錄所屬案件」的第一筆，不是整份任務
  // 紀錄史的第一筆——新增紀錄當下沒有進行中的案件（!hasActivePatient）
  // 就代表這筆要開一個新案件，一樣當初評處理。
  const isInitialEntry = editingVitals
    ? (vitalsEpisodes(taskVitals).find(ep => ep.some(v => v.id === editingVitals.id)) || [])[0]?.id === editingVitals.id
    : !hasActivePatient;
  // 血壓拆成收縮壓／舒張壓兩格輸入，儲存時仍合併成「收縮/舒張」字串，
  // 沿用既有的 bp 欄位與所有顯示邏輯（時間軸、歷史紀錄清單皆顯示 120/80）。
  const [bpSys, bpDia] = (editingVitals?.bp || "").split("/");
  const gcsParts = gcsPartsFromString(editingVitals?.gcs);
  // 有既有紀錄時，預設只顯示歷史紀錄本身；新增紀錄改成要另外點按鈕，
  // 才會切到表單頁面，避免清單跟表單擠在同一畫面。
  const showHistory = !editingVitals && hasPatient && !adding;
  const showForm = editingVitals || isFirstVitals || adding;
  const formCancelBtn = hasPatient
    ? `<button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__backToVitalsHistory('${taskId}')">返回</button>`
    : `<button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__nav({name:'task', id:'${taskId}'})">取消</button>`;
  // 勾選「其他」（過敏史另外還有「藥物」「食物」）時，多顯示一個說明輸入框；
  // 這裡算出頁面載入當下該不該顯示，之後使用者勾選/取消時由
  // window.__syncDetailVisibility 直接切換 DOM，不用整頁重繪。
  const pastHistoryOtherChecked = (editingVitals?.pastHistory||[]).includes('其他');
  const allergyDrugFoodChecked = (editingVitals?.allergyHistory||[]).some(v=>['藥物','食物'].includes(v));
  const allergyOtherChecked = (editingVitals?.allergyHistory||[]).includes('其他');
  const treatmentOtherChecked = (editingVitals?.treatments||[]).includes('其他');
  const diagnosisVal = editingVitals?.diagnosis || '';
  const diagnosisIsOther = !!diagnosisVal && !DIAGNOSIS_OPTIONS.includes(diagnosisVal);
  const diagnosisSelected = diagnosisIsOther ? '其他' : diagnosisVal;
  const sceneType = editingVitals?.sceneType || '';
  const sceneNonTraumaOtherChecked = sceneType === '非創傷' && (editingVitals?.sceneFindings||[]).includes('其他');
  const sceneTraumaOtherChecked = sceneType === '創傷' && (editingVitals?.sceneFindings||[]).includes('其他');
  // 紙本救護紀錄表「墜落傷」「燒燙傷」各自帶了數字細節欄位（約：__公尺／
  // __度__%），跟其他創傷項目共用的「其他說明」自由輸入格式不一樣，各自
  // 獨立成專屬欄位，比照 __syncDetailVisibility 的勾選才顯示模式。
  const sceneTraumaFallChecked = sceneType === '創傷' && (editingVitals?.sceneFindings||[]).includes('墜落傷');
  const sceneTraumaBurnChecked = sceneType === '創傷' && (editingVitals?.sceneFindings||[]).includes('燒燙傷');

  // 一筆任務可能依序處理過好幾位不同患者（見 vitalsEpisodes 說明），歷史

        <div class="vitals-episode-card">
        ${ep.map((v,i) => {
          // 已結案案件的每一筆紀錄，預設只顯示跟這張截圖紅框範圍一樣的摘要
          // （身分／對職幹部／現場狀況），完整的問診、生命徵象、處置這些
          // 細節收在「展開全部資訊」按鈕後面——已經結案的案件通常只是回頭
          // 查資料，不需要每筆都攤開一長串；進行中的案件(closedEpisode為false)
          // 還在持續照護，維持原本全部攤開顯示，不需要多一次點擊才看得到。
          const closedEpisode = !!ep[ep.length-1].caseClosedAt;
          const expanded = !closedEpisode || state.vitalsHistoryExpanded.has(v.id);
          const restHtml = `
          ${(v.complaint || v.complaintQuality || v.complaintDuration || v.complaintOthers || v.spineCheck) ? `<div class="vitals-complaint-block"><span class="lbl">主訴</span></div>` : ""}
          ${vitalsQaPanelHtml(v)}
          ${vitalsCoreGridHtml(v)}

          ${v.diagnosis ? `<div class="detail-item"><span class="lbl">醫官初步診斷</span><span class="val">${esc(v.diagnosis)}</span></div>` : ""}
          ${v.treatments&&v.treatments.length ? `

          </div>` : ""}
          <button class="tl-edit-btn" type="button" style="margin-top:10px;" onclick="window.__openVitalsReport('${v.id}')">${icon('share',14)} 複製回報文字</button>

          ${v.caseClosedAt ? `<div class="step-note">已離開醫務所結案：${fmtTime(new Date(v.caseClosedAt).getTime())}</div>` : ""}`;
          return `

// 患者狀況「複製回報文字」：依既有欄位（單位/階級/姓名/病史/主訴/生命
// 徵象/醫官初步診斷/處置/對職幹部）自動組出一段可以直接貼到 LINE 群組的
// 回報文字，收文對象（連長／營長...）現場才決定，不存進患者紀錄本身，
// 每次複製前用彈窗讓使用者自己填、預設「連長」。
function vitalsNumOk(val, min, max){
  if (val === "" || val == null) return null;
  const n = Number(val);
  if (isNaN(n)) return null;
  return n >= min && n <= max;
}
// 「數據異常」原本只會顯示一個籠統的標籤，連長看了不知道是哪一項異常；
// 改成列出實際異常的項目名稱（例如「血壓異常」），一次好幾項都異常就用
// 頓號接起來（例如「血壓、脈搏異常」）。
function vitalsNormalFlag(v){
  const abnormal = [];
  let known = 0;
  const spo2Ok = vitalsNumOk(v.spo2, 95, 100);
  if (spo2Ok !== null) { known++; if (!spo2Ok) abnormal.push('血氧'); }
  const hrOk = vitalsNumOk(v.hr, 60, 100);
  if (hrOk !== null) { known++; if (!hrOk) abnormal.push('脈搏'); }
  const tempOk = vitalsNumOk(v.temp, 36, 37.5);
  if (tempOk !== null) { known++; if (!tempOk) abnormal.push('體溫'); }
  if (v.bp) {
    const [sys, dia] = v.bp.split("/").map(s => Number(s));
    let bpOk = true;
    if (!isNaN(sys)) { known++; if (!(sys >= 90 && sys <= 140)) bpOk = false; }
    if (!isNaN(dia)) { known++; if (!(dia >= 60 && dia <= 90)) bpOk = false; }
    if (!bpOk) abnormal.push('血壓');
  }
  if (!known) return "";
  return abnormal.length ? `${abnormal.join('、')}異常` : "數據正常";
}
// 回報文字的「狀況」要反映現場狀況分類（創傷/非創傷＋勾選的症狀），不是
// 主訴自由輸入文字——主訴常常只是「哪裡不舒服」的簡短定位詞（例如
// 「胸口」），單獨放進回報文字讀起來像沒講完，現場狀況才是完整的判斷。
// 「非創傷」是多數情況下的預設分類，報告裡特別標出來反而沒有資訊量、
// 讀起來也卡；「創傷」才是真的需要提醒連長注意的分類，所以只在創傷時
// 才加上這個字首。「其他」比照處置項目的做法，直接用使用者填的說明文字
// 取代，不要讓「其他」這個空泛的詞卡在報告句子中間。
function vitalsSceneStatusText(v){
  if (!v.sceneType) return "";
  const findings = (v.sceneFindings||[]).map(f => f === '其他' && v.sceneFindingsOtherDetail ? v.sceneFindingsOtherDetail : f).join('、');
  const detailParts = [
    v.sceneFallHeight ? `約${v.sceneFallHeight}公尺` : "",
    [v.sceneBurnDegree, v.sceneBurnPercent ? `${v.sceneBurnPercent}%` : ""].filter(Boolean).join('　'),
  ].filter(Boolean);
  const prefix = v.sceneType === '創傷' ? '創傷：' : '';
  return `${prefix}${findings}${detailParts.length?`（${detailParts.join('、')}）`:''}`;
}
// 處置項目勾了「其他」時，光顯示「其他」兩個字看不出實際做了什麼，要
// 連同使用者填的說明文字（treatmentOtherDetail）一起顯示在同一個標籤裡
// （例如「其他（EKG）」），不是分開顯示在下面單獨一行——這是患者紀錄卡片
// 本身的顯示邏輯，資訊要完整保留給實際查閱紀錄的人看。
function treatmentLabel(x, v){
  return x === '其他' && v.treatmentOtherDetail ? `其他（${v.treatmentOtherDetail}）` : x;
}
// 回報文字給連長看的是精簡版，跟上面患者紀錄卡片完整顯示的取向不同：
// 「其他」比照現場狀況的做法直接用說明文字取代，不需要保留「其他」
// 這個字，句子讀起來更順（例如「保暖、心理支持、EKG」而不是「保暖、
// 心理支持、其他（EKG）」）。
function reportTreatmentLabel(x, v){
  return x === '其他' && v.treatmentOtherDetail ? v.treatmentOtherDetail : x;
}
// 意識欄位是照 AVPU 量表勾選（清/聲/痛/否＝Alert/Verbal/Pain/Unresponsive
// 的簡稱），這個縮寫給熟悉救護紀錄表的人看沒問題，但回報文字是要給連長
// 這類不一定懂 AVPU 術語的人看，「意識清」容易被誤讀成別的意思；報告裡
// 換成完整說法，患者紀錄卡片本身的顯示不受影響。
const CONSCIOUSNESS_REPORT_LABEL = { "清": "清醒", "聲": "對呼喚有反應", "痛": "對疼痛有反應", "否": "無反應" };
// 「狀況」原本只有現場狀況分類，完全看不到主訴內容——像「上禮拜有回診
// 心臟科」這種對急症判斷很關鍵的描述，連長光看報告文字會漏掉。摘要只取
// 「哪裡不舒服」＋「怎麼不舒服」，「多久了」跟「其他不適」通常是次要
// 細節、放進來反而讓句子太長，需要的話連長還是可以打電話問。
function vitalsComplaintSummary(v){
  if (!v.complaint) return "";
  return `${v.complaint}${v.complaintQuality?`（${v.complaintQuality}）`:''}`;
}
function buildVitalsReportText(v, greeting){
  const d = new Date(v.ts || Date.now());
  const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const patientLine = [v.patientUnit, `${v.patientRank||''}${v.patientName||''}`].filter(Boolean).join(" ");
  const historyText = (v.pastHistory && v.pastHistory.length)
    ? (v.pastHistory.length===1 && v.pastHistory[0]==="無" ? "無病史" : v.pastHistory.join("、")+"病史")
    : "";
  const flag = vitalsNormalFlag(v);
  const treatmentsText = (v.treatments||[]).map(x => reportTreatmentLabel(x, v)).join("、");
  const liaisonLine = `${v.liaisonRank||''}${v.liaisonName||''}`;
  const sceneStatusText = vitalsSceneStatusText(v);
  const complaintSummary = vitalsComplaintSummary(v);

  const vitalsParts = [];
  if (v.consciousness) vitalsParts.push(`意識${CONSCIOUSNESS_REPORT_LABEL[v.consciousness] || v.consciousness}`);
  if (v.spo2) vitalsParts.push(`血氧 ${v.spo2}%`);
  if (v.hr) vitalsParts.push(`脈搏 ${v.hr}`);
  if (v.bp) vitalsParts.push(`血壓 ${v.bp}`);
  if (v.temp) vitalsParts.push(`體溫 ${v.temp}℃`);

  const lines = [];
  lines.push(`報告${greeting || '連長'}：`);
  lines.push(`今日(${dateStr}) ${timeStr} 事件回報：`);
  lines.push(`🔹 對象：${patientLine}${historyText?` (${historyText})`:''}`);

  if (vitalsParts.length) lines.push(`🔹 生命徵象：${vitalsParts.join('｜')}${flag?` (${flag})`:''}`);
  if (treatmentsText) lines.push(`🔹 目前處置：${treatmentsText}，目前持續留觀生命徵象。`);
  if (liaisonLine) lines.push(`隨隊幹部：${liaisonLine}${v.liaisonPhone?` (${v.liaisonPhone})`:''}`);
  return lines.join("\n");
}

function viewTaskDetail(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const p = state.profile;
  const s = deriveStatus(taskId);
  const evs = taskEvents(taskId);
  const isLiaison = t.type === "liaison";
  const evDefs = eventTypesFor(t);

  // 勤務資訊：出發/最終里程與油量、自動計算行駛公里數與任務耗時（里程只在
  // 出勤／抵達營區這頭尾兩個節點記錄，中間各站不再逐一記里程，見回報表單
  // 的 needsMileage 判斷；洽公任務地點單一、不追蹤里程油量，這段資料只有
  // 勤務類任務才會用到）。
  const dispatchEv = eventByType(taskId, "DISPATCH");
  const returningEv = eventByType(taskId, "RETURNING");
  const completedEv = eventByType(taskId, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? null;
  const finalMileage = completedEv?.mileage ?? null;
  const distance = (startMileage != null && finalMileage != null) ? (finalMileage - startMileage) : null;
  // 洽公任務沒有 COMPLETED 事件，返營本身（statusKey completed）就是結束點。
  const finalEv = isLiaison ? returningEv : completedEv;
  const duration = finalEv ? (finalEv.ts - (dispatchEv?.ts ?? new Date(t.createdAt||0).getTime())) : null;

  const draft = state.reportDraft && state.reportDraft.taskId === taskId ? state.reportDraft : null;
  const canDoReport = canReport(p, t);

  // ---- 勤務進度：把「勤務進度」跟「勤務時間軸」合併成同一份清單——已發生的
  // 事件直接顯示實際回報內容（時間/回報人/里程/備註/編輯按鈕），還沒發生的
  // 步驟接在後面用灰色佔位顯示，一次就看得出走到哪一步、之前每一步的細節、
  // 下一步是什麼，不用分開看兩份內容重複的區塊。
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  const stepTypes = evDefs.map(e => e.type);
  const lastIdx = lastType ? stepTypes.indexOf(lastType) : -1;
  const isTaskDone = s === "completed";
  const upcomingSteps = evDefs.filter((def, i) => i > lastIdx);
  // 出勤後、還沒抵達現場前，下一步就是要送去的醫院——回報按鈕上面顯示

  // 下一站的地點是自由輸入的文字，沒有對應醫院名冊資料可以導航。
  const hospitalForArrival = (!isLiaison && lastType === "DISPATCH" && dispatchEv?.hospital)

    <div class="stepper">
      ${evs.map((e, idx) => {
        const def = evDefs.find(d=>d.type===e.type);

  // rTypes 決定回報表單/Sticky Bar 要顯示的動作按鈕（見下方），勤務進度 Stepper

  const rTypes = canDoReport ? reportableTypes(taskId) : [];

  // ---- 患者狀況：任何進行中的任務，遇到突發狀況都能記錄生命徵象／主訴，

        <button type="button" class="btn-ghost" style="width:100%;" onclick="window.__closeVitalsCase('${taskId}')">離開醫務所</button>
      </div>` : ""}

  // ---- 回報表單／Sticky Bottom Action Bar ----

  if (canDoReport && draft) {

            ${isFinal ? `<div class="field"><label>剩餘油量</label><select id="rf-fuel" required>${fuelOptions("")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="rf-note" placeholder="備註"></div>

/* =========================================================
   15) 畫面：勤務紀錄搜尋
   ========================================================= */
const RECORDS_PERIODS = [
  { key:"today", label:"今天" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }, { key:"custom", label:"自訂日期" }
];
function runRecordsFilter(p, f){
  let tasks = visibleTasks(p, state.tasks);
  if (f.period === "custom") {
    if (f.customDateFrom || f.customDateTo) tasks = tasks.filter(t => {
      const d = new Date(t.createdAt||0);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (f.customDateFrom && iso < f.customDateFrom) return false;
      if (f.customDateTo && iso > f.customDateTo) return false;
      return true;
    });
  } else {
    tasks = tasksInPeriod(tasks, f.period);
  }
  if (f.unit) tasks = tasks.filter(t => t.unit === f.unit);
  if (f.vehicle) tasks = tasks.filter(t => t.vehicle === f.vehicle);
  if (f.title) tasks = tasks.filter(t => (t.title||"").toLowerCase().includes(f.title.toLowerCase()));
  if (f.location) tasks = tasks.filter(t => (t.location||"").toLowerCase().includes(f.location.toLowerCase()));
  if (f.status) tasks = tasks.filter(t => deriveStatus(t.id) === f.status);
  if (f.person) tasks = tasks.filter(t => t.crewLeader === f.person || t.driver === f.person);
  return tasks;
}
function viewRecords(){
  const p = state.profile;
  const f = state.recordsFilter;

  const statusOptions = ["", ...STATUS_ORDER].map(s => `<option value="${s}" ${f.status===s?'selected':''}>${s?STATUS_LABEL[s]:'全部狀態'}</option>`).join("");

  // 車號／人員下拉選單：依目前單位篩選（或全部單位）動態列出，不再手打文字搜尋
  const vehiclePool = sortVehicles(f.unit ? state.vehicles.filter(v => v.unit === f.unit) : state.vehicles);
  const personPool = (f.unit ? state.personnel.filter(x => x.unit === f.unit) : state.personnel);
  const vehicleOptions = `<option value="">全部車號</option>` + vehicleOptionsByType(vehiclePool, v => `<option value="${esc(v.plate)}" ${f.vehicle===v.plate?'selected':''}>${esc(v.plate)}</option>`);
  const personOptions = [`<option value="">全部人員</option>`, ...personPool.map(x => `<option value="${esc(x.name)}" ${f.person===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`)].join("");

  const periodPills = `
    <div class="pill-row">
      ${RECORDS_PERIODS.map(pd => `<button class="pill ${f.period===pd.key?'active':''}" onclick="window.__setRecordsFilter('period','${pd.key}')">${pd.label}</button>`).join("")}
    </div>
    ${f.period === "custom" ? `
    <div class="search-grid">
      <div class="field"><label>起始日期</label><input type="date" value="${f.customDateFrom}" max="${f.customDateTo||''}" oninput="window.__setRecordsFilterQuiet('customDateFrom', this.value)"></div>
      <div class="field"><label>結束日期</label><input type="date" value="${f.customDateTo}" min="${f.customDateFrom||''}" oninput="window.__setRecordsFilterQuiet('customDateTo', this.value)"></div>
    </div>` : ""}`;
  const unitPills = canSeeAllUnits(p) ? `
    <div class="pill-row">
      <button class="pill ${!f.unit?'active':''}" onclick="window.__setRecordsFilter('unit','')">全部單位</button>
      ${UNITS.map(u => `<button class="pill ${f.unit===u.code?'active':''}" onclick="window.__setRecordsFilter('unit','${u.code}')">${u.label}</button>`).join("")}
    </div>` : "";

  const expanded = state.recordsFiltersExpanded;
  const applied = state.recordsApplied;
  const tasks = applied ? runRecordsFilter(p, applied) : [];

  // 自訂日期若往回查超過平常預載的最近 RECENT_WINDOW_DAYS 天，那段期間的
  // 資料一開始沒被抓下來，查詢結果可能不完整；提供「查詢更早的資料」讓
  // 使用者自己決定要不要多花一次查詢把那段期間的資料也補齊，而不是每次
  // 登入都預先抓那麼久以前的資料。
  const dq = state.recordsDeepQuery;
  const needsDeepQuery = applied && applied.period === "custom" && applied.customDateFrom
    && applied.customDateFrom < isoDate(recentCutoffDate())
    && !(dq && dq.done && dq.from === applied.customDateFrom && dq.to === applied.customDateTo);
  const deepQueryBanner = needsDeepQuery ? `
    <div class="empty" style="text-align:left; padding:14px 16px; margin-bottom:14px;">
      ${dq && dq.loading ? `查詢中…` : `查詢範圍早於最近 ${RECENT_WINDOW_DAYS} 天，畫面上的結果可能不完整。`}
      ${dq && dq.loading ? "" : `<button class="btn-ghost" style="margin-top:8px;" onclick="window.__runRecordsDeepQuery()">查詢更早的資料</button>`}
    </div>` : "";

  return `
    ${periodPills}
    ${unitPills}
    <button class="filters-toggle ${expanded?'open':''}" onclick="window.__toggleRecordsFilters()">
      ${icon('chevronDown',16).replace('<svg ', '<svg class="chev" ')} 更多篩選
    </button>
    ${expanded ? `
    <div class="search-grid">
      <div class="field"><label>車號</label><select onchange="window.__setRecordsFilter('vehicle', this.value)">${vehicleOptions}</select></div>
      <div class="field"><label>人員（車長/駕駛）</label><select onchange="window.__setRecordsFilter('person', this.value)">${personOptions}</select></div>
      <div class="field"><label>狀態</label><select onchange="window.__setRecordsFilter('status', this.value)">${statusOptions}</select></div>
      <div class="field"><label>任務名稱</label><input value="${esc(f.title)}" oninput="window.__setRecordsFilterQuiet('title', this.value)"></div>
      <div class="field full"><label>地點</label><input value="${esc(f.location)}" oninput="window.__setRecordsFilterQuiet('location', this.value)"></div>
    </div>` : ""}
    <div class="row" style="display:flex; gap:10px; margin:12px 0;">
      <button class="btn-ghost" style="flex:0 0 auto; padding:15px 22px;" onclick="window.__clearRecordsQuery()">清除</button>
      <button class="btn-primary" style="flex:1; margin-top:0;" onclick="window.__runRecordsQuery()">查詢</button>
    </div>
    ${!applied ? `<div class="empty">${icon('records',32)}<div style="margin-top:10px;">選擇篩選條件後按「查詢」</div></div>` : `
      ${deepQueryBanner}
      <div class="section-label">結果 · ${tasks.length}</div>
      ${tasks.length ? tasks.map(taskCard).join("") : `<div class="empty">找不到符合條件的勤務紀錄</div>`}
    `}
  `;
}

/* =========================================================
   15b) 畫面：統計分析
   ========================================================= */
const STATUS_COLOR = { pending:"#8E8E93", dispatch:"#FF3B30", onscene:"#FF9500", transit:"#6B23C7", returning:"#0066FF", completed:"#34C759" };
function tasksInPeriod(tasks, period){
  const now = new Date();
  return tasks.filter(t => {
    const d = new Date(t.createdAt||0);
    if (period === "today") return isSameDay(d.getTime(), now);
    if (period === "week") { const diff = (now - d) / 86400000; return diff >= 0 && diff < 7; }
    if (period === "month") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    return true;
  });
}
function viewStats(){
  const p = state.profile;
  const base = visibleTasks(p, state.tasks);
  const tasks = tasksInPeriod(base, state.statsPeriod);

  const periods = [
    { key:"today", label:"今日" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }
  ];

  // 各車輛出勤次數（依 DISPATCH 事件計算，同一車輛可能執行多趟勤務）
  const vehicleCounts = {};
  tasks.forEach(t => {
    const d = eventByType(t.id, "DISPATCH");
    if (!d) return;
    const key = t.vehicle || "未填車號";
    vehicleCounts[key] = (vehicleCounts[key]||0) + 1;
  });
  const vehicleEntries = Object.entries(vehicleCounts).sort((a,b) => b[1]-a[1]);
  const maxCount = Math.max(1, ...vehicleEntries.map(e=>e[1]));

  const CHART_CAT_COLORS = ["#007AFF", "#FF9500", "#34C759", "#6B23C7", "#FF3B30", "#00A3A3"];
  const barChart = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">各車輛出勤次數</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="bar-row">
          <div class="bar-label">${esc(veh)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%; background:${CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]};"></div></div>
          <div class="bar-val">${count}</div>
        </div>`).join("")}
    </div>` : `<div class="chart-card"><div class="chart-title">各車輛出勤次數</div><div class="empty">此區間尚無出勤紀錄</div></div>`;

  const rankList = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">車輛使用次數排行</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="rank-name">${esc(veh)}</div>
          <div class="rank-count">${count} 次</div>
        </div>`).join("")}
    </div>` : "";

  // 任務狀態比例（part-to-whole → 橫向堆疊長條，不用圓餅圖）
  const statusCounts = {};
  STATUS_ORDER.forEach(s => statusCounts[s] = 0);
  tasks.forEach(t => { const s = deriveStatus(t.id); statusCounts[s] = (statusCounts[s]||0) + 1; });
  const totalTasks = tasks.length || 1;
  const stackSegs = STATUS_ORDER.filter(s => statusCounts[s] > 0).map(s => `
    <div class="seg" style="width:${(statusCounts[s]/totalTasks*100).toFixed(1)}%; background:${STATUS_COLOR[s]};"></div>`).join("");
  const legendRows = STATUS_ORDER.map(s => `
    <div class="leg-row">
      <span class="leg-dot" style="background:${STATUS_COLOR[s]};"></span>
      <span class="leg-name">${STATUS_LABEL[s]}</span>
      <span class="leg-val">${statusCounts[s]}（${Math.round(statusCounts[s]/totalTasks*100)}%）</span>
    </div>`).join("");

  const statusChart = `
    <div class="chart-card">
      <div class="chart-title">任務狀態比例</div>
      <div class="stackbar">${stackSegs}</div>
      <div class="stack-legend">${legendRows}</div>
    </div>`;

  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">統計分析</div>
    <div class="tabs2">
      ${periods.map(pd => `<div class="tab2 ${state.statsPeriod===pd.key?'active':''}" onclick="window.__setStatsPeriod('${pd.key}')">${pd.label}</div>`).join("")}
    </div>
    ${barChart}
    ${rankList}
    ${statusChart}
  `;
}

   16) 畫面：通知中心（收件匣歷史紀錄）
   同一份卡片樣式有兩個入口，但看到的資料不完全一樣：
   - 右上角鈴鐺圖示（所有在職帳號都能看，個人視角，唯讀）：全體公告
     （notifications）＋只有自己收得到的系統推播個人紀錄（pushLog，見
     mergedPersonalNotifications）合併排序，讓使用者能回頭查「系統到底
     推播過什麼給我」，效期一樣是 30 天。
   - 後台管理「訊息管理」（canManageUsers 專用，見 viewAdminMessages，
     多了新增/編輯/刪除公告）：只管理公告本身（notifications），不會混
     進每個人各自的系統推播紀錄——那是系統自動產生的個人化資料，不是

   兩邊共用同一套卡片 HTML，用 editable 參數決定資料來源跟要不要顯示
   新增/編輯/刪除，避免同一份卡片邏輯維護兩份。
   ========================================================= */
function renderNotificationsList(editable){
  const list = editable ? state.notifications : mergedPersonalNotifications();
  const hasUnread = list.some(n => !n.isRead);
  const addBtn = editable
    ? `<button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('notifications', null, '')">${icon('plus',15)} 新增公告</button>`
    : "";
  const markAllBtn = hasUnread
    ? `<button class="icon-btn" style="margin-bottom:12px;" onclick="window.__markAllNotificationsRead(${!editable})">全部標記為已讀</button>`
    : "";
  return `
    ${addBtn}
    ${markAllBtn}
    ${list.length ? list.map(n => `
      <div class="notif-card spatial-card ${!n.isRead ? 'unread' : ''}" onclick="window.__markNotificationRead('${n.id}','${n._coll||'notifications'}')">
        <div class="notif-card-head">
          <span class="notif-icon">${icon('bell',18)}</span>
          <div class="notif-head-text">
            <div class="notif-title">${esc(n.title)}</div>
            <div class="notif-time">${fmtTime(n.timestamp ? new Date(n.timestamp).getTime() : null)}</div>
          </div>
          ${!n.isRead ? `<span class="notif-dot"></span>` : ""}
        </div>
        <div class="notif-body">${esc(n.body)}</div>
        ${n.expiresAt ? `<div class="notif-expiry">效期至 ${fmtDateShort(new Date(n.expiresAt).getTime())}</div>` : ""}
        ${editable ? `
        <div style="display:flex; gap:6px; margin-top:12px;">
          <button class="icon-btn" onclick="event.stopPropagation(); window.__openBaseDataModal('notifications','${n.id}','')">編輯</button>
          <button class="icon-btn danger" onclick="event.stopPropagation(); window.__deleteBaseData('notifications','${n.id}')">刪除</button>
        </div>` : ""}
      </div>`).join("") : `<div class="empty">尚無通知</div>`}
  `;
}
function viewNotifications(){
  return `<div class="section-label">通知中心</div>${renderNotificationsList(false)}`;
}

// disabled：功能還沒開放給這位使用者時（目前只有大量傷患演練模組限

function settingsRow({icon:iconName, bg, fg, title, subtitle, onclick, disabled}){

      <div class="txt"><div class="t1">${title}</div>${subtitle?`<div class="t2">${subtitle}</div>`:''}</div>
      <span class="chev">›</span>

// rows 是空陣列時整個 section（含標題）都不渲染，這樣「管理功能」這個
// 區塊在一般成員登入時會直接消失，不會顯示一個空標題卻沒有內容。

   電話/證照等級，不提供角色指派/編輯/刪除操作——一般成員想查同僚聯絡
   方式時，不用進得去管理後台才看得到名冊。admin/高勤官（canSeeAllUnits）
   可以切換單位頁籤看全營；主官管/一般成員看到的單位範圍本來就受
   Firestore 規則限制只到自己單位，跟其他頁面（人員與帳號、車輛/行車
   紀錄器）共用同一顆 baseDataUnit 頁籤狀態。
   ========================================================= */
function viewMemberList(){
  const p = state.profile;
  const canSwitch = canSeeAllUnits(p);
  const unit = canSwitch ? (state.baseDataUnit || UNITS[0].code) : myUnit(p);
  const unitTabs = canSwitch ? `
    <div class="tabs2">
      ${UNITS.map(u => `<div class="tab2 ${unit===u.code?'active':''}" onclick="window.__setBaseDataUnit('${u.code}')">${u.label}</div>`).join("")}

  const rows = unit ? state.personnel.filter(x => x.unit === unit && x.active !== false).slice().sort((a,b) => rankWeight(a.title) - rankWeight(b.title)) : [];
  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">成員列表</div>
    ${unit ? `
      ${unitTabs}
      ${rows.length ? rows.map(x => `
        <div class="admin-row">

  `;
}

function viewTutorialCategory(key){

  `;
}
// 文章內文的區塊渲染：h3／p／image／callout 四種類型，圖片跟重點提醒框
// 樣式見上面 CSS 的 .tutorial-* 系列。
function renderTutorialBody(blocks){
  return blocks.map(b => {
    if (b.type === "h3") return `<div class="tutorial-h3">${esc(b.text)}</div>`;
    if (b.type === "p") return `<p>${esc(b.text)}</p>`;
    if (b.type === "image") return `
      <div class="tutorial-image-block">
        <img src="${esc(b.src)}" alt="${esc(b.caption||'')}" class="tutorial-image" loading="lazy">
        ${b.caption ? `<div class="tutorial-image-caption">${esc(b.caption)}</div>` : ""}
      </div>`;
    if (b.type === "callout") return `<div class="tutorial-callout">${icon('alert',16)}<span>${esc(b.text)}</span></div>`;
    if (b.type === "table") return `
      <div class="tutorial-table-wrap">
        ${b.title ? `<div class="tutorial-table-title">${esc(b.title)}</div>` : ""}
        <table class="tutorial-table">
          <thead><tr>${b.headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead>
          <tbody>${b.rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody>
        </table>
      </div>`;
    return "";
  }).join("");
}
function viewTutorialArticle(key, id){
  if (myRole(state.profile) !== 'admin') return `<div class="back-row">${backBtn({name:'profile'})}</div><div class="empty">此功能目前僅開放管理員使用</div>`;
  const cat = TUTORIAL_CATEGORIES.find(c => c.key === key);
  const article = cat ? (TUTORIAL_ARTICLES[key]||[]).find(a => a.id === id) : null;
  if (!cat || !article) return `<div class="back-row">${backBtn({name:'tutorials'})}</div><div class="empty">找不到這篇教學</div>`;
  return `
    <div class="back-row">${backBtn({name:'tutorialCategory', key})}</div>
    <div class="section-label">${esc(article.title)}</div>
    <div class="detail-head" style="text-align:left; font-size:var(--text-sm); line-height:1.8; color:var(--text);">
      ${renderTutorialBody(article.body)}
    </div>
  `;
}

   17c) 畫面：醫院資訊（急救責任等級／電話查詢，任何在職帳號皆可查看）

// 醫院卡片清單本體（不含搜尋框/篩選頁籤/重新定位工具列）：搜尋框輸入時
// 只會呼叫這支函式重繪清單本身（見 window.__setHospitalSearch），不會整頁
// render()——整頁 render() 會把 <input> 整個節點換掉，輸入到一半的注音／
// 拼音組字會被打斷、iOS 鍵盤甚至會直接收起來，變成打一個注音符號鍵盤就
// 消失、完全打不了字。篩選頁籤是按鈕點擊（沒有組字狀態要保護），維持
// 呼叫端整頁 render() 即可。
function renderHospitalListBody(){
  const p = state.profile;
  const canEdit = canManageBaseData(p);
  const canAdd = canAddHospital(p);
  const searchQ = (state.hospitalSearchQuery||"").trim();
  const filterTier = state.hospitalFilterTier || "";
  const filterLevel = state.hospitalFilterLevel || "";
  // 排序優先度：醫院本身有登記座標時（tier 0）直接算實際距離最準，按距離排序；
  // 沒登記座標的醫院沒有其他依據可以概略比對，一律排在有距離的後面（tier 1）。
  // tier 0 內部一律用同一個 km 值排序——有算到 OSRM 道路距離（roadDistances）
  // 就用道路距離，抓不到才用 haversine 直線距離頂替，呼叫端不用另外分兩套
  // 排序邏輯。
  function matchInfo(h){
    if (h.lat != null && h.lng != null && state.myLat != null) {
      const roadKm = state.roadDistances[h.id];
      if (roadKm != null) return { tier: 0, km: roadKm, roadKm: true };
      return { tier: 0, km: haversineKm(state.myLat, state.myLng, h.lat, h.lng), roadKm: false };
    }
    return { tier: 1, km: null };
  }
  const filteredHospitals = state.hospitals.filter(h => {
    if (filterTier && h.tier !== filterTier) return false;
    if (filterLevel && h.level !== filterLevel) return false;
    if (searchQ && !(String(h.name||'').includes(searchQ) || String(h.address||'').includes(searchQ))) return false;
    return true;
  });
  // 「依等待看診人數排序」開啟時優先依健保署即時資料排序（沒有資料的
  // 醫院一律排到後面，用原本的距離排序當次要依據）；沒開啟時，已定位
  // 就依距離排序（「依距離」）；都沒有的預設狀態改回依醫院名稱筆畫排序，
  // 不再用醫院層級當預設排序依據——筆畫序才是使用者熟悉、找得到人的預設值，
  // 醫院層級改成上方篩選頁籤自己選就好。
  const rows = filteredHospitals.slice().sort((a,b) => {
    if (state.hospitalSortBySee) {
      const sa = erWaitSeeCount(a, state.erRealtime), sb = erWaitSeeCount(b, state.erRealtime);
      if (sa != null && sb != null && sa !== sb) return sa - sb;
      if (sa != null && sb == null) return -1;
      if (sa == null && sb != null) return 1;
    }
    if (state.myLat != null) {
      const ia = matchInfo(a), ib = matchInfo(b);
      if (ia.tier !== ib.tier) return ia.tier - ib.tier;
      if (ia.tier === 0) return ia.km - ib.km;
    }
    // 純預設排序（沒開依人數、也還沒定位）才把標記過「常用」的醫院排最
    // 前面；依人數／依距離排序時不要跟著調整，避免使用者已經選了其他
    // 排序依據，常用醫院卻突然插隊到看不懂為什麼在那個位置。
    if (!state.hospitalSortBySee && state.myLat == null && !!a.frequent !== !!b.frequent) return a.frequent ? -1 : 1;
    return HOSPITAL_NAME_COLLATOR.compare(a.name||'', b.name||'');
  });
  return `
    ${canAdd ? `<button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('hospitals', null, '')">${icon('plus',15)} 新增醫院</button>` : ""}
    ${rows.length ? rows.map(x => {
      const info = matchInfo(x);
      // 有算到道路距離／退回直線距離，文字上明確標出來（路程/直線），
      // 避免第一線人員誤把直線距離當成實際要開的路程來判斷；路程（比較
      // 準）用綠色 badge，直線（只是概略）用玫瑰色 badge，一眼就能分辨
      // 這個距離可信度如何，不用細看文字。
      const nearBadge = info.tier === 0 ? `<span class="badge ${info.roadKm ? 'completed' : 'dispatch'}" style="padding:7px 10px;">約 ${info.km.toFixed(1)} 公里 ${info.roadKm ? '(路程)' : '(直線)'}</span>` : '';
      const erRec = state.erRealtime ? findErRecord(x, state.erRealtime.records) : null;
      const erInform = erRec ? erField(erRec, ER_INFORM_KEYS) : null;
      const erSee = erRec ? erField(erRec, ER_WAIT_SEE_KEYS) : null;
      const erGeneral = erRec ? erField(erRec, ER_WAIT_GENERAL_KEYS) : null;
      const erIcu = erRec ? erField(erRec, ER_WAIT_ICU_KEYS) : null;
      const erFullBadge = erInform === 'Y' ? `<span class="badge dispatch" style="padding:7px 10px;">119 已通報滿床</span>` : '';
      // 醫院層級／急救責任等級併成單行副標（例如「醫學中心 · 重度級責任
      // 醫院」），兩個欄位都沒填才顯示「—」。
      const subtitleParts = [];
      if (x.tier) subtitleParts.push(esc(x.tier));
      if (x.level) subtitleParts.push(`${esc(x.level)}責任醫院`);
      const subtitle = subtitleParts.length ? subtitleParts.join(' · ') : '—';
      const menuOpen = state.hospitalMenuOpenId === x.id;
      return `
      <div class="hospital-card">
        <div class="hospital-card-top">
          <div class="hospital-card-badges">
            ${x.frequent ? `<span class="badge completed">⭐ 常用</span>` : ''}${nearBadge}${erFullBadge}
            <h3 class="hospital-card-name">${esc(x.name)}</h3>
            <span class="hospital-card-subtitle">${subtitle}</span>
          </div>
          ${canEdit ? `
          <button type="button" class="hospital-menu-btn" onclick="window.__toggleHospitalMenu('${x.id}')" aria-label="更多">
            <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
          </button>
          ${menuOpen ? `
          <div class="hospital-menu-overlay" onclick="window.__closeHospitalMenu()"></div>
          <div class="hospital-menu">
            <button type="button" onclick="window.__closeHospitalMenu(); window.__openBaseDataModal('hospitals','${x.id}','')">編輯</button>
            <button type="button" class="danger" onclick="window.__closeHospitalMenu(); window.__deleteBaseData('hospitals','${x.id}')">刪除</button>
          </div>` : ''}` : ''}
        </div>

        ${erRec ? `
        <div class="hospital-stats">
          <div><p class="stat-label">等待看診</p><p class="stat-value">${erSee != null ? esc(String(erSee)) : '—'} <span class="stat-unit">人</span></p></div>
          <div><p class="stat-label">等待住院</p><p class="stat-value">${erGeneral != null ? esc(String(erGeneral)) : '—'} <span class="stat-unit">人</span></p></div>
          <div><p class="stat-label">ICU 待床</p><p class="stat-value">${erIcu != null ? esc(String(erIcu)) : '—'} <span class="stat-unit">人</span></p></div>
        </div>` : ''}

        <div class="hospital-contact">
          ${x.phone ? `<p>📞 電話：<a href="tel:${esc(x.phone)}">${esc(x.phone)}</a></p>` : ''}
          ${x.address ? `<p>📍 地址：${esc(x.address)}</p>` : ''}
          ${x.note ? `<p>${esc(x.note)}</p>` : ''}
        </div>

        <div class="hospital-nav-grid">
          <a class="hospital-nav-btn google" href="${googleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">🧭 Google 導航</a>
          <a class="hospital-nav-btn apple" href="${appleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">🗺️ Apple 導航</a>
        </div>
      </div>`;
    }).join("") : (state.hospitals.length ? `<div class="empty">找不到符合條件的醫院，請調整搜尋或篩選條件</div>` : `<div class="empty">尚無醫院資料${canAdd ? '，請點上方新增' : ''}</div>`)}
  `;
}
function viewHospitals(){
  const filterTier = state.hospitalFilterTier || "";
  const filterLevel = state.hospitalFilterLevel || "";

  // 篩選樣式：醫院層級（常用，常駐顯示）跟急救責任等級（較少用，收在

    </button>`;
  const locateBar = `
    <div class="hospital-toolbar">
      <button type="button" class="hospital-toolbar-locate" onclick="window.__locateNearbyHospitals()" ${state.locatingHospital ? 'disabled' : ''}>
        ${state.locatingHospital ? '定位中…' : (state.myCounty ? '重新定位' : '顯示附近醫院')}
      </button>
      <div class="hospital-seg">
        <button type="button" class="hospital-seg-btn${state.hospitalSortBySee ? '' : ' active'}" onclick="${state.hospitalSortBySee ? 'window.__toggleHospitalSortBySee()' : ''}">📍 依距離</button>
        <button type="button" class="hospital-seg-btn${state.hospitalSortBySee ? ' active' : ''}" onclick="${state.hospitalSortBySee ? '' : 'window.__toggleHospitalSortBySee()'}">👥 依人數</button>
      </div>
    </div>
    ${(state.myCounty || state.erRealtime) ? `
    <div class="hospital-info-card">
      ${state.myCounty ? `<div class="hospital-info-row">${icon('pin',15)}<span>目前定位：${state.myAddress ? esc(state.myAddress) : `靠近${state.myDistrict ? esc(state.myCounty)+esc(state.myDistrict) : esc(state.myCounty)}`}</span></div>` : ''}
      ${state.erRealtime ? `<div class="hospital-info-row">${icon('refresh',15)}<span>急診即時資訊更新於 ${new Date(state.erRealtime.fetchedAt).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}，僅重度級急救責任醫院有資料</span></div>` : ''}
    </div>` : ''}`;
  return `
    <div class="section-label">醫院資訊</div>
    ${searchBar}
    ${locateBar}
    <div id="hospital-list-body">${renderHospitalListBody()}</div>
  `;

/* =========================================================
   急診待命：兩個醫務所地點固定，各自顯示「目前綁定的待命勤務」——
   待命勤務其實就是一筆提早建立、還沒真的出勤的正常勤務（車號/車長/
   駕駛/值班醫官都先填好），只是建立當下不會自動補一筆出勤事件，停在
   「待出勤」狀態；erStandby/{key} 只存一個 currentTaskId 指標，實際
   資料都在 tasks 集合裡，這樣才能直接沿用平常的勤務詳情頁出勤、記錄
   患者狀況，不用另外維護一套獨立資料。這是底部導覽的一個分頁（不是
   子頁面），所以跟首頁/任務/醫院資訊一樣不接返回鍵。
   ========================================================= */
function viewErStandby(){
  const p = state.profile;
  const canDispatch = canCreateTask(p);
  return `
    <div class="section-label">急診待命</div>
    ${ER_STANDBY_LOCATIONS.map(loc => {
      const rec = state.erStandby.find(x => x.id === loc.key);
      const boundTask = rec && rec.currentTaskId ? state.tasks.find(t => t.id === rec.currentTaskId) : null;
      const boundStatus = boundTask ? deriveStatus(boundTask.id) : null;
      const isBound = boundTask && boundStatus !== "completed";
      const crewLine = isBound ? personCardLine(boundTask.crewLeader, boundTask.unit) : null;
      const driverLine = isBound ? personCardLine(boundTask.driver, boundTask.unit) : null;
      const doctorLine = isBound && boundTask.dutyOfficer ? doctorCardLine(boundTask.dutyOfficer) : null;
      return `
      <div class="er-standby-card spatial-card${isBound ? ' s-'+boundStatus : ''}">
        <div class="er-standby-head">
          <div class="name">${esc(loc.label)}</div>
          ${isBound ? statusBadge(boundStatus) : ""}
        </div>
        ${isBound ? `
        <div class="er-standby-meta">建立於 ${fmtTime(new Date(boundTask.createdAt||0).getTime())}${isStandbyStale(new Date(boundTask.createdAt||0).getTime()) ? `　<span style="color:var(--amber);">${icon('alert',13)} 尚未於今日 08:00 後更新，請確認車長/駕駛是否需要換班</span>` : ''}</div>
        <div class="er-standby-grid">
          <div class="detail-item"><span class="lbl">車號</span><span class="val">${vehicleLabelHtml(boundTask.vehicle)}</span></div>
          <div class="detail-item"><span class="lbl">值班醫官</span><span class="val">${doctorLine ? doctorLine.main : "尚未設定"}</span>${doctorLine && doctorLine.sub ? `<span class="sub-line">${doctorLine.sub}</span>` : ''}</div>
          <div class="detail-item"><span class="lbl">車長</span><span class="val">${crewLine.main}</span>${crewLine.sub ? `<span class="sub-line">${crewLine.sub}</span>` : ''}</div>
          <div class="detail-item"><span class="lbl">駕駛</span><span class="val">${driverLine.main}</span>${driverLine.sub ? `<span class="sub-line">${driverLine.sub}</span>` : ''}</div>
        </div>
        ${isCurrentDutyMember(p, boundTask) ? `
        <div class="emergency-slider" data-loc-key="${esc(loc.key)}">
          <div class="emergency-slider-track"><span class="emergency-slider-text">🚨 右滑發送：${esc(loc.label)} 緊急動員通知</span></div>

function taskToCsvRow(t){
  const s = deriveStatus(t.id);
  const dispatchEv = eventByType(t.id, "DISPATCH");
  const completedEv = eventByType(t.id, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? "";
  const finalMileage = completedEv?.mileage ?? "";
  const distance = (startMileage !== "" && finalMileage !== "") ? (finalMileage - startMileage) : "";
  return [t.title, t.vehicle, t.location, t.crewLeader, t.driver, STATUS_LABEL[s], fmtTime(new Date(t.createdAt||0).getTime()), startMileage, finalMileage, distance]
    .map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",");
}
function exportTasksCsv(){
  const header = ["任務名稱","車號","地點","車長","駕駛","狀態","建立時間","出發里程","最終里程","行駛公里"].join(",");
  const rows = visibleTasks(state.profile, state.tasks).map(taskToCsvRow);
  const csv = "﻿" + [header, ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `勤務紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

      <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">

          </select>

        </div>` : ''}
        <button class="icon-btn" onclick="window.__openBaseDataModal('personnel','${x.id}','${x.unit||''}')">編輯</button>

      </div>

  const unassigned = canAssignRole ? state.personnel.filter(x => !x.unit) : [];
  const unit = canSwitch ? (state.baseDataUnit || UNITS[0].code) : myUnit(p);
  const unitTabs = canSwitch ? `
    <div class="tabs2">
      ${UNITS.map(u => `<div class="tab2 ${unit===u.code?'active':''}" onclick="window.__setBaseDataUnit('${u.code}')">${u.label}</div>`).join("")}

  const rows = unit ? state.personnel.filter(x => x.unit === unit).slice().sort((a,b) => rankWeight(a.title) - rankWeight(b.title)) : [];
  return `
    <div class="section-label">人員與帳號</div>

}

// 測試模式：管理員在測試某項功能（會觸發推播的操作）時，可以暫時關閉
// 「發給大家」的推播通知，不用真的打擾所有人才能測試——實際的略過邏輯
// 在後端 functions/index.js 的 isTestModeActive()／notifyRecipients()，
// 這裡只負責讀取/寫入 settings/testMode 這份單一設定文件、顯示目前狀態。
// 比照意見回饋頁籤的做法（見 state._feedbackCache），開啟頁籤時現抓一次，
// 不建立輪詢——這顆開關很少人在看，不需要即時同步。
function viewAdminSystemSettings(){
  if (!state._testModeCache) {
    state._testModeCache = "loading";
    fsGetDoc("settings/testMode").then(doc => {
      state._testModeCache = doc || {};
      render();
    }).catch(err => {
      console.error("讀取測試模式設定失敗", err);
      showToast(`讀取測試模式設定失敗：[${err.code||'?'}] ${err.message}`);
      state._testModeCache = {};
      render();
    });
    return `<div class="section-label">系統設定</div><div class="spinner"></div>`;
  }
  if (state._testModeCache === "loading") return `<div class="section-label">系統設定</div><div class="spinner"></div>`;

  const tm = state._testModeCache;
  const expiresAtMs = tm.expiresAt ? new Date(tm.expiresAt).getTime() : 0;
  const active = !!tm.enabled && expiresAtMs > Date.now();
  const remainMin = active ? Math.max(1, Math.ceil((expiresAtMs - Date.now()) / 60000)) : 0;
  return `
    <div class="section-label">系統設定</div>
    <div class="detail-head">
      <div class="appearance-auto-row">
        <div style="min-width:0;">
          <div style="font-size:var(--text-base); color:var(--text); font-weight:600;">測試模式（暫停推播通知）</div>
          <div style="color:var(--muted); font-size:var(--text-xs); margin-top:4px;">
            ${active ? `已開啟，約 ${remainMin} 分鐘後自動關閉（由 ${esc(tm.enabledBy||'—')} 開啟）` : '目前關閉，所有推播通知正常發送'}
          </div>
        </div>
        <label class="ios-switch">
          <input type="checkbox" ${active?'checked':''} onchange="window.__toggleTestMode(this.checked)">
          <span class="track"></span>
          <span class="knob"></span>
        </label>

/* =========================================================
   18b) 推播控制台（後台）：通訊覆蓋率儀表板
   資料來源是真實的 users collection（state.personnel，見
   mapUserToPersonnel），不是假資料：pushPermission/pushDevice/
   pushSubscribedAt 由每個人自己的裝置在通過【前台】推播守門員時自我回報
   寫回 Firestore（見 reportPushPermissionStatus()），尚未回報過的帳號
   （還沒開過這個新版本）顯示「尚未回報」，跟「已經開過但選擇不開通」
   （尚未開啟）分開，不能混為一談。
   ========================================================= */
const PUSH_PERMISSION_LABEL = {
  granted: "🟢 已允許", default: "🟡 尚未開啟", denied: "🔴 已封鎖", unknown: "⚪ 尚未回報", unsupported: "⚪ 不支援裝置"
};
// 軟膠囊配色：granted/token 有效＝綠、default＝黃、denied/token 失效＝紅、
// unknown（尚未回報）／不支援＝灰階，跟全站既有的 .badge 淡底深字配色
// 慣例一致（color-mix 出 12~14% 的淡底 + 該色系文字）。
const PUSH_PERMISSION_PILL_CLASS = {
  granted: "ok", default: "warn", denied: "bad", unknown: "muted", unsupported: "muted"
};
// 尚未登入的預建人員資料（role==='unclaimed'）沒有自己的裝置可以回報通知
// 權限，排進來只會全部顯示「尚未回報」，對通訊覆蓋率的判讀沒有意義，
// 一律排除在推播控制台的統計/名冊之外。
function pushConsoleRows(){
  return state.personnel.filter(x => x.role !== "unclaimed");
}
function filteredPushConsoleRows(){
  const f = state.pushConsoleFilter;
  const kw = f.keyword.trim().toLowerCase();
  return pushConsoleRows().filter(x => {
    if (kw && !x.name.toLowerCase().includes(kw)) return false;
    if (f.unit && x.unit !== f.unit) return false;
    if (f.status && x.pushPermission !== f.status) return false;
    return true;
  });
}
function pushConsoleMetrics(){
  const rows = pushConsoleRows();
  const total = rows.length;
  const granted = rows.filter(x => x.pushPermission === "granted").length;
  const dflt = rows.filter(x => x.pushPermission === "default").length;
  const denied = rows.filter(x => x.pushPermission === "denied").length;
  const unknown = total - granted - dflt - denied;
  const rate = total ? Math.round(granted / total * 100) : 0;
  return { total, granted, dflt, denied, unknown, rate };
}
function renderPushConsoleBody(){
  const rows = filteredPushConsoleRows();
  if (!rows.length) return `<div class="empty">沒有符合篩選條件的人員</div>`;
  return rows.map(x => {
    const tokenValid = x.fcmTokens && x.fcmTokens.length > 0;
    const permClass = PUSH_PERMISSION_PILL_CLASS[x.pushPermission] || "muted";
    // 裝置種類／訂閱時間都沒有回報過時，這個區塊直接留白，不要放「—」
    // 這種佔位符號——尚未回報本來就沒有東西可以顯示，硬塞一個符號進去
    // 反而顯得突兀。
    const metaParts = [];
    if (x.pushDevice) metaParts.push(esc(x.pushDevice));
    if (x.pushSubscribedAt) metaParts.push(fmtTime(new Date(x.pushSubscribedAt).getTime()));
    return `
    <div class="push-card">
      <div class="push-card-top">
        <div>
          <div class="push-card-name">${esc(x.name)}</div>
          <div class="push-card-unit">${esc(unitLabel(x.unit))}${x.title ? ' · '+esc(x.title) : ''}</div>
        </div>
        <div class="push-card-pills">
          <span class="push-pill ${permClass}">${PUSH_PERMISSION_LABEL[x.pushPermission] || PUSH_PERMISSION_LABEL.unknown}</span>
          <span class="push-pill ${tokenValid ? 'ok' : 'bad'}">${tokenValid ? '🟢 有效' : '❌ 已過期失效'}</span>
        </div>
      </div>
      <div class="push-card-bottom">
        <div class="push-card-meta">${metaParts.join(' · ')}</div>
        <button class="push-test-btn" ${tokenValid ? '' : 'disabled'} onclick="window.__testPushToUser('${x.id}', this)">測試推播</button>
      </div>
    </div>`;
  }).join("");
}
function viewPushConsole(){
  const m = pushConsoleMetrics();

  return `
    <div class="section-label">推播控制台</div>
    <div class="push-metrics-row">

// 背景輪詢用：畫面會整個重繪（innerHTML 全部換掉），如果使用者正在輸入框
// 打字，重繪會讓輸入框元素被整個換掉，導致輸入焦點與鍵盤被打斷。輪詢觸發的
// 重繪一律呼叫這個函式，偵測到目前有輸入中的欄位就先跳過，等使用者打完離開
// 該欄位（或下一次輪詢/使用者操作觸發真正的 render）再更新畫面。
//
// 只檢查當下有沒有 focus 在輸入框還不夠：手機上切換欄位、跳出鍵盤工具列等
// 動作都可能讓輸入框短暫失焦，若輪詢剛好在那個空檔觸發，整個表單會被重繪回
// 伺服器上的舊資料，使用者還沒送出的內容就會憑空消失。因此只要使用者正處於
// 任何編輯中的表單（個人資料、基礎資料管理、任務回報草稿），一律跳過背景重繪，
// 直到儲存/取消離開編輯狀態為止。
function safeRender(){
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.tagName === "SELECT")) return;
  if (state.profileEditing || state.baseDataModal || state.reportDraft || state.eventEditId || state.campRegModal) return;
  render();
}

function render(){
  renderPushGatekeeper();
  const app = document.getElementById("app");
  // app.innerHTML = ... 整段換掉，連 <main> 這個節點本身都是重新建立的，
  // 新節點的 scrollTop 永遠從 0 開始——單純狀態變化（例如卡片上的選單
  // 開關、切換開關）呼叫 render() 時，畫面會被誤判成「跳回最上面」，其實
  // 只是捲動位置被這次重繪重置掉了。這裡在換內容前先記住捲動位置、換完
  // 再設回去，讓「只是狀態變了」的重繪不會意外把使用者往下捲的內容彈回
  // 頂端；真正的換頁導覽（nav()）呼叫 render() 之後還會再呼叫
  // scrollContentToTop()，會蓋掉這裡還原的值，維持原本換頁就該回頂端的
  // 行為不受影響。
  const prevMain = document.querySelector("main");
  const prevScrollTop = prevMain ? prevMain.scrollTop : 0;
  // 這幾個提前 return 的畫面（登入前／待審核／已停用）本來就沒有
  // <main>，跟下面正式畫面「window/document 永遠不捲動，只有 main 自己

// 醫院道路距離（OSRM Table API，router.project-osrm.org 公開 demo server）：
// 只當直線距離之外的加分項，永遠不擋主流程。這台 demo server 官方明講不
// 保證 uptime／延遲，限流 1 req/秒，也可能隨時停用（見 OSRM 專案 wiki 的
// Api usage policy）——所以任何失敗情況（逾時、限流 429、CORS 被擋、伺服器
// 掛掉）一律靜默放棄，不 console.error 洗版、也不跳錯誤提示，直接讓
// matchInfo() 退回原本的 haversine 直線距離即可，使用者本來就看得到那組
// 排序結果，沒有東西「壞掉」。
// 只對「直線距離 50 公里內、最近的前 15 間」算道路距離：一來 OSRM Table
// API 的座標是接在網址路徑上，醫院數一多網址會太長；二來排序前段之外的
// 醫院算不算路程差異不大，沒必要為了它們消耗有限的請求額度。
// 注意 OSRM 的座標順序是「經度,緯度」（跟站內其他地方慣用的「緯度,經度」
// 相反），串網址時要特別小心不要接反。
let roadDistanceReqId = 0;
async function fetchRoadDistances(lat, lng){
  const myReqId = ++roadDistanceReqId;
  const candidates = state.hospitals
    .filter(h => h.lat != null && h.lng != null)
    .map(h => ({ h, km: haversineKm(lat, lng, h.lat, h.lng) }))
    .filter(x => x.km <= 50)
    .sort((a,b) => a.km - b.km)
    .slice(0, 15);
  if (!candidates.length) return;
  const coordsStr = [`${lng},${lat}`, ...candidates.map(x => `${x.h.lng},${x.h.lat}`)].join(";");
  const url = `https://router.project-osrm.org/table/v1/driving/${coordsStr}?sources=0&annotations=distance`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 2000);
  try {
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) return;
    const json = await res.json();
    // distances[0] 是「起點（使用者自己）到每個座標」的那一列，row-major、
    // 單位公尺；index 0 是起點到自己（不用理），index 1 開始才依序對應
    // candidates 裡的醫院。
    const distances = json?.distances?.[0];
    if (!Array.isArray(distances)) return;
    if (myReqId !== roadDistanceReqId) return; // 這段抓取期間使用者又按了一次重新定位，這筆已經過期，不要蓋掉新結果
    const next = {};
    candidates.forEach((x, i) => {
      const meters = distances[i + 1];
      if (Number.isFinite(meters)) next[x.h.id] = meters / 1000;
    });
    state.roadDistances = next;
    render();
  } catch (e) {
    // 靜默失敗（逾時／CORS／限流／任何錯誤都一樣處理，理由見上方註解）。
  } finally {
    clearTimeout(timer);
  }
}
// GPS 座標反查詳細地址（Nominatim reverse geocoding，跟醫院表單「名稱查
// 座標」共用同一個免費公開服務，一樣沒有 API 金鑰限制）。只當「目前定位」
// 文字顯示的加分項，永遠不擋主流程——nearestDistrict 算出來的縣市/行政區
// 才是排序依據，這裡查不到（逾時、限流、CORS、查無結果）就靜默放棄，
// 畫面自動退回顯示縣市+行政區，不會卡住或跳錯誤訊息。
let reverseGeocodeReqId = 0;
async function fetchReverseGeocodeAddress(lat, lng){
  const myReqId = ++reverseGeocodeReqId;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&countrycodes=tw`;
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) return;
    const json = await res.json();
    if (myReqId !== reverseGeocodeReqId) return; // 查詢期間使用者又按了一次重新定位，這筆已過期
    if (json && json.display_name) {
      state.myAddress = json.display_name;
      render();
    }
  } catch (e) {
    // 靜默失敗，理由見上方註解。
  } finally {
    clearTimeout(timer);
  }
}
// GeolocationPositionError.code 對應的中文提示：瀏覽器回傳的 err.message 是
// 英文原文（例如 "User denied Geolocation"），直接顯示看不懂也不知道怎麼
// 處理。retryActionLabel 是失敗後建議使用者重新觸發的動作名稱，「顯示附近
// 醫院」（醫院資訊頁定位）跟「抓取目前位置」（新增/編輯醫院表單填座標）
// 共用同一份訊息，只有建議重試的動作名稱不同。
function geolocationErrorMessage(err, retryActionLabel){
  if (err.code === 1) return `定位權限被拒絕，請到手機設定 → 瀏覽器（或本網頁）的「位置」權限改成允許，再回來點一次「${retryActionLabel}」`;
  if (err.code === 2) return "目前無法取得定位，請確認手機的定位服務（GPS）已開啟，或移動到訊號較好的地方再試一次";
  if (err.code === 3) return "定位逾時，請確認手機定位服務已開啟且訊號穩定，再試一次";
  return "定位失敗，請確認已開啟定位權限";
}

window.__geocodeHospitalName = async () => {
  const nameInput = document.getElementById("hospitalNameInput");
  const coordsInput = document.getElementById("hospitalCoordsInput");
  const btn = document.getElementById("geocodeNameBtn");
  const label = btn?.querySelector(".btn-label");
  const name = (nameInput?.value || "").trim();
  if (!name) { alert("請先填寫醫院名稱，再查詢座標"); return; }
  if (!coordsInput || !btn || !label) return;
  btn.disabled = true;
  label.textContent = "查詢中…";
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1&countrycodes=tw`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const results = await res.json();
    if (!Array.isArray(results) || !results.length) {
      alert("查不到這個醫院名稱對應的座標，請確認名稱是否正確，或改用「抓取目前位置」／手動輸入");
      return;
    }
    coordsInput.value = `${Number(results[0].lat).toFixed(5)},${Number(results[0].lon).toFixed(5)}`;
  } catch (e) {
    alert("查詢座標失敗，請檢查網路連線後再試一次，或改用「抓取目前位置」／手動輸入");

    btn.disabled = false;
    label.textContent = "名稱查詢座標";

};

// 進度，不會像只查勤務本身那樣看起來沒有任何回報紀錄。
window.__runRecordsDeepQuery = async () => {
  const f = state.recordsApplied;
  if (!f || f.period !== "custom" || !f.customDateFrom) return;
  const from = new Date(`${f.customDateFrom}T00:00:00`);
  const to = f.customDateTo ? new Date(`${f.customDateTo}T23:59:59`) : new Date();
  state.recordsDeepQuery = { loading: true, from: f.customDateFrom, to: f.customDateTo };
  render();
  try {
    const unitFilter = myQueryUnitFilter();
    const taskDocs = await fsQueryRange("tasks", "createdAt", from, to, null, unitFilter);
    const taskIds = taskDocs.map(t => t.id);
    const [eventDocs, vitalDocs] = await Promise.all([
      fsQueryByTaskIds("events", taskIds, unitFilter),
      fsQueryByTaskIds("vitals", taskIds, unitFilter)
    ]);
    state.deepTasks = mergeById(state.deepTasks, taskDocs);
    state.deepEvents = mergeById(state.deepEvents, eventDocs);
    state.deepVitals = mergeById(state.deepVitals, vitalDocs);
    state.tasks = mergeById(state.tasks, taskDocs);
    state.events = mergeById(state.events, eventDocs);
    state.vitals = mergeById(state.vitals, vitalDocs);
    state.tasks.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    state.events.forEach(d => { if (d.ts == null) d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });

    state.vitals.forEach(d => { if (d.ts == null) d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });
    state.vitals.sort(eventOrderCompare);
    state.recordsDeepQuery = { loading: false, from: f.customDateFrom, to: f.customDateTo, done: true };
  } catch (err) {
    state.recordsDeepQuery = null;
    showToast(`查詢更早的資料失敗：[${err.code||'?'}] ${err.message}`);
  }
  render();
};

      ...(militaryItems.length ? { militaryItems } : {}),
      // 標記這筆任務是從急診待命建立的，任務完成時才知道要幫哪個地點自動
      // 續約下一筆待命勤務（見 renewStandbyTask）。
      ...(erStandbyKey ? { erStandbyKey } : {})
    }, { skipDispatch: !!erStandbyKey }).then(async created => {
      if (!erStandbyKey) return;
      if (oldStandbyTaskId && oldStandbyTaskId !== created.id) {
        await silentlyCompleteTask(oldStandbyTaskId, "已啟動新勤務，自動結案").catch(err => console.error("舊待命勤務結案失敗", err));
      }
      fsSetDoc(`erStandby/${erStandbyKey}`, {
        currentTaskId: created.id, updatedAt: new Date(),
        updatedByName: state.profile.displayName || state.profile.email || ""
      }).then(() => { if (erStandbyPoll) erStandbyPoll.refreshNow(); }).catch(baseDataErr);
    });
  }
  action.finally(() => { state.taskSubmitting = false; });
  ev.target.reset();
  nav({ name: erStandbyKey ? "erStandby" : "tasks" });
};
window.__saveTaskEdit = (ev, taskId) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const t = state.tasks.find(x => x.id === taskId);
  if (t && t.type === "liaison" && !f.getAll("personnel").length) { showToast("請至少選擇一位人員"); return; }
  const fields = (t && t.type === "liaison")
    ? { title: f.get("title"), location: f.get("location"), personnel: f.getAll("personnel"), notes: f.get("notes") }
    : (() => {
        const recorders = f.getAll("recorders");
        const startMileage = f.get("startMileage");
        return {
          title: f.get("title"), vehicle: f.get("vehicle"), location: f.get("location"),
          scope: f.get("scope") || "營外",
          crewLeader: f.get("crewLeader"), driver: f.get("driver"),
          // 值班醫官欄位只有急診待命建立出來的勤務才會顯示，一般勤務編輯時
          // 表單裡沒有這個欄位，f.get() 會回傳 null，不能直接拿來覆蓋掉
          // （這裡本來就沒有值可覆蓋，但保險起見沿用原本的值，不要誤清空）。
          dutyOfficer: f.has("dutyOfficer") ? (f.get("dutyOfficer")||"") : (t.dutyOfficer||""), recorders,
          startMileage: startMileage ? Number(startMileage) : null,
          startFuel: f.get("startFuel"), notes: f.get("notes"),
          // 跟建立勤務不同：這裡一定要帶上 militaryItems 欄位（即使是空陣列），
          // 否則使用者把「軍品攜帶」勾勾取消掉之後，fsSetDoc 只會合併新欄位，
          // 舊的攜行清單不會被清空。
          militaryItems: collectMilitaryItemsFromForm(f)
        };
      })();
  updateTask(taskId, fields)
    .then(() => nav({ name: "task", id: taskId }))
    .catch(err => showToast(`更新失敗：[${err.code||'?'}] ${err.message}`));
};

/* =========================================================
   21) 下拉重新整理
   加到主畫面後是獨立 App 模式，沒有瀏覽器原生的下拉更新頁面可用，
   自己刻一個：在頁面最頂端往下拉超過門檻、放開就重新抓取所有資料。
   ========================================================= */
(function setupPullToRefresh(){
  const THRESHOLD = 68;
  let startY = null, pulling = false, refreshing = false, currentDist = 0;
  const indicator = document.createElement('div');
  indicator.id = 'pull-indicator';
  indicator.innerHTML = `<span class="pull-spinner">${icon('refresh',18)}</span><span class="pull-text">下拉重新整理</span>`;
  document.body.appendChild(indicator);
  const spinner = indicator.querySelector('.pull-spinner');
  const text = indicator.querySelector('.pull-text');

  function setDist(dist){
    currentDist = dist;
    const clamped = Math.min(dist, THRESHOLD * 1.4);
    indicator.style.transform = `translateX(-50%) translateY(${clamped}px)`;
    indicator.style.opacity = Math.min(dist / THRESHOLD, 1);
    spinner.style.transform = `rotate(${dist * 2.4}deg)`;
    text.textContent = dist >= THRESHOLD ? '放開重新整理' : '下拉重新整理';
  }
  function reset(){
    indicator.classList.remove('show');
    indicator.style.transform = 'translateX(-50%) translateY(-40px)';
    indicator.style.opacity = '0';
    startY = null; pulling = false; currentDist = 0;
  }
  window.addEventListener('touchstart', (e) => {
    if (refreshing) return;
    // 彈窗（.modal-sheet）跟底部導覽列都有各自獨立的互動區域，跟 main 的
    // scrollTop 無關；在這些區域內手勢不應誤觸外層下拉重新整理。
    const inModal = e.target.closest && e.target.closest('.modal-sheet, .bottomnav');
    // App Shell 改成 main 自己捲動以後（見 #app 的 CSS 註解），要判斷的是
    // main 的 scrollTop，不是 window 的。之前這裡還多判斷過 main 的
    // scrollHeight 是否真的超過 clientHeight（內容不足一螢幕就整個不給
    // 觸發），原意是想避免「內容不夠捲、到處都算頂端」誤觸——但這反而讓
    // 內容本來就短的頁面（例如大量傷患系統的檢傷官/治療官/後送官分頁，
    // 案件不多時一眼就看完，完全捲不動）永遠沒辦法下拉重新整理，變成
    // 「內容越簡單的畫面越沒辦法刷新」的反效果。內容不足一螢幕時整頁本
    // 來就等於「頂端」，從任何位置下拉都合理，不需要额外擋掉，只要
    // scrollTop<=0（捲得動的頁面用來確認真的捲到頂；捲不動的頁面本來就
    // 恆成立）就夠了。
    const m = document.querySelector('main');
    startY = (!inModal && m && m.scrollTop <= 0) ? e.touches[0].clientY : null;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (startY == null || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    const m = document.querySelector('main');
    if (dy <= 0 || (m && m.scrollTop > 0)) { if (pulling) reset(); return; }
    pulling = true;
    indicator.classList.add('show');
    setDist(dy * 0.5);
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!pulling) { startY = null; return; }
    if (currentDist >= THRESHOLD) {
      refreshing = true;
      text.textContent = '重新整理中…';
      spinner.classList.add('spin');
      indicator.style.transform = `translateX(-50%) translateY(${THRESHOLD}px)`;
      indicator.style.opacity = '1';
      // 直接整頁重新載入（而不是只重抓資料），確保拿到最新部署的版本；
      // reload 前先把目前頁面存起來，登入流程跑完後 restoreSavedRoute()
      // 會讀回來，reload 完不會被彈回首頁，而是留在原本的頁面。
      try { sessionStorage.setItem(SAVED_ROUTE_KEY, JSON.stringify(state.route)); } catch (e) {}
      window.location.reload();
    } else {
      reset();
    }
  }, { passive: true });
})();

/* =========================================================
   彈窗下滑關閉：所有 .modal-sheet（記錄患者狀況、編輯回報、基礎資料等）
   都比照 iOS 原生底部彈窗，手指從彈窗內容「已經捲到最上面」的狀態下
   繼續往下滑才會觸發關閉；如果彈窗內容比較長、還沒捲到頂，下滑手勢
   要保留給使用者正常捲動內容用，不能讓整個彈窗跟著往下拖走。
   超過門檻放開就關閉彈窗；沿用彈窗背景遮罩既有的 onclick 判斷式來
   關閉，不用另外為每個彈窗寫關閉邏輯。
   ========================================================= */
(function setupModalSwipeToDismiss(){
  let sheet = null, startY = null, startScrollTop = 0, dragging = false;

  window.addEventListener('touchstart', (e) => {
    const s = e.target.closest && e.target.closest('.modal-sheet');
    if (!s) { sheet = null; startY = null; dragging = false; return; }
    sheet = s;
    startY = e.touches[0].clientY;
    startScrollTop = s.scrollTop;
    dragging = false;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!sheet || startY == null) return;
    const dy = e.touches[0].clientY - startY;
    // 只有手指往下滑、且彈窗內容一開始就已經捲到最上面時，才視為「下滑
    // 關閉」手勢；否則放行讓使用者正常捲動彈窗內較長的內容（例如患者
    // 紀錄表單）。
    if (dy <= 0 || startScrollTop > 0 || sheet.scrollTop > 0) {
      if (dragging) { sheet.style.transition = ''; sheet.style.transform = ''; dragging = false; }
      return;
    }
    dragging = true;
    sheet.style.transition = 'none';
    sheet.style.transform = `translateY(${dy}px)`;
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!sheet) return;
    const s = sheet;
    if (dragging) {
      const m = /translateY\(([-.\d]+)px\)/.exec(s.style.transform);
      const dy = m ? parseFloat(m[1]) : 0;
      s.style.transition = 'transform 0.22s ease';
      if (dy > 90) {
        s.style.transform = 'translateY(100%)';
        const overlay = s.closest('.modal-overlay');
        setTimeout(() => { overlay && overlay.click(); }, 180);
      } else {
        s.style.transform = '';
      }
    }
    sheet = null; startY = null; dragging = false;
  }, { passive: true });
})();

/* =========================================================
   急診待命：一鍵緊急動員廣播滑動條的拖曳手勢。刻意不做成普通按鈕（一碰
   就觸發），必須把紅色拖曳塊實際拖到最右側（>=92%）放開才會送出，滑不到
   位放開會彈回起點——避免單手操作、放口袋時誤觸就發出真的推播動員通知。

   跟上面的彈窗下滑關閉、下拉重新整理同一套做法：監聽 window 層級的指標
   事件，用 e.target.closest() 判斷手指/滑鼠有沒有按在
   .emergency-slider-handle 上，而不是把事件直接綁在每個滑動條節點上——
   render() 整頁重繪時舊節點會整個被換掉，綁在個別節點上的監聽器會跟著
   消失，改成監聽 window 層級就不受重繪影響，卡片重新產生後手勢照樣有效。
   ========================================================= */
(function setupEmergencyBroadcastSlider(){
  let handle = null, sliderEl = null, maxLeft = 0, startX = 0, dragging = false;

  function percentFor(left){ return maxLeft > 0 ? (left - 2) / maxLeft : 0; }
  function setTextOpacity(percent){
    const text = sliderEl && sliderEl.querySelector(".emergency-slider-text");
    if (text) text.style.opacity = String(Math.max(0, 1 - percent * 1.3));
  }
  function snapBack(){
    if (!handle) return;
    handle.classList.remove("dragging");
    handle.style.left = "2px";
    setTextOpacity(0);
    handle = null; sliderEl = null; dragging = false;
  }

  window.addEventListener("mousedown", onStart);
  window.addEventListener("touchstart", onStart, { passive: true });
  window.addEventListener("mousemove", onMove);
  window.addEventListener("touchmove", onMove, { passive: false });
  window.addEventListener("mouseup", onEnd);
  window.addEventListener("touchend", onEnd);
  window.addEventListener("touchcancel", onEnd);

  function onStart(e){
    const h = e.target.closest && e.target.closest(".emergency-slider-handle");
    if (!h) return;
    const s = h.closest(".emergency-slider");
    if (!s || s.classList.contains("sending")) return;
    handle = h; sliderEl = s; dragging = true;
    handle.classList.add("dragging");
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    maxLeft = s.clientWidth - handle.offsetWidth - 4;
  }
  function onMove(e){
    if (!dragging || !handle) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const newLeft = Math.min(Math.max(2 + (x - startX), 2), maxLeft + 2);
    handle.style.left = newLeft + "px";
    setTextOpacity(percentFor(newLeft));
    if (e.cancelable) e.preventDefault();
  }
  function onEnd(){
    if (!dragging || !handle) return;
    const percent = percentFor(parseFloat(handle.style.left) || 2);
    if (percent >= 0.92) {
      const locationKey = sliderEl.dataset.locKey;
      handle.classList.remove("dragging");
      handle.style.left = (maxLeft + 2) + "px";
      const el = sliderEl;
      handle = null; sliderEl = null; dragging = false;
      triggerEmergencyBroadcast(locationKey, el);
    } else {
      snapBack();
    }
  }
})();

// 頁面持續開著（沒有整個關掉重開）時，也要能偵測到「開著但 8 小時沒操作」
// 的情況：使用者操作就更新最後操作時間，每分鐘檢查一次是否已經超過門檻。
(function setupIdleAutoLogout(){
  ["click", "touchstart", "keydown", "scroll"].forEach(ev => {
    window.addEventListener(ev, () => { if (state.user) touchActivity(); }, { passive: true });
  });
  setInterval(() => {
    if (state.user && isIdleTimedOut()) {
      doLogout();
      showToast("閒置超過 8 小時，已自動登出，請重新登入");
    }
  }, 60000);
})();

// #app 的高度理論上靠 CSS 的 100dvh 就會隨虛擬鍵盤開關即時更新（見 #app
// 的 CSS 註解），但實機上觀察到 iOS Safari 鍵盤「收起」時偶爾不會確實
// 觸發重新計算，導致 #app 卡在鍵盤打開時的縮小高度，底部導覽列（原本
// flex-shrink:0 貼齊 #app 底部）就跟著卡在畫面中間，下面留一大塊空白，
// 要整頁換頁導覽（重新觸發版面計算）才會恢復。改成額外監聽
// visualViewport 的 resize／scroll 事件，直接把當下量到的可視高度寫回
// #app 的 inline style（優先權高於 CSS），鍵盤開跟收都會確實同步一次，
// 不用依賴 WebKit 自己重新排版。
// 這個 App Shell 架構的前提是 window/document 本身永遠不捲動（見 #app 的
// 說明，真正捲動的是 <main> 自己）。但 iOS Safari 在輸入框「取得焦點的
// 那一刻」會不管這個前提，直接在原生層把 window 視窗捲動一段距離，想把
// 輸入框「捲到鍵盤上方看得到的地方」——結果反而把我們自己固定不動的頭尾
// （.sticky-head／.bottomnav）一起頂出畫面，使用者會覺得「鍵盤一點下去
// 畫面就跑版」。之前的做法是等 focusout（鍵盤收起）才校正，這段時間內
// 畫面其實一直是跑版的；改成持續監聽 window 的 scroll 事件，只要偵測到
// window 被捲動就立刻捲回 0——鍵盤彈出的當下、iOS 剛開始捲動就會被壓
// 回去，不用等使用者打完字、鍵盤收起才修正。不限定要有 visualViewport
// 支援才生效，跟下面的 setupKeyboardViewportFix() 是各自獨立的防線。
// 注意：<html> 全域設了 scroll-behavior:smooth（給一般頁面內錨點導覽用），
// 這裡的捲動歸零是「校正跑版」不是「使用者導覽」，用平滑動畫反而會出現
// 「畫面彈上去之後慢慢滑回來」的視覺跑版空窗期。校正前先暫時關掉
// scroll-behavior、校正完再還原，讓 scrollTo(0,0) 瞬間跳回、不要動畫。
function resetRogueWindowScroll() {
  const prevBehavior = document.documentElement.style.scrollBehavior;
  document.documentElement.style.scrollBehavior = "auto";
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  document.documentElement.style.scrollBehavior = prevBehavior;
}
// 把 #app 的高度同步成目前量到的 visualViewport 高度（鍵盤打開時要靠這個
// 校正，CSS 的 100dvh 追不上鍵盤即時的高度變化）。獨立成頂層函式（不是
// 關在 setupKeyboardViewportFix() 的 IIFE 裡），讓 nav() 換頁時也能直接
// 呼叫。
//
// 只有在 visualViewport.height 明顯比 window.innerHeight 矮一截（差距
// 超過 KEYBOARD_HEIGHT_THRESHOLD，這個值遠小於任何真實鍵盤的高度，但
// 遠大於安全區域/瀏海/動態島這類量測誤差）時，才判定「鍵盤真的開著」，
// 才用 JS 蓋掉 CSS 的 100dvh；平常（沒有鍵盤）一律清掉 inline style、
// 交還給 CSS 的 100dvh 自己決定高度。
//
// 這是實機回報「導覽列卡在畫面中間、下面留一塊空白，換頁還是修不好」
// 這個 bug 反覆出現好幾次之後才抓到的真正根因：之前所有修正都在處理
// 「什麼時機該重新呼叫 syncAppHeight()」，但從來沒有懷疑過
// visualViewport.height 這個數字本身可不可信——iOS 在 standalone（加入
// 主畫面）模式下，頁面剛載入、visualViewport 都還沒穩定的那一瞬間就可能
// 量到一個比實際可視高度小的數字，如果這時候剛好呼叫到 syncAppHeight()
// 把這個過小的值寫死成 inline style，之後只要沒有真正的鍵盤事件把它蓋
// 回去，就會永遠卡住——不管再怎麼調整「該在哪個時機重新呼叫」都沒用，
// 因為問題出在「呼叫的當下量到的數字本身就不可信」。改成只有明確判定
// 是鍵盤造成的高度差才採信這個數字，其餘情況一律清掉、讓 CSS 接手，
// 從根本上排除「JS 把 #app 卡在錯誤矮高度」這個失敗模式。
const KEYBOARD_HEIGHT_THRESHOLD = 80;
// 底下 .modal-overlay 的高度校正跟 #app 是同一個原因、同一套解法：實機
// 診斷過（畫面右上角debug面板量到的數字）證實 .modal-overlay 這個
// position:fixed 元素的 height:100dvh，鍵盤打開時完全沒有跟著縮小
// （量到的高度還是跟 window.innerHeight 一樣，跟 #app 靠這個函式才真的
// 縮小成 visualViewport.height 形成對比）——這個裝置上的 dvh 對
// position:fixed 元素並不會隨鍵盤反應，不管是用 inset:0 還是明確寫
// height:100dvh 都一樣（連續三次純 CSS 修正在真機上都沒有效果的原因）。
// .modal-sheet 用 align-items:flex-end 貼齊 .modal-overlay 的底部，
// overlay 沒縮小，貼齊的 sheet 底部就會停在鍵盤上緣以下、看不到的地方。
// 只能比照 #app 的做法用 JS 強制蓋掉高度。
//
// 這裡一度刻意只改 overlay 的高度、不去動 .modal-sheet 自己的
// max-height——先前那版（overlay 還沒修正時）直接用 JS 蓋掉 .modal-sheet
// 的 max-height，會讓貼齊底部的 sheet 頂部往下掉，內容整個被推到可視
// 範圍外（畫面整片空白），因為底端仍然貼著（當時）沒有縮小的 overlay
// 下緣。但只修正 overlay 高度、放著 sheet 的 max-height 不管，又會出現
// 另一個問題：sheet 自己的 max-height 是 88vh/88dvh，這個 CSS 單位在這支
// 裝置上鍵盤打開時並不會跟著縮小（跟本檔案其他地方反覆驗證過的結論一
// 致），如果表單內容（例如大量傷患新增傷患彈窗，姓名／檢傷分類／主訴／
// 車輛／醫院一大排欄位）本身就比鍵盤打開後的可視高度還高，sheet 會照著
// 這個「量錯」的 max-height 撐開、貼齊（已經正確縮小的）overlay 底部，
// 撐出來的高度超過 overlay 本身，sheet 的頂部就會被推到 y=0（可視範圍
// 最上緣）以上、跑到看不見也捲不到的地方——因為 sheet 內容本身還沒撐滿
// max-height，overflow-y:auto 判定「沒有真的溢出」，不會提供內部捲動，
// 使用者怎麼滑都碰不到那塊被推到畫面外的內容，只能摸到 sheet 底部那段剛
// 好還在可視範圍內的欄位。修正方式：keyboard 打開時同時把 sheet 的
// max-height 也校正成不超過 overlay 的高度（用量到的 visualViewport
// 高度，扣掉一點點邊界的視覺留白），sheet 就不會再比 overlay 高，撐不下
// 的內容改由 sheet 自己的 overflow-y:auto 提供內部捲動，才捲得到。
function syncAppHeight() {
  if (!window.visualViewport) return;
  const app = document.getElementById("app");
  if (!app) return;
  const diff = window.innerHeight - window.visualViewport.height;
  const keyboardOpen = diff > KEYBOARD_HEIGHT_THRESHOLD;
  app.style.height = keyboardOpen ? window.visualViewport.height + "px" : "";
  // 用 querySelectorAll 而不是 querySelector：畫面上同時只會有一個彈出
  // 視窗是目前的正常情況，但人員選擇器／單位選擇器這類彈窗都共用同一個
  // .modal-overlay class，理論上不排除以後有彈窗疊彈窗的情境（例如在某個
  // 表單彈窗裡再開一個選人彈窗）；只抓第一個找到的元素校正，疊出來的第二
  // 層會被漏掉、鍵盤蓋住那層也不會修正。改成全部一起校正，不管畫面上同時
  // 開著幾層都不會漏掉，只開一層時行為跟原本完全一樣。
  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.style.height = keyboardOpen ? window.visualViewport.height + "px" : "";
  });
  document.querySelectorAll(".modal-sheet").forEach(sheet => {
    sheet.classList.toggle("kb-open", keyboardOpen);
    sheet.style.maxHeight = keyboardOpen ? Math.max(window.visualViewport.height - 24, 120) + "px" : "";
  });
  // 彈窗表單（.modal-sheet）鍵盤打開時已經有上面這段校正撐出足夠空間；
  // 但一般頁面裡直接寫在頁面內容中的欄位（例如大量傷患檢傷官分頁的主訴
  // 輸入框）完全沒有這層照顧——main 底下可捲動的內容區塊到底就是頁面
  // 最後一段內容，沒有多留鍵盤高度的緩衝，聚焦欄位如果離內容底部很近，
  // scrollIntoView() 能捲動的空間不夠，會先被瀏覽器自己的原生捲動行為
  // （在鍵盤還沒開始收縮可視高度前，用還沒校正過的舊尺寸去抓「該捲到哪」
  // 這個時間差）帶去畫面最上緣，再被下面 positionLoop() 每一影格重新
  // 计算、跟著鍵盤展開動畫逐格修正回正確位置，兩段疊在一起就是「先跳到
  // 最上面、再慢慢滑下來」這個現象。補上跟鍵盤等高的底部留白，讓可捲動
  // 內容有地方讓欄位真的捲到置中，减少這個時間差造成的兩段式跳動。
  document.querySelectorAll(".main-content").forEach(mc => {
    mc.style.paddingBottom = keyboardOpen ? `calc(24px + ${diff}px)` : "";
  });
}
// scrollIntoView() 校正聚焦欄位位置時，理論上只會捲動 <main> 自己（唯一
// 真正的捲動容器），跟 window/document 的捲動是各自獨立的兩件事；但 iOS
// Safari 對「捲到聚焦欄位」這件事本來就有自己的原生流氓行為，不排除它會
// 在我們呼叫 scrollIntoView() 的同一時間點也跟著又搓一下 window 捲動值，
// 讓下面這個持續監聽 window scroll 的歸零機制被連續觸發、畫面出現閃動。
// 所以校正欄位位置的當下先短暫（60ms）標記起來，這段極短時間內先不要
// 讓歸零機制動作，避免兩邊在同一瞬間互相打架；不是整個聚焦期間都關掉，
// 一放開就馬上恢復偵測，真正的流氓捲動（不是我們自己校正引起的）還是會
// 立刻被壓回去。
let suppressScrollLockUntil = 0;
window.addEventListener("scroll", () => {
  if (performance.now() < suppressScrollLockUntil) return;
  if (window.scrollY === 0 && document.documentElement.scrollTop === 0 && document.body.scrollTop === 0) return;
  resetRogueWindowScroll();
}, { passive: true });

(function setupKeyboardViewportFix(){
  if (!window.visualViewport) return;
  const app = document.getElementById("app");
  if (!app) return;
  window.visualViewport.addEventListener("resize", syncAppHeight);
  window.visualViewport.addEventListener("scroll", syncAppHeight);
  syncAppHeight();
  const isFieldEl = (el) => el && ["INPUT","TEXTAREA","SELECT"].includes(el.tagName);
  let activeField = null;
  let rafId = null;
  // 鍵盤彈出的動畫時間、上方「自動填寫聯絡人／預測文字」快捷列出現的
  // 時機，會依欄位類型（數字鍵盤／注音鍵盤／有無快捷列）跟裝置快慢不同，
  // 光靠監聽 visualViewport 的 resize/scroll 事件、用固定延遲猜「這次應該
  // 彈完了」永遠會在某些情況下猜錯：有時候量到的高度已經是最終值、有時
  // 候還沒，導致「這次欄位剛好在鍵盤上面、下次卻被鍵盤蓋住」時好時壞。
  // 改成聚焦後用 requestAnimationFrame 連續盯著這個欄位一小段時間（約
  // 1 秒，足夠涵蓋鍵盤動畫＋快捷列出現的時間）：每一影格都重新校正 #app
  // 高度、檢查欄位目前的畫面位置是否還在可視範圍內，只要跑出範圍（不論
  // 是鍵盤還在動畫、還是快捷列讓可視範圍又變小了）就立刻捲回可視範圍，
  // 不用再猜某個特定時間點鍵盤到底彈完了沒。這段時間過後就停止，之後
  // 使用者自己手動捲動瀏覽表單不會再被強制拉回。
  const POSITION_GUARD_MS = 1000;
  const positionLoop = (deadline) => {
    if (!activeField) return;
    syncAppHeight();
    const rect = activeField.getBoundingClientRect();
    const visibleHeight = window.visualViewport.height;
    const margin = 12;
    if (rect.top < margin || rect.bottom > visibleHeight - margin) {
      suppressScrollLockUntil = performance.now() + 60;
      // <html> 全域設了 scroll-behavior:smooth（見 resetRogueWindowScroll()
      // 的說明，給一般頁面內錨點導覽用）。scrollIntoView() 為了把欄位捲進
      // 可視範圍，可能連帶捲動到 document/html 這層（不只是 main 自己），
      // 這層一旦捲動就會被全域的 smooth 設定接管、跑出平滑動畫——這正是
      // 「鍵盤打開後欄位先跳到最上面、再慢慢滑回正確位置」的真正成因：
      // 前面 main 自己瞬間跳到「大致正確」的位置，document/html 那段殘餘
      // 校正卻用平滑動畫慢慢補完，兩段疊在一起就是先跳、再滑。跟
      // resetRogueWindowScroll() 同一套做法：呼叫前先暫時關掉
      // scroll-behavior，校正完再還原，讓這裡的捲動全部瞬間完成。
      const prevBehavior = document.documentElement.style.scrollBehavior;
      document.documentElement.style.scrollBehavior = "auto";
      activeField.scrollIntoView({ block: "center", behavior: "auto" });
      document.documentElement.style.scrollBehavior = prevBehavior;
    }
    if (performance.now() < deadline) {
      rafId = requestAnimationFrame(() => positionLoop(deadline));
    }
  };
  // 鍵盤彈起壓縮 visualViewport 的過程中，底部導覽列（flex-shrink:0 貼齊
  // #app 底部）的版面收合常常跟鍵盤動畫對不齊時序，短暫被鍵盤上緣頂到
  // 畫面中間、直接蓋住正在輸入的欄位。與其一直跟鍵盤搶那段動畫時序，
  // 比照多數行動裝置 App 的做法：輸入框一取得焦點就直接把導覽列藏起來
  // ——反正鍵盤蓋著的那塊高度本來就看不到導覽列，藏起來不影響操作，
  // 還能整個避開「導覽列位置該怎麼即時跟鍵盤同步」這件事；鍵盤收起、
  // 版面確定歸位後才顯示回來。
  document.addEventListener("focusin", (e) => {
    if (!isFieldEl(e.target)) return;
    activeField = e.target;
    const nav = document.querySelector(".bottomnav");
    if (nav) nav.style.display = "none";
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => positionLoop(performance.now() + POSITION_GUARD_MS));
  }, true);
  // 保險機制：輸入框失焦（鍵盤開始收起）時，延遲一小段時間讓鍵盤收合
  // 動畫跑完，先讓導覽列恢復顯示，再強制校正版面。這裡不能只靠
  // syncAppHeight()——iOS Safari 就算我們的架構設計成 window/document
  // 本身不捲動，鍵盤彈起時底層還是會強制把 window 視窗捲動掉，鍵盤收起
  // 後 window.scrollY 不會自動歸零，所以要連 window 本身的捲動值一起
  // 強制歸零，不能只調整 #app 的高度。
  document.addEventListener("focusout", (e) => {
    if (!isFieldEl(e.target)) return;
    if (activeField === e.target) activeField = null;
    cancelAnimationFrame(rafId);
    setTimeout(() => {
      const nav = document.querySelector(".bottomnav");
      if (nav) nav.style.display = "";
      resetRogueWindowScroll();
      syncAppHeight();
      window.dispatchEvent(new Event("resize"));
    }, 120);
  }, true);
})();

render();
</script>
</body>
</html>
