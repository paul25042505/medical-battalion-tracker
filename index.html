<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>衛生營車輛人員動態管制系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F2F7;
    --panel:#FFFFFF;
    --panel-2:#F2F2F7;
    --border:#E5E5EA;
    --text:#1C1C1E;
    --muted:#8E8E93;
    --amber:#FF9500;
    --red:#FF3B30;
    --green:#34C759;
    --blue:#007AFF;
    --gray:#8E8E93;
    --topbar-fade: rgba(255,255,255,0.92);
    --navbar-bg: rgba(255,255,255,0.94);
    --card-shadow: 0 1px 3px rgba(60,60,67,0.08), 0 1px 1px rgba(60,60,67,0.04);
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); height:100%; font-size:16px;}
  body{ padding-bottom:env(safe-area-inset-bottom); }
  #app{min-height:100vh; display:flex; flex-direction:column;}

  /* ---- top status strip ---- */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, var(--panel) 0%, var(--topbar-fade) 100%);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    padding:16px 18px calc(12px + env(safe-area-inset-top)) 18px;
    padding-top:calc(16px + env(safe-area-inset-top));
  }
  .topbar-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .topbar-icons{display:flex; align-items:center; gap:14px; flex-shrink:0;}
  .topbar h1{font-size:15px; font-weight:700; margin:0; letter-spacing:0.01em; line-height:1.35;}
  .topbar-sub{margin-top:5px; font-family:var(--mono); font-size:13px; color:var(--muted);}
  .topbar .live{
    display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; color:var(--muted);
  }
  .topbar-icon-btn{background:none; border:none; color:var(--text); padding:2px; display:flex;}
  .dot-live{width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(52,199,89,0.6); animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(52,199,89,0.5);}
    70%{box-shadow:0 0 0 6px rgba(52,199,89,0);}
    100%{box-shadow:0 0 0 0 rgba(52,199,89,0);}
  }

  main{flex:1; padding:16px 16px 100px 16px; max-width:680px; width:100%; margin:0 auto;}

  /* ---- login ---- */
  .login-wrap{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
  .login-mark{font-family:var(--mono); font-size:13px; letter-spacing:0.25em; color:var(--amber); margin-bottom:12px;}
  .login-title{font-size:29px; font-weight:800; line-height:1.3; margin:0 0 8px 0;}
  .login-sub{color:var(--muted); font-size:15.5px; margin-bottom:38px;}
  .btn-google{
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:#fff; color:#1F2937; font-weight:600; font-size:16.5px;
    padding:16px 22px; border-radius:12px; border:1px solid var(--border); width:100%; max-width:340px;
    box-shadow:var(--card-shadow);
  }
  .pending-box{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:24px; max-width:360px; margin-top:22px; box-shadow:var(--card-shadow);}
  .pending-box p{color:var(--muted); font-size:14.5px; line-height:1.7; margin:0;}

  /* ---- cards ---- */
  .section-label{font-family:var(--mono); font-size:12.5px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin:22px 4px 13px 4px;}
  .section-label:first-child{margin-top:0;}
  .task-card{
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:18px; margin-bottom:13px; position:relative; overflow:hidden; box-shadow:var(--card-shadow);
  }
  .task-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:4px;}
  .task-card.s-pending::before{background:var(--gray);}
  .task-card.s-dispatch::before{background:var(--red);}
  .task-card.s-onscene::before{background:var(--amber);}
  .task-card.s-returning::before{background:var(--blue);}
  .task-card.s-completed::before{background:var(--green);}
  .task-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .task-title{font-size:18px; font-weight:700; margin:0 0 4px 0;}
  .task-meta{color:var(--muted); font-size:14px; font-family:var(--mono);}
  .badge{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-family:var(--mono); font-weight:600;
    padding:6px 12px; border-radius:999px; white-space:nowrap;
  }
  .badge .bdot{width:7px; height:7px; border-radius:50%;}
  .badge.pending{background:rgba(142,142,147,0.15); color:var(--gray);}
  .badge.dispatch{background:rgba(255,59,48,0.15); color:var(--red);}
  .badge.dispatch .bdot{animation:pulse 1.4s infinite;}
  .badge.onscene{background:rgba(255,149,0,0.15); color:var(--amber);}
  .badge.returning{background:rgba(0,122,255,0.15); color:var(--blue);}
  .badge.completed{background:rgba(52,199,89,0.15); color:var(--green);}
  .task-foot{display:flex; justify-content:space-between; align-items:center; margin-top:14px; font-size:13.5px; color:var(--muted);}
  .task-crew{display:flex; gap:16px; margin-top:10px; font-size:13px; color:var(--muted); font-family:var(--mono);}
  .empty{color:var(--muted); font-size:15px; text-align:center; padding:46px 22px; border:1px dashed var(--border); border-radius:14px;}

  /* ---- home ---- */
  .home-date{font-size:14.5px; color:var(--muted); font-family:var(--mono); margin-bottom:16px;}
  .weather-card{
    display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:16px 18px; margin-bottom:18px; color:var(--muted); font-size:14px;
  }
  .weather-card .emoji{font-size:30px;}
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:8px;}
  .stat-tile{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px 10px; text-align:center; box-shadow:var(--card-shadow);}
  .stat-tile .num{font-size:27px; font-weight:800; font-family:var(--mono);}
  .stat-tile .lbl{font-size:12.5px; color:var(--muted); margin-top:5px;}
  .stat-tile.t-blue{background:#E8F1FF; border-color:#CFE3FF;} .stat-tile.t-blue .num{color:#0056C7;} .stat-tile.t-blue .lbl{color:#0056C7; opacity:0.75;}
  .stat-tile.t-orange{background:#FFF2E0; border-color:#FFE1B8;} .stat-tile.t-orange .num{color:#B45F00;} .stat-tile.t-orange .lbl{color:#B45F00; opacity:0.75;}
  .stat-tile.t-green{background:#E6F9EC; border-color:#C6F0D3;} .stat-tile.t-green .num{color:#177A34;} .stat-tile.t-green .lbl{color:#177A34; opacity:0.75;}
  .stat-tile.t-purple{background:#F2E9FE; border-color:#E1CDFB;} .stat-tile.t-purple .num{color:#6B23C7;} .stat-tile.t-purple .lbl{color:#6B23C7; opacity:0.75;}
  .current-banner{
    background:linear-gradient(135deg, rgba(255,149,0,0.16), rgba(255,59,48,0.12));
    border:1px solid var(--amber); border-radius:16px; padding:20px; margin-bottom:20px; cursor:pointer;
  }
  .current-banner .cb-label{font-family:var(--mono); font-size:12.5px; color:var(--amber); letter-spacing:0.1em; margin-bottom:8px;}
  .current-banner .task-title{font-size:20px;}
  .quick-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px;}
  .quick-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    background:var(--panel-2); border:1px solid var(--border); border-radius:14px; padding:18px 8px;
    color:var(--text); font-size:13.5px; font-weight:600;
  }
  .quick-btn .navicon{font-size:26px;}
  .fab{
    position:fixed; right:22px; bottom:calc(84px + env(safe-area-inset-bottom));
    width:58px; height:58px; border-radius:50%; background:var(--blue); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,122,255,0.4); z-index:25;
  }

  /* ---- task detail ---- */
  .back-row{display:flex; align-items:center; gap:8px; margin-bottom:16px; color:var(--muted); font-size:14.5px;}
  .back-row button{background:none; border:none; color:var(--muted); font-size:14.5px; padding:6px 0; font-family:var(--sans);}
  .detail-head{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:var(--card-shadow);}
  .detail-head .task-title{font-size:21px;}
  .kv{display:grid; grid-template-columns:88px 1fr; gap:9px 12px; margin-top:14px; font-size:14.5px;}
  .kv .k{color:var(--text); font-weight:600; font-family:var(--mono); font-size:12.5px; padding-top:2px;}
  .kv .v{color:var(--text);}

  .report-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  .report-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    padding:20px 10px; border-radius:14px; border:1px solid var(--border); background:var(--panel-2);
    font-family:var(--sans); font-weight:700; font-size:15px; color:var(--text);
  }
  .report-btn .emoji{font-size:28px;}
  .report-btn.recommended{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber) inset;}
  .report-btn:disabled{opacity:0.35;}
  .no-permission{color:var(--muted); font-size:14px; text-align:center; padding:16px; border:1px dashed var(--border); border-radius:12px; margin-bottom:20px;}
  .report-form{background:var(--panel); border:1px solid var(--amber); border-radius:14px; padding:18px; margin-bottom:20px; box-shadow:var(--card-shadow);}
  .report-form .title{font-weight:700; font-size:15.5px; margin-bottom:14px;}
  .report-form .row{display:flex; gap:10px; margin-top:10px;}
  .report-form .row button{flex:1;}
  .btn-ghost{background:none; border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:14px; font-size:15px; font-family:var(--sans);}

  .timeline{position:relative; padding-left:22px;}
  .timeline::before{content:''; position:absolute; left:5px; top:4px; bottom:4px; width:1px; background:var(--border);}
  .tl-item{position:relative; padding-bottom:22px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-dot{position:absolute; left:-22px; top:2px; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg);}
  .tl-dot.dispatch{background:var(--red);} .tl-dot.onscene{background:var(--amber);}
  .tl-dot.returning{background:var(--blue);} .tl-dot.completed{background:var(--green);}
  .tl-type{font-weight:700; font-size:15px;}
  .tl-meta{font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-top:3px;}
  .tl-note{font-size:14px; color:var(--text); margin-top:5px;}

  /* ---- forms / admin ---- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:7px; font-family:var(--mono);}
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:13px 14px; border-radius:10px; font-size:16px; font-family:var(--sans);
  }
  .field textarea{resize:vertical; min-height:72px;}
  .field input:disabled{color:var(--muted); background:var(--bg);}
  .btn-primary{width:100%; background:var(--amber); color:#1A1200; font-weight:700; border:none; padding:15px; border-radius:10px; font-size:16px; margin-top:4px;}
  .admin-row{display:flex; justify-content:space-between; align-items:center; background:var(--panel); border:1px solid var(--border); padding:14px 16px; border-radius:12px; margin-bottom:10px; box-shadow:var(--card-shadow);}
  .admin-row .name{font-size:15px; font-weight:600;}
  .admin-row .sub{font-size:13px; color:var(--muted); font-family:var(--mono);}
  .icon-btn{background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:8px 12px; font-size:13.5px;}
  .icon-btn.danger{color:var(--red); border-color:rgba(255,59,48,0.35);}
  .role-select{background:var(--panel-2); border:1px solid var(--border); color:var(--text); font-size:13.5px; border-radius:8px; padding:8px 10px; font-family:var(--mono);}
  .tabs2{display:flex; gap:6px; margin-bottom:18px; background:var(--panel-2); padding:4px; border-radius:12px;}
  .tab2{flex:1; text-align:center; padding:11px; border-radius:9px; font-size:13.5px; font-weight:600; color:var(--muted);}
  .tab2.active{background:var(--panel); color:var(--text);}

  /* ---- records search ---- */
  .search-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .search-grid .field{margin-bottom:0;}
  .search-grid .full{grid-column:1 / -1;}

  /* ---- profile ---- */
  .profile-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:var(--card-shadow);}
  .profile-row{display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:15px;}
  .profile-row:last-child{border-bottom:none;}
  .profile-row .k{color:var(--text); font-weight:600;}

  /* ---- stats / charts ---- */
  .chart-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:18px; box-shadow:var(--card-shadow);}
  .chart-title{font-size:15px; font-weight:700; margin-bottom:16px;}
  .bar-row{display:flex; align-items:center; gap:12px; margin-bottom:14px; font-size:14px;}
  .bar-row .bar-label{width:84px; flex-shrink:0; color:var(--muted); font-family:var(--mono); font-size:12.5px;}
  .bar-row .bar-track{flex:1; background:var(--panel-2); border-radius:6px; height:20px; position:relative; overflow:hidden;}
  .bar-row .bar-fill{position:absolute; left:0; top:0; bottom:0; background:var(--blue); border-radius:6px;}
  .bar-row .bar-val{width:34px; text-align:right; font-family:var(--mono); font-weight:700; flex-shrink:0;}
  .rank-row{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); font-size:14.5px;}
  .rank-row:last-child{border-bottom:none;}
  .rank-row .rank-num{width:22px; height:22px; border-radius:50%; background:var(--panel-2); color:var(--muted); font-family:var(--mono); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .rank-row .rank-name{flex:1;}
  .rank-row .rank-count{color:var(--muted); font-family:var(--mono); font-size:13px;}
  .stackbar{display:flex; height:22px; border-radius:8px; overflow:hidden; background:var(--panel-2); margin-bottom:14px;}
  .stackbar .seg{height:100%;}
  .stack-legend{display:flex; flex-direction:column; gap:8px;}
  .stack-legend .leg-row{display:flex; align-items:center; gap:9px; font-size:14px;}
  .stack-legend .leg-dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .stack-legend .leg-name{flex:1; color:var(--text);}
  .stack-legend .leg-val{color:var(--muted); font-family:var(--mono); font-size:13px;}

  /* ---- 回報精靈 ---- */
  .stepper{display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:22px;}
  .stepper .step-dot{
    width:30px; height:30px; border-radius:50%; background:var(--panel-2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--muted);
  }
  .stepper .step-dot.done{background:var(--green); border-color:var(--green); color:#fff;}
  .stepper .step-dot.current{background:var(--blue); border-color:var(--blue); color:#fff;}
  .stepper .step-line{width:30px; height:2px; background:var(--border);}
  .big-status-btn{
    display:flex; align-items:center; gap:14px; width:100%; padding:18px; border-radius:14px; border:none;
    color:#fff; font-size:16px; font-weight:700; margin-bottom:12px; text-align:left;
  }
  .big-status-text{display:flex; flex-direction:column; gap:3px;}
  .big-status-text .t1{font-size:16px; font-weight:700;}
  .big-status-text .t2{font-size:12.5px; font-weight:500; opacity:0.85;}
  .success-card{text-align:center; padding:36px 22px;}
  .success-card .check{width:64px; height:64px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 18px auto;}

  /* ---- bottom nav ---- */
  .bottomnav{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:var(--navbar-bg); backdrop-filter:blur(10px); border-top:1px solid var(--border);
    display:flex; padding-bottom:env(safe-area-inset-bottom);
  }
  .navbtn{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 4px 10px 4px; color:var(--muted); background:none; border:none; font-family:var(--sans);}
  .navbtn .navicon{font-size:22px;}
  .navbtn .navlabel{font-size:11.5px; font-weight:600;}
  .navbtn.active{color:var(--amber);}

  .toast{
    position:fixed; bottom:92px; left:50%; transform:translateX(-50%); z-index:50;
    background:var(--panel); border:1px solid var(--border); color:var(--text); font-size:14.5px;
    padding:12px 20px; border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity 0.25s, transform 0.25s;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .spinner{width:22px; height:22px; border:2.5px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin 0.8s linear infinite; margin:60px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script type="module">

  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged

/* =========================================================

   Firebase Console → 專案設定 → 一般 → 你的應用程式
   ========================================================= */
const BUILD_TAG = "2026-07-03-16-profileform";

const firebaseConfig = {

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

/* =========================================================
   1b) Firestore REST 用戶端
   部分行動網路環境會干擾 Firestore SDK 預設的長連線/串流協定，
   導致一直卡在 "client is offline"；這裡改用一般的 HTTPS REST
   請求存取 Firestore，即時同步則改為定時輪詢。
   ========================================================= */
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents`;

function toFsValue(v){
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (v instanceof Date) return { timestampValue: v.toISOString() };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFsValue) } };
  if (typeof v === "object") return { mapValue: { fields: toFsFields(v) } };
  return { stringValue: String(v) };
}
function toFsFields(obj){
  const out = {};
  for (const k in obj) if (obj[k] !== undefined) out[k] = toFsValue(obj[k]);
  return out;
}
function fromFsValue(v){
  if (!v) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("integerValue" in v) return parseInt(v.integerValue, 10);
  if ("doubleValue" in v) return v.doubleValue;
  if ("timestampValue" in v) return v.timestampValue;
  if ("nullValue" in v) return null;
  if ("arrayValue" in v) return (v.arrayValue.values||[]).map(fromFsValue);
  if ("mapValue" in v) return fromFsFields(v.mapValue.fields||{});
  return null;
}
function fromFsFields(fields){
  const out = {};
  for (const k in fields||{}) out[k] = fromFsValue(fields[k]);
  return out;
}

async function fsFetch(path, options={}, allow404=false){
  const idToken = await auth.currentUser.getIdToken();
  const res = await fetch(`${FIRESTORE_BASE}/${path}`, {
    ...options,
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json", ...(options.headers||{}) }
  });
  // 404 只有在「讀取單一文件、文件不存在」時才是合理狀態；
  // 寫入（PATCH/POST/DELETE）如果也回傳 404，一定是真的出錯了，
  // 必須丟出例外，不能被這裡靜默吃掉，否則會誤以為寫入成功。
  if (!res.ok && !(allow404 && res.status === 404)) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
  return res;
}
async function fsGetDoc(path){
  const res = await fsFetch(path, {}, true);
  if (res.status === 404) return null;
  const data = await res.json();
  return fromFsFields(data.fields);
}
async function fsSetDoc(path, obj){
  const mask = Object.keys(obj).map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join("&");
  await fsFetch(`${path}?${mask}`, { method: "PATCH", body: JSON.stringify({ fields: toFsFields(obj) }) });
}
async function fsAddDoc(collectionPath, obj){
  await fsFetch(collectionPath, { method: "POST", body: JSON.stringify({ fields: toFsFields(obj) }) });
}
async function fsDeleteDoc(path){
  await fsFetch(path, { method: "DELETE" });
}
async function fsListCollection(collectionPath){
  const res = await fsFetch(`${collectionPath}?pageSize=300`);
  const data = await res.json();
  return (data.documents||[]).map(d => ({ id: d.name.split("/").pop(), ...fromFsFields(d.fields) }));
}

function poll(fn, intervalMs){
  let stopped = false, timer = null;
  async function tick(){
    if (stopped) return;
    try { await fn(); } catch(e){ console.error("輪詢失敗", e); }
    if (!stopped) timer = setTimeout(tick, intervalMs);
  }
  tick();
  return {
    stop(){ stopped = true; if (timer) clearTimeout(timer); },
    refreshNow(){ if (timer) clearTimeout(timer); tick(); }
  };
}

// 只有資料真的變動時才重繪畫面，避免每次背景輪詢都整頁重畫造成畫面閃爍/捲動位置跳動。
function changedSince(cacheKey, value){
  const json = JSON.stringify(value);
  const changed = json !== (cacheKey === "tasks" ? lastTasksJson : cacheKey === "events" ? lastEventsJson : lastProfileJson);
  if (cacheKey === "tasks") lastTasksJson = json;
  else if (cacheKey === "events") lastEventsJson = json;
  else lastProfileJson = json;
  return changed;
}

/* =========================================================
   4) 狀態推導（純函式：Event 陣列 → 狀態）
   ========================================================= */
function deriveStatus(taskId) {
  const evs = state.events.filter(e => e.taskId === taskId).sort((a,b) => (a.ts||0) - (b.ts||0));
  if (evs.length === 0) return "pending";
  const last = evs[evs.length - 1];
  const def = EVENT_TYPES.find(t => t.type === last.type);
  return def ? def.statusKey : "pending";
}
function taskEvents(taskId) {
  return state.events.filter(e => e.taskId === taskId).sort((a,b) => (a.ts||0) - (b.ts||0));
}
function eventByType(taskId, type){
  return taskEvents(taskId).find(e => e.type === type) || null;
}
function isSameDay(ms, ref){
  if (!ms) return false;
  const a = new Date(ms), b = ref;
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function durationLabel(ms){
  if (ms == null || ms < 0) return "—";
  const mins = Math.round(ms/60000);
  if (mins < 60) return `${mins} 分鐘`;
  const h = Math.floor(mins/60), m = mins%60;
  return `${h} 小時 ${m} 分鐘`;
}

/* =========================================================
   5) RBAC
   ========================================================= */
function canManageUsers(p){ return p && p.role === "admin"; }
function canManageTasks(p){ return p && (p.role === "admin" || p.role === "duty_officer"); }
function canSeeAllTasks(p){ return p && (p.role === "admin" || p.role === "duty_officer"); }
function isActive(p){ return p && p.role !== "pending" && p.role !== "disabled"; }
function canCreateTask(p){ return isActive(p); } // 建立勤務（所有成員）
function canReport(p, task){ return isActive(p); } // 回報開放給所有已審核成員
function visibleTasks(p, tasks){
  if (!p) return [];
  if (canSeeAllTasks(p)) return tasks;
  if (p.role === "company_commander" && p.unit) return tasks.filter(t => t.unit === p.unit);
  return tasks; // member：任務中心對所有已審核成員開放
}

onAuthStateChanged(auth, async (user) => {
  cleanupListeners();
  state.user = user;
  if (!user) { state.profile = null; render(); return; }

  render(); // 立即顯示 spinner，避免畫面停留在登入頁

  try {
    const path = `users/${user.uid}`;
    let data = await fsGetDoc(path);
    if (!data) {
      data = { email: user.email, displayName: user.displayName, role: "pending", unit: "", createdAt: new Date() };
      await fsSetDoc(path, data);
    }
    state.profile = { uid: user.uid, ...data };
    if (state.profile.role !== "pending") startDataListeners();
    render();

    profilePoll = poll(async () => {
      const p = await fsGetDoc(path);
      if (!p) return;
      const wasPending = state.profile && state.profile.role === "pending";
      const changed = changedSince("profile", p);
      state.profile = { uid: user.uid, ...p };
      if (wasPending && state.profile.role !== "pending") startDataListeners();
      if (changed || (wasPending && state.profile.role !== "pending")) safeRender();
    }, 8000);
  } catch (err) {
    console.error("登入後初始化失敗", err);
    showToast(`登入後初始化失敗：[${err.code||'?'}] ${err.message} · build:${BUILD_TAG}`);
  }
});

function startDataListeners(){
  if (tasksPoll || eventsPoll) return;
  tasksPoll = poll(async () => {
    const docs = await fsListCollection("tasks");
    docs.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    const changed = changedSince("tasks", docs);
    state.tasks = docs;
    if (changed) safeRender();
  }, 6000);
  eventsPoll = poll(async () => {
    const docs = await fsListCollection("events");
    docs.forEach(d => { d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });
    docs.sort((a,b) => a.ts - b.ts);
    const changed = changedSince("events", docs);
    state.events = docs;
    if (changed) safeRender();
  }, 6000);
}
function cleanupListeners(){
  if (tasksPoll) tasksPoll.stop(); if (eventsPoll) eventsPoll.stop(); if (profilePoll) profilePoll.stop();
  lastTasksJson = lastEventsJson = lastProfileJson = "";
  tasksPoll = eventsPoll = profilePoll = null;
  state.tasks = []; state.events = [];
}

   ========================================================= */
function timeAgo(ms){
  if (!ms) return "—";
  const diff = Math.max(0, Date.now() - ms);
  const m = Math.floor(diff/60000);
  if (m < 1) return "剛剛";
  if (m < 60) return `${m} 分鐘前`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} 小時前`;
  return `${Math.floor(h/24)} 天前`;
}
function fmtTime(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
}
function fmtDate(d){
  return d.toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
function showToast(msg){
  let t = document.getElementById("toast");
  if (!t){ t = document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove("show"), 2200);
}
function nav(route){
  state.route = route; state.reportDraft = null;
  if (route.name === "report") state.reportWizard = { step: 1, taskId: "" };
  render(); window.scrollTo(0,0);
}
function esc(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    .filter(t => deriveStatus(t.id) !== "completed" && deriveStatus(t.id) !== "pending")

function stepperHtml(step){
  const labels = ["選擇任務","選擇狀態","確認送出"];
  return `<div class="stepper">
    ${labels.map((_,i) => {
      const n = i+1;
      const cls = n < step ? "done" : (n === step ? "current" : "");
      return `${i>0?'<div class="step-line"></div>':''}<div class="step-dot ${cls}">${n<step?icon('check',15):n}</div>`;
    }).join("")}
  </div>`;
}
function viewReport(){
  const p = state.profile;
  const w = state.reportWizard;
  const reportable = visibleTasks(p, state.tasks).filter(t => deriveStatus(t.id) !== "completed" && canReport(p, t));

  if (w.step === 4) {
    const t = state.tasks.find(x => x.id === w.taskId);
    const def = EVENT_TYPES.find(e => e.type === w.type);
    const evs = taskEvents(w.taskId).filter(e => e.type === w.type);
    const lastEv = evs[evs.length - 1];
    return `
      <div class="success-card">
        <div class="check">${icon('check',32)}</div>
        <h2 style="margin:0 0 6px 0;">回報成功！</h2>
        <p style="color:var(--muted); font-size:13.5px; margin-bottom:16px;">${t ? esc(t.title) : ''}</p>
        <div class="detail-head" style="text-align:left;">
          <div class="kv">
            <div class="k">已記錄</div><div class="v">${def ? def.label : ''}</div>
            <div class="k">時間</div><div class="v">${lastEv ? fmtTime(lastEv.ts) : '—'}</div>
            ${lastEv && lastEv.mileage != null ? `<div class="k">里程</div><div class="v">${lastEv.mileage} km</div>` : ""}
            ${lastEv && lastEv.reportedLocation ? `<div class="k">地點</div><div class="v">${esc(lastEv.reportedLocation)}</div>` : ""}
          </div>
        </div>
        <button class="btn-primary" onclick="window.__nav({name:'task', id:'${w.taskId}'})">查看任務</button>
        <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.__resetReportWizard()">繼續回報</button>
      </div>`;
  }

  if (w.step === 1) {
    const t = state.tasks.find(x => x.id === w.taskId);
    return `
      ${stepperHtml(1)}
      <div class="section-label">選擇任務</div>
      ${reportable.length ? `
        <div class="field">
          <select onchange="window.__setReportTask(this.value)">
            <option value="">請選擇任務</option>
            ${reportable.map(rt => `<option value="${rt.id}" ${w.taskId===rt.id?'selected':''}>${esc(rt.vehicle||'—')} · ${esc(rt.title)}</option>`).join("")}
          </select>
        </div>
        ${t ? `
          <div class="detail-head">
            <div class="kv">
              <div class="k">目前狀態</div><div class="v">${STATUS_LABEL[deriveStatus(t.id)]}</div>
              <div class="k">地點</div><div class="v">${esc(t.location||'—')}</div>
            </div>
          </div>` : ""}
        <button class="btn-primary" ${!w.taskId?'disabled':''} onclick="window.__reportWizardNext(2)">下一步</button>
      ` : `<div class="empty">目前沒有可回報的勤務</div>`}
    `;
  }

  if (w.step === 2) {
    const t = state.tasks.find(x => x.id === w.taskId);
    if (!t) return `<div class="empty">找不到此任務</div>`;
    return `
      ${stepperHtml(2)}
      <div class="back-row"><button onclick="window.__reportWizardNext(1)">‹ 上一步</button></div>
      <div class="section-label">選擇回報狀態</div>
      ${EVENT_TYPES.map(e => `
        <button class="big-status-btn" style="background:${STATUS_COLOR[e.statusKey]};" onclick="window.__setReportType('${e.type}')">
          ${icon(e.icon,28)}
          <span class="big-status-text"><span class="t1">${e.label}</span><span class="t2">${e.hint}</span></span>
        </button>`).join("")}
    `;
  }

  // step 3
  const t = state.tasks.find(x => x.id === w.taskId);
  const def = EVENT_TYPES.find(e => e.type === w.type);
  if (!t || !def) return `<div class="empty">找不到此任務</div>`;
  const isFinal = w.type === "COMPLETED";
  return `
    ${stepperHtml(3)}
    <div class="back-row"><button onclick="window.__reportWizardNext(2)">‹ 上一步</button></div>
    <div class="detail-head">
      <div class="task-top"><p class="task-title">${esc(t.title)}</p>${statusBadge(deriveStatus(t.id))}</div>
      <div class="kv"><div class="k">選擇狀態</div><div class="v">${icon(def.icon,15)} ${def.label}</div></div>
    </div>

    <div class="field"><label>備註（選填）</label><input id="rw-note" placeholder="備註"></div>

function viewTaskDetail(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const p = state.profile;
  const s = deriveStatus(taskId);
  const evs = taskEvents(taskId);
  const currentIdx = STATUS_ORDER.indexOf(s);
  const nextType = EVENT_TYPES[currentIdx] ? EVENT_TYPES[currentIdx].type : null;

  const draft = state.reportDraft && state.reportDraft.taskId === taskId ? state.reportDraft : null;

  let reportSection;
  if (!canReport(p, t)) {
    reportSection = `<div class="no-permission">您沒有回報權限</div>`;
  } else if (s === "completed") {
    reportSection = `<div class="no-permission">此勤務已完成</div>`;
  } else if (draft) {
    const def = EVENT_TYPES.find(e=>e.type===draft.type);
    const isFinal = draft.type === "COMPLETED";
    reportSection = `
      <div class="report-form">
        <div class="title">${icon(def.icon,19)} 回報：${def.label}</div>
        <div class="field"><label>里程（公里）</label><input id="rf-mileage" type="number" inputmode="decimal" placeholder="目前里程"></div>
        ${isFinal ? `<div class="field"><label>剩餘油量</label><input id="rf-fuel" placeholder="例如：1/2 或 40%"></div>` : ""}
        <div class="field"><label>備註（選填）</label><input id="rf-note" placeholder="備註"></div>
        <div class="row">
          <button class="btn-ghost" onclick="window.__cancelReport()">取消</button>
          <button class="btn-primary" style="margin-top:0;" onclick="window.__submitReport('${t.id}','${draft.type}')">確認送出</button>
        </div>
      </div>`;
  } else {
    reportSection = `
      <div class="report-grid">
        ${EVENT_TYPES.map(e => `
          <button class="report-btn ${e.type===nextType?'recommended':''}"
            onclick="window.__startReport('${t.id}','${e.type}')">
            <span class="emoji">${icon(e.icon,28)}</span>${e.label}
          </button>`).join("")}
      </div>`;
  }

  const timeline = evs.length ? `
    <div class="timeline">
      ${evs.slice().reverse().map(e => {
        const def = EVENT_TYPES.find(d=>d.type===e.type);
        return `
        <div class="tl-item">
          <div class="tl-dot ${def?.statusKey}"></div>
          <div class="tl-type">${def ? icon(def.icon,17) : ''} ${def?.label}</div>
          <div class="tl-meta">${fmtTime(e.ts)} · ${esc(e.userName||'')}${e.mileage!=null ? ' · ' + e.mileage + ' km' : ''}</div>
          ${e.note ? `<div class="tl-note">${esc(e.note)}</div>` : ""}
        </div>`;
      }).join("")}
    </div>` : `<div class="empty">尚無事件紀錄</div>`;

  // 勤務資訊：出發/抵達/返營/最終里程與油量、自動計算行駛公里數與任務耗時
  const dispatchEv = eventByType(taskId, "DISPATCH");
  const arrivedEv = eventByType(taskId, "ARRIVED_SCENE");
  const returningEv = eventByType(taskId, "RETURNING");
  const completedEv = eventByType(taskId, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? null;
  const finalMileage = completedEv?.mileage ?? null;
  const distance = (startMileage != null && finalMileage != null) ? (finalMileage - startMileage) : null;
  const duration = completedEv ? (completedEv.ts - (dispatchEv?.ts ?? new Date(t.createdAt||0).getTime())) : null;

  return `
    <div class="back-row"><button onclick="window.__nav({name:'tasks'})">‹ 返回列表</button></div>
    <div class="detail-head">
      <div class="task-top">
        <p class="task-title">${esc(t.title)}</p>
        ${statusBadge(s)}
      </div>
      <div class="kv">
        <div class="k">車號</div><div class="v">${esc(t.vehicle||'—')}</div>
        <div class="k">地點</div><div class="v">${esc(t.location||'—')}</div>
        <div class="k">車長</div><div class="v">${esc(t.crewLeader||'—')}</div>
        <div class="k">駕駛</div><div class="v">${esc(t.driver||'—')}</div>
        <div class="k">紀錄器</div><div class="v">${esc((t.recorders||[]).join('、') || '—')}</div>
        <div class="k">建立人</div><div class="v">${esc(t.createdByName||'—')}</div>
        <div class="k">建立時間</div><div class="v">${fmtTime(new Date(t.createdAt||0).getTime())}</div>
      </div>
    </div>
    <div class="section-label">回報操作</div>
    ${reportSection}
    <div class="section-label">勤務資訊</div>
    <div class="detail-head">
      <div class="kv">
        <div class="k">出發里程</div><div class="v">${startMileage!=null ? startMileage+' km' : '—'}</div>
        <div class="k">抵達里程</div><div class="v">${arrivedEv?.mileage!=null ? arrivedEv.mileage+' km' : '—'}</div>
        <div class="k">返營里程</div><div class="v">${returningEv?.mileage!=null ? returningEv.mileage+' km' : '—'}</div>
        <div class="k">最終里程</div><div class="v">${finalMileage!=null ? finalMileage+' km' : '—'}</div>
        <div class="k">出發油量</div><div class="v">${esc(t.startFuel||'—')}</div>
        <div class="k">剩餘油量</div><div class="v">${esc(completedEv?.endFuel||'—')}</div>
        <div class="k">行駛公里</div><div class="v">${distance!=null ? distance+' km' : '—'}</div>
        <div class="k">任務耗時</div><div class="v">${duration!=null ? durationLabel(duration) : '—'}</div>
      </div>
    </div>
    <div class="section-label">勤務時間軸（唯讀，不可修改）</div>
    ${timeline}
  `;
}

function viewRecords(){

    </div>
    <div class="section-label">結果 · ${tasks.length}</div>
    ${tasks.length ? tasks.map(taskCard).join("") : `<div class="empty">找不到符合條件的勤務紀錄</div>`}

/* =========================================================
   15b) 畫面：統計分析
   ========================================================= */
const STATUS_COLOR = { pending:"#8E8E93", dispatch:"#FF3B30", onscene:"#FF9500", returning:"#007AFF", completed:"#34C759" };
function tasksInPeriod(tasks, period){
  const now = new Date();
  return tasks.filter(t => {
    const d = new Date(t.createdAt||0);
    if (period === "today") return isSameDay(d.getTime(), now);
    if (period === "week") { const diff = (now - d) / 86400000; return diff >= 0 && diff < 7; }
    if (period === "month") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    return true;
  });
}
function viewStats(){
  const p = state.profile;
  const base = visibleTasks(p, state.tasks);
  const tasks = tasksInPeriod(base, state.statsPeriod);

  const periods = [
    { key:"today", label:"今日" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }
  ];

  // 各車輛出勤次數（依 DISPATCH 事件計算，同一車輛可能執行多趟勤務）
  const vehicleCounts = {};
  tasks.forEach(t => {
    const d = eventByType(t.id, "DISPATCH");
    if (!d) return;
    const key = t.vehicle || "未填車號";
    vehicleCounts[key] = (vehicleCounts[key]||0) + 1;
  });
  const vehicleEntries = Object.entries(vehicleCounts).sort((a,b) => b[1]-a[1]);
  const maxCount = Math.max(1, ...vehicleEntries.map(e=>e[1]));

  const CHART_CAT_COLORS = ["#007AFF", "#FF9500", "#34C759", "#6B23C7", "#FF3B30", "#00A3A3"];
  const barChart = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">各車輛出勤次數</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="bar-row">
          <div class="bar-label">${esc(veh)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%; background:${CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]};"></div></div>
          <div class="bar-val">${count}</div>
        </div>`).join("")}
    </div>` : `<div class="chart-card"><div class="chart-title">各車輛出勤次數</div><div class="empty">此區間尚無出勤紀錄</div></div>`;

  const rankList = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">車輛使用次數排行</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="rank-name">${esc(veh)}</div>
          <div class="rank-count">${count} 次</div>
        </div>`).join("")}
    </div>` : "";

  // 任務狀態比例（part-to-whole → 橫向堆疊長條，不用圓餅圖）
  const statusCounts = {};
  STATUS_ORDER.forEach(s => statusCounts[s] = 0);
  tasks.forEach(t => { const s = deriveStatus(t.id); statusCounts[s] = (statusCounts[s]||0) + 1; });
  const totalTasks = tasks.length || 1;
  const stackSegs = STATUS_ORDER.filter(s => statusCounts[s] > 0).map(s => `
    <div class="seg" style="width:${(statusCounts[s]/totalTasks*100).toFixed(1)}%; background:${STATUS_COLOR[s]};"></div>`).join("");
  const legendRows = STATUS_ORDER.map(s => `
    <div class="leg-row">
      <span class="leg-dot" style="background:${STATUS_COLOR[s]};"></span>
      <span class="leg-name">${STATUS_LABEL[s]}</span>
      <span class="leg-val">${statusCounts[s]}（${Math.round(statusCounts[s]/totalTasks*100)}%）</span>
    </div>`).join("");

  const statusChart = `
    <div class="chart-card">
      <div class="chart-title">任務狀態比例</div>
      <div class="stackbar">${stackSegs}</div>
      <div class="stack-legend">${legendRows}</div>
    </div>`;

  return `
    <div class="tabs2">
      ${periods.map(pd => `<div class="tab2 ${state.statsPeriod===pd.key?'active':''}" onclick="window.__setStatsPeriod('${pd.key}')">${pd.label}</div>`).join("")}
    </div>
    ${barChart}
    ${rankList}
    ${statusChart}
  `;
}

  const p = state.profile;
  if (!canManageTasks(p)) return `<div class="empty">您沒有管理權限</div>`;

  const today = new Date();
  const todayTasks = state.tasks.filter(t => isSameDay(new Date(t.createdAt||0).getTime(), today));
  const todayDone = todayTasks.filter(t => deriveStatus(t.id) === "completed");
  const todayActive = todayTasks.filter(t => deriveStatus(t.id) !== "completed");
  const personnelCount = (state._usersCache && Array.isArray(state._usersCache))
    ? state._usersCache.filter(u => u.role !== "pending" && u.role !== "disabled").length
    : null;

  const overview = `
    <div class="section-label">管理後台總覽</div>
    <div class="stat-grid">
      <div class="stat-tile t-blue"><div class="num">${todayTasks.length}</div><div class="lbl">今日勤務</div></div>
      <div class="stat-tile t-orange"><div class="num">${todayActive.length}</div><div class="lbl">今日進行中</div></div>
      <div class="stat-tile t-green"><div class="num">${todayDone.length}</div><div class="lbl">今日完成</div></div>
    </div>
    <div class="stat-grid" style="grid-template-columns:1fr;">
      <div class="stat-tile t-purple"><div class="num">${personnelCount!=null ? personnelCount : '—'}</div><div class="lbl">已審核人員總數${personnelCount==null ? '（開啟帳號權限頁籤後顯示）' : ''}</div></div>
    </div>`;

  const tabs = `
    <div class="tabs2">
      <div class="tab2 ${state.adminTab==='tasks'?'active':''}" onclick="window.__setAdminTab('tasks')">任務管理</div>
      ${canManageUsers(p) ? `<div class="tab2 ${state.adminTab==='users'?'active':''}" onclick="window.__setAdminTab('users')">帳號權限</div>` : ""}
    </div>`;

  if (state.adminTab === "users" && canManageUsers(p)) {
    return overview + tabs + viewAdminUsers();
  }
  return overview + tabs + viewAdminTasks();
}

function taskToCsvRow(t){
  const s = deriveStatus(t.id);
  const dispatchEv = eventByType(t.id, "DISPATCH");
  const completedEv = eventByType(t.id, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? "";
  const finalMileage = completedEv?.mileage ?? "";
  const distance = (startMileage !== "" && finalMileage !== "") ? (finalMileage - startMileage) : "";
  return [t.title, t.vehicle, t.location, t.crewLeader, t.driver, STATUS_LABEL[s], fmtTime(new Date(t.createdAt||0).getTime()), startMileage, finalMileage, distance]
    .map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",");
}
function exportTasksCsv(){
  const header = ["任務名稱","車號","地點","車長","駕駛","狀態","建立時間","出發里程","最終里程","行駛公里"].join(",");
  const rows = state.tasks.map(taskToCsvRow);
  const csv = "﻿" + [header, ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `勤務紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function viewAdminTasks(){
  return `
    <div class="section-label">所有勤務</div>
    <button class="btn-ghost" style="width:100%;margin-bottom:10px;" onclick="window.__exportTasks()">匯出 CSV</button>
    ${state.tasks.length ? state.tasks.map(t => {
      const s = deriveStatus(t.id);
      return `
      <div class="admin-row">
        <div>
          <div class="name">${esc(t.title)}</div>
          <div class="sub">${esc(t.vehicle||'—')} · ${STATUS_LABEL[s]}</div>
        </div>
        <div style="display:flex; gap:6px;">
          ${s !== "completed" ? `<button class="icon-btn" onclick="window.__forceEndTask('${t.id}')">強制結束</button>` : ""}
          <button class="icon-btn danger" onclick="window.__deleteTask('${t.id}')">刪除</button>
        </div>
      </div>`;
    }).join("") : `<div class="empty">尚無勤務</div>`}
  `;
}

function viewAdminUsers(){
  // 使用者清單需即時讀取，這裡用簡易一次性快取（開啟頁籤時抓取）
  if (!state._usersCache) {
    state._usersCache = "loading";
    fsListCollection("users").then(list => {
      state._usersCache = list;
      render();
    }).catch(err => {
      console.error("讀取使用者清單失敗", err);
      showToast(`讀取使用者清單失敗：[${err.code||'?'}] ${err.message}`);
      state._usersCache = [];
      render();
    });
    return `<div class="spinner"></div>`;
  }
  if (state._usersCache === "loading") return `<div class="spinner"></div>`;

  const roles = ["pending","member","company_commander","duty_officer","admin","disabled"];
  return `
    <div class="section-label">帳號權限管理</div>
    ${state._usersCache.map(u => `
      <div class="admin-row">
        <div>
          <div class="name">${esc(u.displayName||u.email)}</div>
          <div class="sub">${esc(u.email)} · ${esc(u.unit||'未設定單位')}</div>
        </div>
        <select class="role-select" onchange="window.__setRole('${u.id}', this.value)">
          ${roles.map(r => `<option value="${r}" ${u.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join("")}
        </select>
      </div>`).join("")}
  `;
}

/* =========================================================
   19) 主渲染
   ========================================================= */
const ROUTE_VIEWS = {
  home: viewHome,
  tasks: viewTasks,
  createTask: viewCreateTask,
  report: viewReport,
  task: () => viewTaskDetail(state.route.id),
  records: viewRecords,
  stats: viewStats,
  notifications: viewNotifications,
  profile: viewProfile,
  admin: viewAdmin
};
const NAV_ITEMS = [
  { name:"home", iconName:"home", label:"首頁" },
  { name:"tasks", iconName:"tasks", label:"任務中" },
  { name:"report", iconName:"alert", label:"回報" },
  { name:"records", iconName:"records", label:"紀錄" },
  { name:"stats", iconName:"chart", label:"統計" }
];

// 背景輪詢用：畫面會整個重繪（innerHTML 全部換掉），如果使用者正在輸入框
// 打字，重繪會讓輸入框元素被整個換掉，導致輸入焦點與鍵盤被打斷。輪詢觸發的
// 重繪一律呼叫這個函式，偵測到目前有輸入中的欄位就先跳過，等使用者打完離開
// 該欄位（或下一次輪詢/使用者操作觸發真正的 render）再更新畫面。
function safeRender(){
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.tagName === "SELECT")) return;
  render();
}

function render(){
  const app = document.getElementById("app");
  if (!state.user) { app.innerHTML = viewLogin(); return; }
  if (!state.profile) { app.innerHTML = `<div class="spinner"></div>`; return; }
  if (state.profile.role === "pending") { app.innerHTML = viewPending(); return; }
  if (state.profile.role === "disabled") { app.innerHTML = viewDisabled(); return; }

  const view = ROUTE_VIEWS[state.route.name] || viewHome;
  const body = view();

  const p = state.profile;
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-top">
        <h1>衛生營車輛人員動態管制系統</h1>
        <div class="topbar-icons">
          <button class="topbar-icon-btn" onclick="window.__nav({name:'notifications'})">${icon('bell',21)}</button>
          <button class="topbar-icon-btn" onclick="window.__nav({name:'profile'})">${icon('user',21)}</button>
        </div>
      </div>
      <div class="topbar-sub"><span class="dot-live"></span> ${esc(p.displayName||p.email).split(' ')[0]}${p.rank ? ' ' + esc(p.rank) : ''}</div>
    </div>
    <main>${body}</main>
    <div class="bottomnav">
      ${NAV_ITEMS.map(n => `
        <button class="navbtn ${state.route.name===n.name?'active':''}" onclick="window.__nav({name:'${n.name}'})">
          <span class="navicon">${icon(n.iconName,22)}</span><span class="navlabel">${n.label}</span>
        </button>`).join("")}
    </div>
    <div id="toast" class="toast"></div>
  `;
}

/* =========================================================
   20) 全域事件掛載（供 inline onclick 使用）
   ========================================================= */
window.__login = doLogin;
window.__logout = doLogout;
window.__nav = nav;
window.__startReport = (taskId, type) => { state.reportDraft = { taskId, type }; render(); };
window.__cancelReport = () => { state.reportDraft = null; render(); };
window.__submitReport = (taskId, type) => {
  const mileageEl = document.getElementById("rf-mileage");
  const fuelEl = document.getElementById("rf-fuel");
  const noteEl = document.getElementById("rf-note");
  const extra = {};
  if (mileageEl && mileageEl.value !== "") extra.mileage = Number(mileageEl.value);
  if (noteEl && noteEl.value) extra.note = noteEl.value;
  if (fuelEl && fuelEl.value) extra.endFuel = fuelEl.value;
  state.reportDraft = null;
  addEvent(taskId, type, extra);
};
window.__setAdminTab = (t) => { state.adminTab = t; state._usersCache = null; render(); };
window.__deleteTask = (id) => { if (confirm("確定刪除此任務？此動作無法復原。")) deleteTask(id); };
window.__forceEndTask = (id) => { if (confirm("確定強制結束此勤務？此動作無法復原。")) forceEndTask(id); };
window.__exportTasks = () => exportTasksCsv();
window.__setRole = (uid, role) => setUserRole(uid, role, "").then(() => { state._usersCache = null; render(); });
window.__editProfile = () => { state.profileEditing = true; render(); };
window.__cancelEditProfile = () => { state.profileEditing = false; render(); };
window.__saveProfile = (ev) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  updateOwnProfile(f.get("displayName"), f.get("rank"), f.get("unit")).then(() => {
    state.profileEditing = false; render();
  });
};
window.__setRecordsFilter = (key, value) => { state.recordsFilter[key] = value; render(); };
window.__setTasksTab = (key) => { state.tasksTab = key; render(); };
window.__setStatsPeriod = (key) => { state.statsPeriod = key; render(); };
window.__setReportTask = (taskId) => { state.reportWizard.taskId = taskId; render(); };
window.__reportWizardNext = (step) => { state.reportWizard.step = step; render(); };
window.__setReportType = (type) => { state.reportWizard.type = type; state.reportWizard.step = 3; render(); };
window.__resetReportWizard = () => { state.reportWizard = { step: 1, taskId: "" }; render(); };
window.__submitReportWizard = () => {
  const w = state.reportWizard;
  const mileageEl = document.getElementById("rw-mileage");
  const fuelEl = document.getElementById("rw-fuel");
  const noteEl = document.getElementById("rw-note");
  const locationEl = document.getElementById("rw-location");
  const extra = {};
  if (mileageEl && mileageEl.value !== "") extra.mileage = Number(mileageEl.value);
  if (noteEl && noteEl.value) extra.note = noteEl.value;
  if (fuelEl && fuelEl.value) extra.endFuel = fuelEl.value;
  if (locationEl && locationEl.value) extra.reportedLocation = locationEl.value;
  addEvent(w.taskId, w.type, extra).then(() => { state.reportWizard.step = 4; render(); });
};
window.__createTask = (ev) => {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const recorders = (f.get("recorders")||"").split(",").map(s=>s.trim()).filter(Boolean);
  const startMileage = f.get("startMileage");
  createTask({
    title: f.get("title"), vehicle: f.get("vehicle"), location: f.get("location"),
    crewLeader: f.get("crewLeader"), driver: f.get("driver"), recorders,
    startMileage: startMileage ? Number(startMileage) : null,
    startFuel: f.get("startFuel"), notes: f.get("notes")
  });
  ev.target.reset();
  nav({ name: "tasks" });
};

render();
</script>
