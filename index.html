// 醫院有登記自己的經緯度時，直接算跟 GPS 定位的實際距離最準；沒登記
// 座標的醫院則退而求其次，用「行政區」層級的代表點（區公所／市公所
// 座標，比整個縣市的代表點更接近實際醫院位置）概略判斷「人在哪個行政
// 區」，縣市層級當作行政區判斷不到時的備援（見 viewHospitals 的 matchInfo）。
const COUNTY_CENTERS = {
  "臺中市": { lat: 24.1477, lng: 120.6736 },
  "嘉義市": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣": { lat: 23.4623, lng: 120.3333 }
};
// key 用「縣市|行政區」，避免不同縣市剛好同名行政區（例如各地都有「東區」）互相搞混。
// 烏日區（成功北醫務所所在地，見 UNIT_WEATHER_TOWNSHIP）原本不在這份清單裡，
// 導致實際人在烏日的使用者定位會被錯配到最近的「已列出」行政區（南區，仍有
// 數公里之遙），誤判成南區——座標取自烏日分局烏日派出所（中山路二段309號）
// 公開地址資料，跟烏日區公所（新興路316號）在同一個市區範圍內，作為代表點
// 精度足夠。
const DISTRICT_CENTERS = {
  "臺中市|北區": { lat: 24.1512, lng: 120.6839 },
  "臺中市|西屯區": { lat: 24.1786, lng: 120.6400 },
  "臺中市|南區": { lat: 24.1253, lng: 120.6653 },
  "臺中市|梧棲區": { lat: 24.2547, lng: 120.5308 },
  "臺中市|大甲區": { lat: 24.3486, lng: 120.6222 },
  "臺中市|烏日區": { lat: 24.1062, lng: 120.6227 },
  "嘉義市|東區": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣|朴子市": { lat: 23.4650, lng: 120.2458 }
};
function haversineKm(lat1, lng1, lat2, lng2){
  const toRad = d => d * Math.PI / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function nearestCounty(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [county, c] of Object.entries(COUNTY_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = county; }
  }
  return best;
}
// 回傳 { county, district }：先找最接近的行政區代表點，再從 key 拆出對應
// 縣市，兩層資訊一起回傳，排序時可以優先比對行政區、比對不到才退回縣市。
// DISTRICT_CENTERS 目前只收錄少數幾個行政區，不是全臺完整清單；人如果實際
// 是在清單以外的行政區（例如大林鎮，還沒收錄），單純找「最近的一個」還是
// 會硬配一個其實有段距離的行政區，變成很肯定地講錯。這裡加一個距離上限
// （DISTRICT_MATCH_MAX_KM），超過就當作「這份清單裡沒有對得上的行政區」，
// 退回只用縣市比對（nearestCounty），不要不管多遠都硬報一個看似精確、
// 實際上是錯的行政區名稱。
const DISTRICT_MATCH_MAX_KM = 10;
function nearestDistrict(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [key, c] of Object.entries(DISTRICT_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = key; }
  }
  if (!best || bestDist > DISTRICT_MATCH_MAX_KM) return { county: nearestCounty(lat, lng), district: null };
  const [county, district] = best.split("|");
  return { county, district };
}
// Google／Apple 地圖的導航目的地優先用實際地址（比只用醫院名稱搜尋更準，
// 尤其是分院/院區這種同名醫院有多個院區的情況），沒有登記地址時退回用

   7b) 氣象預報（中央氣象署 CWA 開放資料 API，直接從瀏覽器端呼叫；
   縣市層級 36 小時天氣預報，快取 30 分鐘，只在切換單位或首頁重新

// 進到天氣頁那一刻，weather/hazards/apparentTemp/weeklyForecast/rainfall
// 這 5 支 ensure*Loaded 會在同一個畫面重繪的同一個 tick 裡全部觸發，快取
// 都是空的時候等於同時對 opendata.cwa.gov.tw 開 5 條連線；實機上觀察到
// 排在後面的請求常常直接連線失敗（Safari 顯示「Load failed」，不是正常
// HTTP 錯誤回應），研判是撞到氣象署那邊對單一金鑰的併發連線限制。這裡用
// 一個共用的 Promise 佇列把所有打去 CWA 的請求排成一次一支，用等待時間
// 換穩定性。
let cwaRequestQueue = Promise.resolve();
function fetchCwa(url){
  const result = cwaRequestQueue.then(() => fetch(url));
  cwaRequestQueue = result.catch(() => {});
  return result;
}
const weatherCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let weatherLoadingCounty = null;
async function fetchWeather(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetchCwa(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const loc = json?.records?.location?.[0];
  if (!loc) throw new Error("查無天氣資料");
  const els = {};
  loc.weatherElement.forEach(e => { els[e.elementName] = e.time; });
  // 36 小時預報資料本身就有 3 個時段（今天白天/晚上、明天白天，依實際
  // 發布時間會往後移動），只取第一個時段當「現在」的話，後面兩個時段的
  // 資料等於白抓了。這裡把所有時段都留著，天氣頁除了大卡片顯示第一個
  // 時段，底下再補一個「未來預報」清單顯示其餘時段。
  const count = els.Wx?.length || 0;
  const periods = [];
  for (let i = 0; i < count; i++){
    periods.push({
      startTime: els.Wx?.[i]?.startTime || null,
      endTime: els.Wx?.[i]?.endTime || null,
      wx: els.Wx?.[i]?.parameter?.parameterName || "—",
      pop: els.PoP?.[i]?.parameter?.parameterName ?? null,
      minT: els.MinT?.[i]?.parameter?.parameterName ?? null,
      maxT: els.MaxT?.[i]?.parameter?.parameterName ?? null,
      ci: els.CI?.[i]?.parameter?.parameterName ?? null
    });
  }
  const first = periods[0] || {};
  return {
    county,
    wx: first.wx ?? "—",
    pop: first.pop ?? null,
    minT: first.minT ?? null,
    maxT: first.maxT ?? null,
    ci: first.ci ?? null,
    periods
  };
}
// 把時段的 startTime 轉成「今天白天／今天晚上／明天白天」這種好讀的標籤：
// 依日期差判斷今天/明天/後天，依小時判斷白天(06-18)或晚上。
function weatherPeriodLabel(startIso){
  if (!startIso) return "";
  const d = new Date(startIso);
  const now = new Date();
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayDiff = Math.round((dayStart - todayStart) / 86400000);
  const dayLabel = dayDiff <= 0 ? "今天" : dayDiff === 1 ? "明天" : dayDiff === 2 ? "後天" : `${d.getMonth()+1}/${d.getDate()}`;
  const hour = d.getHours();
  const isNight = hour >= 18 || hour < 6;
  return `${dayLabel}${isNight ? "晚上" : "白天"}`;
}
function fmtHHMM(iso){ return iso ? new Date(iso).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false}) : ""; }
function ensureWeatherLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = weatherCache[county];
  // 失敗結果也要存進快取（用比較短的有效期，2 分鐘），不然每次畫面重繪
  // 都會看到「沒有快取」又重新發一次請求，網路真的斷線/API 打不通時會
  // 變成無限重試迴圈——每次重試又會呼叫 safeRender() 整個重繪，使用者
  // 畫面上的捲動位置、正在做的操作都會一直被打斷。
  const freshFor = cached?.error ? 2*60*1000 : 30*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.weather = cached.data; return; }
  if (weatherLoadingCounty === county) return;
  weatherLoadingCounty = county;
  fetchWeather(county).then(data => {
    weatherCache[county] = { data, fetchedAt: Date.now() };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣資訊載入失敗", err);
    const data = { error: true, county, message: err.message || String(err) };
    weatherCache[county] = { data, fetchedAt: Date.now(), error: true };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  });
}
// 一週縣市天氣預報（F-C0032-005）：這組資料集實際查證過並不在氣象署

// 雨量站觀測（O-A0002-001）：這組資料集沒有縣市查詢參數，一次回傳全臺
// 所有雨量站，要靠每筆資料自帶的 parameter（CITY/TOWN）自己篩出目標縣市
// 範圍內的測站。同一個縣市裡通常有好幾個測站，這裡取「近 3 小時累積雨量」
// 最高的那一個當代表值——比隨便挑第一筆更保守，對執勤安全判斷更有意義
// （最糟情況才是該注意的情況）。負值（-99 之類）是氣象署慣用的缺測標記，
// 一律當成無效值處理。
const rainfallCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let rainfallLoadingCounty = null;
async function fetchRainfallStation(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${CWA_API_KEY}`;
  const res = await fetchCwa(url);
  if (!res.ok) {
    let detail = ""; try { detail = (await res.text()).slice(0,200); } catch(e){}
    throw new Error(`HTTP ${res.status}${detail ? `：${detail}` : ""}`);
  }
  const json = await res.json();
  const stations = json?.records?.location || [];
  const matches = stations.filter(s => (s.parameter || []).some(p => p.parameterName === "CITY" && p.parameterValue === county));
  if (!matches.length) return { county, stationName: null, hour3: null, hour24: null };
  const val = (s, name) => {
    const el = (s.weatherElement || []).find(e => e.elementName === name);
    const v = el ? Number(el.elementValue) : NaN;
    return Number.isFinite(v) && v >= 0 ? v : -1;
  };
  let best = matches[0];
  matches.forEach(s => { if (val(s, "HOUR_3") > val(best, "HOUR_3")) best = s; });
  const hour3 = val(best, "HOUR_3");
  const hour24 = val(best, "HOUR_24");
  return {
    county,
    stationName: best.locationName || null,
    hour3: hour3 >= 0 ? hour3 : null,
    hour24: hour24 >= 0 ? hour24 : null
  };
}
function ensureRainfallLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;

  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.rainfall = cached.error ? { county, error: true, message: cached.message } : { county, ...cached.data }; return; }
  if (rainfallLoadingCounty === county) return;
  rainfallLoadingCounty = county;
  fetchRainfallStation(county).then(data => {
    rainfallCache[county] = { data, fetchedAt: Date.now() };

  }).catch(err => {

    rainfallCache[county] = { fetchedAt: Date.now(), error: true, message };
    state.rainfall = { county, error: true, message };
    rainfallLoadingCounty = null;
    safeRender();
  });
}

function ensureHazardsLoaded(unit){

  // 避免網路不通時每次重繪都重新發請求，變成無限重試迴圈。
  const freshFor = cached?.error ? 2*60*1000 : 10*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.hazards = cached.error ? { county, error: true, message: cached.message } : { county, list: cached.data }; return; }
  if (hazardLoadingCounty === county) return;
  hazardLoadingCounty = county;
  fetchHazards(county).then(data => {
    hazardCache[county] = { data, fetchedAt: Date.now() };
    state.hazards = { county, list: data };
    hazardLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣特報載入失敗", err);
    const message = err.message || String(err);
    hazardCache[county] = { fetchedAt: Date.now(), error: true, message };
    state.hazards = { county, error: true, message };
    hazardLoadingCounty = null;
    safeRender();
  });
}

// 鄉鎮天氣預報（F-D0047-093）：這組資料集不接受用鄉鎮名稱查詢，實際
// 查證（透過氣象署 Swagger 文件的 Try it out 對照真實請求)確認要用
// locationId 帶「該縣市專屬的子資料集代碼」（例如臺中市是 F-D0047-075、
// 嘉義縣是 F-D0047-031，不是 093 本身），回應包裹格式也跟其他資料集不同：
// records.Locations[]（該縣市）→ Location[]（鄉鎮）→ WeatherElement[]
// （中文 ElementName，例如「平均相對濕度」）→ Time[]（12 小時一個區間，
// 不是瞬時值）→ ElementValue[0]（依欄位名稱各自命名的值，例如
// {RelativeHumidity:"76"}）。這組資料實際查證後才發現原來也有風速風向、
// 紫外線指數，先前用另一份舊資料判斷「沒有風速風向」是錯的。
//
// 參考資料（未來這組資料集又出問題時，從這裡重新查證，不要用舊 fixture
// 或搜尋結果猜 schema）：
// - Swagger 互動文件（可以直接用自己的授權碼 Try it out，執行後會顯示
//   實際送出的完整請求網址／curl，這是本次查出正確用法的關鍵）：
//   https://opendata.cwa.gov.tw/dist/opendata-swagger.html
// - 資料集介紹頁（有「JSON／XML 檔案下載」按鈕，可以直接看到目前實際
//   在用的縣市代碼、資料範例）：
//   https://opendata.cwa.gov.tw/dataset/forecast/F-D0047-093
// - 若某縣市不在 COUNTY_TOWNSHIP_DATASET_ID 對照表裡，要用上面兩個
//   管道其中一個查出該縣市對應的 F-D0047-0XX 代碼，不要用臆測的號碼。
const COUNTY_TOWNSHIP_DATASET_ID = { "臺中市": "F-D0047-075", "嘉義縣": "F-D0047-031" };
const apparentTempCache = {}; // { [鄉鎮名稱]: { data, fetchedAt } }
let apparentTempLoadingTownship = null;
// 取「現在」所在的 12 小時區間（找不到就退回第一筆），回傳該區間的
// ElementValue[0]（一個物件，key 是欄位名稱，例如 {RelativeHumidity:"76"}）。
function currentWindowValue(el){
  const times = el?.Time || [];
  if (!times.length) return null;
  const now = Date.now();
  const match = times.find(t => {
    const s = new Date(t.StartTime).getTime();
    const e = new Date(t.EndTime).getTime();
    return now >= s && now < e;
  });
  return (match || times[0])?.ElementValue?.[0] || null;
}
async function fetchApparentTemp(county, township){
  const datasetId = COUNTY_TOWNSHIP_DATASET_ID[county];
  if (!datasetId) throw new Error(`${county} 沒有對應的鄉鎮預報資料集代碼`);
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-093?Authorization=${CWA_API_KEY}&format=JSON&locationId=${datasetId}`;
  const res = await fetchCwa(url);
  if (!res.ok) {
    let detail = ""; try { detail = (await res.text()).slice(0,200); } catch(e){}
    throw new Error(`HTTP ${res.status}${detail ? `：${detail}` : ""}`);
  }
  const json = await res.json();
  const loc = (json?.records?.Locations?.[0]?.Location || []).find(l => l.LocationName === township);
  if (!loc) throw new Error("查無鄉鎮預報資料");
  const els = {};
  (loc.WeatherElement || []).forEach(e => { els[e.ElementName] = e; });
  const rh = currentWindowValue(els["平均相對濕度"])?.RelativeHumidity;
  const td = currentWindowValue(els["平均露點溫度"])?.DewPoint;
  const atMax = currentWindowValue(els["最高體感溫度"])?.MaxApparentTemperature;
  const windVal = currentWindowValue(els["風速"]);
  const windDirVal = currentWindowValue(els["風向"])?.WindDirection;
  const uvVal = currentWindowValue(els["紫外線指數"]);
  const toNum = v => (v != null && v !== "" ? Number(v) : null);
  return {
    township,
    at: toNum(atMax),
    rh: toNum(rh),
    td: toNum(td),
    windSpeed: toNum(windVal?.WindSpeed),
    beaufort: toNum(windVal?.BeaufortScale),
    windDir: windDirVal || null,
    uvIndex: toNum(uvVal?.UVIndex),
    uvLevel: uvVal?.UVExposureLevel || null
  };
}
function ensureApparentTempLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const cached = apparentTempCache[township];
  const freshFor = cached?.error ? 2*60*1000 : 30*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.apparentTemp = cached.error ? { township, error: true, message: cached.message } : { township, ...cached.data }; return; }
  if (apparentTempLoadingTownship === township) return;
  apparentTempLoadingTownship = township;
  fetchApparentTemp(county, township).then(data => {
    apparentTempCache[township] = { data, fetchedAt: Date.now() };
    state.apparentTemp = { township, ...data };
    apparentTempLoadingTownship = null;
    safeRender();
  }).catch(err => {
    console.error("體感溫度載入失敗", err);
    const message = err.message || String(err);
    apparentTempCache[township] = { fetchedAt: Date.now(), error: true, message };
    state.apparentTemp = { township, error: true, message };
    apparentTempLoadingTownship = null;
    safeRender();
  });
}

// Header「天氣危險係數」徽章：危險係數＝溫度＋（相對濕度×0.1），資料來源是
// Open-Meteo（跟其他天氣資訊用的中央氣象署開放資料是不同來源，需要經緯度
// 查詢，不用授權碼、也不會撞到 CWA 併發連線限制），每次 render() 都會檢查
// 一次快取（15 分鐘內不重抓，失敗的話 2 分鐘後才重試）。34.9 以下藍燈、
// 35～39.9 黃燈、40 以上紅燈——見 weatherRiskLevel。
function weatherRiskLevel(risk){
  if (risk >= 40) return "red";
  if (risk >= 35) return "yellow";
  return "blue";
}
// WMO 天氣代碼（Open-Meteo current.weather_code）換算成天氣表情符號，只用
// 這 10 個固定符號（不編其他的）：晴朗程度細分成 4 級（0～3），霧沒有對應
// 符號就退回單純的雲；降雨/降雪/雷雨依強度分級，符號本身就有「越往下越
// 嚴重」的視覺意涵，不用另外查表對照文字。
// 參考：https://open-meteo.com/en/docs#weathervariables （WMO Weather
// interpretation codes）。
function weatherEmoji(code){
  if (code === 0) return "☀️";
  if (code === 1) return "🌤️";
  if (code === 2) return "⛅";
  if (code === 3) return "🌥️";
  if (code === 45 || code === 48) return "☁️";
  if ([51,53,55,56,57,61,80].includes(code)) return "🌦️";
  if ([63,65,66,67,81,82].includes(code)) return "🌧️";
  if ([71,73,75,77,85,86].includes(code)) return "🌨️";
  if (code === 95) return "⛈️";
  if (code === 96 || code === 99) return "🌩️";
  return "⛅";
}
async function fetchWeatherRisk(township){
  const loc = TOWNSHIP_LATLNG[township];
  if (!loc) throw new Error(`${township} 沒有對應座標`);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia%2FTaipei`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const temp = json?.current?.temperature_2m;
  const rh = json?.current?.relative_humidity_2m;
  const code = json?.current?.weather_code;
  if (temp == null || rh == null) throw new Error("查無天氣資料");
  const risk = Math.round((temp + rh * 0.1) * 10) / 10;
  return { temp, rh, risk, level: weatherRiskLevel(risk), emoji: weatherEmoji(code) };
}
const weatherRiskCache = {}; // { [鄉鎮名稱]: { data, fetchedAt, error } }
let weatherRiskLoadingTownship = null;
function ensureWeatherRiskLoaded(unit){
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const cached = weatherRiskCache[township];
  const freshFor = cached?.error ? 2*60*1000 : 15*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) {
    if (!cached.error) state.weatherRisk = { township, ...cached.data };
    return;
  }
  if (weatherRiskLoadingTownship === township) return;
  weatherRiskLoadingTownship = township;
  fetchWeatherRisk(township).then(data => {
    weatherRiskCache[township] = { data, fetchedAt: Date.now() };
    state.weatherRisk = { township, ...data };
    weatherRiskLoadingTownship = null;
    safeRender();
  }).catch(err => {
    // 失敗就靜默保留上一次成功的數字（如果有），不清空 state.weatherRisk，
    // 避免 Open-Meteo 偶爾逾時/限流就讓已經顯示好的徽章憑空消失。
    console.error("天氣危險係數載入失敗", err);
    weatherRiskCache[township] = { fetchedAt: Date.now(), error: true };
    weatherRiskLoadingTownship = null;
  });
}

function timeAgo(ms){
  if (!ms) return "—";
  const diff = Math.max(0, Date.now() - ms);
  const m = Math.floor(diff/60000);
  if (m < 1) return "剛剛";
  if (m < 60) return `${m} 分鐘前`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} 小時前`;
  return `${Math.floor(h/24)} 天前`;
}
function fmtTime(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
}
function fmtDate(d){
  return d.toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
// 效期只需要精確到日期（不用像 fmtTime 一樣顯示到分鐘），公告卡片用。
function fmtDateShort(ms){
  if (!ms) return "";
  return new Date(ms).toLocaleDateString("zh-TW", { month:"2-digit", day:"2-digit" });
}
// 回報表單的時間欄位只顯示「時:分」不顯示日期（勤務都是當天的），
// 送出時再跟今天的日期組合成完整時間。
function hhmmValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
// 把「HH:mm」字串跟今天的日期組合成完整的本地時間 Date。
function todayAt(hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
// 編輯既有回報時，時間欄位一樣只顯示「時:分」，但要沿用該筆回報「原本
// 的日期」（可能不是今天），不能用 todayAt()，否則修正時間會被誤改到
// 今天的日期。
function dateAt(baseMs, hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date(baseMs);
  d.setHours(h, m, 0, 0);
  return d;
}
// 全站統一的提示框模板：同一時間只顯示一則，後面來的先排隊，等前一則
// 完整顯示完（含淡出動畫）才輪到下一則——避免像「已回報：抵達營區」緊接著
// 「待命勤務已建立…」這種前後腳觸發的情境，後面那則把前面那則直接蓋掉、
// 兩則都沒看清楚。
const toastQueue = [];
let toastBusy = false;
function showToast(msg){
  toastQueue.push(msg);
  if (!toastBusy) advanceToastQueue();
}
function advanceToastQueue(){
  if (!toastQueue.length){ toastBusy = false; return; }
  toastBusy = true;
  const msg = toastQueue.shift();
  let t = document.getElementById("toast");
  if (!t){
    t = document.createElement("div"); t.id="toast"; t.className="toast";
    t.innerHTML = `<span class="toast-icon"></span><span class="toast-text"></span><span class="toast-progress"></span>`;
    document.body.appendChild(t);
  }
  // 訊息本身沒有攜帶「成功/失敗」的類型資訊，站內失敗訊息全部沿用「OO
  // 失敗：原因」這個固定寫法，用這個特徵判斷要顯示哪種圖示/顏色就好，不用
  // 每個呼叫端都額外傳一個 type 參數。
  const isError = /失敗/.test(msg);
  const iconEl = t.querySelector(".toast-icon");
  iconEl.innerHTML = icon(isError ? "alert" : "check", 18);
  iconEl.className = "toast-icon " + (isError ? "error" : "ok");
  t.querySelector(".toast-text").textContent = msg;
  // 訊息越長給越多閱讀時間（例如推播內容常常一次帶標題＋內文，比原本單純
  // 的操作結果提示長很多）：基本停留 2.6 秒，每個字再加 90 毫秒，上限 6 秒
  // 避免太長的訊息把畫面擋太久。也可以直接點一下提前關閉。
  const duration = Math.min(6000, Math.max(2600, 2600 + msg.length * 90));
  const bar = t.querySelector(".toast-progress");
  bar.style.transition = "none"; bar.style.width = "100%";
  void bar.offsetWidth; // 強制 reflow，下面改 transition 才會真的觸發動畫
  bar.style.transition = `width ${duration}ms linear`;
  bar.style.width = "0%";
  t.classList.add("show");
  clearTimeout(showToast._tm);
  const dismiss = () => { t.classList.remove("show"); setTimeout(advanceToastQueue, 260); };
  showToast._tm = setTimeout(dismiss, duration);
  t.onclick = () => { clearTimeout(showToast._tm); dismiss(); };
}

  setTimeout(() => {

function icon(name, size){

  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;">${ICON_PATHS[name]||''}</svg>`;
}
// 全站共用的返回鍵：純圖示的液態玻璃圓圈＋chevron SVG（不接文字、右邊不接
// 標題），不管目的地是哪裡都一樣，不要再依頁面各自寫「返回列表」「返回
// 更多」等。onclick 屬性務必用單引號包起來，因為裡面的 JSON.stringify(route)
// 輸出是雙引號字串，跟雙引號屬性會互相截斷（曾造成整個返回鍵完全沒反應的
// bug）。chevron 用行內 SVG（stroke-width 2.5，比全站圖標系統的 1.8 粗一點，
// 圓圈變大之後細線條比例上會顯得太細）而不是共用的 icon() helper。
function backBtn(route){
  return `<button class="back-btn" onclick='window.__nav(${JSON.stringify(route)})'><span class="back-btn-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span></button>`;
}
// 多選（checkbox）/單選（radio）標籤群組，用於過去病史／過敏史／處置項目／意識狀態。
// triggers（選填）：[{ values:[...], wrapId }]，勾選到指定選項時，只切換對應
// detail 輸入框容器的顯示/隱藏（呼叫 window.__syncDetailVisibility），不觸發
// 整頁 render()，避免使用者已經填到一半的其他欄位被清空重繪掉。
function chipGroup(name, options, selected, multi, triggers, extraClass){
  const type = multi ? "checkbox" : "radio";
  const sel = multi ? (selected||[]) : null;
  return `<div class="chip-select${extraClass?` ${extraClass}`:''}">${options.map(o => {
    const trig = triggers && triggers.find(tr => tr.values.includes(o));
    const onchange = trig ? ` onchange='window.__syncDetailVisibility("${trig.wrapId}","${name}",${JSON.stringify(trig.values)})'` : "";
    return `
    <label class="chip-option">
      <input type="${type}" name="${name}" value="${esc(o)}" ${multi ? (sel.includes(o)?'checked':'') : (selected===o?'checked':'')}${onchange}>
      <span>${esc(o)}</span>
    </label>`;
  }).join("")}</div>`;
}
// 主訴等自由輸入框旁邊的快捷選字下拉選單：選一個選項就把常見用語塞進
// 輸入框（用「、」分隔多個詞，跟站內其他「可多個」的文字欄位同一套分隔
// 慣例），選完選單重置回「快速選擇」，可以重複打開再選下一個詞做複選；
// 純 DOM 操作輸入框內容，不觸發整頁 render()，理由跟車長/駕駛選擇器
// 一樣：避免把其他還在填寫中、未受控的欄位一起清空。
function quickFillSelect(inputId, options){
  return `<select class="quick-fill-select" onchange='window.__applyQuickFillSelect("${inputId}", this)'>
    <option value="">快速選擇</option>
    ${options.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join("")}
  </select>`;
}
// 任務名稱快速選擇：見 state.taskTitleTemplates 說明，跟 quickFillSelect()
// 不同的地方是選了之後不是附加文字，是整個蓋掉輸入框內容並把「OO」反白選取。
function taskTitleTemplateSelect(inputId, templates){
  return `<select class="quick-fill-select" onchange='window.__applyTaskTitleTemplate("${inputId}", this)'>
    <option value="">快速選擇範本</option>
    ${templates.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join("")}
  </select>`;
}

   10) 共用：狀態徽章 / 卡片
   ========================================================= */
function statusBadge(statusKey){
  const cls = { pending:"pending", dispatch:"dispatch", onscene:"onscene", transit:"transit", returning:"returning", completed:"completed" }[statusKey];
  return `<span class="badge ${cls}"><i class="dot"></i>${STATUS_LABEL[statusKey]}</span>`;
}
function taskCardClass(statusKey){
  return { pending:"s-pending", dispatch:"s-dispatch", onscene:"s-onscene", transit:"s-transit", returning:"s-returning", completed:"s-completed" }[statusKey];
}
// 依姓名＋單位查該人員的電話（人員資料由帳號同步或基礎資料管理手動維護）。
// 舊資料（單位欄位、下拉選單上線前）可能沒有 unit，姓名也常跟階級直接連寫成
// 一串，例如「林伯霖上士」，對不上人員名冊裡單純的姓名「林伯霖」。這裡先在
// 同單位內精準比對、再開頭比對；都找不到的話（通常是舊資料缺 unit）才放寬
// 成全部單位一起找，讓舊任務也能顯示電話。
function findPersonnelByName(pool, name){
  return pool.find(x => x.name === name) || pool.find(x => x.name && name.startsWith(x.name));
}
function findPersonnel(name, unit){
  if (!name) return null;
  const scoped = unit ? state.personnel.filter(x => x.unit === unit) : state.personnel;
  return findPersonnelByName(scoped, name) || (unit ? findPersonnelByName(state.personnel, name) : null);
}
// 姓名 + 階級（若姓名本身沒有帶階級，如新版下拉選單只存姓名，才補上人員名冊的階級）。
// 凡是畫面上會出現人名的地方都套用，讓階級一律跟著姓名顯示。階級用縮小的
// 灰階字（.muted-suffix）弱化，不跟姓名搶視覺焦點，姓名才是主要資訊。
function nameWithRank(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const rank = (match && match.title && !name.includes(match.title)) ? match.title : '';
  return esc(name) + (rank ? ` <span class="muted-suffix">${esc(rank)}</span>` : '');
}
// 編輯勤務頁面「車長／駕駛」欄位目前已指派人選的顯示文字：姓名＋階級，
// 用空格分隔（例如「林伯霖 上士」），不加點號、不顯示單位。
function crewDisplayLabel(name, taskUnit){
  const match = findPersonnel(name, taskUnit);
  if (!match) return name;
  return `${match.name}${match.title ? ' ' + match.title : ''}`;
}
// 值班醫官姓名＋階級，格式跟車長／駕駛一致：空格分隔、不加括號；階級一樣
// 用 .muted-suffix 縮小弱化。呼叫端不用再另外包 esc()，這裡已經處理過escaping。
function doctorLabel(name){
  if (!name) return "";
  const match = state.doctors.find(d => d.name === name);
  return match && match.title ? `${esc(name)} <span class="muted-suffix">${esc(match.title)}</span>` : esc(name);
}
// 跟 personCardLine 同樣的「主要姓名/次要電話」兩段式呈現，給值班醫官這種
// 要把姓名階級跟聯絡方式分兩行顯示的版面用（例如急診待命卡片）。
function doctorCardLine(name){
  if (!name) return { main: '', sub: '' };
  const match = state.doctors.find(d => d.name === name);
  const phone = (match && match.phone) || "";
  return {
    main: doctorLabel(name),
    sub: phone ? `<a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''
  };
}
// 車號＋所屬單位（例如「軍H-20618（第一連）」），單位用 .muted-suffix
// 縮小弱化，不跟車號搶視覺焦點。plate 為空時顯示「—」、不附單位。
function vehicleLabelHtml(plate){
  const unit = plate ? vehicleUnitLabel(plate) : '';
  return esc(plate || '—') + (unit ? ` <span class="muted-suffix">（${esc(unit)}）</span>` : '');
}
// 姓名 + 階級 + EMT 證照等級 + 電話（可點擊撥打），給車長/駕駛這種需要
// 聯絡方式、且要讓調度端知道現場救護量能的欄位用。
// iOS Safari 對 tel: 連結一律會跳出「已阻擋此網站自動開始通話」的系統提示，不管
// 連結上有沒有掛 JS、也不管有沒有先跳自訂確認視窗，這是瀏覽器層級的行為，網頁端
// 無法繞過，加一層自訂確認視窗只是多一次點擊而已，所以還是用最單純的寫法。
function crewLabel(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  return `${nameWithRank(name, unit)}${emtLevel ? ` ${emtBadgeHtml(emtLevel)}` : ''}${phone ? ` <a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''}`;
}
// 跟 crewLabel 同樣的資料來源，但拆成「姓名＋階級」「EMT等級＋電話」兩段，
// 給急診待命卡片這種要把姓名階級跟聯絡方式分兩行顯示的版面用。
function personCardLine(name, unit){
  if (!name) return { main: esc('—'), sub: '' };
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  const subParts = [];
  if (emtLevel) subParts.push(emtBadgeHtml(emtLevel));
  if (phone) subParts.push(`<a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>`);
  return { main: nameWithRank(name, unit), sub: subParts.join(' ') };
}
// 目前位置：最新一筆有帶地點的事件（離開現場記錄的前往地點、抵達現場記錄
// 的抵達地點）就是目前最新的已知位置；還沒有任何地點回報時，退回任務本身
// 建立時填的地點欄位。
function currentLocationOf(t){
  const evs = taskEvents(t.id);
  for (let i = evs.length - 1; i >= 0; i--) {
    if (evs[i].location) return evs[i].location;
    // 待命勤務的「地點」欄位固定填的是醫務所本身（待命的地方，不是真正要
    // 去的地方），出勤當下沒有另外的前往地點欄位，改用回報出勤時選的送醫
    // 醫院當作目前正在前往的地方，才不會顯示成「前往（自己所在的）醫務所」

    if (t.erStandbyKey && evs[i].hospital) return evs[i].hospital;

}
function taskCard(t){

  const activeVitalsForCard = activeEpisodeVitals(state.vitals.filter(v => v.taskId === t.id).sort(eventOrderCompare));
  const hasPatient = activeVitalsForCard.length > 0;
  const noTransportMarked = activeVitalsForCard[activeVitalsForCard.length-1]?.disposition === "不送醫";
  return `

        ${hasPatient ? `<span class="patient-badge">${icon('alert',13)} 有患者</span>` : ""}
        ${statusBadge(s)}

    </div>
    <div class="task-meta">${isLiaison ? '洽公' : `${vehicleLabelHtml(t.vehicle)} · ${taskScope(t)}`} · ${esc(t.location||'—')}</div>
    <div class="task-crew">
      ${locationLine ? `<span>目前位置：${locationLine}</span>` : ""}
      ${isLiaison
        ? `<span>人員：${personnelLine}</span>`
        : `<span>車長：${crewLabel(t.crewLeader, t.unit)}</span><span>駕駛：${crewLabel(t.driver, t.unit)}</span>`}
      ${!isLiaison && Array.isArray(t.militaryItems) && t.militaryItems.length ? `<span>攜行軍品：${t.militaryItems.map(x => `${esc(x.name)}x${x.qty}`).join('、')}</span>` : ""}

// 觀測數據便當盒：體感溫度／相對濕度／露點／風速風向／紫外線指數／
// 近 3 小時雨量，每項獨立一格，資訊密度比塞進天氣卡片的一排 pill 高，
// 掃過去比較容易一眼抓到重點數值。雨量固定顯示（0mm 也顯示，方便一眼
// 確認「現在沒下雨」而不是「這格資料還沒載出來」），其餘項目沒有值
// 時才不佔格。
// 每項數值超過門檻時變色警示（amber=留意、red=危險），門檻參考：
// 體感溫度 33/36°C 是氣象署對高溫的分級用詞（36 以上會發布高溫資訊，
// 是危險級）；露點溫度 24/27°C 是氣象上普遍用來描述「悶熱／極不舒適」
// 的分界；風速用蒲福風級 6/8 級（強風/大風，已經是有實際危害的等級）；
// 紫外線直接沿用氣象署自己回傳的 uvLevel 分級文字（過量級/危險級）；
// 雨量用 15mm／40mm 對應「大雨」等級近 3 小時累積的粗略換算。這些都是
// 既有的氣象/職業安全分級標準，不是憑感覺編的數字。
function weatherStatAccent(key, val){
  if (val == null) return null;
  if (key === "at") return val >= 36 ? "red" : val >= 33 ? "amber" : null;
  if (key === "td") return val >= 27 ? "red" : val >= 24 ? "amber" : null;
  if (key === "windSpeed") return null; // 風速用蒲福風級判斷，見下面呼叫端
  if (key === "beaufort") return val >= 8 ? "red" : val >= 6 ? "amber" : null;
  if (key === "uvLevel") return /危險|危险/.test(val) ? "red" : /過量|过量/.test(val) ? "amber" : null;
  if (key === "rainHour3") return val >= 40 ? "red" : val >= 15 ? "amber" : null;
  return null;
}
function renderWeatherStatsGrid(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;

  const at = state.apparentTemp;
  const townshipOk = at && at.township === township && !at.error;
  const atError = at && at.township === township && at.error;
  const rain = state.rainfall;
  const rainOk = rain && rain.county === county && !rain.error;
  const rainError = rain && rain.county === county && rain.error;
  const items = [];
  if (townshipOk && at.at != null) items.push({ lbl:"體感溫度", val:`${at.at}°C`, accent: weatherStatAccent("at", at.at) });
  if (townshipOk && at.rh != null) items.push({ lbl:"相對濕度", val:`${at.rh}%` });
  if (townshipOk && at.td != null) items.push({ lbl:"露點溫度", val:`${at.td}°C`, accent: weatherStatAccent("td", at.td) });
  if (townshipOk && at.windSpeed != null) items.push({ lbl:"風速", val:`${at.windDir ? esc(at.windDir)+' ' : ''}${at.windSpeed}m/s`, accent: weatherStatAccent("beaufort", at.beaufort) });
  if (townshipOk && at.uvIndex != null) items.push({ lbl:"紫外線指數", val:`${at.uvIndex}${at.uvLevel ? '／'+esc(at.uvLevel) : ''}`, accent: weatherStatAccent("uvLevel", at.uvLevel || "") });
  // 沒偵測到雨（測站缺測或附近測站沒下雨）一律當 0mm 顯示，不要整格
  // 消失——雨量小卡要一直在，才能一眼確認「現在真的沒下雨」跟「還沒
  // 載入完成」的差別（後者是 gridHtml 整段還沒出現，不是這格不見）。
  if (rainOk) { const hour3 = rain.hour3 != null ? rain.hour3 : 0; items.push({ lbl:"近3小時雨量", val:`${hour3}mm`, accent: weatherStatAccent("rainHour3", hour3) }); }
  const gridHtml = items.length ? `
    <div class="weather-stats-grid">
      ${items.map(i => `<div class="weather-stat-tile${i.accent?' accent-'+i.accent:''}"><span class="lbl">${esc(i.lbl)}</span><span class="val">${i.val}</span></div>`).join("")}
    </div>` : "";
  const atErrorHtml = atError ? `<div class="weather-tip">${icon('bell',16)}<div>體感/濕度/露點/風速/紫外線載入失敗${at.message ? '：'+esc(at.message) : ''}</div></div>` : "";
  const rainErrorHtml = rainError ? `<div class="weather-tip">${icon('bell',16)}<div>雨量資料載入失敗${rain.message ? '：'+esc(rain.message) : ''}</div></div>` : "";
  return gridHtml + atErrorHtml + rainErrorHtml;
}

// 用兩三句話把今天天氣＋該注意的事項講清楚：第一句是概況（地點/天氣/溫度/
// 降雨機率），第二句依數值門檻（高溫、高降雨機率、日夜溫差大）挑出對應的
// 提醒，若當下有生效中的天氣特報也一併提醒，沒有特別狀況則給一句安全提醒。
// 貼心提醒文字：純本地規則判斷（氣溫/降雨機率/日夜溫差/體感/特報門檻），
// 不靠任何外部 API，永遠算得出來、不會有載入中或失敗的狀態。原本是天氣卡
// 下面獨立一塊，取消 Core-AI Insight 後搬進同一張卡片、同一個版位。
function weatherTipText(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const w = state.weather;
  if (!w || w.error || w.county !== county) return "";
  let overview = `今日${esc(county)}${esc(w.wx)}`;
  if (w.minT!=null && w.maxT!=null) overview += `，氣溫約 ${w.minT}°–${w.maxT}°C`;
  if (w.pop!=null) overview += `，降雨機率 ${w.pop}%`;
  overview += "。";

  const tips = [];
  if (w.maxT!=null && w.maxT >= 33) tips.push("高溫炎熱，執勤請注意補水防曬、慎防中暑");
  if (w.pop!=null && w.pop >= 50) tips.push("降雨機率高，請攜帶雨具並留意行車安全");
  if (w.minT!=null && w.maxT!=null && (w.maxT - w.minT) >= 8) tips.push("日夜溫差大，請留意保暖");
  if (w.ci && /悶熱|寒冷|偏冷|嚴寒/.test(w.ci)) tips.push(`體感「${esc(w.ci)}」，請留意人員身體狀況`);
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const at = state.apparentTemp;
  if (at && at.township === township && !at.error && at.at != null && w.maxT != null && (at.at - w.maxT) >= 3) {
    tips.push(`體感溫度比預報氣溫高出約 ${Math.round(at.at - w.maxT)}°C，戶外執勤請提高警覺`);
  }
  const h = state.hazards;
  if (h && h.county === county && !h.error && h.list && h.list.length) {
    tips.push(`${esc(county)}目前有${esc(h.list[0].phenomena)}生效中，請提高警覺`);
  }
  if (!tips.length) tips.push("天氣穩定，依標準程序執行今日勤務即可");

  return `${overview}${tips.join("；")}。`;
}
// 依特報的現象名稱（強風/大雨/低溫/高溫...）挑對應的行動提醒，都是既有
// 標準作業程序的通用叮嚀，不是氣象署資料本身的欄位——只用來提醒「這種
// 特報常見要注意什麼」，不夾帶任何編造的數值（例如具體陣風風速）。
function hazardTips(phenomena){
  const tips = [];
  if (/強風/.test(phenomena)) tips.push("高車身行駛留意側風", "隨車器材確認固定");
  if (/大雨|豪雨|暴雨/.test(phenomena)) tips.push("留意積水路段，避免涉水", "雨天煞車距離加長，保持車距");
  if (/低溫|寒流/.test(phenomena)) tips.push("留意人員保暖，慎防路面濕滑", "留意年長患者保暖狀況");
  if (/高溫|熱浪/.test(phenomena)) tips.push("留意人員補水，慎防中暑", "車輛長時間曝曬留意電瓶負荷");
  if (!tips.length) tips.push("依標準程序留意天氣變化", "隨時關注最新特報資訊");
  return tips.slice(0,4);
}
function renderHazardBanner(unit){

// 颱風警報（W-C0034-001，颱風警報單）：跟 W-C0033-001 天氣特報是兩份獨立
// 資料集，全國一份（沒有颱風生效時 records.info 是空陣列，不用帶縣市查詢
// 參數）。description.section[] 是氣象署預先寫好的完整中文段落（命名與
// 位置／強度與半徑／移速與預測／颱風動態／警戒區域及事項／強風特報／
// 注意事項），直接照原文顯示，不要自己從結構化欄位重組句子（避免解讀
// 錯誤）。description["typhoon-info"][0].section[] 底下才有結構化的
// analysis（目前）／prediction（未來 24 小時預測）座標、氣壓、風速數值，
// 只用來附加顯示，不取代原文段落。
// 參考資料（實際查證方式同 F-D0047-093：透過使用者自己的授權碼在 Swagger
// 頁面 Try it out，對照真實回應才確定的 schema，不要用臆測或搜尋結果猜）：
// https://opendata.cwa.gov.tw/dist/opendata-swagger.html
const typhoonCache = { data: null, fetchedAt: 0, error: false, message: "" };
let typhoonLoading = false;
// "緯度,經度" 字串轉成 {lat,lon}，解析失敗（缺欄位/格式跑掉）回傳 null，
// 呼叫端要記得判斷 null，不要假設一定解得出來。
function parsePosition(str){
  if (!str) return null;
  const [lat, lon] = String(str).split(",").map(Number);
  return (Number.isFinite(lat) && Number.isFinite(lon)) ? { lat, lon } : null;
}
// analysis（目前）／prediction（預測 24 小時後）共用同一種欄位結構，抽成
// 共用轉換函式，數值一律轉成 Number，缺值時是 null 不是 0（0 是有意義的
// 觀測值，不能拿來當「沒有資料」的預設值）。
function parseTyphoonPoint(p){
  if (!p) return null;
  return {
    time: p.time || null,
    position: parsePosition(p.position),
    pressure: p.pressure?.value != null ? Number(p.pressure.value) : null,
    maxWinds: p.max_winds?.value != null ? Number(p.max_winds.value) : null,
    gust: p.gust?.value != null ? Number(p.gust.value) : null,
    radius15mps: p.radius_of_15mps?.value != null ? Number(p.radius_of_15mps.value) : null
  };
}
async function fetchTyphoonInfo(){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-001?Authorization=${CWA_API_KEY}&format=JSON`;
  const res = await fetchCwa(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const infos = json?.records?.info || [];
  return infos.map(info => {
    const severityLevel = (info.parameter || []).find(p => p.valueName === "severity_level")?.value || info.headline || "";
    const sections = (info.description?.section || []).map(s => ({ title: s.title || "", value: s.value || "" }));
    const detailRow = (info.description?.["typhoon-info"]?.[0]?.section || []).find(s => s.analysis);
    return {
      headline: info.headline || "",
      severityLevel,
      expires: info.expires || null,
      typhoonName: detailRow ? `${detailRow.cwa_typhoon_name || ""}${detailRow.typhoon_name ? `（${detailRow.typhoon_name}）` : ""}` : "",
      scale: detailRow?.analysis?.scale?.find(s => s.lang === "zh-TW")?.value || null,
      analysis: parseTyphoonPoint(detailRow?.analysis),
      prediction: parseTyphoonPoint(detailRow?.prediction),
      sections
    };
  });
}
function ensureTyphoonLoaded(){
  const freshFor = typhoonCache.error ? 2*60*1000 : 15*60*1000;
  if (typhoonCache.fetchedAt && Date.now() - typhoonCache.fetchedAt < freshFor) {
    state.typhoon = typhoonCache.error ? { error: true, message: typhoonCache.message } : { list: typhoonCache.data };
    return;
  }
  if (typhoonLoading) return;
  typhoonLoading = true;
  fetchTyphoonInfo().then(data => {
    typhoonCache.data = data; typhoonCache.fetchedAt = Date.now(); typhoonCache.error = false;
    state.typhoon = { list: data };
    typhoonLoading = false;
    safeRender();
  }).catch(err => {
    console.error("颱風警報載入失敗", err);
    const message = err.message || String(err);
    typhoonCache.fetchedAt = Date.now(); typhoonCache.error = true; typhoonCache.message = message;
    state.typhoon = { error: true, message };
    typhoonLoading = false;
    safeRender();
  });
}
// 目前→預測數值對照小卡：跟 renderWeatherStatsGrid 同一套「標籤左、數值
// 右」排列，值用「現在→預測」呈現，一眼看出增強還是減弱，不用兩排卡片
// 各自重複標籤。缺值（該筆分析/預測本身沒有這個欄位）就整格跳過不顯示。
function typhoonStatTiles(x){
  const a = x.analysis, p = x.prediction;
  const pair = (av, pv) => (av != null && pv != null) ? `${av} → ${pv}` : (av != null ? `${av}` : (pv != null ? `→ ${pv}` : null));
  const items = [
    { lbl:"中心氣壓", val: pair(a?.pressure, p?.pressure), unit:"hPa" },
    { lbl:"近中心最大風速", val: pair(a?.maxWinds, p?.maxWinds), unit:"m/s" },
    { lbl:"最大陣風", val: pair(a?.gust, p?.gust), unit:"m/s" },
    { lbl:"七級風暴風半徑", val: pair(a?.radius15mps, p?.radius15mps), unit:"km" }
  ].filter(i => i.val != null);
  if (!items.length) return "";
  return `
    <div class="typhoon-stats">
      ${items.map(i => `<div class="typhoon-stat-tile"><span class="lbl">${esc(i.lbl)}</span><span class="val">${esc(i.val)} ${esc(i.unit)}</span></div>`).join("")}
    </div>`;
}
// 方位角轉 16 方位中文名稱（跟氣象署警報原文「東南東方」用同一套命名），
// 0 度＝正北，順時針遞增。
const COMPASS_16 = ["北","北北東","東北","東北東","東","東南東","東南","南南東","南","南南西","西南","西南西","西","西北西","西北","北北西"];
function bearingDeg(lat1, lon1, lat2, lon2){
  const toRad = d => d * Math.PI / 180;
  const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function compass16(deg){ return COMPASS_16[Math.round(deg / 22.5) % 16]; }
// 相對位置示意圖：以單位所在縣市代表點（COUNTY_CENTERS，跟醫院最近距離
// 用的是同一份座標）為原點，把颱風目前／預測位置換算成概略平面座標畫成
// 小圖——經緯度差先用 cos(緯度) 修正經度方向的比例失真，再取兩點中最大
// 的位移量自動抓一個統一縮放比例塞進畫面（保留相對方位與比例關係，不是
// 照實際公里數畫的精確地圖，只是示意）。實際距離／方位另外用 haversineKm
//／bearingDeg 算真實數字文字顯示，示意圖只是輔助視覺，不是唯一資料來源。
function typhoonTrackBlock(unit, x){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const center = COUNTY_CENTERS[county];
  const cur = x.analysis?.position;
  if (!center || !cur) return "";
  const pred = x.prediction?.position || null;
  const toXY = (p) => ({
    dx: (p.lon - center.lng) * Math.cos(center.lat * Math.PI / 180),
    dy: p.lat - center.lat
  });
  const curXY = toXY(cur);
  const predXY = pred ? toXY(pred) : null;
  const pts = [curXY, predXY].filter(Boolean);
  const maxDx = Math.max(0.4, ...pts.map(p => Math.abs(p.dx)));
  const maxDy = Math.max(0.4, ...pts.map(p => Math.abs(p.dy)));
  const W = 260, H = 170, padX = 46, padY = 40;
  const scale = Math.min((W/2 - padX) / maxDx, (H/2 - padY) / maxDy);
  const project = (p) => ({ x: W/2 + p.dx * scale, y: H/2 - p.dy * scale });
  const curPt = project(curXY);
  const predPt = predXY ? project(predXY) : null;
  const curDist = Math.round(haversineKm(center.lat, center.lng, cur.lat, cur.lon));
  const curDir = compass16(bearingDeg(center.lat, center.lng, cur.lat, cur.lon));
  let predLine = "";
  if (pred) {
    const predDist = Math.round(haversineKm(center.lat, center.lng, pred.lat, pred.lon));
    const predDir = compass16(bearingDeg(center.lat, center.lng, pred.lat, pred.lon));
    predLine = `<div class="typhoon-track-caption">預測24小時後：距${esc(county)}約 ${predDist} 公里，方位 ${esc(predDir)}</div>`;
  }
  return `
    <div class="typhoon-track">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="150" preserveAspectRatio="xMidYMid meet">
        ${predPt ? `<line x1="${curPt.x.toFixed(1)}" y1="${curPt.y.toFixed(1)}" x2="${predPt.x.toFixed(1)}" y2="${predPt.y.toFixed(1)}" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>` : ""}
        <circle cx="${(W/2).toFixed(1)}" cy="${(H/2).toFixed(1)}" r="4" style="fill:var(--muted)"/>
        <text x="${(W/2).toFixed(1)}" y="${(H/2 - 10).toFixed(1)}" text-anchor="middle" font-size="11" style="fill:var(--muted)">${esc(county)}</text>
        <circle cx="${curPt.x.toFixed(1)}" cy="${curPt.y.toFixed(1)}" r="6" fill="currentColor"/>
        <text x="${curPt.x.toFixed(1)}" y="${(curPt.y - 11).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="currentColor">現在</text>
        ${predPt ? `
          <circle cx="${predPt.x.toFixed(1)}" cy="${predPt.y.toFixed(1)}" r="5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2,2"/>
          <text x="${predPt.x.toFixed(1)}" y="${(predPt.y - 10).toFixed(1)}" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.85">24小時後</text>
        ` : ""}
      </svg>
      <div class="typhoon-track-caption">現在：距${esc(county)}約 ${curDist} 公里，方位 ${esc(curDir)}</div>
      ${predLine}
      <div class="typhoon-track-note">＊示意圖，非精確比例尺</div>
    </div>`;
}
// 沒有颱風生效中（最常見的情況）或載入中／失敗時安靜略過，理由同
// renderHazardBanner——不用另外顯示失敗提示，避免平常沒颱風時畫面上

// 勤務／洽公清單標題的雙語 eyebrow（英文縮寫／中文），首頁跟任務頁的
// 「勤務」頁籤共用同一份清單樣式，這裡集中產生，兩處才不會各自維護
// 一份看起來一樣、卻各自硬寫死的標籤文字。
const DUTY_SECTION_LABEL_EN = { "勤務": "SERVICE", "洽公": "LIAISON" };
function dutySectionLabel(zh){
  const en = DUTY_SECTION_LABEL_EN[zh];

function viewHome(){
  const p = state.profile;
  const tasks = visibleTasks(p, state.tasks);
  const today = new Date();
  const todayTasks = tasks.filter(t => isSameDay(new Date(t.createdAt||0).getTime(), today));
  const todayDone = todayTasks.filter(t => deriveStatus(t.id) === "completed");

  // 車輛動態＝目前所有進行中的勤務（一輛車理論上同時只會有一個進行中任務，
  // 但測試資料常會讓同一車號被多筆任務共用，所以直接以「任務」為單位列出，
  // 不要用「車輛」去找對應任務，否則同一車號的第二筆任務會被吃掉不顯示）。
  // 一般勤務跟原本行為一致，只看得到自己單位的任務（別單位的一般勤務
  // 完全不顯示，不是外部卡片）——只有急診待命的跨單位待命勤務才會顯示
  // 唯讀外部卡片，見 viewErStandby 的說明。
  // 「進行中」統計直接沿用這份清單的數量，確保上面數字跟下面實際列出的
  // 卡片一定對得上；不能只算「今天建立」的任務，否則跨日還在進行中的
  // 勤務（例如昨天出勤、今天還沒返營）會出現在下面清單卻沒被算進數字。
  // 有患者記錄的任務排最前面，突發狀況不會被其他一般任務蓋過去、漏看。
  const activeTasks = tasks
    .filter(t => deriveStatus(t.id) !== "completed")
    .sort((a,b) => {
      const pa = state.vitals.some(v=>v.taskId===a.id) ? 0 : 1;
      const pb = state.vitals.some(v=>v.taskId===b.id) ? 0 : 1;
      if (pa !== pb) return pa - pb;
      return unitLabel(a.unit).localeCompare(unitLabel(b.unit));
    });
  // 勤務（車輛派遣）跟洽公性質不同，分開列成兩個小節，不要混在同一份清單裡
  // 讓人分不清楚哪些是真的派車出去的勤務。
  const dutyActive = activeTasks.filter(t => t.type !== "liaison");
  const liaisonActive = activeTasks.filter(t => t.type === "liaison");
  const fleetSection = activeTasks.length ? `
    ${dutyActive.length ? `${dutySectionLabel("勤務")}${dutyActive.map(taskCard).join("")}` : ""}
    ${liaisonActive.length ? `${dutySectionLabel("洽公")}${liaisonActive.map(taskCard).join("")}` : ""}
  ` : `<div class="empty">目前沒有車輛執行中</div>`;

  // 高勤官最在意的「一眼看出」統計：目前正在執行中的勤務裡，有幾台車這趟
  // 是營內、幾台是營外（依建立勤務時填的 scope 欄位，不是車輛名冊總數跟
  // 派遣中數量的差——名冊裡很多車今天根本沒有派遣，跟「營內外」這個問題
  // 無關），以及目前洽公在外的人數（不重複計算同一人同時掛在多筆洽公）。
  // 待命中（deriveStatus 為 pending，還沒回報「出勤」）的車輛實際上還沒真的
  // 離開營區，不能只看勤務建立時填的營內/營外屬性就算進營外車，要等真的
  // 出勤、離開營區之後才算——否則急診待命還沒出勤的待命車會被誤算成營外車。
  const inCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營內").length;
  const outCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營外").length;
  const liaisonPeopleCount = new Set(liaisonActive.flatMap(t => Array.isArray(t.personnel) ? t.personnel : [])).size;

  return `
    <div class="home-date">${fmtDate(today)}</div>
    <div class="section-label">今日概況</div>
    <div class="stat-grid stat-grid-2">
      <div class="stat-tile t-blue">
        <div class="stat-tile-top"><span class="lbl">今日勤務數</span><span class="stat-icon">${icon('tasks',16)}</span></div>
        <div class="num">${todayTasks.length}</div>
      </div>
      <div class="stat-tile t-green">
        <div class="stat-tile-top"><span class="lbl">已完成</span><span class="stat-icon">${icon('check',16)}</span></div>
        <div class="num">${todayDone.length}</div>
      </div>
      <div class="stat-tile t-purple">
        <div class="stat-tile-top"><span class="lbl">洽公中人數</span><span class="stat-icon">${icon('user',16)}</span></div>
        <div class="num">${liaisonPeopleCount}</div>
      </div>
      <div class="stat-tile t-orange">
        <div class="stat-tile-top"><span class="lbl">營內／營外</span><span class="stat-icon">${icon('depart',16)}</span></div>
        <div class="num">${inCampCount}／${outCampCount}</div>
      </div>
    </div>
    ${fleetSection}

  const active = visible.filter(t => deriveStatus(t.id) !== "completed");
  const completedTasks = visible.filter(t => deriveStatus(t.id) === "completed");
  const activeTab = TASKS_TABS.find(tb => tb.key === state.tasksTab);
  const shown = state.tasksTab === "all" ? visible
    : state.tasksTab === "completed" ? completedTasks
    : active.filter(t => tabStatuses(activeTab || {key:state.tasksTab}).includes(deriveStatus(t.id)));

  const tabs = `
    <div class="tabs2 scroll">
      ${TASKS_TABS.map(tb => {
        const count = tb.key === "all" ? visible.length
          : tb.key === "completed" ? completedTasks.length
          : active.filter(t=>tabStatuses(tb).includes(deriveStatus(t.id))).length;
        return `
        <div class="tab2 ${state.tasksTab===tb.key?'active':''}" onclick="window.__setTasksTab('${tb.key}')">
          ${tb.label}<span class="tab2-count">${count}</span>
        </div>`;
      }).join("")}
    </div>`;

  // 勤務跟洽公分開列成兩個小節，不要混在同一份清單裡分不清楚。
  const dutyShown = shown.filter(t => t.type !== "liaison");
  const liaisonShown = shown.filter(t => t.type === "liaison");
  const listHtml = shown.length ? `
    ${dutyShown.length ? `${dutySectionLabel("勤務")}${dutyShown.map(taskCard).join("")}` : ""}
    ${liaisonShown.length ? `${dutySectionLabel("洽公")}${liaisonShown.map(taskCard).join("")}` : ""}
  ` : `<div class="empty">目前沒有符合條件的勤務</div>`;

  return `
    ${mainTabs}
    ${tabs}
    ${listHtml}
    ${canCreateTask(p) ? `<button class="fab" onclick="window.__nav({name:'createTask'})">${icon('plus',26)}</button>` : ""}
  `;
}

/* =========================================================
   12b) 畫面：大量傷患事件（MCI）
   ========================================================= */
function mciEventStats(eventId){
  const patients = state.mciPatients.filter(p => p.eventId === eventId);
  const stats = { total: patients.length, redA:0, redB:0, redC:0, redD:0, yellow:0, green:0, black:0, enroute:0, arrived:0 };
  patients.forEach(p => {
    if (p.triageColor === "red") stats["red"+(p.redSubcat||"A")]++;
    else if (stats[p.triageColor] != null) stats[p.triageColor]++;
    if (p.arrivedAt) stats.arrived++;
    else if (p.departedAt) stats.enroute++;
  });
  return stats;
}
function mciEventCard(ev){
  const stats = mciEventStats(ev.id);
  const redTotal = stats.redA + stats.redB + stats.redC + stats.redD;
  return `
  <div class="mci-event-card spatial-card" style="--card-accent:${ev.status==='closed'?'var(--gray)':'var(--red)'};" onclick="window.__nav({name:'mciEvent', id:'${ev.id}'})">
    <div class="mci-event-card-top">
      <div class="mci-event-card-title">${icon('alert',18)} ${esc(ev.title||'大量傷患事件')}</div>
      <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
        <button class="icon-btn" onclick="event.stopPropagation(); window.__openMciCreateModal('${ev.id}')">編輯</button>
        <button class="icon-btn danger" onclick="event.stopPropagation(); window.__deleteMciEvent('${ev.id}')">${icon('close',14)} 刪除</button>
        <span class="badge ${ev.status==='closed'?'muted':'danger'}">${ev.status==='closed'?'已結束':'進行中'}</span>
      </div>
    </div>
    <div class="mci-event-card-meta">${ev.unit?unitLabel(ev.unit)+'・':''}${fmtTime(new Date(ev.createdAt||0).getTime())}・共 ${stats.total} 名傷患</div>
    <div class="mci-event-card-counts">
      <span class="mci-count-chip" style="--c:${mciTriageInfo('red').color}">紅 ${redTotal}</span>
      <span class="mci-count-chip" style="--c:${mciTriageInfo('yellow').color}">黃 ${stats.yellow}</span>
      <span class="mci-count-chip" style="--c:${mciTriageInfo('green').color}">綠 ${stats.green}</span>
      <span class="mci-count-chip" style="--c:${mciTriageInfo('black').color}">黑 ${stats.black}</span>
    </div>
  </div>`;
}
// 目前只開放 admin 使用（建構中）：更多頁的入口本身已經灰階擋掉點擊，
// 這裡再擋一次直接導覽（例如透過 window.__nav 手動呼叫），雙重防護。
function viewMciList(){
  if (myRole(state.profile) !== 'admin') return `<div class="back-row">${backBtn({name:'profile'})}</div><div class="empty">此功能目前僅開放管理員使用</div>`;
  const events = state.mciEvents.slice().sort((a,b) => {
    const sa = a.status==='closed' ? 1 : 0, sb = b.status==='closed' ? 1 : 0;
    if (sa !== sb) return sa - sb;
    return new Date(b.createdAt||0) - new Date(a.createdAt||0);
  });
  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">大量傷患事件</div>
    <button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openMciCreateModal()">${icon('plus',15)} 新增大量傷患事件</button>
    ${events.length ? events.map(mciEventCard).join("") : `<div class="empty">目前沒有大量傷患事件</div>`}
  `;
}
// 新增／編輯共用同一個彈窗（跟基礎資料管理的新增/編輯彈窗同一套慣例）：
// vehicles/hospitals 是這次演習模擬「派了哪幾台救護車、指定收治哪幾家
// 醫院」的資源池，留空代表不限制（檢傷官表單沿用全部車輛/醫院名冊）。
function viewMciCreateModal(){
  const m = state.mciEventModal;
  if (!m) return "";
  const editing = m.id ? state.mciEvents.find(e => e.id === m.id) : null;
  const p = state.profile;
  const vehiclePool = state.vehicles.filter(v=>v.active!==false);
  // 車輛依單位分組顯示（組內照後台車輛管理同一套排序：車種→車號），方便
  // 在一長串車號裡快速找到自己單位的車；checkbox 仍共用同一個 name，勾選
  // 不受分組限制，可以跨連隊挑車支援。
  const vehicleGroupsHtml = UNITS.map(u => {
    const list = sortVehicles(vehiclePool.filter(v => v.unit === u.code)).map(v => v.plate);
    return list.length ? `<div class="picker-group"><div class="picker-group-label">${esc(u.label)}</div>${chipGroup('vehicles', list, editing?.vehicles||[], true)}</div>` : "";
  }).join("");
  const hospitalOptions = state.hospitals.slice().sort((a,b)=>HOSPITAL_NAME_COLLATOR.compare(a.name||'',b.name||'')).map(h=>h.name);
  return `
  <div class="modal-overlay" onclick="if(event.target===this) window.__closeMciCreateModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">${icon('alert',19)} ${editing?'編輯大量傷患事件':'新增大量傷患事件'}</div>
      <form onsubmit="window.__submitMciCreateModal(event,'${m.id||''}')">
        <div class="field"><label>事件名稱</label><input name="title" value="${esc(editing?.title||'')}" placeholder="例如：成功嶺集合場中暑事件" required></div>
        <div class="field"><label>單位（選填）</label>
          <select name="unit">
            <option value="">未指定</option>
            ${UNITS.map(u => `<option value="${u.code}" ${(editing?editing.unit===u.code:myUnit(p)===u.code)?'selected':''}>${u.label}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>本次事件出勤車輛（選填，不選代表開放全部車輛；依單位分組，可跨連隊選擇）</label>
          ${vehiclePool.length ? vehicleGroupsHtml : `<div class="empty" style="padding:14px 0;">尚未建立車輛名冊</div>`}
        </div>
        <div class="field">
          <label>本次事件收治醫院（選填，不選代表開放全部醫院）</label>
          ${hospitalOptions.length ? chipGroup('hospitals', hospitalOptions, editing?.hospitals||[], true) : `<div class="empty" style="padding:14px 0;">尚未建立醫院名冊</div>`}
        </div>
        <button class="btn-primary" type="submit">${editing?'儲存':'開啟事件'}</button>
        <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__closeMciCreateModal()">取消</button>
      </form>
    </div>
  </div>`;
}
// 事件詳情頁底下依角色拆成三個獨立畫面（分頁切換，不是各自獨立路由——
// 三個角色本來就是在看/操作同一個事件的同一份傷患名冊，用路由拆開會
// 沒必要地把「同一個事件」這件事複雜化）：檢傷官負責建立案件、治療官
// 負責傷患集中區的追蹤與二次檢傷、後送官負責車輛出發/抵達的生命週期。
// 全程匿名化：傷患不記錄姓名，唯一身分是流水號（MCI-01, MCI-02...）。
const MCI_EVENT_TABS = [
  { key:"home",    label:"首頁", iconName:"home" },
  { key:"triage",  label:"檢傷官", iconName:"alert" },
  { key:"ccp",     label:"治療官", iconName:"heartbeat" },
  { key:"evac",    label:"後送官", iconName:"depart" },
  { key:"vehicle", label:"車輛視角", iconName:"returnArrow" }
];
function viewMciEvent(eventId){
  if (myRole(state.profile) !== 'admin') return `<div class="back-row">${backBtn({name:'profile'})}</div><div class="empty">此功能目前僅開放管理員使用</div>`;
  const ev = state.mciEvents.find(e => e.id === eventId);
  if (!ev) return `<div class="back-row">${backBtn({name:'mciList'})}</div><div class="empty">找不到這筆事件</div>`;
  const eventTab = state.mciEventTab || "home";
  const tabBar = `
    <div class="icon-subtabs">
      ${MCI_EVENT_TABS.map(tb => `
        <button type="button" class="icon-subtab ${eventTab===tb.key?'active':''}" onclick="window.__setMciEventTab('${tb.key}')">
          <span class="icon-subtab-icon">${icon(tb.iconName,26)}</span>
          <span class="label">${tb.label}</span>
        </button>`).join("")}
    </div>`;
  const tabBody = eventTab === "triage" ? viewMciTriageTab(eventId)
    : eventTab === "ccp" ? viewMciCcpTab(eventId)
    : eventTab === "evac" ? viewMciEvacTab(eventId)
    : eventTab === "vehicle" ? viewMciVehicleTab(eventId)
    : viewMciHomeTab(eventId);
  return `
    <div class="back-row">${backBtn({name:'mciList'})}</div>
    ${tabBar}
    ${tabBody}
  `;
}
// 首頁分頁：事件本身的概況（標題/狀態/編輯/結束事件、傷患統計、人員配置、
// 完整傷患名冊）。檢傷官分頁只留下一號傷患編號跟 START 檢傷問答，這些
// 事件層級的資訊挪到這個獨立分頁，不用每次切分頁都先看到一樣的東西。
function viewMciHomeTab(eventId){
  const ev = state.mciEvents.find(e => e.id === eventId);
  const stats = mciEventStats(eventId);
  const roles = ev.roles || {};
  const patients = state.mciPatients.filter(p => p.eventId === eventId)
    .sort((a,b) => mciPatientSortRank(a) - mciPatientSortRank(b) || (a.seq||0) - (b.seq||0));
  return `
    <div class="mci-event-header">
      <div class="mci-event-header-top">
        <div class="mci-event-header-title">${icon('alert',20)} ${esc(ev.title||'大量傷患事件')}</div>
        <span class="badge ${ev.status==='closed'?'muted':'danger'}">${ev.status==='closed'?'已結束':'進行中'}</span>
      </div>
      <div class="mci-event-card-meta">${ev.unit?unitLabel(ev.unit)+'・':''}${ev.createdByName?esc(ev.createdByName)+' 開啟・':''}${fmtTime(new Date(ev.createdAt||0).getTime())}</div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="icon-btn" onclick="window.__openMciCreateModal('${ev.id}')">編輯車輛／醫院</button>
        <button class="icon-btn" onclick="window.__toggleMciEventStatus('${ev.id}','${ev.status}')">${ev.status==='closed'?'重新開啟事件':'結束事件'}</button>
      </div>
    </div>

    <div class="section-label">現況戰情統計</div>
    <div class="stat-grid stat-grid-2 mci-stat-grid">
      <div class="stat-tile" style="--tc:${mciTriageInfo('red').color}"><div class="stat-tile-top"><span class="lbl">🔴 紅色（立即）</span></div><div class="num">${stats.redA+stats.redB+stats.redC+stats.redD}<span class="mci-subbreak">A${stats.redA} B${stats.redB} C${stats.redC} D${stats.redD}</span></div></div>
      <div class="stat-tile" style="--tc:${mciTriageInfo('yellow').color}"><div class="stat-tile-top"><span class="lbl">🟡 黃色（延遲）</span></div><div class="num">${stats.yellow}</div></div>
      <div class="stat-tile" style="--tc:${mciTriageInfo('green').color}"><div class="stat-tile-top"><span class="lbl">🟢 綠色（輕微）</span></div><div class="num">${stats.green}</div></div>
      <div class="stat-tile" style="--tc:${mciTriageInfo('black').color}"><div class="stat-tile-top"><span class="lbl">⚫ 黑色</span></div><div class="num">${stats.black}</div></div>
      <div class="stat-tile"><div class="stat-tile-top"><span class="lbl">🚑 後送轉運中</span></div><div class="num">${stats.enroute}</div></div>
      <div class="stat-tile"><div class="stat-tile-top"><span class="lbl">🏥 已送達醫院</span></div><div class="num">${stats.arrived}</div></div>
    </div>

    <div class="section-label">現場編組指派</div>
    <div class="mci-roles-card">
      ${MCI_ROLES.map(r => `
        <div class="mci-role-row">
          <label>${esc(r.label)}</label>
          <input value="${esc(roles[r.key]||'')}" placeholder="選填，可填多人" onchange="window.__updateMciRole('${ev.id}','${r.key}',this.value)">
        </div>`).join("")}
    </div>

    <div class="section-label">動態追蹤名冊（共 ${patients.length} 人）</div>
    ${patients.length ? patients.map(mciHomePatientCard).join("") : `<div class="empty">目前沒有傷患</div>`}
  `;
}
// 首頁的傷患名冊是純唯讀總覽，不分角色、不管目前處於哪個生命週期節點都
// 看得到完整資料（檢傷分類、主訴、車輛/醫院配對、離開現場/抵達醫院時間
// 與里程備註）——這點跟治療官/後送官分頁刻意「只顯示跟這個角色有關的
// 那一段狀態」不同，那兩個分頁是工作清單，這裡是總覽，兩者不衝突。沒有
// 任何操作按鈕，要編輯/指派/推進生命週期還是要去對應角色的分頁做。
function mciHomePatientCard(p){
  const info = p.triageColor ? mciTriageInfo(p.triageColor) : null;
  const badgeLabel = p.triageColor === "red" ? `紅${p.redSubcat||''}` : (info ? info.label : '未分類');
  return `
  <div class="mci-patient-card spatial-card" style="--card-accent:${info?info.color:'var(--gray)'};">
    <div class="mci-patient-top">
      <span class="mci-triage-badge" style="--c:${info?info.color:'#8E8E93'}">${badgeLabel}</span>
      <span class="mci-patient-seq">MCI-${String(p.seq||0).padStart(2,'0')}</span>
      <span class="mci-patient-status">${mciPatientStatus(p)}</span>
    </div>
    ${p.complaint ? `<div class="mci-patient-complaint">${esc(p.complaint)}</div>` : ""}
    ${p.vehicle && p.hospital ? `<div class="mci-evac-chain"><span>${esc(p.vehicle)}</span><span class="mci-evac-arrow">→</span><span>${esc(p.hospital)}</span></div>` : ""}
    ${p.departedAt ? `<div class="mci-evac-time">離開現場：${fmtTime(new Date(p.departedAt).getTime())}</div>` : ""}
    ${p.arrivedAt ? `<div class="mci-evac-time">抵達醫院：${fmtTime(new Date(p.arrivedAt).getTime())}${p.notes?'・'+esc(p.notes):''}</div>` : ""}
  </div>`;
}
// 檢傷分類 ABCD 子項改用自己的 chip 樣式（顏色點各自不同、需要 fullLabel
// 這種跟 value 不一樣的顯示文字），不套用全站共用的 chipGroup()（那支只
// 支援 value 當顯示文字）。紅色的 START 判定結束後、以及治療官的二次
// 檢傷升級都會用到這組。
function mciRedSubcatChipGroup(selected){
  return `<div class="chip-select">${MCI_RED_SUBCATS.map(s => `
    <label class="chip-option">
      <input type="radio" name="redSubcat" value="${s.key}" ${selected===s.key?'checked':''}>
      <span>${esc(s.label)}</span>
    </label>`).join("")}
  </div>`;
}

/* ---- 檢傷官視角：先看傷患編號＋START 檢傷決策問答＋主訴，確認上傳 ----
   檢傷官不指派車輛/醫院（那是後送官在傷患待命時的職責，見 viewMciEvacTab／
   viewMciAssignModal）；傷患上傳後狀態一律是「待命」，於集中區等候治療官
   或後送官接手。 */
function viewMciTriageTab(eventId){
  const nextSeq = nextMciPatientSeq(eventId);
  const seqPreview = `
    <div class="mci-seq-preview">
      <div class="mci-seq-preview-label">下一號傷患編號</div>
      <div class="mci-seq-preview-num">MCI-${String(nextSeq).padStart(2,'0')}</div>
    </div>`;
  const step = state.mciTriageStep || "ambulate";
  if (step === "form") return seqPreview + viewMciTriageForm(eventId);
  if (step === "redSubcat") {
    return seqPreview + `
      <div class="mci-start-card">
        <div class="mci-start-question">紅色傷患再評估：第一個出問題的地方是？</div>
        <div class="mci-start-hint">依序評估呼吸道／呼吸／循環／神經學，第一個出問題的地方評到那裡就停，不用再往下評</div>
        <div class="mci-start-options">
          ${MCI_RED_SUBCATS.map(s => `<button type="button" class="mci-start-btn" style="--c:${mciTriageInfo('red').color}" onclick="window.__mciSelectRedSubcat('${s.key}')">${esc(s.label)}</button>`).join("")}
        </div>
      </div>`;
  }
  const flow = MCI_START_FLOW[step] || MCI_START_FLOW.ambulate;
  return seqPreview + (step === "ambulate" ? mciQuickColorCard() : "") + `
    <div class="mci-start-card">
      <div class="mci-start-question">${esc(flow.q)}</div>
      <div class="mci-start-options">
        ${flow.opts.map(o => `<button type="button" class="mci-start-btn" onclick='window.__mciStartGo(${JSON.stringify(o.go)})'>${esc(o.label)}</button>`).join("")}
      </div>
      ${step !== "ambulate" ? `<button type="button" class="btn-ghost" style="width:100%;margin-top:14px;" onclick="window.__mciStartRestart()">重新開始檢傷</button>` : ""}
    </div>`;
}
// 已經目視判斷得出顏色的傷患（例如明顯行動自如、明顯死亡），不用逼著
// 檢傷官照 START 問答一步步點過去；直接複用 __mciStartGo 既有的路由邏輯
// （紅色一樣會先轉去 redSubcat 關卡，其餘顏色直接進表單），行為跟走完整套
// 問答判定出來的結果完全一致，只是省略中間的問答步驟。
function mciQuickColorCard(){
  return `
  <div class="mci-quickcolor-card">
    <div class="mci-quickcolor-label">已經目視判斷得出顏色？可以跳過問答直接選擇</div>
    <div class="mci-quickcolor-options">
      ${MCI_TRIAGE_COLORS.map(c => `<button type="button" class="mci-quickcolor-btn" style="--c:${c.color}" onclick="window.__mciStartGo({color:'${c.key}'})">${esc(c.label)}</button>`).join("")}
    </div>
  </div>`;
}
function viewMciTriageForm(eventId){
  const info = mciTriageInfo(state.mciTriageColor);
  return `
    <div class="mci-start-card">
      <div class="mci-start-result">
        <span class="mci-triage-badge" style="--c:${info.color}">${state.mciTriageColor==='red'?'紅'+(state.mciTriageRedSubcat||''):info.label}</span>
        <span>檢傷完成，請填寫主訴</span>
      </div>
      <form onsubmit="window.__submitMciTriageForm(event,'${eventId}')">
        <div class="field"><label>主訴／受傷部位</label><input name="complaint" placeholder="例如：右大腿開放性骨折" required></div>
        <button class="btn-primary" type="submit">確認上傳</button>
        <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__mciStartRestart()">重新檢傷</button>
      </form>
    </div>`;
}

/* ---- 治療官視角：傷患集中區（CCP）動態追蹤，含二次檢傷 ----
   只看得到還在「治療中」的傷患：一旦點過處置完成，這位傷患就離開集中
   區、交給後送官的分頁繼續追蹤，不會同時出現在兩邊。 */
function viewMciCcpTab(eventId){

// 車輛忙碌判斷：同一台車在同一個事件裡可能載過不只一位傷患（送到醫院
// 後折返，再載下一位），「目前」可不可以再派看的是這台車「最近一次」
// （seq 最大）的指派紀錄有沒有完成返回（returnArrivedAt）；已經返回代表
// 這趟任務結束，車輛回到待命狀態，可以再指派新的傷患。excludeId 用來
// 排除「正在編輯中的這筆傷患自己」，不然編輯已指派傷患的車輛時，會把
// 自己現有的車也當成「被別人占用」濾掉，選單裡看不到原本選的那台車。
function mciVehicleLatestAssignment(eventId, plate, excludeId){
  return state.mciPatients
    .filter(p => p.eventId === eventId && p.vehicle === plate && p.id !== excludeId)
    .sort((a,b) => (b.seq||0) - (a.seq||0))[0] || null;
}
function mciVehicleIsBusy(eventId, plate, excludeId){
  const latest = mciVehicleLatestAssignment(eventId, plate, excludeId);
  return !!latest && !latest.returnArrivedAt;
}
/* ---- 後送官視角：雙節點後送生命週期（離開現場／抵達醫院） ---- */
// 治療官還沒點「處置完成」（狀態仍是「治療中」）的傷患不會出現在這裡：
// 後送官只處理已經處置完成的傷患，不會提早看到、提早指派車輛/醫院。
function viewMciEvacTab(eventId){
  const patients = state.mciPatients.filter(p => p.eventId === eventId && mciPatientStatus(p) !== "治療中")
    .sort((a,b) => mciPatientSortRank(a) - mciPatientSortRank(b) || (a.seq||0) - (b.seq||0));
  return `
    <div class="section-label">後送指揮（共 ${patients.length} 人）</div>

}
function mciEvacPatientCard(p){

  const badgeLabel = p.triageColor === "red" ? `紅${p.redSubcat||''}` : (info ? info.label : '未分類');
  // 車輛/醫院是後送官在這裡指派的（檢傷官建立傷患時不填），還沒指派完成
  // 前不會有配對字串可以顯示，只給一顆「指派車輛／醫院」按鈕。
  const needsAssign = !p.vehicle || !p.hospital;
  return `
  <div class="mci-patient-card spatial-card" style="--card-accent:${info?info.color:'var(--gray)'};">
    <div class="mci-patient-top">
      <span class="mci-triage-badge" style="--c:${info?info.color:'#8E8E93'}">${badgeLabel}</span>
      <span class="mci-patient-seq">MCI-${String(p.seq||0).padStart(2,'0')}</span>
      <span class="mci-patient-status">${mciPatientStatus(p)}</span>
    </div>
    ${p.complaint ? `<div class="mci-patient-complaint">${esc(p.complaint)}</div>` : ""}
    ${needsAssign ? "" : `<div class="mci-evac-chain"><span>${esc(p.vehicle)}</span><span class="mci-evac-arrow">→</span><span>${esc(p.hospital)}</span></div>`}
    ${p.departedAt ? `<div class="mci-evac-time">離開現場：${fmtTime(new Date(p.departedAt).getTime())}</div>` : ""}
    ${p.arrivedAt ? `<div class="mci-evac-time">抵達醫院：${fmtTime(new Date(p.arrivedAt).getTime())}${p.notes?'・'+esc(p.notes):''}</div>` : ""}
    <div class="mci-patient-actions">
      ${needsAssign ? `<button class="icon-btn primary" onclick="window.__openMciAssign('${p.id}')">${icon('depart',15)} 指派車輛／醫院</button>` : ""}
      ${!needsAssign && !p.departedAt ? `<button class="icon-btn primary" onclick="window.__mciMarkDeparted('${p.id}')">${icon('depart',15)} 離開現場</button>` : ""}
      ${p.departedAt && !p.arrivedAt ? `<button class="icon-btn primary" onclick="window.__openMciArrive('${p.id}')">${icon('hospital',15)} 抵達醫院</button>` : ""}
    </div>
    <!-- 資料校正用的編輯按鈕：只補正資料本身，不逆轉離開現場/抵達醫院
         這類已經按下去的生命週期節點。已指派的車輛/醫院隨時可以改；抵達
         醫院之後備註也可以改，時間點本身不受影響。 -->
    <div class="mci-patient-actions">
      ${!needsAssign ? `<button class="icon-btn" onclick="window.__openMciAssign('${p.id}')">${icon('depart',14)} 編輯車輛／醫院</button>` : ""}
      ${p.arrivedAt ? `<button class="icon-btn" onclick="window.__openMciArrive('${p.id}')">${icon('hospital',14)} 編輯備註</button>` : ""}
      <button class="icon-btn danger" onclick="window.__deleteMciPatientFromCcp('${p.id}')">${icon('close',14)} 刪除此傷患</button>
    </div>
  </div>`;
}
// 後送官在這裡指派車輛/醫院（沿用事件建立時設定的資源池範圍，留空代表
// 不限制），指派完成才會出現離開現場／抵達醫院的動作按鈕。同一個彈窗也
// 用來「編輯」已經指派過的傷患（資料校正，不影響已經記錄的生命週期時
// 間點）：車輛選單會排除掉目前正被其他傷患佔用（還沒返回）的車，但
// 會把這位傷患自己原本選的車留著（excludeId），不然編輯時看不到自己
// 原本選的那台。
function viewMciAssignModal(){
  const id = state.mciAssignId;
  if (!id) return "";
  const p = state.mciPatients.find(x => x.id === id);
  if (!p) return "";
  const ev = state.mciEvents.find(e => e.id === p.eventId);
  const outSet = dispatchedVehiclePlates();
  const vehiclePool = (ev && ev.vehicles && ev.vehicles.length
    ? state.vehicles.filter(v => v.active!==false && ev.vehicles.includes(v.plate))
    : state.vehicles.filter(v=>v.active!==false)
  ).filter(v => !mciVehicleIsBusy(p.eventId, v.plate, p.id));
  const hospitalPool = ev && ev.hospitals && ev.hospitals.length
    ? state.hospitals.filter(h => ev.hospitals.includes(h.name))
    : state.hospitals.slice();
  const editing = !!(p.vehicle && p.hospital);
  return `
  <div class="modal-overlay" onclick="if(event.target===this) window.__closeMciAssign()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">${icon('depart',19)} MCI-${String(p.seq||0).padStart(2,'0')} ${editing?'編輯':'指派'}車輛／醫院</div>
      <form onsubmit="window.__submitMciAssign(event,'${p.id}')">
        <div class="field"><label>選取本次出勤車輛</label>
          <select name="vehicle" required>
            <option value="">請選擇車輛</option>
            ${vehiclePool.map(v => `<option value="${esc(v.plate)}" ${v.plate===p.vehicle?'selected':''}>${esc(vehicleOptionLabel(v.plate,outSet))}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>選取後送目標醫院</label>
          <select name="hospital" required>
            <option value="">請選擇醫院</option>
            ${hospitalPool.sort((a,b)=>HOSPITAL_NAME_COLLATOR.compare(a.name||'',b.name||'')).map(h => `<option value="${esc(h.name)}" ${h.name===p.hospital?'selected':''}>${esc(h.name)}${h.tier?'・'+esc(h.tier):''}</option>`).join("")}
          </select>
        </div>
        <button class="btn-primary" type="submit">${editing?'儲存':'確認指派'}</button>
        <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__closeMciAssign()">取消</button>
      </form>
    </div>
  </div>`;
}
function viewMciArriveModal(){
  const id = state.mciArriveId;

/* ---- 車輛視角：救護車車長看「自己這台車現在在哪裡」，跟後送官負責
   「把傷患送到醫院」的視角互補——後送官只在意傷患本身有沒有送到；這裡
   在意的是傷患送達之後，車輛自己還沒走完的旅程（返回後管站或現地），
   讓車輛真正「回報待命」之前，後送官在指派車輛時看不到、選不到這台
   車，避免同一台車被誤重複派出去。狀態掛在「這台車最近一次載的那位
   傷患」的紀錄上，不另外開一個獨立的車輛集合。 ---- */
function viewMciVehicleTab(eventId){
  const patients = state.mciPatients.filter(p => p.eventId === eventId && p.vehicle);
  const plates = [...new Set(patients.map(p => p.vehicle))].sort((a,b)=>a.localeCompare(b));
  const cards = plates.map(plate => mciVehicleCard(eventId, plate));
  return `
    <div class="section-label">車輛狀態（共 ${plates.length} 台出勤過）</div>
    ${cards.length ? cards.join("") : `<div class="empty">目前還沒有車輛出勤</div>`}
  `;
}
function mciVehicleCard(eventId, plate){
  const p = mciVehicleLatestAssignment(eventId, plate, null);
  if (!p) return "";
  const destLabel = p.returnDestination === "scene" ? "現地" : "後管站";
  let statusText, accent, actions = "";
  if (!p.arrivedAt) {
    statusText = `運送中 → ${esc(p.hospital||'')}`;
    accent = "var(--blue)";
  } else if (!p.returnDestination) {
    statusText = `已抵達 ${esc(p.hospital||'')}，等待選擇返回地點`;
    accent = mciTriageInfo('yellow').color;
    actions = `
      <div class="mci-patient-actions">
        <button class="icon-btn primary" onclick="window.__mciVehicleReturn('${p.id}','station')">${icon('returnArrow',15)} 返回後管站</button>
        <button class="icon-btn primary" onclick="window.__mciVehicleReturn('${p.id}','scene')">${icon('returnArrow',15)} 返回現地</button>
      </div>`;
  } else if (!p.returnArrivedAt) {
    statusText = `返回中：${destLabel}`;
    accent = mciTriageInfo('yellow').color;
    actions = `
      <div class="mci-patient-actions">
        <button class="icon-btn primary" onclick="window.__mciVehicleReturnArrive('${p.id}')">${icon('returnArrow',15)} 已抵達${destLabel}</button>
      </div>`;
  } else {
    statusText = `待命中（可再派遣）`;
    accent = "var(--green)";
  }
  return `
  <div class="mci-patient-card spatial-card" style="--card-accent:${accent};">
    <div class="mci-patient-top">
      <span class="mci-patient-seq">${esc(plate)}</span>
      <span class="mci-patient-status">MCI-${String(p.seq||0).padStart(2,'0')}</span>
    </div>
    <div class="mci-patient-complaint">${statusText}</div>
    ${actions}
  </div>`;
}

/* =========================================================

   13) 畫面：建立勤務

function viewCreateTask(){
  const p = state.profile;
  if (!canCreateTask(p)) return `<div class="empty">您沒有建立勤務的權限</div>`;
  const canSwitch = canSeeAllUnits(p);
  const unit = canSwitch ? (state.createTaskUnit || myUnit(p) || UNITS[0].code) : myUnit(p);
  if (!unit) return `<div class="empty">您尚未被指派單位，請聯繫管理員。</div>`;

  // 急診待命頁「建立待命勤務」導過來時帶著 presetLocation（固定的醫務所
  // 地點），這種待命勤務一定是勤務（不是洽公）、一定是營外（車輛要離開
  // 醫務所才需要待命出勤），地點也固定是該醫務所，不開放使用者更改。
  const isStandbyDispatch = !!state.route.presetLocation;
  const taskType = isStandbyDispatch ? "duty" : (state.createTaskType || "duty");
  const isLiaison = taskType === "liaison";
  // 車長／駕駛／洽公人員都可跨單位選人，對應的人員選擇器打開時會直接讀取
  // 當下的 state.personnel 動態建立候選名單，這裡不用先篩好。
  const vehicleOpts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const recorderOpts = state.recorders.filter(x => x.unit === unit && x.active !== false);
  const outSet = dispatchedVehiclePlates();

  return `
    <div class="section-label">建立勤務</div>
    ${isStandbyDispatch ? "" : `
    <div class="field"><label>任務類型 *</label>
      <div class="seg-toggle">
        ${TASK_TYPES.map(x => `<button type="button" class="${taskType===x.key?'active':''}" onclick="window.__setCreateTaskType('${x.key}')">${x.label}</button>`).join("")}
      </div>
    </div>`}
    ${!isLiaison && !isStandbyDispatch ? `
    <div class="field"><label>營內／營外 *</label>
      ${chipGroup('scope', TASK_SCOPE_OPTIONS, '營內', false, null, 'scope-toggle')}
    </div>` : ""}
    <form onsubmit="window.__createTask(event, '${unit}', '${taskType}')">
      ${isStandbyDispatch ? `<input type="hidden" name="scope" value="營外">` : ""}
      ${canSwitch ? `
        <div class="field"><label>單位 *</label>
          <select onchange="window.__setCreateTaskUnit(this.value)">
            ${UNITS.map(u => `<option value="${u.code}" ${unit===u.code?'selected':''}>${u.label}</option>`).join("")}
          </select>
        </div>` : `<div class="field"><label>單位</label><input value="${unitLabel(unit)}" disabled></div>`}
      <div class="field"><div class="field-label-row"><label>任務名稱 *</label>${(!isLiaison && state.taskTitleTemplates.length) ? taskTitleTemplateSelect('tf-title', state.taskTitleTemplates.map(t => t.text)) : ''}</div><input id="tf-title" name="title" required placeholder="${isLiaison?'例如：軍公民任務現勘':'例如：OHCA 患者搶救'}"></div>
