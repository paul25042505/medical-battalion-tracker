    padding:14px 18px; border-radius:var(--radius-md); box-shadow:0 12px 32px rgba(0,0,0,0.28);
    opacity:0; pointer-events:none; transition:opacity 0.25s, transform 0.25s;
    width:max-content; max-width:min(94vw, 480px); line-height:1.45;
    display:flex; align-items:flex-start; gap:10px; overflow:hidden;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px); pointer-events:auto;}
  .toast-icon{flex-shrink:0; margin-top:1px;}
  .toast-icon.ok{color:#32D74B;}
  .toast-icon.error{color:#FF6961;}
  .toast-text{flex:1; text-align:left; min-width:0;}
  .toast-progress{position:absolute; left:0; bottom:0; height:3px; width:100%; background:rgba(255,255,255,0.32);}

  /* ---- 下拉重新整理指示條 ---- */
  #pull-indicator{
    position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(-40px);
    display:flex; align-items:center; gap:8px; padding:9px 16px; margin-top:10px;
    background:var(--panel); border:1px solid var(--border); border-radius:999px; box-shadow:var(--shadow-md);
    font-size:var(--text-xs); font-weight:700; color:var(--muted); z-index:80; opacity:0; pointer-events:none;
  }
  #pull-indicator.show{transition:none;}
  .pull-spinner{display:flex; color:var(--blue);}
  .pull-spinner.spin{animation:pullSpin 0.7s linear infinite;}
  @keyframes pullSpin{ to { transform:rotate(360deg); } }

  .spinner{width:22px; height:22px; border:2.5px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; margin:60px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---- modal（後台編輯用彈窗） ---- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,10,14,0.44); backdrop-filter:blur(1.5px);
    display:flex; align-items:flex-end; justify-content:center; z-index:60;
    animation:modalFade 0.18s ease;

/* =========================================================

const BUILD_TAG = "2026-07-10-287-member-list";

/* =========================================================
   1b) Firestore REST 用戶端
   部分行動網路環境會干擾 Firestore SDK 預設的長連線/串流協定，
   導致一直卡在 "client is offline"；這裡改用一般的 HTTPS REST
   請求存取 Firestore，即時同步則改為定時輪詢。
   ========================================================= */
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents`;

function toFsValue(v){
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "string") return { stringValue: v };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (v instanceof Date) return { timestampValue: v.toISOString() };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFsValue) } };
  if (typeof v === "object") return { mapValue: { fields: toFsFields(v) } };
  return { stringValue: String(v) };
}
function toFsFields(obj){
  const out = {};
  for (const k in obj) if (obj[k] !== undefined) out[k] = toFsValue(obj[k]);
  return out;
}
function fromFsValue(v){
  if (!v) return null;
  if ("stringValue" in v) return v.stringValue;
  if ("booleanValue" in v) return v.booleanValue;
  if ("integerValue" in v) return parseInt(v.integerValue, 10);
  if ("doubleValue" in v) return v.doubleValue;
  if ("timestampValue" in v) return v.timestampValue;
  if ("nullValue" in v) return null;
  if ("arrayValue" in v) return (v.arrayValue.values||[]).map(fromFsValue);
  if ("mapValue" in v) return fromFsFields(v.mapValue.fields||{});
  return null;
}
function fromFsFields(fields){
  const out = {};
  for (const k in fields||{}) out[k] = fromFsValue(fields[k]);
  return out;
}

async function fsFetch(path, options={}, allow404=false){
  const idToken = await auth.currentUser.getIdToken();
  const res = await fetch(`${FIRESTORE_BASE}/${path}`, {
    ...options,
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json", ...(options.headers||{}) }
  });
  // 404 只有在「讀取單一文件、文件不存在」時才是合理狀態；
  // 寫入（PATCH/POST/DELETE）如果也回傳 404，一定是真的出錯了，
  // 必須丟出例外，不能被這裡靜默吃掉，否則會誤以為寫入成功。
  if (!res.ok && !(allow404 && res.status === 404)) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
  return res;
}
async function fsGetDoc(path){
  const res = await fsFetch(path, {}, true);
  if (res.status === 404) return null;
  const data = await res.json();
  return fromFsFields(data.fields);
}
async function fsSetDoc(path, obj){
  const mask = Object.keys(obj).map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join("&");
  await fsFetch(`${path}?${mask}`, { method: "PATCH", body: JSON.stringify({ fields: toFsFields(obj) }) });
}
async function fsAddDoc(collectionPath, obj){
  const res = await fsFetch(collectionPath, { method: "POST", body: JSON.stringify({ fields: toFsFields(obj) }) });
  const data = await res.json();
  return { id: data.name.split("/").pop(), ...fromFsFields(data.fields) };
}
async function fsDeleteDoc(path){
  await fsFetch(path, { method: "DELETE" });
}
async function fsListCollection(collectionPath){
  const res = await fsFetch(`${collectionPath}?pageSize=300`);
  const data = await res.json();
  return (data.documents||[]).map(d => ({ id: d.name.split("/").pop(), ...fromFsFields(d.fields) }));
}
// 一次送出多筆局部更新（Firestore REST 的 :commit），用在「全部標記為已讀」
// 這種一次要改一堆文件、但只改同一個欄位的情境，不用逐筆各打一次 PATCH。
// 網址結構跟其他 fsXxx 不一樣（documents:commit 中間不能加斜線），所以沒有
// 透過 fsFetch，直接組網址發 fetch。
async function fsBatchUpdate(updates){
  if (!updates.length) return;
  const writes = updates.map(({ path, fields }) => ({
    update: { name: `projects/${firebaseConfig.projectId}/databases/(default)/documents/${path}`, fields: toFsFields(fields) },
    updateMask: { fieldPaths: Object.keys(fields) }
  }));
  const idToken = await auth.currentUser.getIdToken();
  const res = await fetch(`https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents:commit`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json" },
    body: JSON.stringify({ writes })
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
}
// 用 Firestore 結構化查詢（:runQuery）在「伺服器端」就先篩掉不需要的文件，
// 真正減少讀取數（跟 fsListCollection 抓全部再前端篩選不同，那樣篩選前
// 每一筆都已經算一次讀取了）。目前只用來依單一時間欄位篩「>= 某個時間」，
// 每日/每週回報累積下去，勤務／事件／患者紀錄這幾個集合的文件數只會越來
// 越多，若每次登入都整個抓一次，讀取量會隨歷史資料量無限成長；改成只抓
// 最近一段期間，讀取量才會維持在一個固定範圍。
async function fsQuerySince(collectionId, field, sinceDate, limit){
  const idToken = await auth.currentUser.getIdToken();
  const body = {
    structuredQuery: {
      from: [{ collectionId }],
      where: { fieldFilter: { field: { fieldPath: field }, op: "GREATER_THAN_OR_EQUAL", value: { timestampValue: sinceDate.toISOString() } } },
      limit: limit || 300
    }
  };
  const res = await fetch(`${FIRESTORE_BASE}:runQuery`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
  const data = await res.json();
  return (data||[]).filter(d => d.document).map(d => ({ id: d.document.name.split("/").pop(), ...fromFsFields(d.document.fields) }));
}
// 「紀錄」頁自訂日期查詢若往回查超過 RECENT_WINDOW_DAYS（平常沒預載那麼久
// 以前的資料），才需要另外針對該區間單獨查一次；查完的勤務／事件／患者
// 紀錄直接併入現有的 state 陣列（用 id 去重），維持既有畫面邏輯不用另外
// 處理一套「額外資料」的顯示路徑。
async function fsQueryRange(collectionId, field, fromDate, toDate, limit){
  const idToken = await auth.currentUser.getIdToken();
  const body = {
    structuredQuery: {
      from: [{ collectionId }],
      where: { compositeFilter: { op: "AND", filters: [
        { fieldFilter: { field: { fieldPath: field }, op: "GREATER_THAN_OR_EQUAL", value: { timestampValue: fromDate.toISOString() } } },
        { fieldFilter: { field: { fieldPath: field }, op: "LESS_THAN_OR_EQUAL", value: { timestampValue: toDate.toISOString() } } }
      ] } },
      limit: limit || 300
    }
  };
  const res = await fetch(`${FIRESTORE_BASE}:runQuery`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
    const err = new Error(msg); err.code = res.status;
    throw err;
  }
  const data = await res.json();
  return (data||[]).filter(d => d.document).map(d => ({ id: d.document.name.split("/").pop(), ...fromFsFields(d.document.fields) }));
}
// 依 taskId 批次查詢 events／vitals（Firestore IN 最多 30 個值一組，
// 超過就分批查完再合併），用於「查詢更早的資料」把某批舊勤務對應的事件
// ／患者紀錄一起補齊，不然舊勤務進到詳情頁會看起來完全沒有回報紀錄。
async function fsQueryByTaskIds(collectionId, taskIds){
  if (!taskIds.length) return [];
  const idToken = await auth.currentUser.getIdToken();
  const batches = [];
  for (let i = 0; i < taskIds.length; i += 30) batches.push(taskIds.slice(i, i+30));
  const results = [];
  for (const batch of batches) {
    const body = {
      structuredQuery: {
        from: [{ collectionId }],
        where: { fieldFilter: { field: { fieldPath: "taskId" }, op: "IN", value: { arrayValue: { values: batch.map(id => ({ stringValue: id })) } } } },
        limit: 300
      }
    };
    const res = await fetch(`${FIRESTORE_BASE}:runQuery`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${idToken}`, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      let msg = res.statusText;
      try { const j = await res.json(); msg = (Array.isArray(j)?j[0]:j).error?.message || msg; } catch(e){}
      const err = new Error(msg); err.code = res.status;
      throw err;
    }
    const data = await res.json();
    results.push(...(data||[]).filter(d => d.document).map(d => ({ id: d.document.name.split("/").pop(), ...fromFsFields(d.document.fields) })));
  }
  return results;
}
const RECENT_WINDOW_DAYS = 30;
function recentCutoffDate(){ return new Date(Date.now() - RECENT_WINDOW_DAYS*24*60*60*1000); }
// 公告效期固定一個月（不開放自訂，維持功能單純）；到期後由後端排程
// （functions/index.js 的 cleanupExpiredNotifications，每天跑一次）
// 自動刪除，不是前端隱藏而已。
const NOTIFICATION_TTL_DAYS = 30;
function isoDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// 不再定時自動輪詢（使用者反應一直背景更新很干擾）。改成只在建立時抓一次，
// 之後只有畫面切換／使用者做出寫入動作時才會呼叫 refreshNow() 手動刷新一次，
// 沒有任何背景計時器會自己觸發重繪。
function poll(fn){
  let stopped = false;
  async function tick(){
    if (stopped) return;
    try { await fn(); } catch(e){ console.error("刷新失敗", e); }
  }
  tick();
  return {
    stop(){ stopped = true; },
    // 回傳 tick() 的 promise，讓少數需要「確定資料已刷新完成才繼續」的呼叫端
    // （例如新增患者紀錄後要等最新清單回來才切換畫面）可以 await；其餘既有
    // 呼叫端沒有接這個回傳值，行為不受影響，仍是 fire-and-forget。
    refreshNow(){ return stopped ? Promise.resolve() : tick(); }
  };
}

const RANKS = ["中校","少校","上尉","中尉","少尉","士官長","上士","中士","下士","上等兵","一等兵","二等兵"];

// EMT（緊急救護技術員）證照等級，跟階級一樣是人員的固有資料，帳號審核
// 通過前就能先登記，車長/駕駛顯示時一併帶出，方便調度時知道現場救護量能。

function emtBadgeHtml(level){

}

// 車長／駕駛不能派給督導性質的角色（高勤官、全單位視角；主官管、連級主官），
// 車長還要再排除資淺士兵（上等兵／一等兵／二等兵），避免資淺兵員單獨擔任
// 車長。角色資訊來自 users 文件的 role 欄位（見 personnelPoll 的欄位對照）；
// 尚未登入（unclaimed）、手動預建的人員資料不受角色限制，視為一般人員。
const CREW_EXCLUDED_ROLES = ["duty_officer", "commander"];
const CREW_LEADER_EXCLUDED_RANKS = ["上等兵", "一等兵", "二等兵"];
function eligibleForDriver(x){ return !CREW_EXCLUDED_ROLES.includes(x.role); }
function eligibleForCrewLeader(x){ return eligibleForDriver(x) && !CREW_LEADER_EXCLUDED_RANKS.includes(x.title); }

const VEHICLE_TYPES = ["城市型救護車","野戰型救護車","悍馬型救護車","輕型戰術輪車","中型戰術輪車","1.75貨車"];
function vehicleTypeWeight(type){ const i = VEHICLE_TYPES.indexOf(type); return i === -1 ? VEHICLE_TYPES.length : i; }
// 「營內車／營外車」是勤務本身的屬性（建立勤務時填的 scope 欄位：這趟勤務
// 車輛會不會離開營區），不是車輛的忙碌狀態，兩者是不同概念，不要混用。
// 這裡是車輛目前忙碌狀態（是否已經掛在其他進行中的勤務上），只用來提醒
// 選車時這台車是否已經派出去，避免重複指派同一台車。
function dispatchedVehiclePlates(){
  const set = new Set();
  state.tasks.forEach(t => {
    if (t.type !== "liaison" && t.vehicle && deriveStatus(t.id) !== "completed") set.add(t.vehicle);
  });
  return set;
}
function vehicleOptionLabel(plate, dispatchedSet){ return `${plate}（${dispatchedSet.has(plate) ? '派遣中' : '可派遣'}）`; }
// 車號本身看不出是哪個單位的車，尤其是跨單位借車、或高勤官/管理員同時看
// 多個單位混在一起的畫面時特別容易搞混——查該車在車輛名冊裡實際登記的
// 單位（不是勤務本身的單位，借來的車兩者可能不一樣），沒有名冊資料就沒有。
function vehicleUnitLabel(plate){
  const v = state.vehicles.find(x => x.plate === plate);
  return v ? unitLabel(v.unit) : "";
}
// 勤務的營內／營外：這趟勤務車輛會不會離開營區，建立勤務時填寫，跟首頁
// 「車輛動態」統計共用同一個欄位值，兩處才會對得起來。舊資料沒有這個
// 欄位時，預設當作營外（多數勤務本來就是出營區執行）。
const TASK_SCOPE_OPTIONS = ["營內","營外"];
function taskScope(t){ return t && t.scope === "營內" ? "營內" : "營外"; }
// 急診待命：兩個醫務所地點固定，每個地點一筆文件（doc id = key），只存
// currentTaskId 指向目前綁定的待命勤務（見 viewErStandby() 說明），
// 不再另外存急診醫官/車長/駕駛文字——那些資料直接來自綁定的 tasks 文件。
// defaultUnit：建立待命勤務時預設帶入的單位（僅對可跨單位切換的角色如
// 管理員有意義，一般成員固定只能用自己單位，見 viewCreateTask 的 unit
// 判斷式）——成功北固定給第一連支援、精北固定給第二連支援。
const ER_STANDBY_LOCATIONS = [
  { key: "chenggongbei", label: "成功北醫務所", defaultUnit: "co1" },
  { key: "jingbei", label: "精北醫務所", defaultUnit: "co2" }
];
function sortVehicles(list){
  return list.slice().sort((a,b) => vehicleTypeWeight(a.type) - vehicleTypeWeight(b.type) || (a.plate||'').localeCompare(b.plate||''));
}
// 車輛下拉選單依車種分組（<optgroup>）：單位車輛一多，同車種放在一起
// 比較好找，車號本身就不用再重複標車種了。傳入的 list 要先經過
// sortVehicles() 排序（車種本身照 VEHICLE_TYPES 順序、組內再依車號），
// 這裡只需要在車種切換的地方插入分組標籤。
function vehicleOptionsByType(vehicles, renderOption){
  let html = "", curType = null;
  for (const v of vehicles) {
    const type = v.type || "其他";
    if (type !== curType) {
      if (curType !== null) html += "</optgroup>";
      html += `<optgroup label="${esc(type)}">`;
      curType = type;
    }
    html += renderOption(v);
  }
  if (curType !== null) html += "</optgroup>";
  return html;
}
// 車輛跨單位借用不常發生，預設車號下拉只列自己單位的車（依車種分組）；
// 勾選「跨單位借車」才展開列出三個單位全部車輛，依單位分組（車種改成
// 附註在車號後面），純 DOM 換掉 <select> 的內容，不觸發整頁 render()。
function vehicleSelectOptionsSameUnit(unit, currentPlate){
  const opts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const outSet = dispatchedVehiclePlates();
  return `<option value="">請選擇車輛</option>` + vehicleOptionsByType(opts, v =>
    `<option value="${esc(v.plate)}" ${v.plate===currentPlate?'selected':''}>${esc(vehicleOptionLabel(v.plate, outSet))}</option>`);
}
function vehicleSelectOptionsAllUnits(currentPlate){
  const opts = state.vehicles.filter(x => x.active !== false).slice()
    .sort((a,b) => unitWeight(a.unit) - unitWeight(b.unit) || vehicleTypeWeight(a.type) - vehicleTypeWeight(b.type) || (a.plate||'').localeCompare(b.plate||''));
  const outSet = dispatchedVehiclePlates();
  let html = `<option value="">請選擇車輛</option>`, curUnit = null;
  for (const v of opts) {
    if (v.unit !== curUnit) {
      if (curUnit !== null) html += "</optgroup>";
      html += `<optgroup label="${esc(unitLabel(v.unit))}">`;
      curUnit = v.unit;
    }
    html += `<option value="${esc(v.plate)}" ${v.plate===currentPlate?'selected':''}>${esc(vehicleOptionLabel(v.plate, outSet))}${v.type?' · '+esc(v.type):''}</option>`;
  }
  if (curUnit !== null) html += "</optgroup>";
  return html;
}

}

// 依醫事機構代碼查（新增/編輯醫院表單填的「健保特約代號」用這個核對，或
// 反過來給使用者確認代號對應到哪間機構）。
function findNhiHospitalByCode(code){
  if (!code) return null;
  const c = String(code).trim();
  return NHI_HOSPITAL_REGISTRY.find(r => r.c === c) || null;
}
// 「臺」「台」是同一個字的正異體，健保署清冊一律用「臺」（官方正式用字），
// 但一般人輸入時幾乎都習慣打「台」——比對前兩邊都正規化成同一個字，不然
// 使用者不知道清冊上是用哪個字，打「台大醫院」會查不到「國立臺灣大學醫學
// 院附設醫院」這種官方全名跟通稱差很多的情況（見下方 findNhiHospitalMatches
// 的說明）。
function normalizeHospitalQueryText(s){ return String(s||"").trim().replace(/臺/g, "台"); }
// 依名稱關鍵字模糊比對（不用打完全一致的官方全名——很多人根本不知道健保
// 署清冊上登記的是哪個全名，例如通稱「台大醫院」、清冊全名卻是「國立臺灣
// 大學醫學院附設醫院」），只要清冊名稱包含輸入的關鍵字，或輸入的內容包含
// 清冊名稱，都算命中；最多回傳 20 筆給使用者自己選，避免關鍵字太籠統時
// 整份清冊都跳出來。
function findNhiHospitalMatches(query){
  const q = normalizeHospitalQueryText(query);
  if (!q) return [];
  return NHI_HOSPITAL_REGISTRY
    .filter(r => { const n = normalizeHospitalQueryText(r.n); return n.includes(q) || q.includes(n); })
    .slice(0, 20);
}
/* =========================================================
   健保署急診即時資訊比對（見 functions/index.js 的 syncErRealtime）。
   這支公開 API 沒有正式文件可查，欄位名稱大小寫無法在部署前用真實資料
   驗證，這裡對「醫院識別碼」「醫院名稱」「各項等待人數／滿床通報」都列
   多種可能的大小寫/命名寫法，依序嘗試比對，提高第一次部署就抓到資料的
   機率；真的都比對不到時，畫面就是這間醫院沒有急診即時資訊可顯示（不
   影響其他既有功能），之後可以照 Cloud Functions 的 log（有記錄第一筆
   原始資料）調整這份清單。
   ========================================================= */
// 部署後從 Cloud Functions log 實際看到的原始資料確認：健保署這支 API
// 真正的欄位名稱是 hosP_ID／hosP_NAME 這種不規則大小寫（不是一般常見的
// HOSP_ID／HOSP_NAME），所以最前面就把它們列進來、放第一順位比對。其餘
// 猜測的大小寫寫法繼續保留當備援，避免健保署之後調整欄位命名又要重新
// 排查一次。
const ER_ID_KEYS = ["hosP_ID","HOSP_ID","HOSP_NO","HOSP_CODE","HospId","HospNo","HospCode","hospId","hospNo","hospCode"];
const ER_NAME_KEYS = ["hosP_NAME","HOSP_NAME","HospName","hospName","NAME","name"];
const ER_WAIT_SEE_KEYS = ["waiT_SEE_CNT","WAIT_SEE_CNT","WaiT_SEE_CNT","waitSeeCnt","WaitSeeCnt"];
const ER_WAIT_GENERAL_KEYS = ["waiT_GENERAL_CNT","WAIT_GENERAL_CNT","WaiT_GENERAL_CNT","waitGeneralCnt","WaitGeneralCnt"];
const ER_WAIT_ICU_KEYS = ["waiT_ICU_CNT","WAIT_ICU_CNT","WaiT_ICU_CNT","waitIcuCnt","WaitIcuCnt"];
const ER_INFORM_KEYS = ["inform","INFORM","Inform"];
function erField(record, keys){
  for (const k of keys) { if (record[k] != null && record[k] !== "") return record[k]; }
  return null;
}
// 主要用「健保特約代號」（admin 在醫院表單手動填的 nhiCode）比對；代號沒
// 填或比對不到時，退回用醫院名稱比對一次（欄位名稱猜錯時的備援路徑）。
function findErRecord(hospital, records){
  if (!Array.isArray(records) || !records.length) return null;
  if (hospital.nhiCode) {
    const code = String(hospital.nhiCode).trim();
    for (const r of records) {
      for (const k of ER_ID_KEYS) {
        if (r[k] != null && String(r[k]).trim() === code) return r;
      }
    }
  }
  if (hospital.name) {
    const name = String(hospital.name).trim();
    for (const r of records) {
      for (const k of ER_NAME_KEYS) {
        if (r[k] != null && String(r[k]).trim() === name) return r;
      }
    }
  }
  return null;
}
function erWaitSeeCount(hospital, erRealtime){
  const rec = erRealtime && findErRecord(hospital, erRealtime.records);
  if (!rec) return null;
  const n = Number(erField(rec, ER_WAIT_SEE_KEYS));
  return Number.isFinite(n) ? n : null;
}

// GCS 改成 E/V/M 三個下拉選單分開選，選完自動加總，避免自由輸入格式不

  { v: "3", label: "M3 異常屈曲" }, { v: "2", label: "M2 異常伸直" }, { v: "1", label: "M1 無反應" }
];
// 編輯既有紀錄時，把儲存的 GCS 字串（"E4V5M6（15分）" 或舊格式）拆回
// E/V/M 三個下拉選單各自的值，抓不到就留空讓使用者重新選。
function gcsPartsFromString(gcsStr){
  const evm = /E(\d).*V(\d).*M(\d)/.exec(gcsStr||"");
  return evm ? { e: evm[1], v: evm[2], m: evm[3] } : { e: "", v: "", m: "" };
}
// 生命徵象異常自動標色：分「正常／注意（偏離但不算危急）／危險」三級，門檻值
// 是常見的成人生命徵象參考區間，僅供現場快速警示用，不能取代臨床判斷。
function hrSeverity(n){ if (isNaN(n)) return ""; if (n>=60&&n<=100) return ""; if ((n>=50&&n<60)||(n>100&&n<=120)) return "warn"; return "danger"; }
function rrSeverity(n){ if (isNaN(n)) return ""; if (n>=12&&n<=20) return ""; if ((n>=8&&n<12)||(n>20&&n<=24)) return "warn"; return "danger"; }
function spo2Severity(n){ if (isNaN(n)) return ""; if (n>=95) return ""; if (n>=90) return "warn"; return "danger"; }
function tempSeverity(n){ if (isNaN(n)) return ""; if (n>=36&&n<=37.5) return ""; if ((n>=35&&n<36)||(n>37.5&&n<=38.5)) return "warn"; return "danger"; }
function bpSeverity(bpStr){
  const m = /^(\d+)\s*\/\s*(\d+)$/.exec((bpStr||"").trim());
  if (!m) return "";
  const sys = Number(m[1]), dia = Number(m[2]);
  const sysSev = (sys>=90&&sys<=140) ? "" : (sys>=80&&sys<160) ? "warn" : "danger";
  const diaSev = (dia>=60&&dia<=90) ? "" : (dia>=50&&dia<100) ? "warn" : "danger";
  return (sysSev==="danger"||diaSev==="danger") ? "danger" : (sysSev==="warn"||diaSev==="warn") ? "warn" : "";
}
function gcsSeverity(total){ if (isNaN(total)) return ""; if (total>=13) return ""; if (total>=9) return "warn"; return "danger"; }
// 舊資料的 GCS 可能是純數字（"15"）或沒有加總的 "E4V5M6"，新格式統一存
// "E4V5M6（15分）"；這裡盡量從各種格式抓出總分，抓不到就不標色。
function gcsTotalFromString(gcsStr){
  const s = gcsStr || "";
  const totalMatch = /(\d+)\s*分/.exec(s);
  if (totalMatch) return Number(totalMatch[1]);
  const evm = /E(\d).*V(\d).*M(\d)/.exec(s);
  if (evm) return Number(evm[1]) + Number(evm[2]) + Number(evm[3]);
  if (/^\d+$/.test(s.trim())) return Number(s.trim());
  return NaN;
}
function consciousnessSeverity(c){ if (c==="清") return ""; if (c==="痛"||c==="聲") return "warn"; if (c==="否") return "danger"; return ""; }
// 生命徵象歷史紀錄分兩組呈現：核心關鍵指標（意識/血壓/心跳/SpO2）用大字級
// 置中的迷你卡片，異常時整格變色；次要檢測指標（呼吸/體溫/GCS/血糖）維持
// 原本較小字級的清單樣式，兩組視覺權重不同，救護人員一眼就能先看核心指標。
function vitalsCoreGridHtml(v){
  const items = [];
  if (v.consciousness) items.push({ lbl: "意識", val: v.consciousness, sev: consciousnessSeverity(v.consciousness) });
  if (v.bp) items.push({ lbl: "血壓", val: v.bp, sev: bpSeverity(v.bp) });
  if (v.hr) items.push({ lbl: "心跳", val: v.hr, sev: hrSeverity(Number(v.hr)) });
  if (v.spo2) items.push({ lbl: "SpO2", val: v.spo2 + "%", sev: spo2Severity(Number(v.spo2)) });
  if (!items.length) return "";
  return `<div class="vitals-grid-core">${items.map(it => `
    <div class="vitals-core-item${it.sev?' '+it.sev:''}"><span class="lbl">${esc(it.lbl)}</span><span class="val">${esc(it.val)}</span></div>
  `).join("")}</div>`;
}
function vitalsSecondaryGridHtml(v){
  const cells = [];
  if (v.rr) cells.push(`<div class="vitals-item${rrSeverity(Number(v.rr))?' '+rrSeverity(Number(v.rr)):''}"><span class="lbl">呼吸</span><span class="val">${esc(v.rr)}</span></div>`);
  if (v.temp) cells.push(`<div class="vitals-item${tempSeverity(Number(v.temp))?' '+tempSeverity(Number(v.temp)):''}"><span class="lbl">體溫</span><span class="val">${esc(v.temp)}°C</span></div>`);
  if (v.gcs) {
    // GCS 原始字串（如「E4V5M6（15分）」）拆成兩層顯示：總分當主要大字（跟
    // 其他次要指標視覺權重一致），E/V/M 分項只是救護人員需要時才覆核的
    // 細節，縮小放在下面當輔助淡字，不跟總分搶視覺焦點。
    const total = gcsTotalFromString(v.gcs);
    const parts = gcsPartsFromString(v.gcs);
    const totalHtml = isNaN(total) ? esc(v.gcs) : `${total}<span class="unit">分</span>`;
    const breakdown = (parts.e && parts.v && parts.m) ? `E${parts.e}V${parts.v}M${parts.m}` : "";
    const sev = gcsSeverity(total);
    cells.push(`<div class="vitals-item${sev?' '+sev:''}"><span class="lbl">GCS</span><span class="val">${totalHtml}</span>${breakdown?`<span class="sub">${esc(breakdown)}</span>`:''}</div>`);
  }
  if (v.glucose) cells.push(`<div class="vitals-item"><span class="lbl">血糖</span><span class="val">${esc(v.glucose)}</span></div>`);
  if (!cells.length) return "";
  return `<div class="vitals-grid">${cells.join("")}</div>`;
}

  if (historyRow.length) groups.push(historyRow);
  if (!groups.length) return "";
  return `<div class="detail-panel"><div class="qa-grid">${groups.map((items,i) => `

    </div>`).join("")}</div></div>`;
}

// 蓋過 prefers-color-scheme 判斷，見 CSS 裡對應的 :root[data-theme=...] 規則。
const THEME_STORAGE_KEY = "medtrack_theme_mode";
function loadThemeMode(){

}
function applyThemeMode(mode){
  if (mode === "light" || mode === "dark") document.documentElement.setAttribute("data-theme", mode);
  else document.documentElement.removeAttribute("data-theme");
}

let tasksPoll = null, eventsPoll = null, profilePoll = null;

let hospitalsPoll = null, vitalsPoll = null, erStandbyPoll = null, doctorsPoll = null;

const lastJson = {};
function changedSince(cacheKey, value){
  const json = JSON.stringify(value);
  const changed = json !== lastJson[cacheKey];
  lastJson[cacheKey] = json;
  return changed;
}

/* =========================================================
   4) 狀態推導（純函式：Event 陣列 → 狀態）
   ========================================================= */
// 使用者填的時間只精確到分鐘，同一分鐘內回報兩筆事件時（例如連續兩個動作
// 都在同一分鐘內完成），timestamp 打平手光靠 ts 排序，順序就要看 Firestore
// 回傳文件的順序（並無保證），時間軸可能被打亂。seq 是實際寫入當下的毫秒
// 數，跟使用者填的時間無關，只在打平手時當穩定的次要排序依據，確保
// 「寫入順序」跟「顯示順序」一致。
function eventOrderCompare(a, b){ return (a.ts||0) - (b.ts||0) || (a.seq||0) - (b.seq||0); }
function deriveStatus(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  const evs = state.events.filter(e => e.taskId === taskId).sort(eventOrderCompare);
  if (evs.length === 0) return "pending";
  const last = evs[evs.length - 1];
  const def = eventTypesFor(t).find(d => d.type === last.type);
  return def ? def.statusKey : "pending";
}
function taskEvents(taskId) {
  return state.events.filter(e => e.taskId === taskId).sort(eventOrderCompare);
}
function eventByType(taskId, type){
  return taskEvents(taskId).find(e => e.type === type) || null;
}
// Workflow 導向：除了已抵達現場之後（可能前往下一個地點、也可能直接返營，
// 真正需要分岔）以外，任何時候都只有「一個」下一步動作，讓使用者不用自己
// 判斷流程，只要照系統提示做下一步就好。
// 離開現場跟抵達下一個地點是兩個不同時刻（中間有移動時間），必須各自回報
// 一次時間/里程，不能假設同一刻直接合併成一個動作——否則抵達下一站填的
// 時間會被誤套用成離開現場的時間，時間軸就會失真甚至順序顛倒。
function reportableTypes(taskId){
  if (deriveStatus(taskId) === "completed") return [];
  const t = state.tasks.find(x => x.id === taskId);
  const evs = taskEvents(taskId);
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  // 洽公任務地點在建立時就一次填完，回報流程沒有分岔，單純出發→抵達→離開→返營。
  // !lastType（還沒有任何事件）＝待出勤，跟「已出勤、下一步抵達現場」是
  // 兩件不同的事，急診待命的待命勤務建立時不會自動補 DISPATCH 事件，會
  // 真的停在待出勤狀態，所以這裡要分開處理，不能再假設 !lastType 不會發生。
  if (t && t.type === "liaison") {
    if (!lastType) return ["DISPATCH"];
    if (lastType === "DISPATCH") return ["ARRIVED_SCENE"];
    if (lastType === "ARRIVED_SCENE") return ["DEPART_SCENE"];
    if (lastType === "DEPART_SCENE") return ["RETURNING"];
    return [];
  }
  if (!lastType) return ["DISPATCH"];
  if (lastType === "DISPATCH") return ["ARRIVED_SCENE"];
  if (lastType === "ARRIVED_SCENE") return ["DEPART_SCENE", "RETURNING"]; // 唯一的分岔點
  // 離開現場後車輛正在移動，還沒抵達下一個地點，所以下一步只會是「抵達」；
  // 離開跟抵達是兩個不同時刻（中間有移動時間），必須分開回報各自的時間/里程，
  // 不能像返營那樣直接假設同一刻，否則抵達時間會被錯誤地套用成離開時間。
  if (lastType === "DEPART_SCENE") return ["ARRIVED_SCENE"];
  if (lastType === "RETURNING") return ["COMPLETED"];
  return [];
}
function isSameDay(ms, ref){
  if (!ms) return false;
  const a = new Date(ms), b = ref;
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
// 急診待命每天固定 08:00 換班，車長/駕駛應該跟著換班更新。現在時間還沒到
// 今天 08:00 時，目前這班其實是「昨天 08:00 開始」的班，不能拿今天的日期
// 當基準，否則從昨天下午一路待命到今天清晨都會被誤判成過期；換算成「以
// 最近一次 08:00 為起點」的基準時間，建立時間比這個基準還早才算過期。
function standbyShiftCutoff(now){
  const cutoff = new Date(now);
  cutoff.setHours(8, 0, 0, 0);
  if (now < cutoff) cutoff.setDate(cutoff.getDate() - 1);
  return cutoff;
}
function isStandbyStale(createdAtMs){
  if (!createdAtMs) return false;
  return createdAtMs < standbyShiftCutoff(new Date()).getTime();
}
function durationLabel(ms){
  if (ms == null || ms < 0) return "—";
  const mins = Math.round(ms/60000);
  if (mins < 60) return `${mins} 分鐘`;
  const h = Math.floor(mins/60), m = mins%60;
  return `${h} 小時 ${m} 分鐘`;
}

/* =========================================================
   5) RBAC
   ========================================================= */
// 舊資料相容：早期版本把連級主官管存成 "company_commander"，統一正規化成 "commander"。
function normalizeRole(role){ return role === "company_commander" ? "commander" : role; }
function myRole(p){ return p ? normalizeRole(p.role) : ""; }
function myUnit(p){ return (p && p.unit) || ""; }
function isActive(p){ const r = myRole(p); return p && r !== "pending" && r !== "disabled"; }
function canSeeAllUnits(p){ const r = myRole(p); return r === "admin" || r === "duty_officer"; }
function canManageUsers(p){ return myRole(p) === "admin"; }
// 任務管理／基礎資料管理：admin、高勤官（全單位），連級主官管（僅自己單位）皆可進入管理後台
function canManageTasks(p){ const r = myRole(p); return r === "admin" || r === "duty_officer" || r === "commander"; }
function canManageBaseData(p){ return canManageTasks(p); }
// 醫院是全營共用的參考資料，新增一筆會影響所有單位查到的清單，範圍收窄成
// 只有 admin 可以新增，避免高勤官/主官管誤增到重複或不精確的醫院資料；
// 既有醫院的編輯／刪除維持 canManageBaseData 不變。
function canAddHospital(p){ return myRole(p) === "admin"; }
function canSeeAllTasks(p){ return canSeeAllUnits(p); }
// 高勤官、主官管對勤務只有查看權限：不可編輯、不可強制結束，僅 admin 可操作。
function canDeleteTask(p){ return myRole(p) === "admin"; }
function canForceEndTask(p){ return myRole(p) === "admin"; }
// 建立勤務改為一般成員、管理員專用；高勤官／主官管維持督導/查看角色（canManageTasks），
// 不再能自己建立勤務。
function canCreateTask(p){ const r = myRole(p); return r === "admin" || r === "member"; }
function canEditTask(p, t){ return myRole(p) === "admin"; }
// 車長／駕駛／洽公人員都是直接記錄「姓名」字串，跟登入者個人資料的
// displayName 同步而來（見 updateOwnProfile／personnel 名冊自動同步），
// 用 displayName 直接比對，就能知道目前登入者是不是這筆勤務指定的人員。
function isAssignedToTask(p, t){
  if (!p || !t) return false;
  const name = p.displayName;
  if (!name) return false;
  if (t.type === "liaison") return Array.isArray(t.personnel) && t.personnel.includes(name);
  return t.crewLeader === name || t.driver === name;
}
// 回報（出勤/抵達現場/返營/抵達營區）僅開放給這筆勤務指定的車長/駕駛/洽公
// 人員本人，以及 admin（後台支援用）——同單位其他成員不能代替沒有被指派
// 到的勤務回報，避免誤觸或代填別人的紀錄；高勤官、主官管屬於督導/查看
// 角色，不進行第一線回報操作。
function canReport(p, task){ const r = myRole(p); return r === "admin" || (r === "member" && isAssignedToTask(p, task)); }
// 患者紀錄的「查看」跟「回報/編輯」分開：高勤官、主官管雖然不能自己記錄
// 患者狀況，但督導角色仍需要看得到既有紀錄內容（例如遠端掌握傷病患狀況），
// 所以查看權限比照 canManageTasks，比 canReport 更寬。
function canViewVitals(p, task){ return canReport(p, task) || canManageTasks(p); }
function visibleTasks(p, tasks){
  if (!p) return [];
  if (canSeeAllUnits(p)) return tasks;
  return tasks.filter(t => t.unit === myUnit(p));
}

   登入後預設會看到什麼」，不會真的變更帳號、也不影響 Firestore
   實際的讀寫權限（那些永遠依照真實登入帳號的 role/unit 判斷）。

const PREVIEW_OPTIONS = [

function startRolePreview(role, unit){

/* =========================================================
   6) Firestore 動作
   ========================================================= */
async function addEvent(taskId, type, extra){
  const task = state.tasks.find(t => t.id === taskId);
  await fsAddDoc("events", {
    taskId, type, unit: task ? task.unit : "",
    timestamp: new Date(),
    userId: state.user.uid,
    userName: state.profile.displayName || state.user.displayName || state.user.email,
    ...extra,
    // seq 是實際寫入當下的毫秒數，跟使用者填的顯示時間無關，只在使用者填的
    // timestamp（只精確到分鐘）打平手時當作穩定的次要排序依據，確保時間軸
    // 顯示順序＝寫入順序，不受 Firestore 文件列表回傳順序（並無保證）影響。
    seq: Date.now()
  });
  showToast(`已回報：${eventTypesFor(task).find(e=>e.type===type).label}`);
  if (eventsPoll) eventsPoll.refreshNow();
  if (type === "COMPLETED" && task && task.erStandbyKey) {
    await renewStandbyTask(task);
  }
}
// 待命車送醫返營、任務完成後，該地點要立刻回到「待命中」，不能消失成「尚未
// 建立待命勤務」——沿用同一組車輛／人員自動建立下一筆待命勤務並接手指標，
// 值勤人員不用重新手動建立。新任務沒有患者資料，「有患者」徽章自然不會顯示；
// 剛完成的舊任務連同患者紀錄原樣保留，可在「紀錄」頁查閱。
async function renewStandbyTask(oldTask){
  try {
    const created = await createTask({
      unit: oldTask.unit, type: "duty", title: "待命勤務",
      vehicle: oldTask.vehicle, location: oldTask.location,
      scope: oldTask.scope || "營外",
      crewLeader: oldTask.crewLeader, driver: oldTask.driver,
      dutyOfficer: oldTask.dutyOfficer || "", recorders: oldTask.recorders || [],
      erStandbyKey: oldTask.erStandbyKey
    }, { skipDispatch: true });
    await fsSetDoc(`erStandby/${oldTask.erStandbyKey}`, {
      currentTaskId: created.id, updatedAt: new Date(),
      updatedByName: state.profile.displayName || state.profile.email || ""
    });
    if (erStandbyPoll) erStandbyPoll.refreshNow();
  } catch (e) {
    console.error("待命勤務續約失敗", e);
  }
}
// 時間、里程有時候會填寫錯誤，回報後仍要能修正，不能整筆事件唯讀鎖死。
async function updateEvent(id, fields){
  await fsSetDoc(`events/${id}`, fields);
  showToast("已更新回報紀錄");
  if (eventsPoll) eventsPoll.refreshNow();
}
// 誤按到不該回報的步驟時，要能整筆撤銷，不是只能改內容；只開放刪除「勤務
// 目前時間軸上最後一筆」（見 viewTaskDetail 的 eventEditModal 只在最後一筆才
// 顯示刪除鈕），刪掉中間的歷史紀錄會讓時間軸出現斷層、跟既有「不能刪除歷史
// 紀錄」的 rules 設計精神衝突，所以限制在「撤銷最新一步」這個情境。
async function deleteEvent(id){
  await fsDeleteDoc(`events/${id}`);
  showToast("已刪除回報紀錄");
  if (eventsPoll) eventsPoll.refreshNow();
}
// options.skipDispatch：急診待命的待命勤務要先建立（車號/車長/駕駛/值班
// 醫官都先填好），但還沒有真的出勤，所以不能像一般勤務一樣建立當下就自動
// 補一筆 DISPATCH 事件——要讓任務留在「待出勤」狀態，等真的出勤時再由
// 使用者自己在勤務詳情頁回報「出勤」。
async function createTask(data, options){
  options = options || {};
  const created = await fsAddDoc("tasks", { ...data, createdAt: new Date(), createdBy: state.user.uid, createdByName: state.profile.displayName || state.user.email });
  if (!options.skipDispatch) {
    await fsAddDoc("events", {
      taskId: created.id, type: "DISPATCH", unit: data.unit,
      // 跟手動回報的事件一樣只精確到分鐘（見 todayAt），不能用完整精確度的
      // new Date()——建立勤務後緊接著手動回報「抵達現場」，如果兩者剛好
      // 落在同一分鐘內，手動回報的時間欄位一律無條件捨去秒數，只要出勤這
      // 筆的秒數不是 0，就會變成比抵達還晚，導致排序顛倒、系統誤以為抵達
      // 還沒回報過，一直重複要求回報。
      timestamp: todayAt(hhmmValue(new Date())),
      userId: state.user.uid,
      userName: state.profile.displayName || state.user.email,
      ...(data.startMileage != null ? { mileage: data.startMileage } : {}),
      seq: Date.now()
    });
  }
  showToast(options.skipDispatch ? "待命勤務已建立，真正出勤時請至勤務詳情頁回報「出勤」"
    : (data.type === "liaison" ? "洽公已建立並標記出發" : "勤務已建立並標記出勤"));
  if (tasksPoll) tasksPoll.refreshNow();
  if (eventsPoll) eventsPoll.refreshNow();
  return created;
}

// 使用者在「座標」欄位貼「緯度,經度」（例如 24.1786,120.6400），這裡負責
// 解析成 {lat,lng} 數字；格式不對或欄位空白就回傳 null，呼叫端退回不存座標。
function parseHospitalCoords(str){
  if (!str) return null;
  const parts = String(str).split(",").map(s => s.trim());
  if (parts.length !== 2) return null;
  const lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
  if (!isFinite(lat) || !isFinite(lng)) return null;
  return { lat, lng };
}

/* =========================================================
   7) Auth 流程
   ========================================================= */
function doLogin(){
  // 手動按登入視為新的操作，要先把閒置計時戳記重置，不然剛被判定閒置
  // 登出、localStorage 裡的舊時間戳沒人清掉，重新登入成功後
  // onAuthStateChanged 又會用同一個過期時間戳判定閒置逾時，當場再登出
  // 一次、跳出同一個提示——使用者會卡在「一直登入一直被踢出」的迴圈。
  try { localStorage.setItem(IDLE_STORAGE_KEY, String(Date.now())); } catch (e) {}
  signInWithPopup(auth, googleProvider).catch(e => showToast("登入失敗：" + e.message));
}
function doLogout(){ signOut(auth); }

// 閒置 8 小時自動登出：最後操作時間存在 localStorage（不是只靠頁面裡的
// 計時器），這樣即使把 App 關掉、放在背景很久，甚至換一個分頁開，重新
// 打開時只要距離上次操作超過 8 小時，一樣會被判定為逾時、強制登出，
// 不會因為背景分頁計時器被瀏覽器暫停而失效。
const IDLE_LOGOUT_MS = 8 * 60 * 60 * 1000;
const IDLE_STORAGE_KEY = "medtrack_lastActivityAt";
let lastActivityWriteAt = 0;
function touchActivity(){
  const now = Date.now();
  if (now - lastActivityWriteAt < 30000) return; // 節流，不用每次操作都寫 localStorage
  lastActivityWriteAt = now;
  try { localStorage.setItem(IDLE_STORAGE_KEY, String(now)); } catch (e) {}
}
function isIdleTimedOut(){
  let last;
  try { last = Number(localStorage.getItem(IDLE_STORAGE_KEY)); } catch (e) { return false; }
  return !!last && (Date.now() - last > IDLE_LOGOUT_MS);
}

// 下拉重新整理是真的整頁 reload（見 setupPullToRefresh），reload 後
// state.route 會被重置回預設的首頁；reload 前把目前頁面存到
// sessionStorage，登入流程跑完、profile 抓到之後這裡讀回來，讓使用者
// 停留在原本的頁面，不會被彈回首頁。只用一次就清掉，不影響之後的正常
// 登入／登出流程（重新登入還是預設回首頁）。
const SAVED_ROUTE_KEY = "medtrack_savedRoute";
function restoreSavedRoute(){
  let raw;
  try { raw = sessionStorage.getItem(SAVED_ROUTE_KEY); sessionStorage.removeItem(SAVED_ROUTE_KEY); } catch (e) { return; }
  if (!raw) return;
  try {
    const route = JSON.parse(raw);
    if (route && route.name) state.route = route;
  } catch (e) {}
}

/* =========================================================
   7a-1) LINE 內建瀏覽器偵測
   分享連結被人直接在 LINE 對話裡點開，會用 LINE 自己的內建瀏覽器（不是
   Safari/Chrome）載入，這種 embedded webview 有兩個致命問題：
   1) Google 登入會直接失敗（Google 明文擋掉所有 embedded webview 的
      OAuth，跳 disallowed_useragent 錯誤）——所以偵測到是 LINE 就直接不
      顯示登入按鈕，顯示按了也沒用，不如直接教怎麼跳出去。
   2) iOS 上 LINE 瀏覽器的選單裡沒有「加入主畫面」這個選項，一定要先
      「在瀏覽器中開啟」跳到真正的 Safari，才能繼續加入主畫面（推播通知
      要用）。
   LINE 的 User-Agent 固定會帶 "Line/版本號"，用這個字串判斷。
   ========================================================= */
function isInLineBrowser(){
  return /\bLine\//i.test(navigator.userAgent);
}
// 流程圖用數字圓圈＋箭頭一步一步排下來，不管是登入頁還是推播設定頁
// 用到都是同一份步驟，抽成共用函式避免兩處各寫一份、之後又對不起來。
function lineOpenGuideHtml(){
  const steps = [

  ];

      <div class="line-guide-steps">

          <div class="line-guide-step">

/* =========================================================
   7b) 推播通知（Firebase Cloud Messaging）
   iOS Safari 只有「加入主畫面」變成 PWA 之後才支援背景推播，一般網頁
   分頁完全不支援（isMessagingSupported() 會回傳 false）；桌機/Android
   Chrome 一般網頁分頁就支援，不用加主畫面。
   ========================================================= */
let pushForegroundSetup = false;
async function checkPushSupport(){
  try { state.pushSupported = await isMessagingSupported(); }
  catch(e) { state.pushSupported = false; }
  return state.pushSupported;
}
// App 開著（前景）時收到推播不會跳系統通知，改用站內 toast 顯示，
// 只需要設定一次，重複呼叫會被 pushForegroundSetup 擋掉。
function setupForegroundMessaging(){
  if (pushForegroundSetup) return;
  pushForegroundSetup = true;
  checkPushSupport().then(supported => {
    if (!supported) return;
    const messaging = getMessaging(app);
    onMessage(messaging, (payload) => {
      // 後端故意送 data（純資料）而不是 notification 欄位，見
      // firebase-messaging-sw.js 上方的說明。
      const title = (payload.data && payload.data.title) || "新通知";
      const body = (payload.data && payload.data.body) || "";
      showToast(body ? `${title}：${body}` : title);
    });
  }).catch(e => console.error("前景推播監聽設定失敗", e));
}
// （render()/showToast() 呼叫順序現在已經不影響 toast 顯示——toast 節點
// 是掛在 document.body 底下、不在 #app 範圍內，render() 只會重畫
// #app.innerHTML，不會動到它，見 render() 內的說明。這裡沿用先 render()
// 再 showToast() 的寫法純粹是維持一致的程式碼風格。）
async function enablePush(){
  if (state.pushEnabling) return;
  state.pushEnabling = true; render();
  try {
    const supported = await checkPushSupport();
    if (!supported) {
      state.pushEnabling = false; render();
      showToast("此裝置/瀏覽器不支援推播，iPhone 請先「加入主畫面」後從主畫面圖示開啟再試一次");
      return;
    }
    const permission = await Notification.requestPermission();
    state.pushPermission = permission;
    if (permission !== "granted") {
      state.pushEnabling = false; render();
      showToast("通知權限被拒絕，請到手機設定裡開啟這個網站的通知權限");
      return;
    }
    const reg = await navigator.serviceWorker.register("firebase-messaging-sw.js");
    const messaging = getMessaging(app);
    const token = await getToken(messaging, { vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: reg });
    if (!token) {
      state.pushEnabling = false; render();
      showToast("無法取得推播權杖，請稍後再試");
      return;
    }
    const previousDeviceToken = localStorage.getItem(FCM_TOKEN_STORAGE_KEY);
    let updated = state.profile.fcmTokens || [];
    if (previousDeviceToken && previousDeviceToken !== token) {
      updated = updated.filter(t => t !== previousDeviceToken);
    }
    if (!updated.includes(token)) {
      updated = [...updated, token];
    }
    await fsSetDoc(`users/${state.user.uid}`, { fcmTokens: updated });
    state.profile.fcmTokens = updated;
    localStorage.setItem(FCM_TOKEN_STORAGE_KEY, token);
    state.pushEnabling = false; render();
    showToast("推播通知已開啟");
  } catch(e) {
    console.error("開啟推播失敗", e);
    state.pushEnabling = false; render();
    showToast("開啟推播失敗：" + (e.message || e));
  }
}
async function disablePush(){
  if (state.pushEnabling) return;
  state.pushEnabling = true; render();
  try {
    const messaging = getMessaging(app);
    const reg = await navigator.serviceWorker.getRegistration("firebase-messaging-sw.js");
    // 優先用 localStorage 記住的權杖（這支裝置實際存進資料庫的那一筆），
    // 沒有的話才退而求其次現場問一次（已註冊過的話 getToken 通常會回傳同
    // 一組既有權杖，不會重新產生新的）。
    let token = localStorage.getItem(FCM_TOKEN_STORAGE_KEY);
    if (!token && reg) { try { token = await getToken(messaging, { vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: reg }); } catch(e){} }
    const existing = state.profile.fcmTokens || [];
    const updated = token ? existing.filter(t => t !== token) : [];
    await fsSetDoc(`users/${state.user.uid}`, { fcmTokens: updated });
    state.profile.fcmTokens = updated;
    try { await deleteToken(messaging); } catch(e){}
    localStorage.removeItem(FCM_TOKEN_STORAGE_KEY);
    state.pushEnabling = false; render();
    showToast("推播通知已關閉");
  } catch(e) {
    console.error("關閉推播失敗", e);
    state.pushEnabling = false; render();
    showToast("關閉推播失敗：" + (e.message || e));
  }
}
function pushStatusLabel(){
  if (state.pushSupported === false) return "此裝置不支援";
  if (state.pushPermission === "denied") return "已被瀏覽器封鎖";
  return (state.profile && state.profile.fcmTokens && state.profile.fcmTokens.length) ? "已開啟" : "已關閉";
}

onAuthStateChanged(auth, async (user) => {
  cleanupListeners();
  if (user && isIdleTimedOut()) {
    state.user = null; state.profile = null; render();
    signOut(auth);
    showToast("閒置超過 8 小時，已自動登出，請重新登入");
    return;
  }
  state.user = user;
  if (!user) { state.profile = null; render(); return; }
  touchActivity();

  render(); // 立即顯示 spinner，避免畫面停留在登入頁

  try {
    const path = `users/${user.uid}`;
    let data = await fsGetDoc(path);
    if (!data) {
      data = { email: user.email, displayName: user.displayName, role: "pending", unit: "", createdAt: new Date() };
      await fsSetDoc(path, data);
    }
    state.profile = { uid: user.uid, ...data };
    restoreSavedRoute();
    if (state.profile.role !== "pending") startDataListeners();
    checkPushSupport().then(() => safeRender());
    setupForegroundMessaging();
    render();

    profilePoll = poll(async () => {
      const p = await fsGetDoc(path);
      if (!p) return;
      const wasPending = state.profile && state.profile.role === "pending";
      const changed = changedSince("profile", p);
      if (state.previewActive) {
        // 預覽模式進行中：背景保持同步真實角色/單位，但不覆蓋畫面上正在預覽的狀態
        state.realRoleUnit = { role: p.role, unit: p.unit };
        state.profile = { ...state.profile, uid: user.uid, displayName: p.displayName, email: p.email, rank: p.rank, createdAt: p.createdAt };
      } else {
        state.profile = { uid: user.uid, ...p };
      }
      if (wasPending && state.profile.role !== "pending") startDataListeners();
      if (changed || (wasPending && state.profile.role !== "pending")) safeRender();
    });
  } catch (err) {
    console.error("登入後初始化失敗", err);
    showToast(`登入後初始化失敗：[${err.code||'?'}] ${err.message} · build:${BUILD_TAG}`);
  }
});

// 合併「最近期間」查到的文件跟「紀錄」頁另外深度查詢過的舊文件，用 id 去重
// （深度查詢的優先，避免同一筆文件在兩份清單裡新舊內容打架）。
function mergeById(recentDocs, extraDocs){
  if (!extraDocs.length) return recentDocs;
  const ids = new Set(recentDocs.map(d => d.id));
  return recentDocs.concat(extraDocs.filter(d => !ids.has(d.id)));
}
// 人員名冊／帳號合併成同一份 users 集合後，車長/駕駛下拉選單、任務指派
// 等既有程式碼仍然沿用舊的 personnel 資料形狀（name/title/active...），
// 這裡把 users 文件轉成這個舊形狀，其餘呼叫端完全不用改。
// active 比照合併前 syncPersonnelFromUsers 的邏輯：pending（審核中）跟
// disabled（已停用）不算在職，其餘（含 unclaimed 尚未登入）都算在職，
// 可以被選為車長/駕駛。
function mapUserToPersonnel(u){
  const role = normalizeRole(u.role);
  return {
    id: u.id, unit: u.unit || "",
    name: u.displayName || u.email || u.id,
    title: u.rank || ROLE_LABEL[role] || "",
    phone: u.phone || "", emtLevel: u.emtLevel || "",
    active: role !== "disabled" && role !== "pending",
    email: u.email || "", role
  };
}

// 系統固定為營部／第一連／第二連三個單位；首次啟用時自動補建 units 文件，
// 供其他集合以 unit_id 建立關聯（不提供 UI 編輯，因為單位編制本身不會變動）。
let unitsSeeded = false;
async function ensureUnitsSeeded(){
  if (unitsSeeded) return;
  unitsSeeded = true;
  try {
    const existing = await fsListCollection("units");
    const have = new Set(existing.map(u => u.id));
    for (const u of UNITS) {
      if (!have.has(u.code)) await fsSetDoc(`units/${u.code}`, { name: u.label, order: UNITS.indexOf(u) });
    }
  } catch (e) { console.error("初始化單位資料失敗", e); }
}

// 醫院有登記自己的經緯度時，直接算跟 GPS 定位的實際距離最準；沒登記
// 座標的醫院則退而求其次，用「行政區」層級的代表點（區公所／市公所
// 座標，比整個縣市的代表點更接近實際醫院位置）概略判斷「人在哪個行政
// 區」，縣市層級當作行政區判斷不到時的備援（見 viewHospitals 的 matchInfo）。
const COUNTY_CENTERS = {
  "臺中市": { lat: 24.1477, lng: 120.6736 },
  "嘉義市": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣": { lat: 23.4623, lng: 120.3333 }
};
// key 用「縣市|行政區」，避免不同縣市剛好同名行政區（例如各地都有「東區」）互相搞混。
// 烏日區（成功北醫務所所在地，見 UNIT_WEATHER_TOWNSHIP）原本不在這份清單裡，
// 導致實際人在烏日的使用者定位會被錯配到最近的「已列出」行政區（南區，仍有
// 數公里之遙），誤判成南區——座標取自烏日分局烏日派出所（中山路二段309號）
// 公開地址資料，跟烏日區公所（新興路316號）在同一個市區範圍內，作為代表點
// 精度足夠。
const DISTRICT_CENTERS = {
  "臺中市|北區": { lat: 24.1512, lng: 120.6839 },
  "臺中市|西屯區": { lat: 24.1786, lng: 120.6400 },
  "臺中市|南區": { lat: 24.1253, lng: 120.6653 },
  "臺中市|梧棲區": { lat: 24.2547, lng: 120.5308 },
  "臺中市|大甲區": { lat: 24.3486, lng: 120.6222 },
  "臺中市|烏日區": { lat: 24.1062, lng: 120.6227 },
  "嘉義市|東區": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣|朴子市": { lat: 23.4650, lng: 120.2458 }
};
function haversineKm(lat1, lng1, lat2, lng2){
  const toRad = d => d * Math.PI / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function nearestCounty(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [county, c] of Object.entries(COUNTY_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = county; }
  }
  return best;
}
// 回傳 { county, district }：先找最接近的行政區代表點，再從 key 拆出對應
// 縣市，兩層資訊一起回傳，排序時可以優先比對行政區、比對不到才退回縣市。
// DISTRICT_CENTERS 目前只收錄少數幾個行政區，不是全臺完整清單；人如果實際
// 是在清單以外的行政區（例如大林鎮，還沒收錄），單純找「最近的一個」還是
// 會硬配一個其實有段距離的行政區，變成很肯定地講錯。這裡加一個距離上限
// （DISTRICT_MATCH_MAX_KM），超過就當作「這份清單裡沒有對得上的行政區」，
// 退回只用縣市比對（nearestCounty），不要不管多遠都硬報一個看似精確、
// 實際上是錯的行政區名稱。
const DISTRICT_MATCH_MAX_KM = 10;
function nearestDistrict(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [key, c] of Object.entries(DISTRICT_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = key; }
  }
  if (!best || bestDist > DISTRICT_MATCH_MAX_KM) return { county: nearestCounty(lat, lng), district: null };
  const [county, district] = best.split("|");
  return { county, district };
}

/* =========================================================
   7b) 氣象預報（中央氣象署 CWA 開放資料 API，直接從瀏覽器端呼叫；
   縣市層級 36 小時天氣預報，快取 30 分鐘，只在切換單位或首頁重新
   整理時才會重抓，不使用背景計時器）
   ========================================================= */
// 進到天氣頁那一刻，weather/hazards/apparentTemp/weeklyForecast/rainfall
// 這 5 支 ensure*Loaded 會在同一個畫面重繪的同一個 tick 裡全部觸發，快取
// 都是空的時候等於同時對 opendata.cwa.gov.tw 開 5 條連線；實機上觀察到
// 排在後面的請求常常直接連線失敗（Safari 顯示「Load failed」，不是正常
// HTTP 錯誤回應），研判是撞到氣象署那邊對單一金鑰的併發連線限制。這裡用
// 一個共用的 Promise 佇列把所有打去 CWA 的請求排成一次一支，用等待時間
// 換穩定性。
let cwaRequestQueue = Promise.resolve();
function fetchCwa(url){
  const result = cwaRequestQueue.then(() => fetch(url));
  cwaRequestQueue = result.catch(() => {});
  return result;
}
const weatherCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let weatherLoadingCounty = null;
async function fetchWeather(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetchCwa(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const loc = json?.records?.location?.[0];
  if (!loc) throw new Error("查無天氣資料");
  const els = {};
  loc.weatherElement.forEach(e => { els[e.elementName] = e.time; });
  // 36 小時預報資料本身就有 3 個時段（今天白天/晚上、明天白天，依實際
  // 發布時間會往後移動），只取第一個時段當「現在」的話，後面兩個時段的
  // 資料等於白抓了。這裡把所有時段都留著，天氣頁除了大卡片顯示第一個
  // 時段，底下再補一個「未來預報」清單顯示其餘時段。
  const count = els.Wx?.length || 0;
  const periods = [];
  for (let i = 0; i < count; i++){
    periods.push({
      startTime: els.Wx?.[i]?.startTime || null,
      endTime: els.Wx?.[i]?.endTime || null,
      wx: els.Wx?.[i]?.parameter?.parameterName || "—",
      pop: els.PoP?.[i]?.parameter?.parameterName ?? null,
      minT: els.MinT?.[i]?.parameter?.parameterName ?? null,
      maxT: els.MaxT?.[i]?.parameter?.parameterName ?? null,
      ci: els.CI?.[i]?.parameter?.parameterName ?? null
    });
  }
  const first = periods[0] || {};
  return {
    county,
    wx: first.wx ?? "—",
    pop: first.pop ?? null,
    minT: first.minT ?? null,
    maxT: first.maxT ?? null,
    ci: first.ci ?? null,
    periods
  };
}
// 把時段的 startTime 轉成「今天白天／今天晚上／明天白天」這種好讀的標籤：
// 依日期差判斷今天/明天/後天，依小時判斷白天(06-18)或晚上。
function weatherPeriodLabel(startIso){
  if (!startIso) return "";
  const d = new Date(startIso);
  const now = new Date();
  const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dayDiff = Math.round((dayStart - todayStart) / 86400000);
  const dayLabel = dayDiff <= 0 ? "今天" : dayDiff === 1 ? "明天" : dayDiff === 2 ? "後天" : `${d.getMonth()+1}/${d.getDate()}`;
  const hour = d.getHours();
  const isNight = hour >= 18 || hour < 6;
  return `${dayLabel}${isNight ? "晚上" : "白天"}`;
}
function ensureWeatherLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = weatherCache[county];
  // 失敗結果也要存進快取（用比較短的有效期，2 分鐘），不然每次畫面重繪
  // 都會看到「沒有快取」又重新發一次請求，網路真的斷線/API 打不通時會
  // 變成無限重試迴圈——每次重試又會呼叫 safeRender() 整個重繪，使用者
  // 畫面上的捲動位置、正在做的操作都會一直被打斷。
  const freshFor = cached?.error ? 2*60*1000 : 30*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.weather = cached.data; return; }
  if (weatherLoadingCounty === county) return;
  weatherLoadingCounty = county;
  fetchWeather(county).then(data => {
    weatherCache[county] = { data, fetchedAt: Date.now() };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣資訊載入失敗", err);
    const data = { error: true, county, message: err.message || String(err) };
    weatherCache[county] = { data, fetchedAt: Date.now(), error: true };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  });
}
// 一週縣市天氣預報（F-C0032-005）：這組資料集實際查證過並不在氣象署
// REST datastore／Swagger 文件裡（跟今明 36 小時預報 F-C0032-001 不是走
// 同一條路），只透過資料集頁面的靜態檔案下載提供，放在 AWS S3、不需要
// 授權碼，格式也是完全不同的 cwaopendata/dataset/location 包法（不是
// records/location）。欄位也比 36 小時預報少，只有 Wx/MaxT/MinT，沒有
// PoP／CI，所以畫面上這兩項不會顯示。
//
// 參考資料（未來要重新查證時從這裡開始，不要用舊 fixture 或搜尋結果猜
// schema；資料集介紹頁上的「JSON」下載按鈕點下去就會看到目前這個真正
// 在用的網址）：
// https://opendata.cwa.gov.tw/dataset/forecast/F-C0032-005
const weeklyForecastCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let weeklyForecastLoadingCounty = null;
async function fetchWeeklyForecast(county){
  const url = `https://cwaopendata.s3.ap-northeast-1.amazonaws.com/Forecast/F-C0032-005.json`;
  const res = await fetch(url);
  if (!res.ok) {
    let detail = ""; try { detail = (await res.text()).slice(0,200); } catch(e){}
    throw new Error(`HTTP ${res.status}${detail ? `：${detail}` : ""}`);
  }
  const json = await res.json();
  const locs = json?.cwaopendata?.dataset?.location || [];
  const loc = locs.find(l => l.locationName === county);
  if (!loc) throw new Error("查無一週預報資料");
  const els = {};
  loc.weatherElement.forEach(e => { els[e.elementName] = e.time; });
  const count = els.Wx?.length || 0;
  const periods = [];
  for (let i = 0; i < count; i++){
    periods.push({
      startTime: els.Wx?.[i]?.startTime || null,
      endTime: els.Wx?.[i]?.endTime || null,
      wx: els.Wx?.[i]?.parameter?.parameterName || "—",
      minT: els.MinT?.[i]?.parameter?.parameterName ?? null,
      maxT: els.MaxT?.[i]?.parameter?.parameterName ?? null
    });
  }
  return { county, periods };
}
function ensureWeeklyForecastLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = weeklyForecastCache[county];
  // 一週預報不需要跟 36 小時預報一樣頻繁更新，成功快取拉長到 1 小時；
  // 失敗快取理由同 ensureWeatherLoaded，避免無限重試迴圈。
  const freshFor = cached?.error ? 2*60*1000 : 60*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.weeklyForecast = cached.error ? { county, error: true, message: cached.message } : { county, periods: cached.data.periods }; return; }
  if (weeklyForecastLoadingCounty === county) return;
  weeklyForecastLoadingCounty = county;
  fetchWeeklyForecast(county).then(data => {
    weeklyForecastCache[county] = { data, fetchedAt: Date.now() };
    state.weeklyForecast = { county, periods: data.periods };
    weeklyForecastLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("一週預報載入失敗", err);
    const message = err.message || String(err);
    weeklyForecastCache[county] = { fetchedAt: Date.now(), error: true, message };
    state.weeklyForecast = { county, error: true, message };
    weeklyForecastLoadingCounty = null;
    safeRender();
  });
}
// 雨量站觀測（O-A0002-001）：這組資料集沒有縣市查詢參數，一次回傳全臺
// 所有雨量站，要靠每筆資料自帶的 parameter（CITY/TOWN）自己篩出目標縣市
// 範圍內的測站。同一個縣市裡通常有好幾個測站，這裡取「近 3 小時累積雨量」
// 最高的那一個當代表值——比隨便挑第一筆更保守，對執勤安全判斷更有意義
// （最糟情況才是該注意的情況）。負值（-99 之類）是氣象署慣用的缺測標記，
// 一律當成無效值處理。
const rainfallCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let rainfallLoadingCounty = null;
async function fetchRainfallStation(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${CWA_API_KEY}`;
  const res = await fetchCwa(url);
  if (!res.ok) {
    let detail = ""; try { detail = (await res.text()).slice(0,200); } catch(e){}
    throw new Error(`HTTP ${res.status}${detail ? `：${detail}` : ""}`);
  }
  const json = await res.json();
  const stations = json?.records?.location || [];
  const matches = stations.filter(s => (s.parameter || []).some(p => p.parameterName === "CITY" && p.parameterValue === county));
  if (!matches.length) return { county, stationName: null, hour3: null, hour24: null };
  const val = (s, name) => {
    const el = (s.weatherElement || []).find(e => e.elementName === name);
    const v = el ? Number(el.elementValue) : NaN;
    return Number.isFinite(v) && v >= 0 ? v : -1;
  };
  let best = matches[0];
  matches.forEach(s => { if (val(s, "HOUR_3") > val(best, "HOUR_3")) best = s; });
  const hour3 = val(best, "HOUR_3");
  const hour24 = val(best, "HOUR_24");
  return {
    county,
    stationName: best.locationName || null,
    hour3: hour3 >= 0 ? hour3 : null,
    hour24: hour24 >= 0 ? hour24 : null
  };
}
function ensureRainfallLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = rainfallCache[county];
  const freshFor = cached?.error ? 2*60*1000 : 15*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.rainfall = cached.error ? { county, error: true, message: cached.message } : { county, ...cached.data }; return; }
  if (rainfallLoadingCounty === county) return;
  rainfallLoadingCounty = county;
  fetchRainfallStation(county).then(data => {
    rainfallCache[county] = { data, fetchedAt: Date.now() };
    state.rainfall = { county, ...data };
    rainfallLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("雨量站資料載入失敗", err);
    const message = err.message || String(err);
    rainfallCache[county] = { fetchedAt: Date.now(), error: true, message };
    state.rainfall = { county, error: true, message };
    rainfallLoadingCounty = null;
    safeRender();
  });
}

// 鄉鎮天氣預報（F-D0047-093）：這組資料集不接受用鄉鎮名稱查詢，實際
// 查證（透過氣象署 Swagger 文件的 Try it out 對照真實請求)確認要用
// locationId 帶「該縣市專屬的子資料集代碼」（例如臺中市是 F-D0047-075、
// 嘉義縣是 F-D0047-031，不是 093 本身），回應包裹格式也跟其他資料集不同：
// records.Locations[]（該縣市）→ Location[]（鄉鎮）→ WeatherElement[]
// （中文 ElementName，例如「平均相對濕度」）→ Time[]（12 小時一個區間，
// 不是瞬時值）→ ElementValue[0]（依欄位名稱各自命名的值，例如
// {RelativeHumidity:"76"}）。這組資料實際查證後才發現原來也有風速風向、
// 紫外線指數，先前用另一份舊資料判斷「沒有風速風向」是錯的。
//
// 參考資料（未來這組資料集又出問題時，從這裡重新查證，不要用舊 fixture
// 或搜尋結果猜 schema）：
// - Swagger 互動文件（可以直接用自己的授權碼 Try it out，執行後會顯示
//   實際送出的完整請求網址／curl，這是本次查出正確用法的關鍵）：
//   https://opendata.cwa.gov.tw/dist/opendata-swagger.html
// - 資料集介紹頁（有「JSON／XML 檔案下載」按鈕，可以直接看到目前實際
//   在用的縣市代碼、資料範例）：
//   https://opendata.cwa.gov.tw/dataset/forecast/F-D0047-093
// - 若某縣市不在 COUNTY_TOWNSHIP_DATASET_ID 對照表裡，要用上面兩個
//   管道其中一個查出該縣市對應的 F-D0047-0XX 代碼，不要用臆測的號碼。
const COUNTY_TOWNSHIP_DATASET_ID = { "臺中市": "F-D0047-075", "嘉義縣": "F-D0047-031" };
const apparentTempCache = {}; // { [鄉鎮名稱]: { data, fetchedAt } }
let apparentTempLoadingTownship = null;
// 取「現在」所在的 12 小時區間（找不到就退回第一筆），回傳該區間的
// ElementValue[0]（一個物件，key 是欄位名稱，例如 {RelativeHumidity:"76"}）。
function currentWindowValue(el){
  const times = el?.Time || [];
  if (!times.length) return null;
  const now = Date.now();
  const match = times.find(t => {
    const s = new Date(t.StartTime).getTime();
    const e = new Date(t.EndTime).getTime();
    return now >= s && now < e;
  });
  return (match || times[0])?.ElementValue?.[0] || null;
}
async function fetchApparentTemp(county, township){
  const datasetId = COUNTY_TOWNSHIP_DATASET_ID[county];
  if (!datasetId) throw new Error(`${county} 沒有對應的鄉鎮預報資料集代碼`);
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-093?Authorization=${CWA_API_KEY}&format=JSON&locationId=${datasetId}`;
  const res = await fetchCwa(url);
  if (!res.ok) {
    let detail = ""; try { detail = (await res.text()).slice(0,200); } catch(e){}
    throw new Error(`HTTP ${res.status}${detail ? `：${detail}` : ""}`);
  }
  const json = await res.json();
  const loc = (json?.records?.Locations?.[0]?.Location || []).find(l => l.LocationName === township);
  if (!loc) throw new Error("查無鄉鎮預報資料");
  const els = {};
  (loc.WeatherElement || []).forEach(e => { els[e.ElementName] = e; });
  const rh = currentWindowValue(els["平均相對濕度"])?.RelativeHumidity;
  const td = currentWindowValue(els["平均露點溫度"])?.DewPoint;
  const atMax = currentWindowValue(els["最高體感溫度"])?.MaxApparentTemperature;
  const windVal = currentWindowValue(els["風速"]);
  const windDirVal = currentWindowValue(els["風向"])?.WindDirection;
  const uvVal = currentWindowValue(els["紫外線指數"]);
  const toNum = v => (v != null && v !== "" ? Number(v) : null);
  return {
    township,
    at: toNum(atMax),
    rh: toNum(rh),
    td: toNum(td),
    windSpeed: toNum(windVal?.WindSpeed),
    beaufort: toNum(windVal?.BeaufortScale),
    windDir: windDirVal || null,
    uvIndex: toNum(uvVal?.UVIndex),
    uvLevel: uvVal?.UVExposureLevel || null
  };
}
function ensureApparentTempLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const cached = apparentTempCache[township];
  const freshFor = cached?.error ? 2*60*1000 : 30*60*1000;
  if (cached && Date.now() - cached.fetchedAt < freshFor) { state.apparentTemp = cached.error ? { township, error: true, message: cached.message } : { township, ...cached.data }; return; }
  if (apparentTempLoadingTownship === township) return;
  apparentTempLoadingTownship = township;
  fetchApparentTemp(county, township).then(data => {
    apparentTempCache[township] = { data, fetchedAt: Date.now() };
    state.apparentTemp = { township, ...data };
    apparentTempLoadingTownship = null;
    safeRender();
  }).catch(err => {
    console.error("體感溫度載入失敗", err);
    const message = err.message || String(err);
    apparentTempCache[township] = { fetchedAt: Date.now(), error: true, message };
    state.apparentTemp = { township, error: true, message };
    apparentTempLoadingTownship = null;
    safeRender();
  });
}

function timeAgo(ms){
  if (!ms) return "—";
  const diff = Math.max(0, Date.now() - ms);
  const m = Math.floor(diff/60000);
  if (m < 1) return "剛剛";
  if (m < 60) return `${m} 分鐘前`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} 小時前`;
  return `${Math.floor(h/24)} 天前`;
}
function fmtTime(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
}
function fmtDate(d){
  return d.toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
// 效期只需要精確到日期（不用像 fmtTime 一樣顯示到分鐘），公告卡片用。
function fmtDateShort(ms){
  if (!ms) return "";
  return new Date(ms).toLocaleDateString("zh-TW", { month:"2-digit", day:"2-digit" });
}
// 回報表單的時間欄位只顯示「時:分」不顯示日期（勤務都是當天的），
// 送出時再跟今天的日期組合成完整時間。
function hhmmValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
// 把「HH:mm」字串跟今天的日期組合成完整的本地時間 Date。
function todayAt(hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
// 編輯既有回報時，時間欄位一樣只顯示「時:分」，但要沿用該筆回報「原本
// 的日期」（可能不是今天），不能用 todayAt()，否則修正時間會被誤改到
// 今天的日期。
function dateAt(baseMs, hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date(baseMs);
  d.setHours(h, m, 0, 0);
  return d;
}
// 全站統一的提示框模板：同一時間只顯示一則，後面來的先排隊，等前一則
// 完整顯示完（含淡出動畫）才輪到下一則——避免像「已回報：抵達營區」緊接著
// 「待命勤務已建立…」這種前後腳觸發的情境，後面那則把前面那則直接蓋掉、
// 兩則都沒看清楚。
const toastQueue = [];
let toastBusy = false;
function showToast(msg){
  toastQueue.push(msg);
  if (!toastBusy) advanceToastQueue();
}
function advanceToastQueue(){
  if (!toastQueue.length){ toastBusy = false; return; }
  toastBusy = true;
  const msg = toastQueue.shift();
  let t = document.getElementById("toast");
  if (!t){
    t = document.createElement("div"); t.id="toast"; t.className="toast";
    t.innerHTML = `<span class="toast-icon"></span><span class="toast-text"></span><span class="toast-progress"></span>`;
    document.body.appendChild(t);
  }
  // 訊息本身沒有攜帶「成功/失敗」的類型資訊，站內失敗訊息全部沿用「OO
  // 失敗：原因」這個固定寫法，用這個特徵判斷要顯示哪種圖示/顏色就好，不用
  // 每個呼叫端都額外傳一個 type 參數。
  const isError = /失敗/.test(msg);
  const iconEl = t.querySelector(".toast-icon");
  iconEl.innerHTML = icon(isError ? "alert" : "check", 18);
  iconEl.className = "toast-icon " + (isError ? "error" : "ok");
  t.querySelector(".toast-text").textContent = msg;
  // 訊息越長給越多閱讀時間（例如推播內容常常一次帶標題＋內文，比原本單純
  // 的操作結果提示長很多）：基本停留 2.6 秒，每個字再加 90 毫秒，上限 6 秒
  // 避免太長的訊息把畫面擋太久。也可以直接點一下提前關閉。
  const duration = Math.min(6000, Math.max(2600, 2600 + msg.length * 90));
  const bar = t.querySelector(".toast-progress");
  bar.style.transition = "none"; bar.style.width = "100%";
  void bar.offsetWidth; // 強制 reflow，下面改 transition 才會真的觸發動畫
  bar.style.transition = `width ${duration}ms linear`;
  bar.style.width = "0%";
  t.classList.add("show");
  clearTimeout(showToast._tm);
  const dismiss = () => { t.classList.remove("show"); setTimeout(advanceToastQueue, 260); };
  showToast._tm = setTimeout(dismiss, duration);
  t.onclick = () => { clearTimeout(showToast._tm); dismiss(); };
}

// 全站共用的返回鍵：純圖示的液態玻璃圓圈＋chevron SVG（不接文字、右邊不接
// 標題），不管目的地是哪裡都一樣，不要再依頁面各自寫「返回列表」「返回
// 更多」等。onclick 屬性務必用單引號包起來，因為裡面的 JSON.stringify(route)
// 輸出是雙引號字串，跟雙引號屬性會互相截斷（曾造成整個返回鍵完全沒反應的
// bug）。chevron 用行內 SVG（stroke-width 2.5，比全站圖標系統的 1.8 粗一點，
// 圓圈變大之後細線條比例上會顯得太細）而不是共用的 icon() helper。
function backBtn(route){

}
// 多選（checkbox）/單選（radio）標籤群組，用於過去病史／過敏史／處置項目／意識狀態。
// triggers（選填）：[{ values:[...], wrapId }]，勾選到指定選項時，只切換對應
// detail 輸入框容器的顯示/隱藏（呼叫 window.__syncDetailVisibility），不觸發
// 整頁 render()，避免使用者已經填到一半的其他欄位被清空重繪掉。
function chipGroup(name, options, selected, multi, triggers){
  const type = multi ? "checkbox" : "radio";
  const sel = multi ? (selected||[]) : null;
  return `<div class="chip-select">${options.map(o => {
    const trig = triggers && triggers.find(tr => tr.values.includes(o));
    const onchange = trig ? ` onchange='window.__syncDetailVisibility("${trig.wrapId}","${name}",${JSON.stringify(trig.values)})'` : "";
    return `
    <label class="chip-option">
      <input type="${type}" name="${name}" value="${esc(o)}" ${multi ? (sel.includes(o)?'checked':'') : (selected===o?'checked':'')}${onchange}>
      <span>${esc(o)}</span>
    </label>`;
  }).join("")}</div>`;
}
// 主訴等自由輸入框旁邊的快捷選字下拉選單：選一個選項就把常見用語塞進
// 輸入框（用「、」分隔多個詞，跟站內其他「可多個」的文字欄位同一套分隔
// 慣例），選完選單重置回「快速選擇」，可以重複打開再選下一個詞做複選；
// 純 DOM 操作輸入框內容，不觸發整頁 render()，理由跟車長/駕駛選擇器
// 一樣：避免把其他還在填寫中、未受控的欄位一起清空。
function quickFillSelect(inputId, options){
  return `<select class="quick-fill-select" onchange='window.__applyQuickFillSelect("${inputId}", this)'>
    <option value="">快速選擇</option>
    ${options.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join("")}
  </select>`;
}

   10) 共用：狀態徽章 / 卡片

function statusBadge(statusKey){
  const cls = { pending:"pending", dispatch:"dispatch", onscene:"onscene", transit:"transit", returning:"returning", completed:"completed" }[statusKey];
  return `<span class="badge ${cls}"><i class="dot"></i>${STATUS_LABEL[statusKey]}</span>`;
}
function taskCardClass(statusKey){
  return { pending:"s-pending", dispatch:"s-dispatch", onscene:"s-onscene", transit:"s-transit", returning:"s-returning", completed:"s-completed" }[statusKey];
}
// 依姓名＋單位查該人員的電話（人員資料由帳號同步或基礎資料管理手動維護）。
// 舊資料（單位欄位、下拉選單上線前）可能沒有 unit，姓名也常跟階級直接連寫成
// 一串，例如「林伯霖上士」，對不上人員名冊裡單純的姓名「林伯霖」。這裡先在
// 同單位內精準比對、再開頭比對；都找不到的話（通常是舊資料缺 unit）才放寬
// 成全部單位一起找，讓舊任務也能顯示電話。
function findPersonnelByName(pool, name){
  return pool.find(x => x.name === name) || pool.find(x => x.name && name.startsWith(x.name));
}
function findPersonnel(name, unit){
  if (!name) return null;
  const scoped = unit ? state.personnel.filter(x => x.unit === unit) : state.personnel;
  return findPersonnelByName(scoped, name) || (unit ? findPersonnelByName(state.personnel, name) : null);
}
// 姓名 + 階級（若姓名本身沒有帶階級，如新版下拉選單只存姓名，才補上人員名冊的階級）。
// 凡是畫面上會出現人名的地方都套用，讓階級一律跟著姓名顯示。階級用縮小的
// 灰階字（.muted-suffix）弱化，不跟姓名搶視覺焦點，姓名才是主要資訊。
function nameWithRank(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const rank = (match && match.title && !name.includes(match.title)) ? match.title : '';
  return esc(name) + (rank ? ` <span class="muted-suffix">${esc(rank)}</span>` : '');
}
// 編輯勤務頁面「車長／駕駛」欄位目前已指派人選的顯示文字：姓名＋階級，
// 用空格分隔（例如「林伯霖 上士」），不加點號、不顯示單位。
function crewDisplayLabel(name, taskUnit){
  const match = findPersonnel(name, taskUnit);
  if (!match) return name;
  return `${match.name}${match.title ? ' ' + match.title : ''}`;
}
// 值班醫官姓名＋階級，格式跟車長／駕駛一致：空格分隔、不加括號；階級一樣
// 用 .muted-suffix 縮小弱化。呼叫端不用再另外包 esc()，這裡已經處理過escaping。
function doctorLabel(name){
  if (!name) return "";
  const match = state.doctors.find(d => d.name === name);
  return match && match.title ? `${esc(name)} <span class="muted-suffix">${esc(match.title)}</span>` : esc(name);
}
// 跟 personCardLine 同樣的「主要姓名/次要電話」兩段式呈現，給值班醫官這種
// 要把姓名階級跟聯絡方式分兩行顯示的版面用（例如急診待命卡片）。
function doctorCardLine(name){
  if (!name) return { main: '', sub: '' };
  const match = state.doctors.find(d => d.name === name);
  const phone = (match && match.phone) || "";
  return {
    main: doctorLabel(name),
    sub: phone ? `<a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''
  };
}
// 車號＋所屬單位（例如「軍H-20618（第一連）」），單位用 .muted-suffix
// 縮小弱化，不跟車號搶視覺焦點。plate 為空時顯示「—」、不附單位。
function vehicleLabelHtml(plate){
  const unit = plate ? vehicleUnitLabel(plate) : '';
  return esc(plate || '—') + (unit ? ` <span class="muted-suffix">（${esc(unit)}）</span>` : '');
}
// 姓名 + 階級 + EMT 證照等級 + 電話（可點擊撥打），給車長/駕駛這種需要
// 聯絡方式、且要讓調度端知道現場救護量能的欄位用。
// iOS Safari 對 tel: 連結一律會跳出「已阻擋此網站自動開始通話」的系統提示，不管
// 連結上有沒有掛 JS、也不管有沒有先跳自訂確認視窗，這是瀏覽器層級的行為，網頁端
// 無法繞過，加一層自訂確認視窗只是多一次點擊而已，所以還是用最單純的寫法。
function crewLabel(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  return `${nameWithRank(name, unit)}${emtLevel ? ` ${emtBadgeHtml(emtLevel)}` : ''}${phone ? ` <a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''}`;
}
// 跟 crewLabel 同樣的資料來源，但拆成「姓名＋階級」「EMT等級＋電話」兩段，
// 給急診待命卡片這種要把姓名階級跟聯絡方式分兩行顯示的版面用。
function personCardLine(name, unit){
  if (!name) return { main: esc('—'), sub: '' };
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  const subParts = [];
  if (emtLevel) subParts.push(emtBadgeHtml(emtLevel));
  if (phone) subParts.push(`<a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>`);
  return { main: nameWithRank(name, unit), sub: subParts.join(' ') };
}
// 目前位置：最新一筆有帶地點的事件（離開現場記錄的前往地點、抵達現場記錄
// 的抵達地點）就是目前最新的已知位置；還沒有任何地點回報時，退回任務本身
// 建立時填的地點欄位。
function currentLocationOf(t){
  const evs = taskEvents(t.id);
  for (let i = evs.length - 1; i >= 0; i--) {
    if (evs[i].location) return evs[i].location;
    // 待命勤務的「地點」欄位固定填的是醫務所本身（待命的地方，不是真正要
    // 去的地方），出勤當下沒有另外的前往地點欄位，改用回報出勤時選的送醫
    // 醫院當作目前正在前往的地方，才不會顯示成「前往（自己所在的）醫務所」
    // 這種矛盾的文字。一般勤務的地點欄位本來就是真正的目的地，不受影響。
    if (t.erStandbyKey && evs[i].hospital) return evs[i].hospital;
  }
  return t.location || null;
}
function taskCard(t){
  const s = deriveStatus(t.id);
  const evs = taskEvents(t.id);
  const last = evs[evs.length-1];
  const isLiaison = t.type === "liaison";
  const personnelLine = isLiaison && Array.isArray(t.personnel) && t.personnel.length
    ? t.personnel.map(n => nameWithRank(n, t.unit)).join('、')
    : '—';
  const currentLocation = currentLocationOf(t);
  // 最新一筆是出勤或離開現場，代表車輛還在路上、還沒真的抵達那個地點，
  // 文字要講清楚是「正在前往」而不是「已經在那裡」，避免看起來像已經抵達
  // 了——出勤當下車輛才剛從營區/醫務所出發，還沒到任務地點，跟離開現場後
  // 前往下一站是同一種「移動中」狀態，不能只處理離開現場這一種情況。
  // 已經按下返回營區的話，正在前往的地方是營區本身，不是上一次離開現場時
  // 記的那個地點（那個地點已經是過去式了），所以要顯示「返回營區中」，
  // 不能沿用舊的地點文字，否則會顯示已經離開的地方、跟目前狀態對不上。
  const inTransit = last && (last.type === "DISPATCH" || last.type === "DEPART_SCENE");
  const returningToBase = last && last.type === "RETURNING" && !isLiaison;
  const locationLine = returningToBase
    ? "返回營區中"
    : currentLocation
      ? (inTransit ? `前往 ${esc(currentLocation)} 中` : esc(currentLocation))
      : "";
  // 有患者記錄的任務要在卡片上凸顯出來，讓人一眼就看得到，不會被其他一般
  // 任務蓋過去（首頁清單排序見 viewHome，這裡只負責視覺樣式）。

// 觀測數據便當盒：體感溫度／相對濕度／露點／風速風向／紫外線指數／
// 近 3 小時雨量，每項獨立一格，資訊密度比塞進天氣卡片的一排 pill 高，
// 掃過去比較容易一眼抓到重點數值。雨量固定顯示（0mm 也顯示，方便一眼
// 確認「現在沒下雨」而不是「這格資料還沒載出來」），其餘項目沒有值
// 時才不佔格。
// 每項數值超過門檻時變色警示（amber=留意、red=危險），門檻參考：
// 體感溫度 33/36°C 是氣象署對高溫的分級用詞（36 以上會發布高溫資訊，
// 是危險級）；露點溫度 24/27°C 是氣象上普遍用來描述「悶熱／極不舒適」
// 的分界；風速用蒲福風級 6/8 級（強風/大風，已經是有實際危害的等級）；
// 紫外線直接沿用氣象署自己回傳的 uvLevel 分級文字（過量級/危險級）；
// 雨量用 15mm／40mm 對應「大雨」等級近 3 小時累積的粗略換算。這些都是
// 既有的氣象/職業安全分級標準，不是憑感覺編的數字。
function weatherStatAccent(key, val){
  if (val == null) return null;
  if (key === "at") return val >= 36 ? "red" : val >= 33 ? "amber" : null;
  if (key === "td") return val >= 27 ? "red" : val >= 24 ? "amber" : null;
  if (key === "windSpeed") return null; // 風速用蒲福風級判斷，見下面呼叫端
  if (key === "beaufort") return val >= 8 ? "red" : val >= 6 ? "amber" : null;
  if (key === "uvLevel") return /危險|危险/.test(val) ? "red" : /過量|过量/.test(val) ? "amber" : null;
  if (key === "rainHour3") return val >= 40 ? "red" : val >= 15 ? "amber" : null;
  return null;
}
function renderWeatherStatsGrid(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const at = state.apparentTemp;
  const townshipOk = at && at.township === township && !at.error;
  const atError = at && at.township === township && at.error;
  const rain = state.rainfall;
  const rainOk = rain && rain.county === county && !rain.error;
  const rainError = rain && rain.county === county && rain.error;
  const items = [];
  if (townshipOk && at.at != null) items.push({ lbl:"體感溫度", val:`${at.at}°C`, accent: weatherStatAccent("at", at.at) });
  if (townshipOk && at.rh != null) items.push({ lbl:"相對濕度", val:`${at.rh}%` });
  if (townshipOk && at.td != null) items.push({ lbl:"露點溫度", val:`${at.td}°C`, accent: weatherStatAccent("td", at.td) });
  if (townshipOk && at.windSpeed != null) items.push({ lbl:"風速", val:`${at.windDir ? esc(at.windDir)+' ' : ''}${at.windSpeed}m/s`, accent: weatherStatAccent("beaufort", at.beaufort) });
  if (townshipOk && at.uvIndex != null) items.push({ lbl:"紫外線指數", val:`${at.uvIndex}${at.uvLevel ? '／'+esc(at.uvLevel) : ''}`, accent: weatherStatAccent("uvLevel", at.uvLevel || "") });
  // 沒偵測到雨（測站缺測或附近測站沒下雨）一律當 0mm 顯示，不要整格
  // 消失——雨量小卡要一直在，才能一眼確認「現在真的沒下雨」跟「還沒
  // 載入完成」的差別（後者是 gridHtml 整段還沒出現，不是這格不見）。
  if (rainOk) { const hour3 = rain.hour3 != null ? rain.hour3 : 0; items.push({ lbl:"近3小時雨量", val:`${hour3}mm`, accent: weatherStatAccent("rainHour3", hour3) }); }
  const gridHtml = items.length ? `
    <div class="weather-stats-grid">
      ${items.map(i => `<div class="weather-stat-tile${i.accent?' accent-'+i.accent:''}"><span class="lbl">${esc(i.lbl)}</span><span class="val">${i.val}</span></div>`).join("")}
    </div>` : "";
  const atErrorHtml = atError ? `<div class="weather-tip">${icon('bell',16)}<div>體感/濕度/露點/風速/紫外線載入失敗${at.message ? '：'+esc(at.message) : ''}</div></div>` : "";
  const rainErrorHtml = rainError ? `<div class="weather-tip">${icon('bell',16)}<div>雨量資料載入失敗${rain.message ? '：'+esc(rain.message) : ''}</div></div>` : "";
  return gridHtml + atErrorHtml + rainErrorHtml;
}

// 用兩三句話把今天天氣＋該注意的事項講清楚：第一句是概況（地點/天氣/溫度/
// 降雨機率），第二句依數值門檻（高溫、高降雨機率、日夜溫差大）挑出對應的
// 提醒，若當下有生效中的天氣特報也一併提醒，沒有特別狀況則給一句安全提醒。
// 貼心提醒文字：純本地規則判斷（氣溫/降雨機率/日夜溫差/體感/特報門檻），
// 不靠任何外部 API，永遠算得出來、不會有載入中或失敗的狀態。原本是天氣卡
// 下面獨立一塊，取消 Core-AI Insight 後搬進同一張卡片、同一個版位。
function weatherTipText(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const w = state.weather;
  if (!w || w.error || w.county !== county) return "";
  let overview = `今日${esc(county)}${esc(w.wx)}`;
  if (w.minT!=null && w.maxT!=null) overview += `，氣溫約 ${w.minT}°–${w.maxT}°C`;
  if (w.pop!=null) overview += `，降雨機率 ${w.pop}%`;
  overview += "。";

  const tips = [];
  if (w.maxT!=null && w.maxT >= 33) tips.push("高溫炎熱，執勤請注意補水防曬、慎防中暑");
  if (w.pop!=null && w.pop >= 50) tips.push("降雨機率高，請攜帶雨具並留意行車安全");
  if (w.minT!=null && w.maxT!=null && (w.maxT - w.minT) >= 8) tips.push("日夜溫差大，請留意保暖");
  if (w.ci && /悶熱|寒冷|偏冷|嚴寒/.test(w.ci)) tips.push(`體感「${esc(w.ci)}」，請留意人員身體狀況`);
  const township = UNIT_WEATHER_TOWNSHIP[unit] || UNIT_WEATHER_TOWNSHIP.hq;
  const at = state.apparentTemp;
  if (at && at.township === township && !at.error && at.at != null && w.maxT != null && (at.at - w.maxT) >= 3) {
    tips.push(`體感溫度比預報氣溫高出約 ${Math.round(at.at - w.maxT)}°C，戶外執勤請提高警覺`);
  }
  const h = state.hazards;
  if (h && h.county === county && !h.error && h.list && h.list.length) {
    tips.push(`${esc(county)}目前有${esc(h.list[0].phenomena)}生效中，請提高警覺`);
  }
  if (!tips.length) tips.push("天氣穩定，依標準程序執行今日勤務即可");

  return `${overview}${tips.join("；")}。`;
}
// 依特報的現象名稱（強風/大雨/低溫/高溫...）挑對應的行動提醒，都是既有
// 標準作業程序的通用叮嚀，不是氣象署資料本身的欄位——只用來提醒「這種
// 特報常見要注意什麼」，不夾帶任何編造的數值（例如具體陣風風速）。
function hazardTips(phenomena){
  const tips = [];
  if (/強風/.test(phenomena)) tips.push("高車身行駛留意側風", "隨車器材確認固定");
  if (/大雨|豪雨|暴雨/.test(phenomena)) tips.push("留意積水路段，避免涉水", "雨天煞車距離加長，保持車距");
  if (/低溫|寒流/.test(phenomena)) tips.push("留意人員保暖，慎防路面濕滑", "留意年長患者保暖狀況");
  if (/高溫|熱浪/.test(phenomena)) tips.push("留意人員補水，慎防中暑", "車輛長時間曝曬留意電瓶負荷");
  if (!tips.length) tips.push("依標準程序留意天氣變化", "隨時關注最新特報資訊");
  return tips.slice(0,4);
}
