// 醫院有登記自己的經緯度時，直接算跟 GPS 定位的實際距離最準；沒登記
// 座標的醫院則退而求其次，用「行政區」層級的代表點（區公所／市公所
// 座標，比整個縣市的代表點更接近實際醫院位置）概略判斷「人在哪個行政
// 區」，縣市層級當作行政區判斷不到時的備援（見 viewHospitals 的 matchInfo）。
const COUNTY_CENTERS = {
  "臺中市": { lat: 24.1477, lng: 120.6736 },
  "嘉義市": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣": { lat: 23.4623, lng: 120.3333 }
};
// key 用「縣市|行政區」，避免不同縣市剛好同名行政區（例如各地都有「東區」）互相搞混。
const DISTRICT_CENTERS = {
  "臺中市|北區": { lat: 24.1512, lng: 120.6839 },
  "臺中市|西屯區": { lat: 24.1786, lng: 120.6400 },
  "臺中市|南區": { lat: 24.1253, lng: 120.6653 },
  "臺中市|梧棲區": { lat: 24.2547, lng: 120.5308 },
  "臺中市|大甲區": { lat: 24.3486, lng: 120.6222 },
  "嘉義市|東區": { lat: 23.4801, lng: 120.4491 },
  "嘉義縣|朴子市": { lat: 23.4650, lng: 120.2458 }
};
function haversineKm(lat1, lng1, lat2, lng2){
  const toRad = d => d * Math.PI / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function nearestCounty(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [county, c] of Object.entries(COUNTY_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = county; }
  }
  return best;
}
// 回傳 { county, district }：先找最接近的行政區代表點，再從 key 拆出對應
// 縣市，兩層資訊一起回傳，排序時可以優先比對行政區、比對不到才退回縣市。
function nearestDistrict(lat, lng){
  let best = null, bestDist = Infinity;
  for (const [key, c] of Object.entries(DISTRICT_CENTERS)) {
    const d = haversineKm(lat, lng, c.lat, c.lng);
    if (d < bestDist) { bestDist = d; best = key; }
  }
  if (!best) return { county: nearestCounty(lat, lng), district: null };
  const [county, district] = best.split("|");
  return { county, district };
}
// Google／Apple 地圖的導航目的地優先用實際地址（比只用醫院名稱搜尋更準，
// 尤其是分院/院區這種同名醫院有多個院區的情況），沒有登記地址時退回用
// 醫院名稱讓地圖自己搜尋定位。

/* =========================================================
   7b) 氣象預報（中央氣象署 CWA 開放資料 API，直接從瀏覽器端呼叫；
   縣市層級 36 小時天氣預報，快取 30 分鐘，只在切換單位或首頁重新
   整理時才會重抓，不使用背景計時器）
   ========================================================= */
const weatherCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let weatherLoadingCounty = null;
async function fetchWeather(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const loc = json?.records?.location?.[0];
  if (!loc) throw new Error("查無天氣資料");
  const els = {};
  loc.weatherElement.forEach(e => { els[e.elementName] = e.time; });
  return {
    county,
    wx: els.Wx?.[0]?.parameter?.parameterName || "—",
    pop: els.PoP?.[0]?.parameter?.parameterName ?? null,
    minT: els.MinT?.[0]?.parameter?.parameterName ?? null,
    maxT: els.MaxT?.[0]?.parameter?.parameterName ?? null
  };
}
function ensureWeatherLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = weatherCache[county];
  if (cached && Date.now() - cached.fetchedAt < 30*60*1000) { state.weather = cached.data; return; }
  if (weatherLoadingCounty === county) return;
  weatherLoadingCounty = county;
  fetchWeather(county).then(data => {
    weatherCache[county] = { data, fetchedAt: Date.now() };
    state.weather = data;
    weatherLoadingCounty = null;
    safeRender();
  }).catch(err => {
    console.error("天氣資訊載入失敗", err);
    state.weather = { error: true, county, message: err.message || String(err) };
    weatherLoadingCounty = null;
    safeRender();
  });
}
function weatherIconFor(wx){
  if (!wx) return "cloud";
  if (wx.includes("雷") || wx.includes("雨")) return "rain";
  if (wx.startsWith("晴") && !wx.includes("多雲") && !wx.includes("陰")) return "sun";
  return "cloud";
}

// 天氣特報（W-C0033-001，各縣市目前有效的天氣警特報，含颱風陸上警報／大雨特報等）。
// 縣市層級的特報 feed 本身就會涵蓋「颱風陸上警報」：陸上警報生效時，受影響縣市會
// 出現在這份清單裡，不需要另外接颱風警報單的資料集。
const hazardCache = {}; // { [縣市名稱]: { data, fetchedAt } }
let hazardLoadingCounty = null;
async function fetchHazards(county){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0033-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(county)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  console.log("[天氣特報原始回應]", county, json);
  const locs = json?.records?.location || [];
  const loc = locs.find(l => l.locationName === county) || locs[0];
  const hazards = loc?.hazardConditions?.hazards || [];
  return hazards.map(h => ({
    phenomena: h.info?.phenomena || "天氣特報",
    significance: h.info?.significance || "",
    startTime: h.validTime?.startTime || null,
    endTime: h.validTime?.endTime || null
  }));
}
function ensureHazardsLoaded(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const cached = hazardCache[county];
  if (cached && Date.now() - cached.fetchedAt < 10*60*1000) { state.hazards = { county, list: cached.data }; return; }
  if (hazardLoadingCounty === county) return;
  hazardLoadingCounty = county;
  fetchHazards(county).then(data => {
    hazardCache[county] = { data, fetchedAt: Date.now() };
    state.hazards = { county, list: data };

    hazardLoadingCounty = null;
    safeRender();
  });
}

function timeAgo(ms){
  if (!ms) return "—";
  const diff = Math.max(0, Date.now() - ms);
  const m = Math.floor(diff/60000);
  if (m < 1) return "剛剛";
  if (m < 60) return `${m} 分鐘前`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} 小時前`;
  return `${Math.floor(h/24)} 天前`;
}
function fmtTime(ms){
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleString("zh-TW", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false });
}
function fmtDate(d){
  return d.toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
// 回報表單的時間欄位只顯示「時:分」不顯示日期（勤務都是當天的），
// 送出時再跟今天的日期組合成完整時間。
function hhmmValue(d){
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
// 把「HH:mm」字串跟今天的日期組合成完整的本地時間 Date。
function todayAt(hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}
// 編輯既有回報時，時間欄位一樣只顯示「時:分」，但要沿用該筆回報「原本
// 的日期」（可能不是今天），不能用 todayAt()，否則修正時間會被誤改到
// 今天的日期。
function dateAt(baseMs, hhmm){
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date(baseMs);
  d.setHours(h, m, 0, 0);
  return d;
}
function showToast(msg){
  let t = document.getElementById("toast");
  if (!t){ t = document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove("show"), 2200);
}

function icon(name, size){
  size = size || 20;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;">${ICON_PATHS[name]||''}</svg>`;
}
// 全站共用的返回鍵：純圖示的液態玻璃圓圈＋chevron SVG（不接文字、右邊不接
// 標題），不管目的地是哪裡都一樣，不要再依頁面各自寫「返回列表」「返回
// 更多」等。onclick 屬性務必用單引號包起來，因為裡面的 JSON.stringify(route)
// 輸出是雙引號字串，跟雙引號屬性會互相截斷（曾造成整個返回鍵完全沒反應的
// bug）。chevron 用行內 SVG（stroke-width 2.5，比全站圖標系統的 1.8 粗一點，
// 圓圈變大之後細線條比例上會顯得太細）而不是共用的 icon() helper。
function backBtn(route){
  return `<button class="back-btn" onclick='window.__nav(${JSON.stringify(route)})'><span class="back-btn-circle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span></button>`;
}
// 多選（checkbox）/單選（radio）標籤群組，用於過去病史／過敏史／處置項目／意識狀態。
// triggers（選填）：[{ values:[...], wrapId }]，勾選到指定選項時，只切換對應
// detail 輸入框容器的顯示/隱藏（呼叫 window.__syncDetailVisibility），不觸發
// 整頁 render()，避免使用者已經填到一半的其他欄位被清空重繪掉。
function chipGroup(name, options, selected, multi, triggers){
  const type = multi ? "checkbox" : "radio";
  const sel = multi ? (selected||[]) : null;
  return `<div class="chip-select">${options.map(o => {
    const trig = triggers && triggers.find(tr => tr.values.includes(o));
    const onchange = trig ? ` onchange='window.__syncDetailVisibility("${trig.wrapId}","${name}",${JSON.stringify(trig.values)})'` : "";
    return `
    <label class="chip-option">
      <input type="${type}" name="${name}" value="${esc(o)}" ${multi ? (sel.includes(o)?'checked':'') : (selected===o?'checked':'')}${onchange}>
      <span>${esc(o)}</span>
    </label>`;
  }).join("")}</div>`;
}
// 主訴等自由輸入框旁邊的快捷選字下拉選單：選一個選項就把常見用語塞進
// 輸入框（用「、」分隔多個詞，跟站內其他「可多個」的文字欄位同一套分隔
// 慣例），選完選單重置回「快速選擇」，可以重複打開再選下一個詞做複選；
// 純 DOM 操作輸入框內容，不觸發整頁 render()，理由跟車長/駕駛選擇器
// 一樣：避免把其他還在填寫中、未受控的欄位一起清空。
function quickFillSelect(inputId, options){
  return `<select class="quick-fill-select" onchange='window.__applyQuickFillSelect("${inputId}", this)'>
    <option value="">快速選擇</option>
    ${options.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join("")}
  </select>`;
}

/* =========================================================
   10) 共用：狀態徽章 / 卡片
   ========================================================= */
function statusBadge(statusKey){
  const cls = { pending:"pending", dispatch:"dispatch", onscene:"onscene", transit:"transit", returning:"returning", completed:"completed" }[statusKey];
  return `<span class="badge ${cls}"><i class="dot"></i>${STATUS_LABEL[statusKey]}</span>`;
}
function taskCardClass(statusKey){
  return { pending:"s-pending", dispatch:"s-dispatch", onscene:"s-onscene", transit:"s-transit", returning:"s-returning", completed:"s-completed" }[statusKey];
}
// 依姓名＋單位查該人員的電話（人員資料由帳號同步或基礎資料管理手動維護）。
// 舊資料（單位欄位、下拉選單上線前）可能沒有 unit，姓名也常跟階級直接連寫成
// 一串，例如「林伯霖上士」，對不上人員名冊裡單純的姓名「林伯霖」。這裡先在
// 同單位內精準比對、再開頭比對；都找不到的話（通常是舊資料缺 unit）才放寬
// 成全部單位一起找，讓舊任務也能顯示電話。
function findPersonnelByName(pool, name){
  return pool.find(x => x.name === name) || pool.find(x => x.name && name.startsWith(x.name));
}
function findPersonnel(name, unit){
  if (!name) return null;
  const scoped = unit ? state.personnel.filter(x => x.unit === unit) : state.personnel;
  return findPersonnelByName(scoped, name) || (unit ? findPersonnelByName(state.personnel, name) : null);
}
// 姓名 + 階級（若姓名本身沒有帶階級，如新版下拉選單只存姓名，才補上人員名冊的階級）。
// 凡是畫面上會出現人名的地方都套用，讓階級一律跟著姓名顯示。階級用縮小的
// 灰階字（.muted-suffix）弱化，不跟姓名搶視覺焦點，姓名才是主要資訊。
function nameWithRank(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const rank = (match && match.title && !name.includes(match.title)) ? match.title : '';
  return esc(name) + (rank ? ` <span class="muted-suffix">${esc(rank)}</span>` : '');
}
// 編輯勤務頁面「車長／駕駛」欄位目前已指派人選的顯示文字：姓名＋階級，
// 用空格分隔（例如「林伯霖 上士」），不加點號、不顯示單位。
function crewDisplayLabel(name, taskUnit){
  const match = findPersonnel(name, taskUnit);
  if (!match) return name;
  return `${match.name}${match.title ? ' ' + match.title : ''}`;
}
// 值班醫官姓名＋階級，格式跟車長／駕駛一致：空格分隔、不加括號；階級一樣
// 用 .muted-suffix 縮小弱化。呼叫端不用再另外包 esc()，這裡已經處理過escaping。
function doctorLabel(name){
  if (!name) return "";
  const match = state.doctors.find(d => d.name === name);
  return match && match.title ? `${esc(name)} <span class="muted-suffix">${esc(match.title)}</span>` : esc(name);
}
// 車號＋所屬單位（例如「軍H-20618（第一連）」），單位用 .muted-suffix
// 縮小弱化，不跟車號搶視覺焦點。plate 為空時顯示「—」、不附單位。
function vehicleLabelHtml(plate){
  const unit = plate ? vehicleUnitLabel(plate) : '';
  return esc(plate || '—') + (unit ? ` <span class="muted-suffix">（${esc(unit)}）</span>` : '');
}
// 姓名 + 階級 + EMT 證照等級 + 電話（可點擊撥打），給車長/駕駛這種需要
// 聯絡方式、且要讓調度端知道現場救護量能的欄位用。
// iOS Safari 對 tel: 連結一律會跳出「已阻擋此網站自動開始通話」的系統提示，不管
// 連結上有沒有掛 JS、也不管有沒有先跳自訂確認視窗，這是瀏覽器層級的行為，網頁端
// 無法繞過，加一層自訂確認視窗只是多一次點擊而已，所以還是用最單純的寫法。
function crewLabel(name, unit){
  if (!name) return esc('—');
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  return `${nameWithRank(name, unit)}${emtLevel ? ` ${emtBadgeHtml(emtLevel)}` : ''}${phone ? ` <a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>` : ''}`;
}
// 跟 crewLabel 同樣的資料來源，但拆成「姓名＋階級」「EMT等級＋電話」兩段，
// 給急診待命卡片這種要把姓名階級跟聯絡方式分兩行顯示的版面用。
function personCardLine(name, unit){
  if (!name) return { main: esc('—'), sub: '' };
  const match = findPersonnel(name, unit);
  const phone = (match && match.phone) || "";
  const emtLevel = (match && match.emtLevel) || "";
  const subParts = [];
  if (emtLevel) subParts.push(emtBadgeHtml(emtLevel));
  if (phone) subParts.push(`<a href="tel:${esc(phone)}" class="phone-link" style="text-decoration:none;">${esc(phone)}</a>`);
  return { main: nameWithRank(name, unit), sub: subParts.join(' · ') };
}
// 目前位置：最新一筆有帶地點的事件（離開現場記錄的前往地點、抵達現場記錄
// 的抵達地點）就是目前最新的已知位置；還沒有任何地點回報時，退回任務本身
// 建立時填的地點欄位。
function currentLocationOf(t){
  const evs = taskEvents(t.id);
  for (let i = evs.length - 1; i >= 0; i--) {
    if (evs[i].location) return evs[i].location;
    // 待命勤務的「地點」欄位固定填的是醫務所本身（待命的地方，不是真正要
    // 去的地方），出勤當下沒有另外的前往地點欄位，改用回報出勤時選的送醫
    // 醫院當作目前正在前往的地方，才不會顯示成「前往（自己所在的）醫務所」
    // 這種矛盾的文字。一般勤務的地點欄位本來就是真正的目的地，不受影響。
    if (t.erStandbyKey && evs[i].hospital) return evs[i].hospital;
  }
  return t.location || null;
}
function taskCard(t){
  const s = deriveStatus(t.id);
  const evs = taskEvents(t.id);
  const last = evs[evs.length-1];
  const isLiaison = t.type === "liaison";
  const personnelLine = isLiaison && Array.isArray(t.personnel) && t.personnel.length
    ? t.personnel.map(n => nameWithRank(n, t.unit)).join('、')
    : '—';
  const currentLocation = currentLocationOf(t);
  // 最新一筆是出勤或離開現場，代表車輛還在路上、還沒真的抵達那個地點，
  // 文字要講清楚是「正在前往」而不是「已經在那裡」，避免看起來像已經抵達
  // 了——出勤當下車輛才剛從營區/醫務所出發，還沒到任務地點，跟離開現場後
  // 前往下一站是同一種「移動中」狀態，不能只處理離開現場這一種情況。
  // 已經按下返回營區的話，正在前往的地方是營區本身，不是上一次離開現場時
  // 記的那個地點（那個地點已經是過去式了），所以要顯示「返回營區中」，
  // 不能沿用舊的地點文字，否則會顯示已經離開的地方、跟目前狀態對不上。
  const inTransit = last && (last.type === "DISPATCH" || last.type === "DEPART_SCENE");
  const returningToBase = last && last.type === "RETURNING" && !isLiaison;
  const locationLine = returningToBase
    ? "返回營區中"
    : currentLocation
      ? (inTransit ? `前往 ${esc(currentLocation)} 中` : esc(currentLocation))
      : "";
  // 有患者記錄的任務要在卡片上凸顯出來，讓人一眼就看得到，不會被其他一般
  // 任務蓋過去（首頁清單排序見 viewHome，這裡只負責視覺樣式）。
  const hasPatient = state.vitals.some(v => v.taskId === t.id);
  return `
  <div class="task-card ${taskCardClass(s)}${hasPatient ? ' has-patient' : ''}" onclick="if(!event.target.closest('a')) window.__nav({name:'task', id:'${t.id}'})">
    <div class="task-top">
      <p class="task-title">${esc(t.title)}</p>
      <div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">
        ${hasPatient ? `<span class="patient-badge">${icon('alert',13)} 有患者</span>` : ""}
        ${statusBadge(s)}
      </div>
    </div>
    <div class="task-meta">${isLiaison ? '洽公' : `${vehicleLabelHtml(t.vehicle)} · ${taskScope(t)}`} · ${esc(t.location||'—')}</div>
    <div class="task-crew">
      ${locationLine ? `<span>目前位置：${locationLine}</span>` : ""}
      ${isLiaison
        ? `<span>人員：${personnelLine}</span>`
        : `<span>車長：${crewLabel(t.crewLeader, t.unit)}</span><span>駕駛：${crewLabel(t.driver, t.unit)}</span>`}
    </div>
    <div class="task-foot" style="justify-content:${last ? 'flex-end' : 'flex-start'};">
      <span>${last ? timeAgo(last.ts) : '尚無回報'}</span>
    </div>
  </div>`;
}

   11) 畫面：首頁 Dashboard
   ========================================================= */
function renderWeatherCard(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const w = state.weather;
  if (!w) return `
    <div class="weather-card wx-muted">
      <span class="weather-card-icon">${icon('cloud',26)}</span>
      <div class="weather-card-body">天氣資訊載入中…</div>
    </div>`;
  if (w.error || w.county !== county) return `
    <div class="weather-card wx-muted">
      <span class="weather-card-icon">${icon('cloud',26)}</span>
      <div class="weather-card-body">${esc(county)}天氣資訊載入失敗${w.message ? '：'+esc(w.message) : ''}</div>
    </div>`;
  const wxType = weatherIconFor(w.wx);
  const range = (w.minT!=null && w.maxT!=null) ? `${w.minT}°<span style="opacity:0.6;font-weight:600;"> / </span>${w.maxT}°` : "";
  return `
    <div class="weather-card wx-${wxType}">
      <span class="weather-card-icon">${icon(wxType,28)}</span>
      <div class="weather-card-body">
        <div class="weather-card-loc">${esc(county)}</div>
        <div class="weather-card-desc">${esc(w.wx)}</div>
        ${range ? `<div class="weather-card-temp">${range}</div>` : ""}
        ${w.pop!=null ? `<div class="weather-card-pop">${icon('rain',12)} 降雨機率 ${w.pop}%</div>` : ""}
      </div>
    </div>`;
}
// 用兩三句話把今天天氣＋該注意的事項講清楚：第一句是概況（地點/天氣/溫度/
// 降雨機率），第二句依數值門檻（高溫、高降雨機率、日夜溫差大）挑出對應的
// 提醒，若當下有生效中的天氣特報也一併提醒，沒有特別狀況則給一句安全提醒。
function renderWeatherTip(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const w = state.weather;
  if (!w || w.error || w.county !== county) return "";
  let overview = `今日${esc(county)}${esc(w.wx)}`;
  if (w.minT!=null && w.maxT!=null) overview += `，氣溫約 ${w.minT}°–${w.maxT}°C`;
  if (w.pop!=null) overview += `，降雨機率 ${w.pop}%`;
  overview += "。";

  const tips = [];
  if (w.maxT!=null && w.maxT >= 33) tips.push("高溫炎熱，執勤請注意補水防曬、慎防中暑");
  if (w.pop!=null && w.pop >= 50) tips.push("降雨機率高，請攜帶雨具並留意行車安全");
  if (w.minT!=null && w.maxT!=null && (w.maxT - w.minT) >= 8) tips.push("日夜溫差大，請留意保暖");
  const h = state.hazards;
  if (h && h.county === county && !h.error && h.list && h.list.length) {
    tips.push(`${esc(county)}目前有${esc(h.list[0].phenomena)}生效中，請提高警覺`);
  }
  if (!tips.length) tips.push("天氣穩定，依標準程序執行今日勤務即可");

  return `
    <div class="weather-tip">
      ${icon('bell',16)}
      <div>${overview}${tips.join("；")}。</div>
    </div>`;
}
function renderHazardBanner(unit){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const h = state.hazards;
  // 尚未載入完成或載入失敗時安靜略過，不影響首頁其他內容顯示
  // （天氣卡片本身已經有自己的載入中／失敗狀態，不需要重複顯示）。
  if (!h || h.county !== county || h.error || !h.list || !h.list.length) return "";
  return `
    <div class="hazard-banner">
      ${h.list.map(x => `
        <div class="hazard-row">
          ${icon('alert',18)}
          <div class="hazard-txt">
            <div class="hazard-name">${esc(county)} ${esc(x.phenomena)}${esc(x.significance)}</div>
            ${x.startTime ? `<div class="hazard-time">${fmtTime(new Date(x.startTime).getTime())}${x.endTime?' 至 '+fmtTime(new Date(x.endTime).getTime()):''}</div>` : ""}
          </div>
        </div>`).join("")}
    </div>`;
}
function viewHome(){
  const p = state.profile;
  const unit = myUnit(p);
  ensureWeatherLoaded(unit);
  ensureHazardsLoaded(unit);
  const tasks = visibleTasks(p, state.tasks);
  const today = new Date();
  const todayTasks = tasks.filter(t => isSameDay(new Date(t.createdAt||0).getTime(), today));
  const todayDone = todayTasks.filter(t => deriveStatus(t.id) === "completed");

  // 車輛動態＝目前所有進行中的勤務（一輛車理論上同時只會有一個進行中任務，
  // 但測試資料常會讓同一車號被多筆任務共用，所以直接以「任務」為單位列出，
  // 不要用「車輛」去找對應任務，否則同一車號的第二筆任務會被吃掉不顯示）。
  // 「進行中」統計直接沿用這份清單的數量，確保上面數字跟下面實際列出的
  // 卡片一定對得上；不能只算「今天建立」的任務，否則跨日還在進行中的
  // 勤務（例如昨天出勤、今天還沒返營）會出現在下面清單卻沒被算進數字。
  // 有患者記錄的任務排最前面，突發狀況不會被其他一般任務蓋過去、漏看。
  const activeTasks = tasks
    .filter(t => deriveStatus(t.id) !== "completed")
    .sort((a,b) => {
      const pa = state.vitals.some(v=>v.taskId===a.id) ? 0 : 1;
      const pb = state.vitals.some(v=>v.taskId===b.id) ? 0 : 1;
      if (pa !== pb) return pa - pb;
      return unitLabel(a.unit).localeCompare(unitLabel(b.unit));
    });
  // 勤務（車輛派遣）跟洽公性質不同，分開列成兩個小節，不要混在同一份清單裡
  // 讓人分不清楚哪些是真的派車出去的勤務。
  const dutyActive = activeTasks.filter(t => t.type !== "liaison");
  const liaisonActive = activeTasks.filter(t => t.type === "liaison");
  const fleetSection = activeTasks.length ? `
    ${dutyActive.length ? `<div class="section-label tight">勤務</div>${dutyActive.map(taskCard).join("")}` : ""}
    ${liaisonActive.length ? `<div class="section-label tight">洽公</div>${liaisonActive.map(taskCard).join("")}` : ""}
  ` : `<div class="empty">目前沒有車輛執行中</div>`;

  // 高勤官最在意的「一眼看出」統計：目前正在執行中的勤務裡，有幾台車這趟
  // 是營內、幾台是營外（依建立勤務時填的 scope 欄位，不是車輛名冊總數跟
  // 派遣中數量的差——名冊裡很多車今天根本沒有派遣，跟「營內外」這個問題
  // 無關），以及目前洽公在外的人數（不重複計算同一人同時掛在多筆洽公）。
  // 待命中（deriveStatus 為 pending，還沒回報「出勤」）的車輛實際上還沒真的
  // 離開營區，不能只看勤務建立時填的營內/營外屬性就算進營外車，要等真的
  // 出勤、離開營區之後才算——否則急診待命還沒出勤的待命車會被誤算成營外車。
  const inCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營內").length;
  const outCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營外").length;
  const liaisonPeopleCount = new Set(liaisonActive.flatMap(t => Array.isArray(t.personnel) ? t.personnel : [])).size;

  return `
    <div class="home-date">${fmtDate(today)}</div>
    ${renderHazardBanner(unit)}
    ${renderWeatherCard(unit)}
    ${renderWeatherTip(unit)}
    <div class="section-label">今日概況</div>
    <div class="stat-grid">
      <div class="stat-tile t-blue"><div class="stat-icon">${icon('tasks',16)}</div><div class="num">${todayTasks.length}</div><div class="lbl">今日勤務數</div></div>
      <div class="stat-tile t-green"><div class="stat-icon">${icon('check',16)}</div><div class="num">${todayDone.length}</div><div class="lbl">已完成</div></div>
      <div class="stat-tile t-purple"><div class="stat-icon">${icon('user',16)}</div><div class="num">${liaisonPeopleCount}</div><div class="lbl">洽公中人數</div></div>
    </div>
    <div class="stat-grid stat-grid-2">
      <div class="stat-tile t-green"><div class="stat-icon">${icon('home',16)}</div><div class="num">${inCampCount}</div><div class="lbl">營內車</div></div>
      <div class="stat-tile t-orange"><div class="stat-icon">${icon('depart',16)}</div><div class="num">${outCampCount}</div><div class="lbl">營外車</div></div>
    </div>
    ${fleetSection}
  `;
}

/* =========================================================
   12) 畫面：任務中心（所有尚未完成的勤務）
   ========================================================= */
// 完成的勤務不能直接從清單裡消失、找不到——除了「全部」跟各進行中狀態頁籤
// （只列尚未完成的勤務）以外，另外加一個「已完成」頁籤，才能在任務頁本身
// 就查得到剛完成的勤務，不用跳去「紀錄」頁另外查詢。
const TASKS_TABS = [
  { key:"all", label:"全部" },
  { key:"pending", label:"待命中" },
  { key:"dispatch", label:"出勤中" },
  { key:"onscene", label:"現場中" },
  { key:"transit", label:"前往中" },
  { key:"returning", label:"返營中" },
  { key:"completed", label:"已完成" }
];
function viewTasks(){
  const p = state.profile;
  const visible = visibleTasks(p, state.tasks);
  const active = visible.filter(t => deriveStatus(t.id) !== "completed");
  const completedTasks = visible.filter(t => deriveStatus(t.id) === "completed");
  const shown = state.tasksTab === "all" ? visible
    : state.tasksTab === "completed" ? completedTasks
    : active.filter(t => deriveStatus(t.id) === state.tasksTab);

  const tabs = `
    <div class="tabs2 scroll">
      ${TASKS_TABS.map(tb => {
        const count = tb.key === "all" ? visible.length
          : tb.key === "completed" ? completedTasks.length
          : active.filter(t=>deriveStatus(t.id)===tb.key).length;
        return `
        <div class="tab2 ${state.tasksTab===tb.key?'active':''}" onclick="window.__setTasksTab('${tb.key}')">
          ${tb.label}<span class="tab2-count">${count}</span>
        </div>`;
      }).join("")}
    </div>`;

  // 勤務跟洽公分開列成兩個小節，不要混在同一份清單裡分不清楚。
  const dutyShown = shown.filter(t => t.type !== "liaison");
  const liaisonShown = shown.filter(t => t.type === "liaison");
  const listHtml = shown.length ? `
    ${dutyShown.length ? `<div class="section-label tight">勤務</div>${dutyShown.map(taskCard).join("")}` : ""}
    ${liaisonShown.length ? `<div class="section-label tight">洽公</div>${liaisonShown.map(taskCard).join("")}` : ""}
  ` : `<div class="empty">目前沒有符合條件的勤務</div>`;

  return `
    ${tabs}
    ${listHtml}
    ${canCreateTask(p) ? `<button class="fab" onclick="window.__nav({name:'createTask'})">${icon('plus',26)}</button>` : ""}
  `;
}

function viewCreateTask(){
  const p = state.profile;

  const canSwitch = canSeeAllUnits(p);
  const unit = canSwitch ? (state.createTaskUnit || myUnit(p) || UNITS[0].code) : myUnit(p);
  if (!unit) return `<div class="empty">您尚未被指派單位，請聯繫管理員。</div>`;

  // 急診待命頁「建立待命勤務」導過來時帶著 presetLocation（固定的醫務所
  // 地點），這種待命勤務一定是勤務（不是洽公）、一定是營外（車輛要離開
  // 醫務所才需要待命出勤），地點也固定是該醫務所，不開放使用者更改。
  const isStandbyDispatch = !!state.route.presetLocation;
  const taskType = isStandbyDispatch ? "duty" : (state.createTaskType || "duty");
  const isLiaison = taskType === "liaison";
  // 車長／駕駛／洽公人員都可跨單位選人，對應的人員選擇器打開時會直接讀取
  // 當下的 state.personnel 動態建立候選名單，這裡不用先篩好。
  const vehicleOpts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const recorderOpts = state.recorders.filter(x => x.unit === unit && x.active !== false);
  const outSet = dispatchedVehiclePlates();

  return `
    <div class="section-label">建立勤務</div>
    ${isStandbyDispatch ? "" : `
    <div class="field"><label>任務類型 *</label>
      <div class="seg-toggle">
        ${TASK_TYPES.map(x => `<button type="button" class="${taskType===x.key?'active':''}" onclick="window.__setCreateTaskType('${x.key}')">${x.label}</button>`).join("")}

      ${isStandbyDispatch ? `<input type="hidden" name="scope" value="營外">` : ""}
      ${canSwitch ? `
        <div class="field"><label>單位 *</label>
          <select onchange="window.__setCreateTaskUnit(this.value)">
            ${UNITS.map(u => `<option value="${u.code}" ${unit===u.code?'selected':''}>${u.label}</option>`).join("")}
          </select>
        </div>` : `<div class="field"><label>單位</label><input value="${unitLabel(unit)}" disabled></div>`}
      <div class="field"><label>任務名稱 *</label><input name="title" required placeholder="${isLiaison?'例如：軍公民任務現勘':'例如：OHCA 患者搶救'}"></div>
      ${isStandbyDispatch ? `
      <div class="field"><label>醫務所</label>
        <input value="${esc(state.route.presetLocation)}" disabled>
        <input type="hidden" name="location" value="${esc(state.route.presetLocation)}">
      </div>` : `
      <div class="field"><label>地點${isLiaison?'（可多個，用頓號分隔）':''}</label><input name="location" placeholder="${isLiaison?'例如：烏日高鐵站、福田水資源回收中心、天后宮':'例如：潭子區豐興路一段'}"></div>`}
      ${isLiaison ? `
      <div class="field"><label>人員（可複選）*</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openMultiPersonPicker(this)">
          <span class="picker-field-text placeholder">請選擇人員</span>${icon('chevronDown',16)}
        </button>
        <div class="personnel-hidden-checkboxes"></div>
      </div>` : `

      </div>

      <div class="field"><label>備註（選填）</label><textarea name="notes" placeholder="其他需要註記的事項"></textarea></div>
      <button class="btn-primary" type="submit">建立${isLiaison?'洽公':'勤務'}</button>

  `;
}

function viewEditTask(taskId){
  const p = state.profile;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  if (!canEditTask(p, t)) return `<div class="empty">您沒有編輯此勤務的權限</div>`;

  const isLiaison = t.type === "liaison";
  const unit = t.unit;
  // 車長／駕駛／洽公人員都可跨單位選人，對應的人員選擇器打開時會直接讀取
  // 當下的 state.personnel 動態建立候選名單（並保留目前已指派的人選，即使
  // 現在被排除規則擋住）。
  const vehicleOpts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const recorderOpts = state.recorders.filter(x => x.unit === unit && x.active !== false);
  const outSet = dispatchedVehiclePlates();
  const currentRecorders = t.recorders || [];
  const currentPersonnel = t.personnel || [];
  // 車輛跨單位借用不常見，但既有勤務可能早就借了別的單位的車，編輯時要
  // 判斷目前指派的車是不是跨單位借來的，是的話「跨單位借車」預設打勾、
  // 車號下拉也要一開始就展開列出所有單位的車，不然選單裡會找不到它。
  const currentVehicleRecord = t.vehicle ? state.vehicles.find(v => v.plate === t.vehicle) : null;
  const isCrossUnitVehicle = !!(currentVehicleRecord && currentVehicleRecord.unit !== unit);

  return `
    <div class="back-row">${backBtn({name:'task', id:taskId})}</div>
    <div class="section-label">編輯${isLiaison?'洽公':'勤務'}</div>
    <form onsubmit="window.__saveTaskEdit(event,'${taskId}')">
      ${!isLiaison ? `
      <div class="field"><label>營內／營外 *</label>
        ${chipGroup('scope', TASK_SCOPE_OPTIONS, taskScope(t), false)}
      </div>` : ""}
      <div class="field"><label>單位</label><input value="${unitLabel(unit)}" disabled></div>
      <div class="field"><label>任務名稱 *</label><input name="title" required value="${esc(t.title||'')}"></div>
      <div class="field"><label>地點${isLiaison?'（可多個，用頓號分隔）':''}</label><input name="location" value="${esc(t.location||'')}"></div>
      ${isLiaison ? `
      <div class="field"><label>人員（可複選）*</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openMultiPersonPicker(this)">
          <span class="picker-field-text${currentPersonnel.length?'':' placeholder'}">${currentPersonnel.length ? esc(currentPersonnel.join('、')) : '請選擇人員'}</span>${icon('chevronDown',16)}
        </button>
        <div class="personnel-hidden-checkboxes">${currentPersonnel.map(name => `<input type="checkbox" name="personnel" value="${esc(name)}" checked style="display:none">`).join("")}</div>
      </div>` : `
      <div class="field"><label>車號</label>
        <select name="vehicle" data-unit="${unit}">
          ${isCrossUnitVehicle ? vehicleSelectOptionsAllUnits(t.vehicle) : `<option value="">請選擇車輛</option>` + vehicleOptionsByType(vehicleOpts, v => `<option value="${esc(v.plate)}" ${t.vehicle===v.plate?'selected':''}>${esc(vehicleOptionLabel(v.plate, outSet))}</option>`)}
        </select>
        <label class="checkbox-inline"><input type="checkbox" ${isCrossUnitVehicle?'checked':''} onchange="window.__toggleCrossUnitVehicle(this)"> 跨單位借車</label>
      </div>
      <div class="field"><label>車長</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('crewLeader', this)">
          <span class="picker-field-text${t.crewLeader?'':' placeholder'}">${t.crewLeader ? esc(crewDisplayLabel(t.crewLeader, unit)) : '請選擇車長'}</span>${icon('chevronDown',16)}

      <div class="field"><label>駕駛</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('driver', this)">

        </button>
        <input type="hidden" name="driver" value="${esc(t.driver||'')}">
      </div>
      ${t.erStandbyKey ? `
      <div class="field"><label>值班醫官（選填）</label>
        <select name="dutyOfficer">
          <option value="">請選擇醫官</option>

      <div class="field"><label>備註（選填）</label><textarea name="notes">${esc(t.notes||'')}</textarea></div>
      <button class="btn-primary" type="submit">儲存變更</button>
    </form>
  `;
}

/* =========================================================
   13b) 畫面：患者紀錄（獨立頁面，不是彈窗——欄位比照救護紀錄表補齊後
   資料量變多，改成一頁一頁分區顯示，比塞在彈窗裡好操作）
   ========================================================= */
function viewVitalsPage(taskId, id, adding){
  const p = state.profile;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const canDoReport = canReport(p, t);
  const taskVitals = state.vitals.filter(v => v.taskId === taskId).sort(eventOrderCompare);
  const hasPatient = taskVitals.length > 0;
  if (!canDoReport && !hasPatient) return `<div class="empty">您沒有記錄患者狀況的權限</div>`;

  const editingVitals = id ? taskVitals.find(v => v.id === id) : null;
  const isFirstVitals = !editingVitals && !hasPatient;
  // 「初評」＝該任務的第一筆生命徵象紀錄，比照救護紀錄表完整記錄患者基本

/* =========================================================
   14) 畫面：任務詳情
   ========================================================= */
function viewTaskDetail(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const p = state.profile;
  const s = deriveStatus(taskId);
  const evs = taskEvents(taskId);
  const isLiaison = t.type === "liaison";
  const evDefs = eventTypesFor(t);

  // 勤務資訊：出發/抵達/返營/最終里程與油量、自動計算行駛公里數與任務耗時
  // （抵達現場可能有多筆，因為同一趟勤務可能去兩個以上的地點；洽公任務地點
  // 單一、不追蹤里程油量，這段資料只有勤務類任務才會用到）
  const dispatchEv = eventByType(taskId, "DISPATCH");
  const arrivedEvs = evs.filter(e => e.type === "ARRIVED_SCENE");
  const departEvs = evs.filter(e => e.type === "DEPART_SCENE");
  // 多地點時每一站分開列成自己的一列（不要用頓號串在同一行），才看得出來
  // 抵達／離開的流水時間線，一眼就知道第幾站對應哪個里程。
  const arrivalRows = arrivedEvs.length
    ? arrivedEvs.map((e,i) => `<div class="k">抵達里程${arrivedEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}</div>`).join("")
    : `<div class="k">抵達里程</div><div class="v">—</div>`;
  // 前往地點是離開現場當下就先問清楚（決定要去哪裡才會按前往下一個地點），
  // 所以顯示在離開里程這一列，不是抵達里程那一列。
  const departRows = departEvs.length
    ? departEvs.map((e,i) => `<div class="k">離開里程${departEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}${e.location?'（前往：'+esc(e.location)+'）':''}</div>`).join("")
    : `<div class="k">離開里程</div><div class="v">—</div>`;
  const returningEv = eventByType(taskId, "RETURNING");
  const completedEv = eventByType(taskId, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? null;
  const finalMileage = completedEv?.mileage ?? null;
  const distance = (startMileage != null && finalMileage != null) ? (finalMileage - startMileage) : null;
  // 洽公任務沒有 COMPLETED 事件，返營本身（statusKey completed）就是結束點。
  const finalEv = isLiaison ? returningEv : completedEv;
  const duration = finalEv ? (finalEv.ts - (dispatchEv?.ts ?? new Date(t.createdAt||0).getTime())) : null;

  const draft = state.reportDraft && state.reportDraft.taskId === taskId ? state.reportDraft : null;
  const canDoReport = canReport(p, t);

  // ---- 勤務進度：把「勤務進度」跟「勤務時間軸」合併成同一份清單——已發生的
  // 事件直接顯示實際回報內容（時間/回報人/里程/備註/編輯按鈕），還沒發生的
  // 步驟接在後面用灰色佔位顯示，一次就看得出走到哪一步、之前每一步的細節、
  // 下一步是什麼，不用分開看兩份內容重複的區塊。
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  const stepTypes = evDefs.map(e => e.type);
  const lastIdx = lastType ? stepTypes.indexOf(lastType) : -1;
  const isTaskDone = s === "completed";
  const upcomingSteps = evDefs.filter((def, i) => i > lastIdx);
  // 出勤後、還沒抵達現場前，下一步就是要送去的醫院——回報按鈕上面顯示
  // 導航按鈕用（見下方 stickyBar），人在路上點開勤務詳情頁隨時能導航過去。
  // 只在「下一步剛好是抵達現場、且出勤時有選送醫醫院」才顯示；之後前往
  // 下一站的地點是自由輸入的文字，沒有對應醫院名冊資料可以導航。
  const hospitalForArrival = (!isLiaison && lastType === "DISPATCH" && dispatchEv?.hospital)
    ? state.hospitals.find(h => h.name === dispatchEv.hospital)
    : null;
  const progressHtml = `
    <div class="section-label">${isLiaison ? "洽公進度" : "勤務進度"}</div>
    <div class="stepper">
      ${evs.map((e, idx) => {
        const def = evDefs.find(d=>d.type===e.type);
        const cls = (idx === evs.length - 1 && !isTaskDone) ? "current" : "done";
        return `
        <div class="step-item ${cls}">
          <div class="step-dot">${cls === "done" ? icon("check", 11) : ""}</div>
          <div class="step-body">
            <div class="step-head">
              <div class="step-label">${def ? icon(def.icon,15) : ''} ${def?.label}${e.location ? '：'+esc(e.location) : ''}</div>
              ${canDoReport ? `<button class="tl-edit-btn" onclick="window.__editEvent('${e.id}')">編輯</button>` : ""}
            </div>
            <div class="step-meta">${fmtTime(e.ts)} · ${nameWithRank(e.userName, e.unit)}${e.mileage!=null ? ' · ' + e.mileage + ' km' : ''}</div>
            ${e.note ? `<div class="step-note">${esc(e.note)}</div>` : ""}
          </div>
        </div>`;
      }).join("")}
      ${upcomingSteps.map(def => `
        <div class="step-item upcoming">
          <div class="step-dot"></div>
          <div class="step-body"><div class="step-label">${icon(def.icon,15)} ${def.label}</div></div>
        </div>`).join("")}
    </div>`;

  // rTypes 決定回報表單/Sticky Bar 要顯示的動作按鈕（見下方），勤務進度 Stepper
  // 本身已經看得出目前狀態與下一步，不需要再另外一張卡片重複顯示一次。
  const rTypes = canDoReport ? reportableTypes(taskId) : [];

  // ---- 患者狀況：任何進行中的任務，遇到突發狀況都能記錄生命徵象／主訴，
  // 不綁定特定任務類型或當下的勤務進度階段。可持續新增，形成時間序列方便
  // 看出病人狀況變化。首頁／任務卡片會依此凸顯有患者的任務（見 taskCard）。
  const taskVitals = state.vitals.filter(v => v.taskId === taskId).sort(eventOrderCompare);
  const hasPatient = taskVitals.length > 0;
  const latestComplaint = taskVitals.slice().reverse().find(v => v.complaint)?.complaint || "";
  // 患者基本資料（單位／級職／姓名／性別）只在初評（第一筆紀錄）詢問，
  // 卡片摘要沿用那一筆的資料顯示。
  const initialVitals = taskVitals[0];
  const patientLabel = initialVitals
    ? [initialVitals.patientUnit, initialVitals.patientRank, initialVitals.patientName].filter(Boolean).join('　') + (initialVitals.patientGender ? `（${initialVitals.patientGender}）` : '')
    : '';
  // 高勤官、主官管不能自己記錄患者狀況，但既有紀錄仍要能點進去查看（唯讀），
  // 不能因為沒有回報權限就完全看不到卡片可以點——canView 決定「有紀錄時
  // 能不能點進去看」，canDoReport 才決定「能不能新增/編輯」。
  const canView = canViewVitals(p, t);
  const canOpenPatientCard = canDoReport || (canView && hasPatient);
  const patientCardTag = canOpenPatientCard ? "button" : "div";
  const patientCardClickAttr = canOpenPatientCard ? ` onclick="window.__startVitals('${taskId}')"` : "";
  const patientActionLabel = hasPatient ? (canDoReport ? '查看／更新紀錄' : '查看紀錄') : '開始記錄';
  const vitalsSection = !isLiaison && (canDoReport || hasPatient) ? `
    <div class="section-label">患者狀況</div>
    <${patientCardTag} class="patient-card${hasPatient ? ' has-record' : ''}"${patientCardClickAttr}>
      <div class="patient-card-top">
        <div class="patient-card-icon">${icon('heartbeat',20)}</div>
        <div class="patient-card-body">
          <div class="patient-card-title-row">
            <div class="patient-card-title">患者狀況</div>
            ${hasPatient ? `<span class="patient-card-badge">患者紀錄中</span>` : ""}
          </div>
          ${hasPatient ? (patientLabel ? `<div class="patient-card-sub">${esc(patientLabel)}</div>` : "") : `<div class="patient-card-sub">尚未建立患者紀錄</div>`}
          <div class="patient-card-desc">${hasPatient
            ? (latestComplaint ? `主訴：${esc(latestComplaint)}。請持續更新生命徵象及處置內容。` : "已建立患者紀錄。請持續更新主訴、生命徵象及處置內容。")
            : "勤務過程中若發現患者需要救護，可點擊建立患者紀錄。"}</div>
        </div>
      </div>
      ${canOpenPatientCard ? `<div class="patient-card-action">${hasPatient ? icon('heartbeat',16) : icon('plus',16)} ${patientActionLabel}</div>` : ""}
    </${patientCardTag}>
  ` : "";

  // ---- 回報表單／Sticky Bottom Action Bar ----
  let reportModal = "";
  let stickyBar = "";
  if (canDoReport && draft) {
    const def = evDefs.find(e=>e.type===draft.type);
    const isFinal = !isLiaison && draft.type === "COMPLETED";
    const lastEv = evs[evs.length - 1];
    const minBase = lastEv?.ts ?? dispatchEv?.ts ?? null;
    const minTime = minBase ? hhmmValue(new Date(minBase)) : "";
    // 離開現場當下就已經知道要去哪裡（決定要前往下一個地點才會按這顆按鈕），
    // 所以地點在「離開現場」就先問清楚，抵達下一個地點時不用再問一次；
    // 第一次抵達現場的地點則沿用建立勤務時填的任務「地點」欄位，也不用問。
    // 洽公任務地點單一、沒有多站分岔，不會有這個情況。
    const needsLocation = !isLiaison && draft.type === "DEPART_SCENE";
    // 出勤當下先問清楚預計送去的醫院（選填，現場評估後可能會變，之後有需要
    // 再補），沿用「基礎資料管理」維護的醫院名冊，不用手動打字。
    const needsHospital = !isLiaison && draft.type === "DISPATCH";
    const formTitle = (!isLiaison && draft.type === "ARRIVED_SCENE" && lastType === "DEPART_SCENE") ? "抵達下一個地點" : def.label;
    // 離開現場、開始返營的當下，車輛都還沒有移動（人剛在原地回報），里程
    // 理論上跟上一筆回報的里程一樣，直接帶入避免重複輸入；抵達下一個地點
    // 是移動之後才回報，先帶入上一筆已知里程當作起始值，使用者只要接著往
    // 上改，不用從零開始整串重打一次；抵達營區才是完全空白，需要手動輸入。
    // 洽公任務不追蹤里程。
    const lastMileageEv = evs.slice().reverse().find(e => e.mileage != null);
    const isNextStopArrival = !isLiaison && draft.type === "ARRIVED_SCENE" && arrivedEvs.length > 0;
    const prefillMileage = !isLiaison && (draft.type === "RETURNING" || draft.type === "DEPART_SCENE" || isNextStopArrival) && lastMileageEv ? lastMileageEv.mileage : null;
    // 回報表單改用彈窗（跟基礎資料管理的新增/編輯彈窗同一套元件），避免表單
    // 內容被固定在畫面底部的 Sticky Action Bar 擋住看不到。
    // 除了備註以外都是必填欄位，避免漏填造成紀錄不完整。
    reportModal = `
      <div class="modal-overlay" onclick="if(event.target===this) window.__cancelReport()">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${icon(def.icon,19)} 回報：${formTitle}</div>
          <form onsubmit="event.preventDefault(); window.__submitReport('${t.id}','${draft.type}')">
            ${needsLocation ? `<div class="field"><label>前往地點</label><input id="rf-location" placeholder="例如：加油站、OO超商" required></div>` : ""}
            ${needsHospital ? `<div class="field"><label>送醫醫院（選填）</label>
              <select id="rf-hospital">
                <option value="">請選擇醫院</option>
                ${state.hospitals.map(h => `<option value="${esc(h.name)}">${esc(h.name)}</option>`).join("")}
              </select>
            </div>` : ""}
            <div class="field">
              <label>時間</label>
              <div style="display:flex; gap:8px;">
                <input id="rf-time" type="time" style="flex:1;" ${minTime?`min="${minTime}"`:""} value="${hhmmValue(new Date())}" required>
                <button type="button" class="icon-btn" style="flex-shrink:0;" onclick="window.__resetReportTime()">套用目前</button>
              </div>
            </div>
            ${!isLiaison ? `<div class="field"><label>里程（公里）</label><input id="rf-mileage" type="number" inputmode="decimal" placeholder="目前里程" value="${prefillMileage != null ? prefillMileage : ''}" required></div>` : ""}
            ${isFinal ? `<div class="field"><label>剩餘油量</label><select id="rf-fuel" required>${fuelOptions("")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="rf-note" placeholder="備註"></div>
            <button class="btn-primary" type="submit">確認送出</button>
            <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__cancelReport()">取消</button>
          </form>
        </div>
      </div>`;
  } else if (canDoReport && !draft && rTypes.length === 1) {
    const def = evDefs.find(e=>e.type===rTypes[0]);
    // 離開現場後回頭要回報的「抵達」是抵達下一個地點，跟第一次抵達現場要分開講清楚。
    const btnLabel = (!isLiaison && rTypes[0] === "ARRIVED_SCENE" && lastType === "DEPART_SCENE") ? "抵達下一個地點" : def.label;
    // 下一步剛好是「抵達現場」且出勤時有選送醫醫院時，在「抵達現場」這顆
    // 回報按鈕上面加一排導航按鈕，人準備按下去回報之前就能先點導航出發。
    const showNavAboveBtn = rTypes[0] === "ARRIVED_SCENE" && hospitalForArrival;
    const navRow = showNavAboveBtn ? `<div style="display:flex; gap:8px;">
      <a class="icon-btn" style="flex:1; justify-content:center;" href="${googleMapsUrl(hospitalNavQuery(hospitalForArrival))}" target="_blank" rel="noopener">${icon('depart',14)} Google 導航</a>
      <a class="icon-btn" style="flex:1; justify-content:center;" href="${appleMapsUrl(hospitalNavQuery(hospitalForArrival))}" target="_blank" rel="noopener">${icon('depart',14)} Apple 導航</a>
    </div>` : "";
    stickyBar = `
      <div class="sticky-action-bar" style="flex-direction:column; align-items:stretch; gap:8px;">
        ${navRow}
        <button class="btn-primary" style="width:100%;" onclick="window.__startReport('${t.id}','${rTypes[0]}')">${icon(def.icon,20)} ${btnLabel}</button>
      </div>
      <div class="sticky-bar-spacer" style="${showNavAboveBtn ? 'height:128px;' : ''}"></div>`;
  } else if (canDoReport && !draft && rTypes.length === 2) {
    // 唯一的分岔點（僅勤務類任務才會出現）：抵達現場之後，離開前往下一個地點
    // （這裡回報的是「離開現場」本身，抵達下一站要等真的到了才另外回報，
    // 兩者是不同時刻，不能混在同一次動作裡）或直接返回營區。
    stickyBar = `
      <div class="sticky-action-bar">
        <button class="btn-primary" onclick="window.__startReport('${t.id}','DEPART_SCENE')">${icon('depart',20)} 前往下一個地點</button>
        <button class="btn-primary green" onclick="window.__startReport('${t.id}','RETURNING')">${icon('home',20)} 返回營區</button>
      </div>
      <div class="sticky-bar-spacer"></div>`;
  }

  // ---- 編輯既有回報（時間/里程有時候會填錯，需要能修正）----
  const editingEvent = canDoReport && state.eventEditId ? evs.find(e => e.id === state.eventEditId) : null;
  let eventEditModal = "";
  if (editingEvent) {
    const def = evDefs.find(x=>x.type===editingEvent.type);
    const isFinalEv = !isLiaison && editingEvent.type === "COMPLETED";
    const hasLocationField = !isLiaison && editingEvent.type === "DEPART_SCENE";
    // 誤按到不該回報的步驟時要能整筆撤銷，但只開放刪除時間軸上「最後一筆」，
    // 刪掉中間的歷史紀錄會讓時間軸出現斷層（例如出勤→離開現場中間憑空少了
    // 抵達現場），跟既有「歷史紀錄不能刪除」的設計精神衝突，所以限制在
    // 「撤銷最新一步」這個情境，不開放刪除中間任意一筆。
    const isLastEvent = evs.length > 0 && evs[evs.length - 1].id === editingEvent.id;
    eventEditModal = `
      <div class="modal-overlay" onclick="if(event.target===this) window.__cancelEditEvent()">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${icon(def.icon,19)} 編輯回報：${def.label}</div>
          <form onsubmit="event.preventDefault(); window.__submitEditEvent('${editingEvent.id}')">
            ${hasLocationField ? `<div class="field"><label>前往地點</label><input id="ee-location" value="${esc(editingEvent.location||'')}" placeholder="例如：加油站、OO超商"></div>` : ""}
            <div class="field"><label>時間</label><input id="ee-time" type="time" value="${hhmmValue(new Date(editingEvent.ts))}" required></div>
            ${!isLiaison ? `<div class="field"><label>里程（公里）</label><input id="ee-mileage" type="number" inputmode="decimal" value="${editingEvent.mileage!=null?editingEvent.mileage:''}" required></div>` : ""}
            ${isFinalEv ? `<div class="field"><label>剩餘油量</label><select id="ee-fuel" required>${fuelOptions(editingEvent.endFuel||"")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="ee-note" value="${esc(editingEvent.note||'')}" placeholder="備註"></div>
            <button class="btn-primary" type="submit">儲存修正</button>
            ${isLastEvent ? `<button class="btn-ghost danger" type="button" style="width:100%;margin-top:10px;" onclick="window.__deleteEditingEvent('${editingEvent.id}','${isFinalEv ? 'final' : ''}')">刪除這筆回報</button>` : ""}
            <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__cancelEditEvent()">取消</button>
          </form>
        </div>
      </div>`;
  }

  const personnelLine = isLiaison && Array.isArray(t.personnel) && t.personnel.length
    ? t.personnel.map(n => nameWithRank(n, t.unit)).join('、')
    : '';

  return `
    <div class="back-row" style="justify-content:space-between;">
      ${backBtn({name:'tasks'})}
      ${canEditTask(p, t) ? `<button class="icon-btn" onclick="window.__nav({name:'editTask', id:'${t.id}'})">編輯勤務</button>` : ""}
    </div>
    ${progressHtml}
    ${vitalsSection}
    <div class="detail-head">
      <div class="task-top">
        <p class="task-title">${esc(t.title)}</p>
        ${statusBadge(s)}
      </div>
      <div class="kv">
        ${isLiaison
          ? `<div class="k">人員</div><div class="v">${personnelLine || '—'}</div>`
          : `<div class="k">車號</div><div class="v">${vehicleLabelHtml(t.vehicle)}</div>
             <div class="k">營內／營外</div><div class="v">${taskScope(t)}</div>`}
        <div class="k">地點</div><div class="v">${esc(t.location||'—')}</div>
        ${!isLiaison ? `
        <div class="k">車長</div><div class="v">${crewLabel(t.crewLeader, t.unit)}</div>
        <div class="k">駕駛</div><div class="v">${crewLabel(t.driver, t.unit)}</div>
        ${t.dutyOfficer ? `<div class="k">值班醫官</div><div class="v">${doctorLabel(t.dutyOfficer)}</div>` : ""}
        <div class="k">紀錄器</div><div class="v">${esc((t.recorders||[]).join('、') || '—')}</div>` : ""}
        <div class="k">建立人</div><div class="v">${nameWithRank(t.createdByName, t.unit)}</div>
        <div class="k">建立時間</div><div class="v">${fmtTime(new Date(t.createdAt||0).getTime())}</div>
      </div>
    </div>
    ${canDoReport ? (isLiaison ? `
    <div class="section-label">洽公資訊</div>
    <div class="detail-head">
      <div class="kv">
        <div class="k">任務耗時</div><div class="v">${duration!=null ? durationLabel(duration) : '—'}</div>
      </div>
    </div>` : `
    <div class="section-label">勤務資訊</div>
    <div class="detail-head">
      <div class="kv">
        <div class="k">出發里程</div><div class="v">${startMileage!=null ? startMileage+' km' : '—'}</div>
        ${dispatchEv?.hospital ? `<div class="k">送醫醫院</div><div class="v">${esc(dispatchEv.hospital)}</div>` : ""}
        ${arrivalRows}
        ${departRows}
        <div class="k">返營里程</div><div class="v">${returningEv?.mileage!=null ? returningEv.mileage+' km' : '—'}</div>
        <div class="k">最終里程</div><div class="v">${finalMileage!=null ? finalMileage+' km' : '—'}</div>
        <div class="k">出發油量</div><div class="v">${esc(t.startFuel||'—')}</div>
        <div class="k">剩餘油量</div><div class="v">${esc(completedEv?.endFuel||'—')}</div>
        <div class="k">行駛公里</div><div class="v">${distance!=null ? distance+' km' : '—'}</div>
        <div class="k">任務耗時</div><div class="v">${duration!=null ? durationLabel(duration) : '—'}</div>
      </div>
    </div>`) : ""}
    ${stickyBar}
    ${reportModal}
    ${eventEditModal}
  `;
}

/* =========================================================
   15) 畫面：勤務紀錄搜尋
   ========================================================= */
const RECORDS_PERIODS = [
  { key:"today", label:"今天" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }, { key:"custom", label:"自訂日期" }
];
function runRecordsFilter(p, f){
  let tasks = visibleTasks(p, state.tasks);
  if (f.period === "custom") {
    if (f.customDateFrom || f.customDateTo) tasks = tasks.filter(t => {
      const d = new Date(t.createdAt||0);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (f.customDateFrom && iso < f.customDateFrom) return false;
      if (f.customDateTo && iso > f.customDateTo) return false;
      return true;
    });
  } else {
    tasks = tasksInPeriod(tasks, f.period);
  }
  if (f.unit) tasks = tasks.filter(t => t.unit === f.unit);
  if (f.vehicle) tasks = tasks.filter(t => t.vehicle === f.vehicle);
  if (f.title) tasks = tasks.filter(t => (t.title||"").toLowerCase().includes(f.title.toLowerCase()));
  if (f.location) tasks = tasks.filter(t => (t.location||"").toLowerCase().includes(f.location.toLowerCase()));
  if (f.status) tasks = tasks.filter(t => deriveStatus(t.id) === f.status);
  if (f.person) tasks = tasks.filter(t => t.crewLeader === f.person || t.driver === f.person);
  return tasks;
}
function viewRecords(){
  const p = state.profile;
  const f = state.recordsFilter;

  const statusOptions = ["", ...STATUS_ORDER].map(s => `<option value="${s}" ${f.status===s?'selected':''}>${s?STATUS_LABEL[s]:'全部狀態'}</option>`).join("");

  // 車號／人員下拉選單：依目前單位篩選（或全部單位）動態列出，不再手打文字搜尋
  const vehiclePool = sortVehicles(f.unit ? state.vehicles.filter(v => v.unit === f.unit) : state.vehicles);
  const personPool = (f.unit ? state.personnel.filter(x => x.unit === f.unit) : state.personnel);
  const vehicleOptions = `<option value="">全部車號</option>` + vehicleOptionsByType(vehiclePool, v => `<option value="${esc(v.plate)}" ${f.vehicle===v.plate?'selected':''}>${esc(v.plate)}</option>`);
  const personOptions = [`<option value="">全部人員</option>`, ...personPool.map(x => `<option value="${esc(x.name)}" ${f.person===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`)].join("");

  const periodPills = `
    <div class="pill-row">
      ${RECORDS_PERIODS.map(pd => `<button class="pill ${f.period===pd.key?'active':''}" onclick="window.__setRecordsFilter('period','${pd.key}')">${pd.label}</button>`).join("")}
    </div>
    ${f.period === "custom" ? `
    <div class="search-grid">
      <div class="field"><label>起始日期</label><input type="date" value="${f.customDateFrom}" max="${f.customDateTo||''}" oninput="window.__setRecordsFilter('customDateFrom', this.value)"></div>
      <div class="field"><label>結束日期</label><input type="date" value="${f.customDateTo}" min="${f.customDateFrom||''}" oninput="window.__setRecordsFilter('customDateTo', this.value)"></div>
    </div>` : ""}`;
  const unitPills = canSeeAllUnits(p) ? `
    <div class="pill-row">
      <button class="pill ${!f.unit?'active':''}" onclick="window.__setRecordsFilter('unit','')">全部單位</button>
      ${UNITS.map(u => `<button class="pill ${f.unit===u.code?'active':''}" onclick="window.__setRecordsFilter('unit','${u.code}')">${u.label}</button>`).join("")}
    </div>` : "";

  const expanded = state.recordsFiltersExpanded;
  const applied = state.recordsApplied;
  const tasks = applied ? runRecordsFilter(p, applied) : [];

  // 自訂日期若往回查超過平常預載的最近 RECENT_WINDOW_DAYS 天，那段期間的
  // 資料一開始沒被抓下來，查詢結果可能不完整；提供「查詢更早的資料」讓
  // 使用者自己決定要不要多花一次查詢把那段期間的資料也補齊，而不是每次
  // 登入都預先抓那麼久以前的資料。
  const dq = state.recordsDeepQuery;
  const needsDeepQuery = applied && applied.period === "custom" && applied.customDateFrom
    && applied.customDateFrom < isoDate(recentCutoffDate())
    && !(dq && dq.done && dq.from === applied.customDateFrom && dq.to === applied.customDateTo);
  const deepQueryBanner = needsDeepQuery ? `
    <div class="empty" style="text-align:left; padding:14px 16px; margin-bottom:14px;">
      ${dq && dq.loading ? `查詢中…` : `查詢範圍早於最近 ${RECENT_WINDOW_DAYS} 天，畫面上的結果可能不完整。`}
      ${dq && dq.loading ? "" : `<button class="btn-ghost" style="margin-top:8px;" onclick="window.__runRecordsDeepQuery()">查詢更早的資料</button>`}
    </div>` : "";

  return `
    ${periodPills}
    ${unitPills}
    <button class="filters-toggle ${expanded?'open':''}" onclick="window.__toggleRecordsFilters()">
      ${icon('chevronDown',16).replace('<svg ', '<svg class="chev" ')} 更多篩選
    </button>
    ${expanded ? `
    <div class="search-grid">
      <div class="field"><label>車號</label><select onchange="window.__setRecordsFilter('vehicle', this.value)">${vehicleOptions}</select></div>
      <div class="field"><label>人員（車長/駕駛）</label><select onchange="window.__setRecordsFilter('person', this.value)">${personOptions}</select></div>
      <div class="field"><label>狀態</label><select onchange="window.__setRecordsFilter('status', this.value)">${statusOptions}</select></div>
      <div class="field"><label>任務名稱</label><input value="${esc(f.title)}" oninput="window.__setRecordsFilter('title', this.value)"></div>
      <div class="field full"><label>地點</label><input value="${esc(f.location)}" oninput="window.__setRecordsFilter('location', this.value)"></div>
    </div>` : ""}
    <div class="row" style="display:flex; gap:10px; margin:12px 0;">

/* =========================================================
   15b) 畫面：統計分析
   ========================================================= */
const STATUS_COLOR = { pending:"#8E8E93", dispatch:"#FF3B30", onscene:"#FF9500", transit:"#6B23C7", returning:"#0066FF", completed:"#34C759" };
function tasksInPeriod(tasks, period){
  const now = new Date();
  return tasks.filter(t => {
    const d = new Date(t.createdAt||0);
    if (period === "today") return isSameDay(d.getTime(), now);
    if (period === "week") { const diff = (now - d) / 86400000; return diff >= 0 && diff < 7; }
    if (period === "month") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    return true;
  });
}
function viewStats(){
  const p = state.profile;
  const base = visibleTasks(p, state.tasks);
  const tasks = tasksInPeriod(base, state.statsPeriod);

  const periods = [
    { key:"today", label:"今日" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }
  ];

  // 各車輛出勤次數（依 DISPATCH 事件計算，同一車輛可能執行多趟勤務）
  const vehicleCounts = {};
  tasks.forEach(t => {
    const d = eventByType(t.id, "DISPATCH");
    if (!d) return;
    const key = t.vehicle || "未填車號";
    vehicleCounts[key] = (vehicleCounts[key]||0) + 1;
  });
  const vehicleEntries = Object.entries(vehicleCounts).sort((a,b) => b[1]-a[1]);
  const maxCount = Math.max(1, ...vehicleEntries.map(e=>e[1]));

  const CHART_CAT_COLORS = ["#007AFF", "#FF9500", "#34C759", "#6B23C7", "#FF3B30", "#00A3A3"];
  const barChart = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">各車輛出勤次數</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="bar-row">
          <div class="bar-label">${esc(veh)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%; background:${CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]};"></div></div>
          <div class="bar-val">${count}</div>
        </div>`).join("")}
    </div>` : `<div class="chart-card"><div class="chart-title">各車輛出勤次數</div><div class="empty">此區間尚無出勤紀錄</div></div>`;

  const rankList = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">車輛使用次數排行</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="rank-name">${esc(veh)}</div>
          <div class="rank-count">${count} 次</div>
        </div>`).join("")}
    </div>` : "";

  // 任務狀態比例（part-to-whole → 橫向堆疊長條，不用圓餅圖）
  const statusCounts = {};
  STATUS_ORDER.forEach(s => statusCounts[s] = 0);
  tasks.forEach(t => { const s = deriveStatus(t.id); statusCounts[s] = (statusCounts[s]||0) + 1; });
  const totalTasks = tasks.length || 1;
  const stackSegs = STATUS_ORDER.filter(s => statusCounts[s] > 0).map(s => `
    <div class="seg" style="width:${(statusCounts[s]/totalTasks*100).toFixed(1)}%; background:${STATUS_COLOR[s]};"></div>`).join("");
  const legendRows = STATUS_ORDER.map(s => `
    <div class="leg-row">
      <span class="leg-dot" style="background:${STATUS_COLOR[s]};"></span>
      <span class="leg-name">${STATUS_LABEL[s]}</span>
      <span class="leg-val">${statusCounts[s]}（${Math.round(statusCounts[s]/totalTasks*100)}%）</span>
    </div>`).join("");

  const statusChart = `
    <div class="chart-card">
      <div class="chart-title">任務狀態比例</div>
      <div class="stackbar">${stackSegs}</div>
      <div class="stack-legend">${legendRows}</div>
    </div>`;

  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">統計分析</div>
    <div class="tabs2">
      ${periods.map(pd => `<div class="tab2 ${state.statsPeriod===pd.key?'active':''}" onclick="window.__setStatsPeriod('${pd.key}')">${pd.label}</div>`).join("")}
    </div>
    ${barChart}
    ${rankList}
    ${statusChart}
  `;
}

   ========================================================= */
function viewHospitals(){
  const p = state.profile;
  const canEdit = canManageBaseData(p);
  // 排序優先度：醫院本身有登記座標時（tier 0）直接算實際距離最準；沒有
  // 座標才退回用行政區（tier 1）/ 縣市（tier 2）概略比對；都比對不到排最後（tier 3）。
  function matchInfo(h){
    if (h.lat != null && h.lng != null && state.myLat != null) {
      return { tier: 0, km: haversineKm(state.myLat, state.myLng, h.lat, h.lng) };
    }
    if (state.myDistrict && h.district === state.myDistrict && h.county === state.myCounty) return { tier: 1, km: null };
    if (state.myCounty && h.county === state.myCounty) return { tier: 2, km: null };
    return { tier: 3, km: null };
  }
  const rows = state.hospitals.slice().sort((a,b) => {
    if (state.myCounty || state.myLat != null) {
      const ia = matchInfo(a), ib = matchInfo(b);
      if (ia.tier !== ib.tier) return ia.tier - ib.tier;
      if (ia.tier === 0) return ia.km - ib.km;
    }
    return HOSPITAL_LEVELS.indexOf(a.level) - HOSPITAL_LEVELS.indexOf(b.level) || (a.name||'').localeCompare(b.name||'');
  });
  const locateBar = `
    <div class="field" style="margin-bottom:14px;">
      <button class="icon-btn primary" style="width:100%;" onclick="window.__locateNearbyHospitals()" ${state.locatingHospital ? 'disabled' : ''}>
        ${icon('pin',15)} ${state.locatingHospital ? '定位中…' : (state.myCounty ? '重新定位' : '顯示附近醫院')}
      </button>
      ${state.myCounty ? `<div style="color:var(--muted); font-size:var(--text-xs); margin-top:6px;">目前定位：靠近${state.myDistrict ? esc(state.myCounty)+esc(state.myDistrict) : esc(state.myCounty)}，已登記座標的醫院會顯示實際距離並排最前面，其餘${state.myDistrict ? '同行政區優先，其次同縣市' : '同縣市醫院優先'}</div>` : ''}
    </div>`;
  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">醫院資訊</div>
    ${locateBar}
    ${canEdit ? `<button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('hospitals', null, '')">${icon('plus',15)} 新增醫院</button>` : ""}
    ${rows.length ? rows.map(x => {
      const info = (state.myCounty || state.myLat != null) ? matchInfo(x) : { tier: 3, km: null };
      const nearBadge = info.tier === 0 ? `<span class="badge dispatch" style="padding:3px 8px;">約 ${info.km.toFixed(1)} 公里</span>`
        : info.tier === 1 ? `<span class="badge dispatch" style="padding:3px 8px;">同行政區</span>`
        : info.tier === 2 ? `<span class="badge dispatch" style="padding:3px 8px;">同縣市</span>` : '';
      return `
      <div class="admin-row">
        <div>
          <div class="name">${esc(x.name)}${nearBadge ? ' '+nearBadge : ''}</div>
          <div class="sub">${esc(x.county||'—')}${x.district?esc(x.district):''} · ${esc(x.level||'—')}${x.phone?` · <a href="tel:${esc(x.phone)}" class="phone-link" style="text-decoration:none;">${esc(x.phone)}</a>`:''}</div>
          ${x.address ? `<div class="sub">${esc(x.address)}</div>` : ""}
          ${x.note ? `<div class="sub">${esc(x.note)}</div>` : ""}
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">
            <a class="icon-btn" href="${googleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">${icon('depart',14)} Google 導航</a>
            <a class="icon-btn" href="${appleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">${icon('depart',14)} Apple 導航</a>
          </div>
        </div>
        ${canEdit ? `
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="icon-btn" onclick="window.__openBaseDataModal('hospitals','${x.id}','')">編輯</button>
          <button class="icon-btn danger" onclick="window.__deleteBaseData('hospitals','${x.id}')">刪除</button>
        </div>` : ""}
      </div>`;
    }).join("") : `<div class="empty">尚無醫院資料${canEdit ? '，請點上方新增' : ''}</div>`}
  `;
}

   待命勤務其實就是一筆提早建立、還沒真的出勤的正常勤務（車號/車長/
   駕駛/值班醫官都先填好），只是建立當下不會自動補一筆出勤事件，停在
   「待出勤」狀態；erStandby/{key} 只存一個 currentTaskId 指標，實際
   資料都在 tasks 集合裡，這樣才能直接沿用平常的勤務詳情頁出勤、記錄
   患者狀況，不用另外維護一套獨立資料。這是底部導覽的一個分頁（不是

}

function taskToCsvRow(t){
  const s = deriveStatus(t.id);
  const dispatchEv = eventByType(t.id, "DISPATCH");
  const completedEv = eventByType(t.id, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? "";
  const finalMileage = completedEv?.mileage ?? "";
  const distance = (startMileage !== "" && finalMileage !== "") ? (finalMileage - startMileage) : "";
  return [t.title, t.vehicle, t.location, t.crewLeader, t.driver, STATUS_LABEL[s], fmtTime(new Date(t.createdAt||0).getTime()), startMileage, finalMileage, distance]
    .map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",");
}
function exportTasksCsv(){
  const header = ["任務名稱","車號","地點","車長","駕駛","狀態","建立時間","出發里程","最終里程","行駛公里"].join(",");
  const rows = visibleTasks(state.profile, state.tasks).map(taskToCsvRow);
  const csv = "﻿" + [header, ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `勤務紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// 背景輪詢用：畫面會整個重繪（innerHTML 全部換掉），如果使用者正在輸入框
// 打字，重繪會讓輸入框元素被整個換掉，導致輸入焦點與鍵盤被打斷。輪詢觸發的
// 重繪一律呼叫這個函式，偵測到目前有輸入中的欄位就先跳過，等使用者打完離開
// 該欄位（或下一次輪詢/使用者操作觸發真正的 render）再更新畫面。
//
// 只檢查當下有沒有 focus 在輸入框還不夠：手機上切換欄位、跳出鍵盤工具列等
// 動作都可能讓輸入框短暫失焦，若輪詢剛好在那個空檔觸發，整個表單會被重繪回
// 伺服器上的舊資料，使用者還沒送出的內容就會憑空消失。因此只要使用者正處於
// 任何編輯中的表單（個人資料、基礎資料管理、任務回報草稿），一律跳過背景重繪，
// 直到儲存/取消離開編輯狀態為止。
function safeRender(){
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.tagName === "SELECT")) return;
  if (state.profileEditing || state.baseDataModal || state.reportDraft || state.eventEditId) return;
  render();
}

function render(){
  const app = document.getElementById("app");
  if (!state.user) { app.innerHTML = viewLogin(); return; }
  if (!state.profile) { app.innerHTML = `<div class="spinner"></div>`; return; }
  if (state.profile.role === "pending") { app.innerHTML = viewPending(); return; }
  if (state.profile.role === "disabled") { app.innerHTML = viewDisabled(); return; }

  const view = ROUTE_VIEWS[state.route.name] || viewHome;
  const body = view();

  const p = state.profile;
  const previewBanner = state.previewActive ? `
    <div class="preview-banner">
      ${icon('alert',16)} 預覽模式：以「${ROLE_LABEL[myRole(p)]||p.role}${p.unit?'・'+unitLabel(p.unit):''}」檢視畫面（僅預覽，實際寫入權限仍以您的真實身份為準）
      <button onclick="window.__endRolePreview()">結束預覽</button>
    </div>` : "";
  app.innerHTML = `
    <div class="sticky-head">
      ${previewBanner}
      <div class="topbar">
        <div class="topbar-bottom-row">
          <div class="topbar-sub">
            <span class="name">${esc(p.displayName||p.email).split(' ')[0]}</span>${p.rank ? `<span class="rank">${esc(p.rank)}</span>` : ''}
          </div>
          <div class="topbar-icons">
            <button class="topbar-icon-btn" onclick="window.__nav({name:'notifications'})">${icon('bell',25)}</button>
            <button class="topbar-icon-btn" onclick="window.__confirmLogout()">${icon('logout',25)}</button>
          </div>
        </div>
      </div>
    </div>
    <main>${body}</main>
    <div class="bottomnav">
      ${NAV_ITEMS.map(n => `
        <button class="navbtn ${state.route.name===n.name?'active':''}" style="${state.route.name===n.name?`color:${n.accent};`:''}" onclick="window.__nav({name:'${n.name}'})">
          <span class="navicon">${icon(n.iconName,24)}</span><span class="navlabel">${n.label}</span>
        </button>`).join("")}
    </div>
    ${viewBaseDataModal()}
    <div id="toast" class="toast"></div>
  `;
}

window.__submitReport = (taskId, type) => {
  const mileageEl = document.getElementById("rf-mileage");
  const fuelEl = document.getElementById("rf-fuel");
  const noteEl = document.getElementById("rf-note");
  const timeEl = document.getElementById("rf-time");
  const locationEl = document.getElementById("rf-location");
  const hospitalEl = document.getElementById("rf-hospital");
  const extra = {};
  if (mileageEl && mileageEl.value !== "") extra.mileage = Number(mileageEl.value);
  if (noteEl && noteEl.value) extra.note = noteEl.value;
  if (fuelEl && fuelEl.value) extra.endFuel = fuelEl.value;
  if (timeEl && timeEl.value) extra.timestamp = todayAt(timeEl.value);
  if (locationEl && locationEl.value) extra.location = locationEl.value;
  if (hospitalEl && hospitalEl.value) extra.hospital = hospitalEl.value;
  // 抵達現場本身不再另外問地點（地點在離開現場時就先問過了），但時間軸上
  // 抵達這一步也要看得出抵達的是哪裡：沿用剛才離開現場填的前往地點；如果
  // 是出勤後第一次抵達（前面還沒有離開現場的紀錄），待命勤務的任務「地點」
  // 欄位固定填的是醫務所本身（待命的地方，不是真正要去的地方），改沿用
  // 回報出勤時選的送醫醫院，才不會把「抵達現場」寫成抵達了自己出發的醫務所；
  // 一般勤務的地點欄位本來就是真正的目的地，直接沿用（跟 currentLocationOf 邏輯一致）。
  if (type === "ARRIVED_SCENE" && !extra.location) {
    const t = state.tasks.find(x => x.id === taskId);
    if (t && t.type !== "liaison") {
      const evs = taskEvents(taskId);
      const lastEv = evs[evs.length - 1];
      const dispatchEv = evs.find(e => e.type === "DISPATCH");
      if (lastEv && lastEv.type === "DEPART_SCENE" && lastEv.location) extra.location = lastEv.location;
      else if (t.erStandbyKey && dispatchEv?.hospital) extra.location = dispatchEv.hospital;
      else if (t.location) extra.location = t.location;
    }
  }
  // 寫入成功才關閉彈窗並重繪；失敗（例如權限被拒）要留在原畫面讓使用者看到
  // 錯誤訊息並可重試，不能還沒確認寫入結果就先把草稿清掉。
  addEvent(taskId, type, extra)
    .then(() => { state.reportDraft = null; render(); })
    .catch(err => showToast(`回報失敗：[${err.code||'?'}] ${err.message||err}`));
};

window.__updateGcsScore = () => {
  const e = document.getElementById("gcs-e").value;
  const v = document.getElementById("gcs-v").value;
  const m = document.getElementById("gcs-m").value;
  const hidden = document.getElementById("vf-gcs");

let personPickerCtx = null; // { pool, unit, crossUnit, hiddenInput, triggerBtn }
function personPickerRows(pool, unit, crossUnit, query){
  const scoped = crossUnit ? pool : pool.filter(x => x.unit === unit);
  const q = (query||"").trim().toLowerCase();
  const filtered = q ? scoped.filter(x =>
    x.name.toLowerCase().includes(q) || (x.title||"").toLowerCase().includes(q) || unitLabel(x.unit).toLowerCase().includes(q)
  ) : scoped;
  if (!filtered.length) return `<div class="empty" style="padding:28px 0;">找不到符合的人員</div>`;
  let html = "", curUnit = null;
  for (const x of filtered) {
    if (x.unit !== curUnit) {
      if (curUnit !== null) html += `</div>`;
      html += `<div class="picker-group"><div class="picker-group-label">${esc(unitLabel(x.unit))}</div>`;
      curUnit = x.unit;
    }
    html += `<button type="button" class="picker-option" data-id="${esc(x.id)}">${esc(x.name)}${x.title ? `<span class="picker-option-sub">${esc(x.title)}</span>` : ""}</button>`;

let multiPersonPickerCtx = null; // { pool, unit, selected: Set<string>, fieldWrap }
function personMultiPickerRows(pool, unit, crossUnit, query, selected){
  const scoped = crossUnit ? pool : pool.filter(x => x.unit === unit);
  const q = (query||"").trim().toLowerCase();
  const filtered = q ? scoped.filter(x =>
    x.name.toLowerCase().includes(q) || (x.title||"").toLowerCase().includes(q) || unitLabel(x.unit).toLowerCase().includes(q)
  ) : scoped;
  if (!filtered.length) return `<div class="empty" style="padding:28px 0;">找不到符合的人員</div>`;
  let html = "", curUnit = null;
  for (const x of filtered) {
    if (x.unit !== curUnit) {
      if (curUnit !== null) html += `</div>`;
      html += `<div class="picker-group"><div class="picker-group-label">${esc(unitLabel(x.unit))}</div>`;
      curUnit = x.unit;
    }
    html += `<label class="picker-option">
      <input type="checkbox" data-name="${esc(x.name)}" ${selected.has(x.name)?'checked':''}>
      <span>${esc(x.name)}${x.title ? `<span class="picker-option-sub">${esc(x.title)}</span>` : ""}</span>
    </label>`;
  }

      else multiPersonPickerCtx.selected.delete(cb.dataset.name);

// 同縣市不代表距離近），同行政區的醫院排最前面，其次是同縣市但行政區

  if (!navigator.geolocation) { showToast("此裝置/瀏覽器不支援定位功能"); return; }
  state.locatingHospital = true; render();
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { county, district } = nearestDistrict(pos.coords.latitude, pos.coords.longitude);
      state.myLat = pos.coords.latitude;
      state.myLng = pos.coords.longitude;
      state.myCounty = county;
      state.myDistrict = district;
      state.locatingHospital = false;
      render();
    },
    (err) => {
      state.locatingHospital = false; render();
      // 瀏覽器回傳的 err.message 是英文原文（例如 "User denied Geolocation"），
      // 直接顯示看不懂也不知道怎麼處理；依 GeolocationPositionError 的
      // code 給出可以實際照做的中文提示。
      const msg = err.code === 1
        ? "定位權限被拒絕，請到手機設定 → 瀏覽器（或本網頁）的「位置」權限改成允許，再回來點一次「顯示附近醫院」"
        : err.code === 2

        : err.code === 3
        ? "定位逾時，請確認手機定位服務已開啟且訊號穩定，再試一次"

// 自訂日期查詢若往回查超過平常預載的最近 RECENT_WINDOW_DAYS 天，該範圍的
// 舊資料一開始並不在 state.tasks/events/vitals 裡，需要另外查一次；查到的
// 勤務連同對應的事件／患者紀錄一起併入現有資料，讓詳情頁一樣看得到完整
// 進度，不會像只查勤務本身那樣看起來沒有任何回報紀錄。
window.__runRecordsDeepQuery = async () => {
  const f = state.recordsApplied;
  if (!f || f.period !== "custom" || !f.customDateFrom) return;
  const from = new Date(`${f.customDateFrom}T00:00:00`);
  const to = f.customDateTo ? new Date(`${f.customDateTo}T23:59:59`) : new Date();
  state.recordsDeepQuery = { loading: true, from: f.customDateFrom, to: f.customDateTo };
  render();
  try {
    const taskDocs = await fsQueryRange("tasks", "createdAt", from, to);
    const taskIds = taskDocs.map(t => t.id);
    const [eventDocs, vitalDocs] = await Promise.all([
      fsQueryByTaskIds("events", taskIds),
      fsQueryByTaskIds("vitals", taskIds)
    ]);
    state.deepTasks = mergeById(state.deepTasks, taskDocs);
    state.deepEvents = mergeById(state.deepEvents, eventDocs);
    state.deepVitals = mergeById(state.deepVitals, vitalDocs);
    state.tasks = mergeById(state.tasks, taskDocs);
    state.events = mergeById(state.events, eventDocs);
    state.vitals = mergeById(state.vitals, vitalDocs);
    state.tasks.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    state.events.forEach(d => { if (d.ts == null) d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });
    state.events.sort(eventOrderCompare);
    state.vitals.forEach(d => { if (d.ts == null) d.ts = d.timestamp ? new Date(d.timestamp).getTime() : Date.now(); });
    state.vitals.sort(eventOrderCompare);
    state.recordsDeepQuery = { loading: false, from: f.customDateFrom, to: f.customDateTo, done: true };
  } catch (err) {
    state.recordsDeepQuery = null;
    showToast(`查詢更早的資料失敗：[${err.code||'?'}] ${err.message}`);
  }
  render();
};

/* =========================================================
   21) 下拉重新整理
   加到主畫面後是獨立 App 模式，沒有瀏覽器原生的下拉更新頁面可用，
   自己刻一個：在頁面最頂端往下拉超過門檻、放開就重新抓取所有資料。
   ========================================================= */
(function setupPullToRefresh(){
  const THRESHOLD = 68;
  let startY = null, pulling = false, refreshing = false, currentDist = 0;
  const indicator = document.createElement('div');
  indicator.id = 'pull-indicator';
  indicator.innerHTML = `<span class="pull-spinner">${icon('refresh',18)}</span><span class="pull-text">下拉重新整理</span>`;
  document.body.appendChild(indicator);
  const spinner = indicator.querySelector('.pull-spinner');
  const text = indicator.querySelector('.pull-text');

  function setDist(dist){
    currentDist = dist;
    const clamped = Math.min(dist, THRESHOLD * 1.4);
    indicator.style.transform = `translateX(-50%) translateY(${clamped}px)`;
    indicator.style.opacity = Math.min(dist / THRESHOLD, 1);
    spinner.style.transform = `rotate(${dist * 2.4}deg)`;
    text.textContent = dist >= THRESHOLD ? '放開重新整理' : '下拉重新整理';
  }
  function reset(){
    indicator.classList.remove('show');
    indicator.style.transform = 'translateX(-50%) translateY(-40px)';
    indicator.style.opacity = '0';
    startY = null; pulling = false; currentDist = 0;
  }
  window.addEventListener('touchstart', (e) => {
    if (refreshing) return;
    // 彈窗（.modal-sheet）跟底部導覽列都有各自獨立的互動區域，跟外層頁面的
    // scrollY 無關；在這些區域內手勢不應誤觸外層下拉重新整理。
    const inModal = e.target.closest && e.target.closest('.modal-sheet, .bottomnav');
    // 頁面內容不足一螢幕（例如首頁任務不多時）根本沒有可捲動的空間，scrollY
    // 永遠是 0，這種情況下「頁面最上方」跟「頁面最下方」沒有實質區別——只
    // 靠 scrollY 判斷會導致在畫面任何位置下拉都被誤判成「已在頂端」。因此
    // 下拉重新整理只在頁面「真的可以捲動」時才允許觸發，且必須確實捲到頂部。
    const canScroll = document.documentElement.scrollHeight > window.innerHeight + 1;
    startY = (!inModal && canScroll && window.scrollY <= 0) ? e.touches[0].clientY : null;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (startY == null || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0 || window.scrollY > 0) { if (pulling) reset(); return; }
    pulling = true;
    indicator.classList.add('show');
    setDist(dy * 0.5);
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!pulling) { startY = null; return; }
    if (currentDist >= THRESHOLD) {
      refreshing = true;
      text.textContent = '重新整理中…';
      spinner.classList.add('spin');
      indicator.style.transform = `translateX(-50%) translateY(${THRESHOLD}px)`;
      indicator.style.opacity = '1';
      // 直接整頁重新載入（而不是只重抓資料），確保拿到最新部署的版本；
      // reload 前先把目前頁面存起來，登入流程跑完後 restoreSavedRoute()
      // 會讀回來，reload 完不會被彈回首頁，而是留在原本的頁面。
      try { sessionStorage.setItem(SAVED_ROUTE_KEY, JSON.stringify(state.route)); } catch (e) {}
      window.location.reload();
    } else {
      reset();
    }
  }, { passive: true });
})();

/* =========================================================
   彈窗下滑關閉：所有 .modal-sheet（記錄患者狀況、編輯回報、基礎資料等）
   都比照 iOS 原生底部彈窗，手指從彈窗內容「已經捲到最上面」的狀態下
   繼續往下滑才會觸發關閉；如果彈窗內容比較長、還沒捲到頂，下滑手勢
   要保留給使用者正常捲動內容用，不能讓整個彈窗跟著往下拖走。
   超過門檻放開就關閉彈窗；沿用彈窗背景遮罩既有的 onclick 判斷式來
   關閉，不用另外為每個彈窗寫關閉邏輯。
   ========================================================= */
(function setupModalSwipeToDismiss(){
  let sheet = null, startY = null, startScrollTop = 0, dragging = false;

  window.addEventListener('touchstart', (e) => {
    const s = e.target.closest && e.target.closest('.modal-sheet');
    if (!s) { sheet = null; startY = null; dragging = false; return; }
    sheet = s;
    startY = e.touches[0].clientY;
    startScrollTop = s.scrollTop;
    dragging = false;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!sheet || startY == null) return;
    const dy = e.touches[0].clientY - startY;
    // 只有手指往下滑、且彈窗內容一開始就已經捲到最上面時，才視為「下滑
    // 關閉」手勢；否則放行讓使用者正常捲動彈窗內較長的內容（例如患者
    // 紀錄表單）。
    if (dy <= 0 || startScrollTop > 0 || sheet.scrollTop > 0) {
      if (dragging) { sheet.style.transition = ''; sheet.style.transform = ''; dragging = false; }
      return;
    }
    dragging = true;
    sheet.style.transition = 'none';
    sheet.style.transform = `translateY(${dy}px)`;
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!sheet) return;
    const s = sheet;
    if (dragging) {
      const m = /translateY\(([-.\d]+)px\)/.exec(s.style.transform);
      const dy = m ? parseFloat(m[1]) : 0;
      s.style.transition = 'transform 0.22s ease';
      if (dy > 90) {
        s.style.transform = 'translateY(100%)';
        const overlay = s.closest('.modal-overlay');
        setTimeout(() => { overlay && overlay.click(); }, 180);
      } else {
        s.style.transform = '';
      }
    }
    sheet = null; startY = null; dragging = false;
  }, { passive: true });
})();

// 頁面持續開著（沒有整個關掉重開）時，也要能偵測到「開著但 8 小時沒操作」
// 的情況：使用者操作就更新最後操作時間，每分鐘檢查一次是否已經超過門檻。
(function setupIdleAutoLogout(){
  ["click", "touchstart", "keydown", "scroll"].forEach(ev => {
    window.addEventListener(ev, () => { if (state.user) touchActivity(); }, { passive: true });
  });
  setInterval(() => {
    if (state.user && isIdleTimedOut()) {
      doLogout();
      showToast("閒置超過 8 小時，已自動登出，請重新登入");
    }
  }, 60000);
})();

render();
</script>
