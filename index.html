// 颱風警報（W-C0034-001，颱風警報單）：跟 W-C0033-001 天氣特報是兩份獨立
// 資料集，全國一份（沒有颱風生效時 records.info 是空陣列，不用帶縣市查詢
// 參數）。description.section[] 是氣象署預先寫好的完整中文段落（命名與
// 位置／強度與半徑／移速與預測／颱風動態／警戒區域及事項／強風特報／
// 注意事項），直接照原文顯示，不要自己從結構化欄位重組句子（避免解讀
// 錯誤）。description["typhoon-info"][0].section[] 底下才有結構化的
// analysis（目前）／prediction（未來 24 小時預測）座標、氣壓、風速數值，
// 只用來附加顯示，不取代原文段落。
// 參考資料（實際查證方式同 F-D0047-093：透過使用者自己的授權碼在 Swagger
// 頁面 Try it out，對照真實回應才確定的 schema，不要用臆測或搜尋結果猜）：
// https://opendata.cwa.gov.tw/dist/opendata-swagger.html
const typhoonCache = { data: null, fetchedAt: 0, error: false, message: "" };
let typhoonLoading = false;
// "緯度,經度" 字串轉成 {lat,lon}，解析失敗（缺欄位/格式跑掉）回傳 null，
// 呼叫端要記得判斷 null，不要假設一定解得出來。
function parsePosition(str){
  if (!str) return null;
  const [lat, lon] = String(str).split(",").map(Number);
  return (Number.isFinite(lat) && Number.isFinite(lon)) ? { lat, lon } : null;
}
// analysis（目前）／prediction（預測 24 小時後）共用同一種欄位結構，抽成
// 共用轉換函式，數值一律轉成 Number，缺值時是 null 不是 0（0 是有意義的
// 觀測值，不能拿來當「沒有資料」的預設值）。
function parseTyphoonPoint(p){
  if (!p) return null;
  return {
    time: p.time || null,
    position: parsePosition(p.position),
    pressure: p.pressure?.value != null ? Number(p.pressure.value) : null,
    maxWinds: p.max_winds?.value != null ? Number(p.max_winds.value) : null,
    gust: p.gust?.value != null ? Number(p.gust.value) : null,
    radius15mps: p.radius_of_15mps?.value != null ? Number(p.radius_of_15mps.value) : null
  };
}
async function fetchTyphoonInfo(){
  const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-001?Authorization=${CWA_API_KEY}&format=JSON`;
  const res = await fetchCwa(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const infos = json?.records?.info || [];
  return infos.map(info => {
    const severityLevel = (info.parameter || []).find(p => p.valueName === "severity_level")?.value || info.headline || "";
    const sections = (info.description?.section || []).map(s => ({ title: s.title || "", value: s.value || "" }));
    const detailRow = (info.description?.["typhoon-info"]?.[0]?.section || []).find(s => s.analysis);
    return {
      headline: info.headline || "",
      severityLevel,
      expires: info.expires || null,
      typhoonName: detailRow ? `${detailRow.cwa_typhoon_name || ""}${detailRow.typhoon_name ? `（${detailRow.typhoon_name}）` : ""}` : "",
      scale: detailRow?.analysis?.scale?.find(s => s.lang === "zh-TW")?.value || null,
      analysis: parseTyphoonPoint(detailRow?.analysis),
      prediction: parseTyphoonPoint(detailRow?.prediction),
      sections
    };
  });
}
function ensureTyphoonLoaded(){
  const freshFor = typhoonCache.error ? 2*60*1000 : 15*60*1000;
  if (typhoonCache.fetchedAt && Date.now() - typhoonCache.fetchedAt < freshFor) {
    state.typhoon = typhoonCache.error ? { error: true, message: typhoonCache.message } : { list: typhoonCache.data };
    return;
  }
  if (typhoonLoading) return;
  typhoonLoading = true;
  fetchTyphoonInfo().then(data => {
    typhoonCache.data = data; typhoonCache.fetchedAt = Date.now(); typhoonCache.error = false;
    state.typhoon = { list: data };
    typhoonLoading = false;
    safeRender();
  }).catch(err => {
    console.error("颱風警報載入失敗", err);
    const message = err.message || String(err);
    typhoonCache.fetchedAt = Date.now(); typhoonCache.error = true; typhoonCache.message = message;
    state.typhoon = { error: true, message };
    typhoonLoading = false;
    safeRender();
  });
}
// 目前→預測數值對照小卡：跟 renderWeatherStatsGrid 同一套「標籤左、數值
// 右」排列，值用「現在→預測」呈現，一眼看出增強還是減弱，不用兩排卡片
// 各自重複標籤。缺值（該筆分析/預測本身沒有這個欄位）就整格跳過不顯示。
function typhoonStatTiles(x){
  const a = x.analysis, p = x.prediction;
  const pair = (av, pv) => (av != null && pv != null) ? `${av} → ${pv}` : (av != null ? `${av}` : (pv != null ? `→ ${pv}` : null));
  const items = [
    { lbl:"中心氣壓", val: pair(a?.pressure, p?.pressure), unit:"hPa" },
    { lbl:"近中心最大風速", val: pair(a?.maxWinds, p?.maxWinds), unit:"m/s" },
    { lbl:"最大陣風", val: pair(a?.gust, p?.gust), unit:"m/s" },
    { lbl:"七級風暴風半徑", val: pair(a?.radius15mps, p?.radius15mps), unit:"km" }
  ].filter(i => i.val != null);
  if (!items.length) return "";
  return `
    <div class="typhoon-stats">
      ${items.map(i => `<div class="typhoon-stat-tile"><span class="lbl">${esc(i.lbl)}</span><span class="val">${esc(i.val)} ${esc(i.unit)}</span></div>`).join("")}
    </div>`;
}
// 方位角轉 16 方位中文名稱（跟氣象署警報原文「東南東方」用同一套命名），
// 0 度＝正北，順時針遞增。
const COMPASS_16 = ["北","北北東","東北","東北東","東","東南東","東南","南南東","南","南南西","西南","西南西","西","西北西","西北","北北西"];
function bearingDeg(lat1, lon1, lat2, lon2){
  const toRad = d => d * Math.PI / 180;
  const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
function compass16(deg){ return COMPASS_16[Math.round(deg / 22.5) % 16]; }
// 相對位置示意圖：以單位所在縣市代表點（COUNTY_CENTERS，跟醫院最近距離
// 用的是同一份座標）為原點，把颱風目前／預測位置換算成概略平面座標畫成
// 小圖——經緯度差先用 cos(緯度) 修正經度方向的比例失真，再取兩點中最大
// 的位移量自動抓一個統一縮放比例塞進畫面（保留相對方位與比例關係，不是
// 照實際公里數畫的精確地圖，只是示意）。實際距離／方位另外用 haversineKm
//／bearingDeg 算真實數字文字顯示，示意圖只是輔助視覺，不是唯一資料來源。
function typhoonTrackBlock(unit, x){
  const county = UNIT_WEATHER_LOCATION[unit] || UNIT_WEATHER_LOCATION.hq;
  const center = COUNTY_CENTERS[county];
  const cur = x.analysis?.position;
  if (!center || !cur) return "";
  const pred = x.prediction?.position || null;
  const toXY = (p) => ({
    dx: (p.lon - center.lng) * Math.cos(center.lat * Math.PI / 180),
    dy: p.lat - center.lat
  });
  const curXY = toXY(cur);
  const predXY = pred ? toXY(pred) : null;
  const pts = [curXY, predXY].filter(Boolean);
  const maxDx = Math.max(0.4, ...pts.map(p => Math.abs(p.dx)));
  const maxDy = Math.max(0.4, ...pts.map(p => Math.abs(p.dy)));
  const W = 260, H = 170, padX = 46, padY = 40;
  const scale = Math.min((W/2 - padX) / maxDx, (H/2 - padY) / maxDy);
  const project = (p) => ({ x: W/2 + p.dx * scale, y: H/2 - p.dy * scale });
  const curPt = project(curXY);
  const predPt = predXY ? project(predXY) : null;
  const curDist = Math.round(haversineKm(center.lat, center.lng, cur.lat, cur.lon));
  const curDir = compass16(bearingDeg(center.lat, center.lng, cur.lat, cur.lon));
  let predLine = "";
  if (pred) {
    const predDist = Math.round(haversineKm(center.lat, center.lng, pred.lat, pred.lon));
    const predDir = compass16(bearingDeg(center.lat, center.lng, pred.lat, pred.lon));
    predLine = `<div class="typhoon-track-caption">預測24小時後：距${esc(county)}約 ${predDist} 公里，方位 ${esc(predDir)}</div>`;
  }
  return `
    <div class="typhoon-track">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="150" preserveAspectRatio="xMidYMid meet">
        ${predPt ? `<line x1="${curPt.x.toFixed(1)}" y1="${curPt.y.toFixed(1)}" x2="${predPt.x.toFixed(1)}" y2="${predPt.y.toFixed(1)}" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>` : ""}
        <circle cx="${(W/2).toFixed(1)}" cy="${(H/2).toFixed(1)}" r="4" style="fill:var(--muted)"/>
        <text x="${(W/2).toFixed(1)}" y="${(H/2 - 10).toFixed(1)}" text-anchor="middle" font-size="11" style="fill:var(--muted)">${esc(county)}</text>
        <circle cx="${curPt.x.toFixed(1)}" cy="${curPt.y.toFixed(1)}" r="6" fill="currentColor"/>
        <text x="${curPt.x.toFixed(1)}" y="${(curPt.y - 11).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="currentColor">現在</text>
        ${predPt ? `
          <circle cx="${predPt.x.toFixed(1)}" cy="${predPt.y.toFixed(1)}" r="5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2,2"/>
          <text x="${predPt.x.toFixed(1)}" y="${(predPt.y - 10).toFixed(1)}" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.85">24小時後</text>
        ` : ""}
      </svg>
      <div class="typhoon-track-caption">現在：距${esc(county)}約 ${curDist} 公里，方位 ${esc(curDir)}</div>
      ${predLine}
      <div class="typhoon-track-note">＊示意圖，非精確比例尺</div>
    </div>`;
}
// 沒有颱風生效中（最常見的情況）或載入中／失敗時安靜略過，理由同
// renderHazardBanner——不用另外顯示失敗提示，避免平常沒颱風時畫面上
// 一直有一塊多餘的錯誤訊息。

function renderTyphoonBanner(unit){
  const t = state.typhoon;

          <button type="button" class="typhoon-toggle" onclick="window.__toggleTyphoonExpanded()">

          </button>

// 勤務／洽公清單標題的雙語 eyebrow（英文縮寫／中文），首頁跟任務頁的
// 「勤務」頁籤共用同一份清單樣式，這裡集中產生，兩處才不會各自維護
// 一份看起來一樣、卻各自硬寫死的標籤文字。
const DUTY_SECTION_LABEL_EN = { "勤務": "SERVICE", "洽公": "LIAISON" };
function dutySectionLabel(zh){
  const en = DUTY_SECTION_LABEL_EN[zh];
  return `<div class="section-label tight section-label-duty">${en ? `<span class="en">${en}</span><span class="slash">/</span>` : ""}${esc(zh)}</div>`;
}
function viewHome(){
  const p = state.profile;
  const tasks = visibleTasks(p, state.tasks);
  const today = new Date();
  const todayTasks = tasks.filter(t => isSameDay(new Date(t.createdAt||0).getTime(), today));
  const todayDone = todayTasks.filter(t => deriveStatus(t.id) === "completed");

  // 車輛動態＝目前所有進行中的勤務（一輛車理論上同時只會有一個進行中任務，
  // 但測試資料常會讓同一車號被多筆任務共用，所以直接以「任務」為單位列出，
  // 不要用「車輛」去找對應任務，否則同一車號的第二筆任務會被吃掉不顯示）。
  // 「進行中」統計直接沿用這份清單的數量，確保上面數字跟下面實際列出的
  // 卡片一定對得上；不能只算「今天建立」的任務，否則跨日還在進行中的
  // 勤務（例如昨天出勤、今天還沒返營）會出現在下面清單卻沒被算進數字。
  // 有患者記錄的任務排最前面，突發狀況不會被其他一般任務蓋過去、漏看。
  const activeTasks = tasks
    .filter(t => deriveStatus(t.id) !== "completed")
    .sort((a,b) => {
      const pa = state.vitals.some(v=>v.taskId===a.id) ? 0 : 1;
      const pb = state.vitals.some(v=>v.taskId===b.id) ? 0 : 1;
      if (pa !== pb) return pa - pb;
      return unitLabel(a.unit).localeCompare(unitLabel(b.unit));
    });
  // 勤務（車輛派遣）跟洽公性質不同，分開列成兩個小節，不要混在同一份清單裡
  // 讓人分不清楚哪些是真的派車出去的勤務。
  const dutyActive = activeTasks.filter(t => t.type !== "liaison");
  const liaisonActive = activeTasks.filter(t => t.type === "liaison");
  const fleetSection = activeTasks.length ? `
    ${dutyActive.length ? `${dutySectionLabel("勤務")}${dutyActive.map(taskCard).join("")}` : ""}
    ${liaisonActive.length ? `${dutySectionLabel("洽公")}${liaisonActive.map(taskCard).join("")}` : ""}
  ` : `<div class="empty">目前沒有車輛執行中</div>`;

  // 高勤官最在意的「一眼看出」統計：目前正在執行中的勤務裡，有幾台車這趟
  // 是營內、幾台是營外（依建立勤務時填的 scope 欄位，不是車輛名冊總數跟
  // 派遣中數量的差——名冊裡很多車今天根本沒有派遣，跟「營內外」這個問題
  // 無關），以及目前洽公在外的人數（不重複計算同一人同時掛在多筆洽公）。
  // 待命中（deriveStatus 為 pending，還沒回報「出勤」）的車輛實際上還沒真的
  // 離開營區，不能只看勤務建立時填的營內/營外屬性就算進營外車，要等真的
  // 出勤、離開營區之後才算——否則急診待命還沒出勤的待命車會被誤算成營外車。
  const inCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營內").length;
  const outCampCount = dutyActive.filter(t => deriveStatus(t.id) !== "pending" && taskScope(t) === "營外").length;
  const liaisonPeopleCount = new Set(liaisonActive.flatMap(t => Array.isArray(t.personnel) ? t.personnel : [])).size;

  return `
    <div class="home-date">${fmtDate(today)}</div>
    <div class="section-label">今日概況</div>
    <div class="stat-grid stat-grid-2">
      <div class="stat-tile t-blue">
        <div class="stat-tile-top"><span class="lbl">今日勤務數</span><span class="stat-icon">${icon('tasks',16)}</span></div>
        <div class="num">${todayTasks.length}</div>
      </div>
      <div class="stat-tile t-green">
        <div class="stat-tile-top"><span class="lbl">已完成</span><span class="stat-icon">${icon('check',16)}</span></div>
        <div class="num">${todayDone.length}</div>
      </div>
      <div class="stat-tile t-purple">
        <div class="stat-tile-top"><span class="lbl">洽公中人數</span><span class="stat-icon">${icon('user',16)}</span></div>
        <div class="num">${liaisonPeopleCount}</div>
      </div>
      <div class="stat-tile t-orange">
        <div class="stat-tile-top"><span class="lbl">營內／營外</span><span class="stat-icon">${icon('depart',16)}</span></div>
        <div class="num">${inCampCount}／${outCampCount}</div>
      </div>
    </div>
    ${fleetSection}
  `;
}

function viewEditTask(taskId){
  const p = state.profile;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  if (!canEditTask(p, t)) return `<div class="empty">您沒有編輯此勤務的權限</div>`;

  const isLiaison = t.type === "liaison";
  const unit = t.unit;
  // 車長／駕駛／洽公人員都可跨單位選人，對應的人員選擇器打開時會直接讀取
  // 當下的 state.personnel 動態建立候選名單（並保留目前已指派的人選，即使
  // 現在被排除規則擋住）。
  const vehicleOpts = sortVehicles(state.vehicles.filter(x => x.unit === unit && x.active !== false));
  const recorderOpts = state.recorders.filter(x => x.unit === unit && x.active !== false);
  const outSet = dispatchedVehiclePlates();
  const currentRecorders = t.recorders || [];
  const currentPersonnel = t.personnel || [];
  // 車輛跨單位借用不常見，但既有勤務可能早就借了別的單位的車，編輯時要
  // 判斷目前指派的車是不是跨單位借來的，是的話「跨單位借車」預設打勾、
  // 車號下拉也要一開始就展開列出所有單位的車，不然選單裡會找不到它。
  const currentVehicleRecord = t.vehicle ? state.vehicles.find(v => v.plate === t.vehicle) : null;
  const isCrossUnitVehicle = !!(currentVehicleRecord && currentVehicleRecord.unit !== unit);

  return `
    <div class="back-row">${backBtn({name:'task', id:taskId})}</div>
    <div class="section-label">編輯${isLiaison?'洽公':'勤務'}</div>
    <form onsubmit="window.__saveTaskEdit(event,'${taskId}')">
      ${!isLiaison ? `
      <div class="field"><label>營內／營外 *</label>
        ${chipGroup('scope', TASK_SCOPE_OPTIONS, taskScope(t), false)}
      </div>` : ""}
      <div class="field"><label>單位</label><input value="${unitLabel(unit)}" disabled></div>
      <div class="field"><label>任務名稱 *</label><input name="title" required value="${esc(t.title||'')}"></div>
      <div class="field"><label>地點${isLiaison?'（可多個，用頓號分隔）':''}</label><input name="location" value="${esc(t.location||'')}"></div>
      ${isLiaison ? `
      <div class="field"><label>人員（可複選）*</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openMultiPersonPicker(this)">
          <span class="picker-field-text${currentPersonnel.length?'':' placeholder'}">${currentPersonnel.length ? esc(currentPersonnel.join('、')) : '請選擇人員'}</span>${icon('chevronDown',16)}
        </button>
        <div class="personnel-hidden-checkboxes">${currentPersonnel.map(name => `<input type="checkbox" name="personnel" value="${esc(name)}" checked style="display:none">`).join("")}</div>
      </div>` : `
      <div class="field"><label>車號</label>
        <select name="vehicle" data-unit="${unit}">
          ${isCrossUnitVehicle ? vehicleSelectOptionsAllUnits(t.vehicle) : `<option value="">請選擇車輛</option>` + vehicleOptionsByType(vehicleOpts, v => `<option value="${esc(v.plate)}" ${t.vehicle===v.plate?'selected':''}>${esc(vehicleOptionLabel(v.plate, outSet))}</option>`)}
        </select>
        <label class="checkbox-inline"><input type="checkbox" ${isCrossUnitVehicle?'checked':''} onchange="window.__toggleCrossUnitVehicle(this)"> 跨單位借車</label>
      </div>
      <div class="field"><label>車長</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('crewLeader', this)">
          <span class="picker-field-text${t.crewLeader?'':' placeholder'}">${t.crewLeader ? esc(crewDisplayLabel(t.crewLeader, unit)) : '請選擇車長'}</span>${icon('chevronDown',16)}
        </button>
        <input type="hidden" name="crewLeader" value="${esc(t.crewLeader||'')}">
      </div>
      <div class="field"><label>駕駛</label>
        <button type="button" class="picker-field" data-unit="${unit}" onclick="window.__openPersonPicker('driver', this)">
          <span class="picker-field-text${t.driver?'':' placeholder'}">${t.driver ? esc(crewDisplayLabel(t.driver, unit)) : '請選擇駕駛'}</span>${icon('chevronDown',16)}
        </button>
        <input type="hidden" name="driver" value="${esc(t.driver||'')}">
      </div>
      ${t.erStandbyKey ? `
      <div class="field"><label>值班醫官（選填）</label>
        <select name="dutyOfficer">
          <option value="">請選擇醫官</option>
          ${state.doctors.filter(x=>x.active!==false).map(x => `<option value="${esc(x.name)}" ${t.dutyOfficer===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`).join("")}
        </select>
      </div>` : ""}
      <div class="field"><label>行車紀錄器（可多選）</label>
        <select name="recorders" multiple size="${Math.min(4, Math.max(2, recorderOpts.length || 2))}">
          ${recorderOpts.map(x => `<option value="${esc(x.code)}" ${currentRecorders.includes(x.code)?'selected':''}>${esc(x.code)}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>出發前里程（公里）</label><input name="startMileage" type="number" inputmode="decimal" value="${t.startMileage!=null?t.startMileage:''}"></div>
      <div class="field"><label>出發前油量</label><select name="startFuel">${fuelOptions(t.startFuel||"")}</select></div>`}
      <div class="field"><label>備註（選填）</label><textarea name="notes">${esc(t.notes||'')}</textarea></div>
      <button class="btn-primary" type="submit">儲存變更</button>
    </form>
  `;
}

        <div id="allergy-drugfood-wrap" style="display:${allergyDrugFoodChecked?'block':'none'};">
          <div class="field" style="margin-top:10px;"><label>過敏詳情（選填，請說明是哪種藥物／食物）</label><input id="vf-allergy-drugfood-detail" value="${esc(editingVitals?.allergyDrugFoodDetail||'')}" placeholder="例如：盤尼西林、花生"></div>
        </div>
        <div id="allergy-other-wrap" style="display:${allergyOtherChecked?'block':'none'};">
          <div class="field" style="margin-bottom:0;"><label>其他過敏說明（選填）</label><input id="vf-allergy-other-detail" value="${esc(editingVitals?.allergyOtherDetail||'')}" placeholder="請說明"></div>
        </div>
      </div>
      ` : ``}
      <div class="form-section">
        <div class="form-section-title">${isInitialEntry ? `<span class="step-num">6</span>` : ""}生命徵象</div>
        <div class="field">
          <label>時間</label>
          <div style="display:flex; gap:8px;">
            <input id="vf-time" type="time" style="flex:1;" value="${hhmmValue(new Date(editingVitals?editingVitals.ts:Date.now()))}" required>
            <button type="button" class="icon-btn" style="flex-shrink:0;" onclick="window.__resetVitalsTime()">套用目前</button>
          </div>
        </div>
        <div class="field"><label>意識狀態（選填）</label>${chipGroup('vf-consciousness', CONSCIOUSNESS_OPTIONS, editingVitals?.consciousness||'', false)}</div>
        <div class="field">
          <label>血壓（選填）</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <input id="vf-bp-sys" type="text" inputmode="numeric" placeholder="收縮壓 120" style="flex:1;" value="${esc(bpSys||'')}">
            <span style="color:var(--muted); font-weight:700;">/</span>
            <input id="vf-bp-dia" type="text" inputmode="numeric" placeholder="舒張壓 80" style="flex:1;" value="${esc(bpDia||'')}">
          </div>
        </div>
        <div class="field"><label>心跳 次/分（選填）</label><input id="vf-hr" type="text" inputmode="numeric" value="${esc(editingVitals?.hr||'')}"></div>
        <div class="field"><label>呼吸 次/分（選填）</label><input id="vf-rr" type="text" inputmode="numeric" value="${esc(editingVitals?.rr||'')}"></div>
        <div class="field"><label>血氧 SpO2 %（選填）</label><input id="vf-spo2" type="text" inputmode="numeric" value="${esc(editingVitals?.spo2||'')}"></div>
        <div class="field"><label>體溫 °C（選填）</label><input id="vf-temp" type="text" inputmode="decimal" value="${esc(editingVitals?.temp||'')}"></div>
        <div class="field">
          <label>意識程度 GCS（選填）</label>
          <div class="gcs-select-row">
            <select id="gcs-e" onchange="window.__updateGcsScore()">
              <option value="">E 睜眼</option>
              ${GCS_E_OPTIONS.map(o => `<option value="${o.v}" ${gcsParts.e===o.v?'selected':''}>${esc(o.label)}</option>`).join("")}
            </select>
            <select id="gcs-v" onchange="window.__updateGcsScore()">
              <option value="">V 語言</option>
              ${GCS_V_OPTIONS.map(o => `<option value="${o.v}" ${gcsParts.v===o.v?'selected':''}>${esc(o.label)}</option>`).join("")}
            </select>
            <select id="gcs-m" onchange="window.__updateGcsScore()">
              <option value="">M 運動</option>
              ${GCS_M_OPTIONS.map(o => `<option value="${o.v}" ${gcsParts.m===o.v?'selected':''}>${esc(o.label)}</option>`).join("")}
            </select>
          </div>
          <div id="gcs-score-display" class="gcs-score-display">${(gcsParts.e&&gcsParts.v&&gcsParts.m) ? `總分：${Number(gcsParts.e)+Number(gcsParts.v)+Number(gcsParts.m)} / 15` : ''}</div>
          <input type="hidden" id="vf-gcs" value="${esc(editingVitals?.gcs||'')}">
        </div>
        <div class="field"><label>血糖值 mg/dL（選填）</label><input id="vf-glucose" type="text" inputmode="numeric" value="${esc(editingVitals?.glucose||'')}"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">${isInitialEntry ? `<span class="step-num">7</span>` : ""}處置項目</div>
        <div class="field">${chipGroup('vf-treatments', TREATMENT_OPTIONS, editingVitals?.treatments||[], true, [{values:['其他'], wrapId:'treatment-other-wrap'}])}</div>
        <div id="treatment-other-wrap" style="display:${treatmentOtherChecked?'block':'none'};">
          <div class="field" style="margin-top:10px; margin-bottom:0;"><label>其他處置說明（選填）</label><input id="vf-treatment-other-detail" value="${esc(editingVitals?.treatmentOtherDetail||'')}" placeholder="請說明"></div>
        </div>
      </div>
      <div class="field"><label>備註（選填）</label><input id="vf-note" value="${esc(editingVitals?.note||'')}"></div>
      <button class="btn-primary" type="submit">${editingVitals?'儲存修正':'送出紀錄'}</button>
      ${formCancelBtn}
    </form>
  ` : "";

  return `
    <div class="back-row">${backBtn({name:'task', id:taskId})}</div>
    <div class="section-label">${icon('heartbeat',17)} ${editingVitals ? '編輯患者紀錄' : (hasPatient ? '患者紀錄' : '記錄患者狀況')}</div>
    ${historyHtml}
    ${formHtml}
  `;
}

/* =========================================================
   14) 畫面：任務詳情
   ========================================================= */
function viewTaskDetail(taskId){
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return `<div class="empty">找不到此任務</div>`;
  const p = state.profile;
  const s = deriveStatus(taskId);
  const evs = taskEvents(taskId);
  const isLiaison = t.type === "liaison";
  const evDefs = eventTypesFor(t);

  // 勤務資訊：出發/抵達/返營/最終里程與油量、自動計算行駛公里數與任務耗時
  // （抵達現場可能有多筆，因為同一趟勤務可能去兩個以上的地點；洽公任務地點
  // 單一、不追蹤里程油量，這段資料只有勤務類任務才會用到）
  const dispatchEv = eventByType(taskId, "DISPATCH");
  const arrivedEvs = evs.filter(e => e.type === "ARRIVED_SCENE");
  const departEvs = evs.filter(e => e.type === "DEPART_SCENE");
  // 多地點時每一站分開列成自己的一列（不要用頓號串在同一行），才看得出來
  // 抵達／離開的流水時間線，一眼就知道第幾站對應哪個里程。
  const arrivalRows = arrivedEvs.length
    ? arrivedEvs.map((e,i) => `<div class="k">抵達里程${arrivedEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}</div>`).join("")
    : `<div class="k">抵達里程</div><div class="v">—</div>`;
  // 前往地點是離開現場當下就先問清楚（決定要去哪裡才會按前往下一個地點），
  // 所以顯示在離開里程這一列，不是抵達里程那一列。
  const departRows = departEvs.length
    ? departEvs.map((e,i) => `<div class="k">離開里程${departEvs.length>1?' '+(i+1):''}</div><div class="v">${e.mileage!=null?e.mileage+' km':'—'}${e.location?'（前往：'+esc(e.location)+'）':''}</div>`).join("")
    : `<div class="k">離開里程</div><div class="v">—</div>`;
  const returningEv = eventByType(taskId, "RETURNING");
  const completedEv = eventByType(taskId, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? null;
  const finalMileage = completedEv?.mileage ?? null;
  const distance = (startMileage != null && finalMileage != null) ? (finalMileage - startMileage) : null;
  // 洽公任務沒有 COMPLETED 事件，返營本身（statusKey completed）就是結束點。
  const finalEv = isLiaison ? returningEv : completedEv;
  const duration = finalEv ? (finalEv.ts - (dispatchEv?.ts ?? new Date(t.createdAt||0).getTime())) : null;

  const draft = state.reportDraft && state.reportDraft.taskId === taskId ? state.reportDraft : null;
  const canDoReport = canReport(p, t);

  // ---- 勤務進度：把「勤務進度」跟「勤務時間軸」合併成同一份清單——已發生的
  // 事件直接顯示實際回報內容（時間/回報人/里程/備註/編輯按鈕），還沒發生的
  // 步驟接在後面用灰色佔位顯示，一次就看得出走到哪一步、之前每一步的細節、
  // 下一步是什麼，不用分開看兩份內容重複的區塊。
  const lastType = evs.length ? evs[evs.length - 1].type : null;
  const stepTypes = evDefs.map(e => e.type);
  const lastIdx = lastType ? stepTypes.indexOf(lastType) : -1;
  const isTaskDone = s === "completed";
  const upcomingSteps = evDefs.filter((def, i) => i > lastIdx);
  // 出勤後、還沒抵達現場前，下一步就是要送去的醫院——回報按鈕上面顯示
  // 導航按鈕用（見下方 stickyBar），人在路上點開勤務詳情頁隨時能導航過去。
  // 只在「下一步剛好是抵達現場、且出勤時有選送醫醫院」才顯示；之後前往
  // 下一站的地點是自由輸入的文字，沒有對應醫院名冊資料可以導航。
  const hospitalForArrival = (!isLiaison && lastType === "DISPATCH" && dispatchEv?.hospital)
    ? state.hospitals.find(h => h.name === dispatchEv.hospital)
    : null;
  const progressHtml = `
    <div class="section-label">${isLiaison ? "洽公進度" : "勤務進度"}</div>
    <div class="stepper">
      ${evs.map((e, idx) => {
        const def = evDefs.find(d=>d.type===e.type);
        const cls = (idx === evs.length - 1 && !isTaskDone) ? "current" : "done";
        return `
        <div class="step-item ${cls}">
          <div class="step-dot">${cls === "done" ? icon("check", 11) : ""}</div>
          <div class="step-body">
            <div class="step-head">
              <div class="step-label">${def ? icon(def.icon,15) : ''} ${def?.label}${e.location ? '：'+esc(e.location) : ''}</div>
              ${canDoReport ? `<button class="tl-edit-btn" onclick="window.__editEvent('${e.id}')">編輯</button>` : ""}
            </div>
            <div class="step-meta">${fmtTime(e.ts)} · ${nameWithRank(e.userName, e.unit)}${e.mileage!=null ? ' · ' + e.mileage + ' km' : ''}</div>
            ${e.note ? `<div class="step-note">${esc(e.note)}</div>` : ""}
          </div>
        </div>`;
      }).join("")}
      ${upcomingSteps.map(def => `
        <div class="step-item upcoming">
          <div class="step-dot"></div>
          <div class="step-body"><div class="step-label">${icon(def.icon,15)} ${def.label}</div></div>
        </div>`).join("")}
    </div>`;

  // rTypes 決定回報表單/Sticky Bar 要顯示的動作按鈕（見下方），勤務進度 Stepper
  // 本身已經看得出目前狀態與下一步，不需要再另外一張卡片重複顯示一次。
  const rTypes = canDoReport ? reportableTypes(taskId) : [];

  // ---- 患者狀況：任何進行中的任務，遇到突發狀況都能記錄生命徵象／主訴，
  // 不綁定特定任務類型或當下的勤務進度階段。可持續新增，形成時間序列方便
  // 看出病人狀況變化。首頁／任務卡片會依此凸顯有患者的任務（見 taskCard）。
  const taskVitals = state.vitals.filter(v => v.taskId === taskId).sort(eventOrderCompare);
  const hasPatient = taskVitals.length > 0;
  const latestComplaint = taskVitals.slice().reverse().find(v => v.complaint)?.complaint || "";
  // 患者基本資料（單位／級職／姓名／性別）只在初評（第一筆紀錄）詢問，
  // 卡片摘要沿用那一筆的資料顯示。
  const initialVitals = taskVitals[0];
  const patientLabel = initialVitals
    ? [initialVitals.patientUnit, initialVitals.patientRank, initialVitals.patientName].filter(Boolean).join('　') + (initialVitals.patientGender ? `（${initialVitals.patientGender}）` : '')
    : '';
  // 高勤官、主官管不能自己記錄患者狀況，但既有紀錄仍要能點進去查看（唯讀），
  // 不能因為沒有回報權限就完全看不到卡片可以點——canView 決定「有紀錄時
  // 能不能點進去看」，canDoReport 才決定「能不能新增/編輯」。
  const canView = canViewVitals(p, t);
  const canOpenPatientCard = canDoReport || (canView && hasPatient);
  const patientCardTag = canOpenPatientCard ? "button" : "div";
  const patientCardClickAttr = canOpenPatientCard ? ` onclick="window.__startVitals('${taskId}')"` : "";
  const patientActionLabel = hasPatient ? (canDoReport ? '查看／更新紀錄' : '查看紀錄') : '開始記錄';
  const vitalsSection = !isLiaison && (canDoReport || hasPatient) ? `
    <div class="section-label">患者狀況</div>
    <${patientCardTag} class="patient-card${hasPatient ? ' has-record' : ''}"${patientCardClickAttr}>
      <div class="patient-card-top">
        <div class="patient-card-icon">${icon('heartbeat',20)}</div>
        <div class="patient-card-body">
          <div class="patient-card-title-row">
            <div class="patient-card-title">患者狀況</div>
            ${hasPatient ? `<span class="patient-card-badge">患者紀錄中</span>` : ""}
          </div>
          ${hasPatient ? (patientLabel ? `<div class="patient-card-sub">${esc(patientLabel)}</div>` : "") : `<div class="patient-card-sub">尚未建立患者紀錄</div>`}
          <div class="patient-card-desc">${hasPatient
            ? (latestComplaint ? `主訴：${esc(latestComplaint)}。請持續更新生命徵象及處置內容。` : "已建立患者紀錄。請持續更新主訴、生命徵象及處置內容。")
            : "勤務過程中若發現患者需要救護，可點擊建立患者紀錄。"}</div>
        </div>
      </div>
      ${canOpenPatientCard ? `<div class="patient-card-action">${hasPatient ? icon('heartbeat',16) : icon('plus',16)} ${patientActionLabel}</div>` : ""}
    </${patientCardTag}>
  ` : "";

  // ---- 回報表單／Sticky Bottom Action Bar ----
  let reportModal = "";
  let stickyBar = "";
  if (canDoReport && draft) {
    const def = evDefs.find(e=>e.type===draft.type);
    const isFinal = !isLiaison && draft.type === "COMPLETED";
    const lastEv = evs[evs.length - 1];
    const minBase = lastEv?.ts ?? dispatchEv?.ts ?? null;
    const minTime = minBase ? hhmmValue(new Date(minBase)) : "";
    // 離開現場當下就已經知道要去哪裡（決定要前往下一個地點才會按這顆按鈕），
    // 所以地點在「離開現場」就先問清楚，抵達下一個地點時不用再問一次；
    // 第一次抵達現場的地點則沿用建立勤務時填的任務「地點」欄位，也不用問。
    // 洽公任務地點單一、沒有多站分岔，不會有這個情況。
    const needsLocation = !isLiaison && draft.type === "DEPART_SCENE";
    // 出勤當下先問清楚預計送去的醫院（選填，現場評估後可能會變，之後有需要
    // 再補），沿用「基礎資料管理」維護的醫院名冊，不用手動打字。
    const needsHospital = !isLiaison && draft.type === "DISPATCH";
    const formTitle = (!isLiaison && draft.type === "ARRIVED_SCENE" && lastType === "DEPART_SCENE") ? "抵達下一個地點" : def.label;
    // 離開現場、開始返營的當下，車輛都還沒有移動（人剛在原地回報），里程
    // 理論上跟上一筆回報的里程一樣，直接帶入避免重複輸入；抵達下一個地點
    // 是移動之後才回報，先帶入上一筆已知里程當作起始值，使用者只要接著往
    // 上改，不用從零開始整串重打一次；抵達營區才是完全空白，需要手動輸入。
    // 洽公任務不追蹤里程。
    const lastMileageEv = evs.slice().reverse().find(e => e.mileage != null);
    const isNextStopArrival = !isLiaison && draft.type === "ARRIVED_SCENE" && arrivedEvs.length > 0;
    const prefillMileage = !isLiaison && (draft.type === "RETURNING" || draft.type === "DEPART_SCENE" || isNextStopArrival) && lastMileageEv ? lastMileageEv.mileage : null;
    // 回報表單改用彈窗（跟基礎資料管理的新增/編輯彈窗同一套元件），避免表單
    // 內容被固定在畫面底部的 Sticky Action Bar 擋住看不到。
    // 除了備註以外都是必填欄位，避免漏填造成紀錄不完整。
    reportModal = `
      <div class="modal-overlay" onclick="if(event.target===this) window.__cancelReport()">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${icon(def.icon,19)} 回報：${formTitle}</div>
          <form onsubmit="event.preventDefault(); window.__submitReport('${t.id}','${draft.type}')">
            ${needsLocation ? `<div class="field"><label>前往地點</label><input id="rf-location" placeholder="例如：加油站、OO超商" required></div>` : ""}
            ${needsHospital ? `<div class="field"><label>送醫醫院（選填）</label>
              <select id="rf-hospital">
                <option value="">請選擇醫院</option>
                ${state.hospitals.slice().sort((a,b) => HOSPITAL_NAME_COLLATOR.compare(a.name||'', b.name||'')).map(h => `<option value="${esc(h.name)}">${esc(h.name)}</option>`).join("")}
              </select>
            </div>` : ""}
            <div class="field">
              <label>時間</label>
              <div style="display:flex; gap:8px;">
                <input id="rf-time" type="time" style="flex:1;" ${minTime?`min="${minTime}"`:""} value="${hhmmValue(new Date())}" required>
                <button type="button" class="icon-btn" style="flex-shrink:0;" onclick="window.__resetReportTime()">套用目前</button>
              </div>
            </div>
            ${!isLiaison ? `<div class="field"><label>里程（公里）</label><input id="rf-mileage" type="number" inputmode="decimal" placeholder="目前里程" value="${prefillMileage != null ? prefillMileage : ''}" required></div>` : ""}
            ${isFinal ? `<div class="field"><label>剩餘油量</label><select id="rf-fuel" required>${fuelOptions("")}</select></div>` : ""}
            <div class="field"><label>備註（選填）</label><input id="rf-note" placeholder="備註"></div>
            <button class="btn-primary" type="submit">確認送出</button>
            <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__cancelReport()">取消</button>
          </form>
        </div>
      </div>`;
  } else if (canDoReport && !draft && rTypes.length === 1) {
    const def = evDefs.find(e=>e.type===rTypes[0]);
    // 離開現場後回頭要回報的「抵達」是抵達下一個地點，跟第一次抵達現場要分開講清楚。
    const btnLabel = (!isLiaison && rTypes[0] === "ARRIVED_SCENE" && lastType === "DEPART_SCENE") ? "抵達下一個地點" : def.label;
    // 下一步剛好是「抵達現場」且出勤時有選送醫醫院時，在「抵達現場」這顆
    // 回報按鈕上面加一排導航按鈕，人準備按下去回報之前就能先點導航出發。
    const showNavAboveBtn = rTypes[0] === "ARRIVED_SCENE" && hospitalForArrival;
    const navRow = showNavAboveBtn ? `<div style="display:flex; gap:8px;">
      <a class="icon-btn" style="flex:1; justify-content:center;" href="${googleMapsUrl(hospitalNavQuery(hospitalForArrival))}" target="_blank" rel="noopener">${icon('depart',14)} Google 導航</a>
      <a class="icon-btn" style="flex:1; justify-content:center;" href="${appleMapsUrl(hospitalNavQuery(hospitalForArrival))}" target="_blank" rel="noopener">${icon('depart',14)} Apple 導航</a>
    </div>` : "";
    stickyBar = `
      <div class="sticky-action-bar" style="flex-direction:column; align-items:stretch; gap:8px;">
        ${navRow}
        <button class="btn-primary" style="width:100%;" onclick="window.__startReport('${t.id}','${rTypes[0]}')">${icon(def.icon,20)} ${btnLabel}</button>
      </div>
      <div class="sticky-bar-spacer" style="${showNavAboveBtn ? 'height:128px;' : ''}"></div>`;
  } else if (canDoReport && !draft && rTypes.length === 2) {
    // 唯一的分岔點（僅勤務類任務才會出現）：抵達現場之後，離開前往下一個地點
    // （這裡回報的是「離開現場」本身，抵達下一站要等真的到了才另外回報，
    // 兩者是不同時刻，不能混在同一次動作裡）或直接返回營區。
    stickyBar = `
      <div class="sticky-action-bar">
        <button class="btn-primary" onclick="window.__startReport('${t.id}','DEPART_SCENE')">${icon('depart',20)} 前往下一個地點</button>
        <button class="btn-primary green" onclick="window.__startReport('${t.id}','RETURNING')">${icon('home',20)} 返回營區</button>
      </div>
      <div class="sticky-bar-spacer"></div>`;
  }

  // ---- 編輯既有回報（時間/里程有時候會填錯，需要能修正）----
  const editingEvent = canDoReport && state.eventEditId ? evs.find(e => e.id === state.eventEditId) : null;

        <div class="k">紀錄器</div><div class="v">${esc((t.recorders||[]).join('、') || '—')}</div>` : ""}

/* =========================================================
   15) 畫面：勤務紀錄搜尋
   ========================================================= */
const RECORDS_PERIODS = [
  { key:"today", label:"今天" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }, { key:"custom", label:"自訂日期" }
];
function runRecordsFilter(p, f){
  let tasks = visibleTasks(p, state.tasks);
  if (f.period === "custom") {
    if (f.customDateFrom || f.customDateTo) tasks = tasks.filter(t => {
      const d = new Date(t.createdAt||0);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (f.customDateFrom && iso < f.customDateFrom) return false;
      if (f.customDateTo && iso > f.customDateTo) return false;
      return true;
    });
  } else {
    tasks = tasksInPeriod(tasks, f.period);
  }
  if (f.unit) tasks = tasks.filter(t => t.unit === f.unit);
  if (f.vehicle) tasks = tasks.filter(t => t.vehicle === f.vehicle);
  if (f.title) tasks = tasks.filter(t => (t.title||"").toLowerCase().includes(f.title.toLowerCase()));
  if (f.location) tasks = tasks.filter(t => (t.location||"").toLowerCase().includes(f.location.toLowerCase()));
  if (f.status) tasks = tasks.filter(t => deriveStatus(t.id) === f.status);
  if (f.person) tasks = tasks.filter(t => t.crewLeader === f.person || t.driver === f.person);
  return tasks;
}
function viewRecords(){
  const p = state.profile;
  const f = state.recordsFilter;

  const statusOptions = ["", ...STATUS_ORDER].map(s => `<option value="${s}" ${f.status===s?'selected':''}>${s?STATUS_LABEL[s]:'全部狀態'}</option>`).join("");

  // 車號／人員下拉選單：依目前單位篩選（或全部單位）動態列出，不再手打文字搜尋
  const vehiclePool = sortVehicles(f.unit ? state.vehicles.filter(v => v.unit === f.unit) : state.vehicles);
  const personPool = (f.unit ? state.personnel.filter(x => x.unit === f.unit) : state.personnel);
  const vehicleOptions = `<option value="">全部車號</option>` + vehicleOptionsByType(vehiclePool, v => `<option value="${esc(v.plate)}" ${f.vehicle===v.plate?'selected':''}>${esc(v.plate)}</option>`);
  const personOptions = [`<option value="">全部人員</option>`, ...personPool.map(x => `<option value="${esc(x.name)}" ${f.person===x.name?'selected':''}>${esc(x.name)}${x.title?' '+esc(x.title):''}</option>`)].join("");

  const periodPills = `
    <div class="pill-row">
      ${RECORDS_PERIODS.map(pd => `<button class="pill ${f.period===pd.key?'active':''}" onclick="window.__setRecordsFilter('period','${pd.key}')">${pd.label}</button>`).join("")}
    </div>
    ${f.period === "custom" ? `
    <div class="search-grid">
      <div class="field"><label>起始日期</label><input type="date" value="${f.customDateFrom}" max="${f.customDateTo||''}" oninput="window.__setRecordsFilter('customDateFrom', this.value)"></div>
      <div class="field"><label>結束日期</label><input type="date" value="${f.customDateTo}" min="${f.customDateFrom||''}" oninput="window.__setRecordsFilter('customDateTo', this.value)"></div>
    </div>` : ""}`;
  const unitPills = canSeeAllUnits(p) ? `
    <div class="pill-row">
      <button class="pill ${!f.unit?'active':''}" onclick="window.__setRecordsFilter('unit','')">全部單位</button>
      ${UNITS.map(u => `<button class="pill ${f.unit===u.code?'active':''}" onclick="window.__setRecordsFilter('unit','${u.code}')">${u.label}</button>`).join("")}
    </div>` : "";

  const expanded = state.recordsFiltersExpanded;
  const applied = state.recordsApplied;
  const tasks = applied ? runRecordsFilter(p, applied) : [];

  // 自訂日期若往回查超過平常預載的最近 RECENT_WINDOW_DAYS 天，那段期間的
  // 資料一開始沒被抓下來，查詢結果可能不完整；提供「查詢更早的資料」讓
  // 使用者自己決定要不要多花一次查詢把那段期間的資料也補齊，而不是每次
  // 登入都預先抓那麼久以前的資料。
  const dq = state.recordsDeepQuery;
  const needsDeepQuery = applied && applied.period === "custom" && applied.customDateFrom
    && applied.customDateFrom < isoDate(recentCutoffDate())
    && !(dq && dq.done && dq.from === applied.customDateFrom && dq.to === applied.customDateTo);
  const deepQueryBanner = needsDeepQuery ? `
    <div class="empty" style="text-align:left; padding:14px 16px; margin-bottom:14px;">
      ${dq && dq.loading ? `查詢中…` : `查詢範圍早於最近 ${RECENT_WINDOW_DAYS} 天，畫面上的結果可能不完整。`}
      ${dq && dq.loading ? "" : `<button class="btn-ghost" style="margin-top:8px;" onclick="window.__runRecordsDeepQuery()">查詢更早的資料</button>`}
    </div>` : "";

  return `
    ${periodPills}
    ${unitPills}
    <button class="filters-toggle ${expanded?'open':''}" onclick="window.__toggleRecordsFilters()">
      ${icon('chevronDown',16).replace('<svg ', '<svg class="chev" ')} 更多篩選
    </button>
    ${expanded ? `
    <div class="search-grid">
      <div class="field"><label>車號</label><select onchange="window.__setRecordsFilter('vehicle', this.value)">${vehicleOptions}</select></div>
      <div class="field"><label>人員（車長/駕駛）</label><select onchange="window.__setRecordsFilter('person', this.value)">${personOptions}</select></div>
      <div class="field"><label>狀態</label><select onchange="window.__setRecordsFilter('status', this.value)">${statusOptions}</select></div>
      <div class="field"><label>任務名稱</label><input value="${esc(f.title)}" oninput="window.__setRecordsFilter('title', this.value)"></div>
      <div class="field full"><label>地點</label><input value="${esc(f.location)}" oninput="window.__setRecordsFilter('location', this.value)"></div>
    </div>` : ""}
    <div class="row" style="display:flex; gap:10px; margin:12px 0;">
      <button class="btn-ghost" style="flex:0 0 auto; padding:15px 22px;" onclick="window.__clearRecordsQuery()">清除</button>
      <button class="btn-primary" style="flex:1; margin-top:0;" onclick="window.__runRecordsQuery()">查詢</button>
    </div>
    ${!applied ? `<div class="empty">${icon('records',32)}<div style="margin-top:10px;">選擇篩選條件後按「查詢」</div></div>` : `
      ${deepQueryBanner}
      <div class="section-label">結果 · ${tasks.length}</div>
      ${tasks.length ? tasks.map(taskCard).join("") : `<div class="empty">找不到符合條件的勤務紀錄</div>`}
    `}
  `;
}

/* =========================================================
   15b) 畫面：統計分析
   ========================================================= */
const STATUS_COLOR = { pending:"#8E8E93", dispatch:"#FF3B30", onscene:"#FF9500", transit:"#6B23C7", returning:"#0066FF", completed:"#34C759" };
function tasksInPeriod(tasks, period){
  const now = new Date();
  return tasks.filter(t => {
    const d = new Date(t.createdAt||0);
    if (period === "today") return isSameDay(d.getTime(), now);
    if (period === "week") { const diff = (now - d) / 86400000; return diff >= 0 && diff < 7; }
    if (period === "month") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
    return true;
  });
}
function viewStats(){
  const p = state.profile;
  const base = visibleTasks(p, state.tasks);
  const tasks = tasksInPeriod(base, state.statsPeriod);

  const periods = [
    { key:"today", label:"今日" }, { key:"week", label:"本週" }, { key:"month", label:"本月" }
  ];

  // 各車輛出勤次數（依 DISPATCH 事件計算，同一車輛可能執行多趟勤務）
  const vehicleCounts = {};
  tasks.forEach(t => {
    const d = eventByType(t.id, "DISPATCH");
    if (!d) return;
    const key = t.vehicle || "未填車號";
    vehicleCounts[key] = (vehicleCounts[key]||0) + 1;
  });
  const vehicleEntries = Object.entries(vehicleCounts).sort((a,b) => b[1]-a[1]);
  const maxCount = Math.max(1, ...vehicleEntries.map(e=>e[1]));

  const CHART_CAT_COLORS = ["#007AFF", "#FF9500", "#34C759", "#6B23C7", "#FF3B30", "#00A3A3"];
  const barChart = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">各車輛出勤次數</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="bar-row">
          <div class="bar-label">${esc(veh)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCount*100).toFixed(0)}%; background:${CHART_CAT_COLORS[i % CHART_CAT_COLORS.length]};"></div></div>
          <div class="bar-val">${count}</div>
        </div>`).join("")}
    </div>` : `<div class="chart-card"><div class="chart-title">各車輛出勤次數</div><div class="empty">此區間尚無出勤紀錄</div></div>`;

  const rankList = vehicleEntries.length ? `
    <div class="chart-card">
      <div class="chart-title">車輛使用次數排行</div>
      ${vehicleEntries.map(([veh,count], i) => `
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="rank-name">${esc(veh)}</div>
          <div class="rank-count">${count} 次</div>
        </div>`).join("")}
    </div>` : "";

  // 任務狀態比例（part-to-whole → 橫向堆疊長條，不用圓餅圖）
  const statusCounts = {};
  STATUS_ORDER.forEach(s => statusCounts[s] = 0);
  tasks.forEach(t => { const s = deriveStatus(t.id); statusCounts[s] = (statusCounts[s]||0) + 1; });
  const totalTasks = tasks.length || 1;
  const stackSegs = STATUS_ORDER.filter(s => statusCounts[s] > 0).map(s => `
    <div class="seg" style="width:${(statusCounts[s]/totalTasks*100).toFixed(1)}%; background:${STATUS_COLOR[s]};"></div>`).join("");
  const legendRows = STATUS_ORDER.map(s => `
    <div class="leg-row">
      <span class="leg-dot" style="background:${STATUS_COLOR[s]};"></span>
      <span class="leg-name">${STATUS_LABEL[s]}</span>
      <span class="leg-val">${statusCounts[s]}（${Math.round(statusCounts[s]/totalTasks*100)}%）</span>
    </div>`).join("");

  const statusChart = `
    <div class="chart-card">
      <div class="chart-title">任務狀態比例</div>
      <div class="stackbar">${stackSegs}</div>
      <div class="stack-legend">${legendRows}</div>
    </div>`;

  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">統計分析</div>
    <div class="tabs2">
      ${periods.map(pd => `<div class="tab2 ${state.statsPeriod===pd.key?'active':''}" onclick="window.__setStatsPeriod('${pd.key}')">${pd.label}</div>`).join("")}
    </div>
    ${barChart}
    ${rankList}
    ${statusChart}
  `;
}

/* =========================================================
   16) 畫面：通知中心（收件匣歷史紀錄，模組 A：基礎版——單一列表，新到舊
   排序，不分「全部/未讀」頁籤；未讀狀態是共用的 isRead 欄位，不分帳號）
   同一份清單有兩個入口：右上角鈴鐺圖示（所有在職帳號都能看，個人視角，
   唯讀）、後台管理「訊息管理」（canManageUsers 專用，見
   viewAdminMessages，多了新增/編輯/刪除公告）——兩邊看到的通知內容一致，
   只是「訊息管理」多一層管理操作，所以抽成共用的 renderNotificationsList()，
   用 editable 參數決定要不要顯示新增/編輯/刪除，避免同一份卡片邏輯維護兩份。
   ========================================================= */
function renderNotificationsList(editable){
  const list = state.notifications;
  const hasUnread = list.some(n => !n.isRead);
  const addBtn = editable
    ? `<button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('notifications', null, '')">${icon('plus',15)} 新增公告</button>`
    : "";
  const markAllBtn = hasUnread
    ? `<button class="icon-btn" style="margin-bottom:12px;" onclick="window.__markAllNotificationsRead()">全部標記為已讀</button>`
    : "";
  return `
    ${addBtn}
    ${markAllBtn}
    ${list.length ? list.map(n => `
      <div class="notif-card spatial-card ${!n.isRead ? 'unread' : ''}" onclick="window.__markNotificationRead('${n.id}')">
        <div class="notif-card-head">
          <span class="notif-icon">${icon('bell',18)}</span>
          <div class="notif-head-text">
            <div class="notif-title">${esc(n.title)}</div>
            <div class="notif-time">${fmtTime(n.timestamp ? new Date(n.timestamp).getTime() : null)}</div>
          </div>
          ${!n.isRead ? `<span class="notif-dot"></span>` : ""}
        </div>
        <div class="notif-body">${esc(n.body)}</div>
        ${n.expiresAt ? `<div class="notif-expiry">效期至 ${fmtDateShort(new Date(n.expiresAt).getTime())}</div>` : ""}
        ${editable ? `
        <div style="display:flex; gap:6px; margin-top:12px;">
          <button class="icon-btn" onclick="event.stopPropagation(); window.__openBaseDataModal('notifications','${n.id}','')">編輯</button>
          <button class="icon-btn danger" onclick="event.stopPropagation(); window.__deleteBaseData('notifications','${n.id}')">刪除</button>
        </div>` : ""}
      </div>`).join("") : `<div class="empty">尚無通知</div>`}
  `;
}
function viewNotifications(){
  return `<div class="section-label">通知中心</div>${renderNotificationsList(false)}`;
}

   跟管理後台的「人員與帳號」是同一份資料（state.personnel，由
   mapUserToPersonnel 轉換 users 集合而來），但這裡只單純列出姓名/階級/
   電話/證照等級，不提供角色指派/編輯/刪除操作——一般成員想查同僚聯絡
   方式時，不用進得去管理後台才看得到名冊。admin/高勤官（canSeeAllUnits）
   可以切換單位頁籤看全營；主官管/一般成員看到的單位範圍本來就受
   Firestore 規則限制只到自己單位，跟其他頁面（人員與帳號、車輛/行車
   紀錄器）共用同一顆 baseDataUnit 頁籤狀態。
   ========================================================= */
function viewMemberList(){
  const p = state.profile;
  const canSwitch = canSeeAllUnits(p);
  const unit = canSwitch ? (state.baseDataUnit || UNITS[0].code) : myUnit(p);
  const unitTabs = canSwitch ? `
    <div class="tabs2">
      ${UNITS.map(u => `<div class="tab2 ${unit===u.code?'active':''}" onclick="window.__setBaseDataUnit('${u.code}')">${u.label}</div>`).join("")}
    </div>` : `<div class="section-label">${unitLabel(unit)}</div>`;
  const rows = unit ? state.personnel.filter(x => x.unit === unit && x.active !== false).slice().sort((a,b) => rankWeight(a.title) - rankWeight(b.title)) : [];
  return `
    <div class="back-row">${backBtn({name:'profile'})}</div>
    <div class="section-label">成員列表</div>
    ${unit ? `
      ${unitTabs}
      ${rows.length ? rows.map(x => `
        <div class="admin-row">
          <div>
            <div class="name">${esc(x.name)}${x.title ? ` <span style="font-weight:600; color:var(--muted);">${esc(x.title)}</span>` : ''}</div>
            <div class="sub">${x.phone ? `📞 ${esc(x.phone)}` : '未填寫電話'}</div>
          </div>
          ${x.emtLevel ? emtBadgeHtml(x.emtLevel) : ''}
        </div>`).join("") : `<div class="empty">尚無成員資料</div>`}
    ` : `<div class="empty">您尚未被指派單位，請聯繫管理員。</div>`}
  `;
}

  // 排序優先度：醫院本身有登記座標時（tier 0）直接算實際距離最準，按距離排序；
  // 沒登記座標的醫院沒有其他依據可以概略比對，一律排在有距離的後面（tier 1）。
  // tier 0 內部一律用同一個 km 值排序——有算到 OSRM 道路距離（roadDistances）
  // 就用道路距離，抓不到才用 haversine 直線距離頂替，呼叫端不用另外分兩套
  // 排序邏輯。
  function matchInfo(h){
    if (h.lat != null && h.lng != null && state.myLat != null) {
      const roadKm = state.roadDistances[h.id];
      if (roadKm != null) return { tier: 0, km: roadKm, roadKm: true };
      return { tier: 0, km: haversineKm(state.myLat, state.myLng, h.lat, h.lng), roadKm: false };
    }
    return { tier: 1, km: null };
  }
  const filteredHospitals = state.hospitals.filter(h => {
    if (filterTier && h.tier !== filterTier) return false;
    if (filterLevel && h.level !== filterLevel) return false;
    if (searchQ && !(String(h.name||'').includes(searchQ) || String(h.address||'').includes(searchQ))) return false;
    return true;
  });
  // 「依等待看診人數排序」開啟時優先依健保署即時資料排序（沒有資料的
  // 醫院一律排到後面，用原本的距離排序當次要依據）；沒開啟時，已定位
  // 就依距離排序（「依距離」）；都沒有的預設狀態改回依醫院名稱筆畫排序，
  // 不再用醫院層級當預設排序依據——筆畫序才是使用者熟悉、找得到人的預設值，
  // 醫院層級改成上方篩選頁籤自己選就好。
  const rows = filteredHospitals.slice().sort((a,b) => {
    if (state.hospitalSortBySee) {
      const sa = erWaitSeeCount(a, state.erRealtime), sb = erWaitSeeCount(b, state.erRealtime);
      if (sa != null && sb != null && sa !== sb) return sa - sb;
      if (sa != null && sb == null) return -1;
      if (sa == null && sb != null) return 1;
    }
    if (state.myLat != null) {
      const ia = matchInfo(a), ib = matchInfo(b);
      if (ia.tier !== ib.tier) return ia.tier - ib.tier;
      if (ia.tier === 0) return ia.km - ib.km;
    }
    return HOSPITAL_NAME_COLLATOR.compare(a.name||'', b.name||'');
  });
  const searchBar = `
    <input type="search" class="picker-search" style="margin-bottom:10px;" placeholder="搜尋醫院名稱或地址" value="${esc(state.hospitalSearchQuery||'')}" oninput="window.__setHospitalSearch(this.value)">
    <div class="tabs2 scroll" style="margin-bottom:8px;">
      <div class="tab2 ${!filterTier ? 'active' : ''}" onclick="window.__setHospitalFilterTier('')">全部層級</div>
      ${HOSPITAL_TIERS.map(t => `<div class="tab2 ${filterTier===t ? 'active' : ''}" onclick="window.__setHospitalFilterTier('${t}')">${t}</div>`).join("")}
    </div>
    <div class="tabs2 scroll" style="margin-bottom:10px;">
      <div class="tab2 ${!filterLevel ? 'active' : ''}" onclick="window.__setHospitalFilterLevel('')">全部等級</div>
      ${HOSPITAL_LEVELS.map(l => `<div class="tab2 ${filterLevel===l ? 'active' : ''}" onclick="window.__setHospitalFilterLevel('${l}')">${l}</div>`).join("")}
    </div>`;
  const locateBar = `
    <div class="hospital-toolbar">
      <button type="button" class="hospital-toolbar-locate" onclick="window.__locateNearbyHospitals()" ${state.locatingHospital ? 'disabled' : ''}>
        ${state.locatingHospital ? '定位中…' : (state.myCounty ? '重新定位' : '顯示附近醫院')}
      </button>
      <div class="hospital-seg">
        <button type="button" class="hospital-seg-btn${state.hospitalSortBySee ? '' : ' active'}" onclick="${state.hospitalSortBySee ? 'window.__toggleHospitalSortBySee()' : ''}">📍 依距離</button>
        <button type="button" class="hospital-seg-btn${state.hospitalSortBySee ? ' active' : ''}" onclick="${state.hospitalSortBySee ? '' : 'window.__toggleHospitalSortBySee()'}">👥 依人數</button>
      </div>
    </div>
    ${(state.myCounty || state.erRealtime) ? `
    <div class="hospital-info-card">
      ${state.myCounty ? `<div class="hospital-info-row">${icon('pin',15)}<span>目前定位：${state.myAddress ? esc(state.myAddress) : `靠近${state.myDistrict ? esc(state.myCounty)+esc(state.myDistrict) : esc(state.myCounty)}`}</span></div>` : ''}
      ${state.erRealtime ? `<div class="hospital-info-row">${icon('refresh',15)}<span>急診即時資訊更新於 ${new Date(state.erRealtime.fetchedAt).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}，僅重度級急救責任醫院有資料</span></div>` : ''}
    </div>` : ''}`;
  return `
    <div class="section-label">醫院資訊</div>
    ${searchBar}
    ${locateBar}
    ${canAdd ? `<button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('hospitals', null, '')">${icon('plus',15)} 新增醫院</button>` : ""}
    ${rows.length ? rows.map(x => {
      const info = matchInfo(x);
      // 有算到道路距離／退回直線距離，文字上明確標出來（路程/直線），
      // 避免第一線人員誤把直線距離當成實際要開的路程來判斷；路程（比較
      // 準）用綠色 badge，直線（只是概略）用玫瑰色 badge，一眼就能分辨
      // 這個距離可信度如何，不用細看文字。
      const nearBadge = info.tier === 0 ? `<span class="badge ${info.roadKm ? 'completed' : 'dispatch'}" style="padding:7px 10px;">約 ${info.km.toFixed(1)} 公里 ${info.roadKm ? '(路程)' : '(直線)'}</span>` : '';
      const erRec = state.erRealtime ? findErRecord(x, state.erRealtime.records) : null;
      const erInform = erRec ? erField(erRec, ER_INFORM_KEYS) : null;
      const erSee = erRec ? erField(erRec, ER_WAIT_SEE_KEYS) : null;
      const erGeneral = erRec ? erField(erRec, ER_WAIT_GENERAL_KEYS) : null;
      const erIcu = erRec ? erField(erRec, ER_WAIT_ICU_KEYS) : null;
      const erFullBadge = erInform === 'Y' ? `<span class="badge dispatch" style="padding:7px 10px;">119 已通報滿床</span>` : '';
      // 醫院層級／急救責任等級併成單行副標（例如「醫學中心 · 重度級責任
      // 醫院」），兩個欄位都沒填才顯示「—」。
      const subtitleParts = [];
      if (x.tier) subtitleParts.push(esc(x.tier));
      if (x.level) subtitleParts.push(`${esc(x.level)}責任醫院`);
      const subtitle = subtitleParts.length ? subtitleParts.join(' · ') : '—';
      const menuOpen = state.hospitalMenuOpenId === x.id;
      return `
      <div class="hospital-card">
        <div class="hospital-card-top">
          <div class="hospital-card-badges">
            ${nearBadge}${erFullBadge}
            <h3 class="hospital-card-name">${esc(x.name)}</h3>
            <span class="hospital-card-subtitle">${subtitle}</span>
          </div>
          ${canEdit ? `
          <button type="button" class="hospital-menu-btn" onclick="window.__toggleHospitalMenu('${x.id}')" aria-label="更多">
            <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="19" r="1.8" fill="currentColor"/></svg>
          </button>
          ${menuOpen ? `
          <div class="hospital-menu-overlay" onclick="window.__closeHospitalMenu()"></div>
          <div class="hospital-menu">
            <button type="button" onclick="window.__closeHospitalMenu(); window.__openBaseDataModal('hospitals','${x.id}','')">編輯</button>
            <button type="button" class="danger" onclick="window.__closeHospitalMenu(); window.__deleteBaseData('hospitals','${x.id}')">刪除</button>
          </div>` : ''}` : ''}
        </div>

        ${erRec ? `
        <div class="hospital-stats">
          <div><p class="stat-label">等待看診</p><p class="stat-value">${erSee != null ? esc(String(erSee)) : '—'} <span class="stat-unit">人</span></p></div>
          <div><p class="stat-label">等待住院</p><p class="stat-value">${erGeneral != null ? esc(String(erGeneral)) : '—'} <span class="stat-unit">人</span></p></div>
          <div><p class="stat-label">ICU 待床</p><p class="stat-value">${erIcu != null ? esc(String(erIcu)) : '—'} <span class="stat-unit">人</span></p></div>
        </div>` : ''}

        <div class="hospital-contact">
          ${x.phone ? `<p>📞 電話：<a href="tel:${esc(x.phone)}">${esc(x.phone)}</a></p>` : ''}
          ${x.address ? `<p>📍 地址：${esc(x.address)}</p>` : ''}
          ${x.note ? `<p>${esc(x.note)}</p>` : ''}
        </div>

        <div class="hospital-nav-grid">
          <a class="hospital-nav-btn google" href="${googleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">🧭 Google 導航</a>
          <a class="hospital-nav-btn apple" href="${appleMapsUrl(hospitalNavQuery(x))}" target="_blank" rel="noopener">🗺️ Apple 導航</a>
        </div>
      </div>`;
    }).join("") : (state.hospitals.length ? `<div class="empty">找不到符合條件的醫院，請調整搜尋或篩選條件</div>` : `<div class="empty">尚無醫院資料${canAdd ? '，請點上方新增' : ''}</div>`)}
  `;
}

/* =========================================================
   急診待命：兩個醫務所地點固定，各自顯示「目前綁定的待命勤務」——
   待命勤務其實就是一筆提早建立、還沒真的出勤的正常勤務（車號/車長/
   駕駛/值班醫官都先填好），只是建立當下不會自動補一筆出勤事件，停在
   「待出勤」狀態；erStandby/{key} 只存一個 currentTaskId 指標，實際
   資料都在 tasks 集合裡，這樣才能直接沿用平常的勤務詳情頁出勤、記錄
   患者狀況，不用另外維護一套獨立資料。這是底部導覽的一個分頁（不是
   子頁面），所以跟首頁/任務/醫院資訊一樣不接返回鍵。
   ========================================================= */
function viewErStandby(){
  const p = state.profile;
  const canDispatch = canCreateTask(p);
  return `
    <div class="section-label">急診待命</div>
    ${ER_STANDBY_LOCATIONS.map(loc => {
      const rec = state.erStandby.find(x => x.id === loc.key);
      const boundTask = rec && rec.currentTaskId ? state.tasks.find(t => t.id === rec.currentTaskId) : null;
      const boundStatus = boundTask ? deriveStatus(boundTask.id) : null;
      const isBound = boundTask && boundStatus !== "completed";
      const crewLine = isBound ? personCardLine(boundTask.crewLeader, boundTask.unit) : null;
      const driverLine = isBound ? personCardLine(boundTask.driver, boundTask.unit) : null;
      const doctorLine = isBound && boundTask.dutyOfficer ? doctorCardLine(boundTask.dutyOfficer) : null;
      return `
      <div class="er-standby-card spatial-card${isBound ? ' s-'+boundStatus : ''}">
        <div class="er-standby-head">
          <div class="name">${esc(loc.label)}</div>
          ${isBound ? statusBadge(boundStatus) : ""}
        </div>
        ${isBound ? `
        <div class="er-standby-meta">建立於 ${fmtTime(new Date(boundTask.createdAt||0).getTime())}${isStandbyStale(new Date(boundTask.createdAt||0).getTime()) ? `　<span style="color:var(--amber);">${icon('alert',13)} 尚未於今日 08:00 後更新，請確認車長/駕駛是否需要換班</span>` : ''}</div>
        <div class="er-standby-grid">
          <div class="detail-item"><span class="lbl">車號</span><span class="val">${vehicleLabelHtml(boundTask.vehicle)}</span></div>
          <div class="detail-item"><span class="lbl">值班醫官</span><span class="val">${doctorLine ? doctorLine.main : "尚未設定"}</span>${doctorLine && doctorLine.sub ? `<span class="sub-line">${doctorLine.sub}</span>` : ''}</div>
          <div class="detail-item"><span class="lbl">車長</span><span class="val">${crewLine.main}</span>${crewLine.sub ? `<span class="sub-line">${crewLine.sub}</span>` : ''}</div>
          <div class="detail-item"><span class="lbl">駕駛</span><span class="val">${driverLine.main}</span>${driverLine.sub ? `<span class="sub-line">${driverLine.sub}</span>` : ''}</div>
        </div>
        <button class="btn-primary" style="width:100%;" onclick="window.__nav({name:'task', id:'${boundTask.id}'})">查看／管理</button>
        ` : `
        <div class="empty" style="padding:16px 0;">尚未建立待命勤務</div>
        ${canDispatch ? `<button class="btn-primary" style="width:100%;" onclick='window.__startErStandbyTask(${JSON.stringify(loc.key)}, ${JSON.stringify(loc.label)})'>建立待命勤務</button>` : ""}
        `}
      </div>`;
    }).join("")}
  `;
}

function taskToCsvRow(t){
  const s = deriveStatus(t.id);
  const dispatchEv = eventByType(t.id, "DISPATCH");
  const completedEv = eventByType(t.id, "COMPLETED");
  const startMileage = dispatchEv?.mileage ?? t.startMileage ?? "";
  const finalMileage = completedEv?.mileage ?? "";
  const distance = (startMileage !== "" && finalMileage !== "") ? (finalMileage - startMileage) : "";
  return [t.title, t.vehicle, t.location, t.crewLeader, t.driver, STATUS_LABEL[s], fmtTime(new Date(t.createdAt||0).getTime()), startMileage, finalMileage, distance]
    .map(v => `"${String(v??"").replace(/"/g,'""')}"`).join(",");
}
function exportTasksCsv(){
  const header = ["任務名稱","車號","地點","車長","駕駛","狀態","建立時間","出發里程","最終里程","行駛公里"].join(",");
  const rows = visibleTasks(state.profile, state.tasks).map(taskToCsvRow);
  const csv = "﻿" + [header, ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `勤務紀錄_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// 類別（例如這次新增的醫官）只會越擠越亂，改成列表後每加一類只要在
// 對應分區多加一列，不影響既有排版。人員名冊已經併入「人員與帳號」
// （見管理後台首頁、viewAdminUsers），這裡只剩車輛／行車紀錄器依單位
// 分類，歸在「單位資料」；醫院／醫官是全營共用、不綁定單位，歸在
// 「共用資料」。
function viewBaseDataHub(){
  const unitRows = [
    settingsRow({icon:'depart', bg:'#FFF2E0', fg:'#B45F00', title:'車輛', subtitle:'依單位分類的車輛名冊', onclick:"window.__nav({name:'baseDataVehicles'})"}),
    settingsRow({icon:'records', bg:'#F2E9FE', fg:'#6B23C7', title:'行車紀錄器', subtitle:'依單位分類', onclick:"window.__nav({name:'baseDataRecorders'})"}),
  ];
  const sharedRows = [
    settingsRow({icon:'hospital', bg:'#E9F9EF', fg:'#177A34', title:'醫院', subtitle:'急救責任等級／電話，全營共用', onclick:"window.__nav({name:'baseDataHospitals'})"}),
    settingsRow({icon:'heartbeat', bg:'#FFEAEA', fg:'#C7233B', title:'醫官', subtitle:'值班醫官名冊，全營共用', onclick:"window.__nav({name:'baseDataDoctors'})"}),
  ];
  return `
    ${settingsSection('單位資料', unitRows)}
    ${settingsSection('共用資料', sharedRows)}
  `;
}
function viewBaseDataVehicles(){
  const p = state.profile;
  const canSwitch = canSeeAllUnits(p);
  const unit = canSwitch ? (state.baseDataUnit || UNITS[0].code) : myUnit(p);
  if (!unit) return `<div class="back-row">${backBtn({name:'adminBaseData'})}</div><div class="empty">您尚未被指派單位，請聯繫管理員。</div>`;
  const unitTabs = canSwitch ? `
    <div class="tabs2">
      ${UNITS.map(u => `<div class="tab2 ${unit===u.code?'active':''}" onclick="window.__setBaseDataUnit('${u.code}')">${u.label}</div>`).join("")}
    </div>` : `<div class="section-label">${unitLabel(unit)}</div>`;
  const rows = sortVehicles(state.vehicles.filter(x => x.unit === unit));
  const body = `
    <button class="icon-btn primary" style="margin-bottom:12px;" onclick="window.__openBaseDataModal('vehicles', null, '${unit}')">${icon('plus',15)} 新增車輛</button>
    ${rows.length ? rows.map(x => `
      <div class="admin-row">
        <div><div class="name">${esc(x.plate)}${x.active===false?'（已停用）':''}</div><div class="sub">${esc(x.type||'—')}</div></div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="icon-btn" onclick="window.__openBaseDataModal('vehicles','${x.id}','${unit}')">編輯</button>
          <button class="icon-btn" onclick="window.__toggleBaseData('vehicles','${x.id}',${x.active!==false})">${x.active===false?'啟用':'停用'}</button>
          <button class="icon-btn danger" onclick="window.__deleteBaseData('vehicles','${x.id}')">刪除</button>
        </div>
      </div>`).join("") : `<div class="empty">尚無車輛資料</div>`}`;
  return `<div class="back-row">${backBtn({name:'adminBaseData'})}</div><div class="section-label">車輛</div>${unitTabs}${body}`;
}

/* =========================================================
   18c) 畫面：基礎資料新增／編輯彈窗
   ========================================================= */

  const m = state.baseDataModal;
  if (!m) return "";
  const { coll, id, unit } = m;
  const pool = coll === "personnel" ? state.personnel : coll === "vehicles" ? state.vehicles : coll === "hospitals" ? state.hospitals : coll === "doctors" ? state.doctors : coll === "notifications" ? state.notifications : state.recorders;
  const editing = id ? pool.find(x => x.id === id) : null;
  let title, fields;
  if (coll === "personnel") {
    title = editing ? "編輯人員" : "預先建立人員";
    fields = `
      <div class="field"><label>姓名</label><input name="name" required value="${esc(editing?.name||'')}"></div>
      <div class="field"><label>階級</label>
        <select name="title">
          <option value="">請選擇階級</option>
          ${RANKS.map(r => `<option value="${r}" ${editing?.title===r?'selected':''}>${r}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>電話（選填）</label><input name="phone" type="tel" inputmode="tel" value="${esc(editing?.phone||'')}"></div>
      <div class="field"><label>EMT 證照等級（選填）</label>

        </select>
      </div>
      <div class="field"><label>信箱（選填，用於預先建立帳號）</label><input name="email" type="email" inputmode="email" value="${esc(editing?.email||'')}" placeholder="例如：example@gmail.com"></div>
      <div style="color:var(--muted); font-size:var(--text-xs); margin:-8px 0 12px;">填了信箱，這個人第一次用同一個 Google 帳號登入時，會直接套用這裡設定的單位/階級/電話/EMT 證照，不用再等管理員審核。</div>`;
  } else if (coll === "vehicles") {
    title = editing ? "編輯車輛" : "新增車輛";

      <div class="field"><label>車號</label><input name="plate" required value="${esc(editing?.plate||'')}"></div>

      <div class="field"><label>醫院名稱</label><input id="hospitalNameInput" name="name" list="nhiHospitalNameList" required value="${esc(editing?.name||'')}"></div>
      <datalist id="nhiHospitalNameList">${NHI_HOSPITAL_REGISTRY.map(r => `<option value="${esc(r.n)}">`).join("")}</datalist>
      <div style="display:flex; gap:8px; margin:-8px 0 8px;">
        <button type="button" class="icon-btn" onclick="window.__searchNhiHospital()">${icon('check',14)} <span class="btn-label">查詢健保署清冊資料</span></button>
      </div>
      <div id="nhiSearchResults"></div>
      <div style="color:var(--muted); font-size:var(--text-xs); margin:-8px 0 12px;">不用打完整的官方全名，打部分關鍵字（例如「台大」「榮總」）就能查，「臺」「台」也不影響查詢；查到不只一筆時會列出來讓你選，選定後自動填入正確名稱/電話/地址/醫院層級/健保特約代號，清冊上顯示沒有急診相關科別/服務項目的機構會另外提醒。這份清冊只涵蓋醫學中心/區域醫院/地區醫院三個層級，基層診所查不到。</div>
      <div class="field"><label>地址（選填，用於一鍵導航）</label><input id="hospitalAddressInput" name="address" value="${esc(editing?.address||'')}" placeholder="例如：臺中市西屯區臺灣大道四段1650號"></div>
      <div class="field"><label>座標（選填，格式：緯度,經度）</label><input id="hospitalCoordsInput" name="coords" value="${(editing && editing.lat != null && editing.lng != null) ? `${editing.lat},${editing.lng}` : ''}" placeholder="例如：24.1786,120.6400"></div>
      <div style="display:flex; gap:8px; margin:-8px 0 8px;">
        <button type="button" class="icon-btn" onclick="window.__fillHospitalCoordsFromGPS()">${icon('pin',14)} <span class="btn-label">抓取目前位置</span></button>

      </div>
      <div class="field"><label>急救責任等級</label>
        <select name="level" required>
          <option value="">請選擇等級</option>
          ${HOSPITAL_LEVELS.map(l => `<option value="${l}" ${editing?.level===l?'selected':''}>${l}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>電話</label><input name="phone" type="tel" inputmode="tel" value="${esc(editing?.phone||'')}" placeholder="總機或急診專線"></div>
      <div class="field"><label>備註（選填）</label><input name="note" value="${esc(editing?.note||'')}" placeholder="例如：電話為總機，急診專線待確認"></div>
      <div class="field"><label>健保特約代號（選填）</label><input name="nhiCode" value="${esc(editing?.nhiCode||'')}" placeholder="例如：0000000000"></div>

  } else if (coll === "doctors") {
    title = editing ? "編輯醫官" : "新增醫官";

      <div class="field"><label>姓名</label><input name="name" required value="${esc(editing?.name||'')}"></div>
      <div class="field"><label>階級</label>

      <div class="field"><label>標題</label><input name="title" required value="${esc(editing?.title||'')}"></div>
      <div class="field"><label>內容</label><textarea name="body" required rows="4">${esc(editing?.body||'')}</textarea></div>`;
  } else {
    title = editing ? "編輯行車紀錄器" : "新增行車紀錄器";
    fields = `<div class="field"><label>編號</label><input name="code" required value="${esc(editing?.code||'')}"></div>`;
  }
  return `
    <div class="modal-overlay" onclick="if(event.target===this) window.__closeBaseDataModal()">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <form onsubmit="window.__submitBaseDataModal(event,'${coll}','${unit}'${editing?`,'${editing.id}'`:''})">
          ${fields}
          <button class="btn-primary" type="submit">${editing?'儲存變更':'新增'}</button>
          <button class="btn-ghost" type="button" style="width:100%;margin-top:10px;" onclick="window.__closeBaseDataModal()">取消</button>
        </form>
      </div>
    </div>`;
}

// 人員名冊（車長/駕駛下拉選單用）跟成員帳號（角色/單位權限）已經合併成
// 同一份 users 集合、同一個畫面：admin 可以同時指派角色/單位、也能編輯
// 名冊類欄位；高勤官／主官管（canManageBaseData，但不到 canManageUsers）
// 只能編輯名冊類欄位，看不到角色/單位下拉選單（跟 firestore.rules 的
// onlyChanged 寫入限制一致）。
// 還沒被指派單位的帳號（剛登入的 pending、或忘記選單位的舊資料）不會
// 出現在任何單位頁籤裡，另外獨立列在「待指派單位」，確保不會被漏掉。
function viewAdminUsers(){
  const p = state.profile;
  const canAssignRole = canManageUsers(p);
  const canSwitch = canSeeAllUnits(p);
  const roles = ["pending","member","commander","duty_officer","admin","disabled"];
  const renderRow = (x) => `
    <div class="admin-row">
      <div>
        <div class="name">${esc(x.name)}</div>
        <div class="sub">${esc(x.title||'—')}${x.phone?' · '+esc(x.phone):''}${x.email?' · '+esc(x.email):''}${x.role==='unclaimed' ? ' · <span style="color:var(--amber-text); font-weight:700;">尚未登入</span>' : ''}</div>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
        ${canAssignRole && x.role !== 'unclaimed' ? `
        <div class="role-controls">
          <select id="role-${x.id}" class="role-select" onchange="window.__setRole('${x.id}')">
            ${roles.map(rr => `<option value="${rr}" ${x.role===rr?'selected':''}>${ROLE_LABEL[rr]}</option>`).join("")}
          </select>
          <select id="unit-${x.id}" class="role-select" onchange="window.__setRole('${x.id}')">
            <option value="">未指派單位</option>
            ${UNITS.map(un => `<option value="${un.code}" ${x.unit===un.code?'selected':''}>${un.label}</option>`).join("")}
          </select>
        </div>` : ''}
        <button class="icon-btn" onclick="window.__openBaseDataModal('personnel','${x.id}','${x.unit||''}')">編輯</button>
        ${x.role==='unclaimed' ? `<button class="icon-btn danger" onclick="window.__deleteBaseData('personnel','${x.id}')">刪除</button>` : ''}
      </div>
    </div>`;
  const unassigned = canAssignRole ? state.personnel.filter(x => !x.unit) : [];
  const unit = canSwitch ? (state.baseDataUnit || UNITS[0].code) : myUnit(p);
  const unitTabs = canSwitch ? `
    <div class="tabs2">
      ${UNITS.map(u => `<div class="tab2 ${unit===u.code?'active':''}" onclick="window.__setBaseDataUnit('${u.code}')">${u.label}</div>`).join("")}
    </div>` : `<div class="section-label">${unitLabel(unit)}</div>`;
  const rows = unit ? state.personnel.filter(x => x.unit === unit).slice().sort((a,b) => rankWeight(a.title) - rankWeight(b.title)) : [];
  return `
    <div class="section-label">人員與帳號</div>
    ${unassigned.length ? `
      <div class="section-label">待指派單位</div>
      ${unassigned.map(renderRow).join("")}
    ` : ''}
    ${unit ? `
      <button class="icon-btn primary" style="margin:12px 0;" onclick="window.__openBaseDataModal('personnel', null, '${unit}')">${icon('plus',15)} 預先建立人員</button>
      ${unitTabs}
      ${rows.length ? rows.map(renderRow).join("") : `<div class="empty">尚無人員資料</div>`}
    ` : `<div class="empty">您尚未被指派單位，請聯繫管理員。</div>`}
  `;
}

// 意見回饋清單僅 admin 可見，比照帳號權限頁籤的做法：開啟頁籤時現抓一次，
// 不另外建立輪詢（回報頻率低，不需要即時同步）。
function viewAdminFeedback(){
  if (!state._feedbackCache) {
    state._feedbackCache = "loading";
    fsListCollection("feedback").then(list => {
      list.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
      state._feedbackCache = list;
      render();
    }).catch(err => {
      console.error("讀取意見回饋失敗", err);
      showToast(`讀取意見回饋失敗：[${err.code||'?'}] ${err.message}`);
      state._feedbackCache = [];
      render();
    });
    return `<div class="spinner"></div>`;
  }

// 背景輪詢用：畫面會整個重繪（innerHTML 全部換掉），如果使用者正在輸入框
// 打字，重繪會讓輸入框元素被整個換掉，導致輸入焦點與鍵盤被打斷。輪詢觸發的
// 重繪一律呼叫這個函式，偵測到目前有輸入中的欄位就先跳過，等使用者打完離開
// 該欄位（或下一次輪詢/使用者操作觸發真正的 render）再更新畫面。
//
// 只檢查當下有沒有 focus 在輸入框還不夠：手機上切換欄位、跳出鍵盤工具列等
// 動作都可能讓輸入框短暫失焦，若輪詢剛好在那個空檔觸發，整個表單會被重繪回
// 伺服器上的舊資料，使用者還沒送出的內容就會憑空消失。因此只要使用者正處於
// 任何編輯中的表單（個人資料、基礎資料管理、任務回報草稿），一律跳過背景重繪，
// 直到儲存/取消離開編輯狀態為止。
function safeRender(){
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.tagName === "SELECT")) return;
  if (state.profileEditing || state.baseDataModal || state.reportDraft || state.eventEditId) return;
  render();
}

function render(){
  const app = document.getElementById("app");
  // app.innerHTML = ... 整段換掉，連 <main> 這個節點本身都是重新建立的，
  // 新節點的 scrollTop 永遠從 0 開始——單純狀態變化（例如卡片上的選單
  // 開關、切換開關）呼叫 render() 時，畫面會被誤判成「跳回最上面」，其實
  // 只是捲動位置被這次重繪重置掉了。這裡在換內容前先記住捲動位置、換完
  // 再設回去，讓「只是狀態變了」的重繪不會意外把使用者往下捲的內容彈回
  // 頂端；真正的換頁導覽（nav()）呼叫 render() 之後還會再呼叫
  // scrollContentToTop()，會蓋掉這裡還原的值，維持原本換頁就該回頂端的
  // 行為不受影響。
  const prevMain = document.querySelector("main");
  const prevScrollTop = prevMain ? prevMain.scrollTop : 0;
  if (!state.user) { app.innerHTML = viewLogin(); return; }
  if (!state.profile) { app.innerHTML = `<div class="spinner"></div>`; return; }
  if (state.profile.role === "pending") { app.innerHTML = viewPending(); return; }
  if (state.profile.role === "disabled") { app.innerHTML = viewDisabled(); return; }

  const view = ROUTE_VIEWS[state.route.name] || viewHome;
  const body = view();

  const p = state.profile;
  const previewBanner = state.previewActive ? `
    <div class="preview-banner">
      ${icon('alert',16)} 預覽模式：以「${ROLE_LABEL[myRole(p)]||p.role}${p.unit?'・'+unitLabel(p.unit):''}」檢視畫面（僅預覽，實際寫入權限仍以您的真實身份為準）
      <button onclick="window.__endRolePreview()">結束預覽</button>
    </div>` : "";
  app.innerHTML = `
    <div class="sticky-head">
      ${previewBanner}
      <div class="topbar">
        <div class="topbar-bottom-row">
          <div class="topbar-sub">
            <span class="name">${esc(p.displayName||p.email).split(' ')[0]}</span>${p.rank ? `<span class="rank">${esc(p.rank)}</span>` : ''}
          </div>
          <div class="topbar-icons">
            <button class="topbar-icon-btn" onclick="window.__nav({name:'notifications'})">${icon('bell',25)}</button>
            <button class="topbar-icon-btn" onclick="window.__confirmLogout()">${icon('logout',25)}</button>
          </div>
        </div>
      </div>
    </div>
    <main><div class="main-content">${body}</div></main>
    <div class="bottomnav">
      ${NAV_ITEMS.map(n => `
        <button class="navbtn ${state.route.name===n.name?'active':''}" style="${state.route.name===n.name?`color:${n.accent};`:''}" onclick="window.__nav({name:'${n.name}'})">
          <span class="navicon">${icon(n.iconName,24)}</span><span class="navlabel">${n.label}</span>
        </button>`).join("")}
    </div>
    ${viewBaseDataModal()}
  `;
  if (prevScrollTop > 0) {
    const newMain = document.querySelector("main");
    if (newMain) newMain.scrollTop = prevScrollTop;
  }
}

let personPickerCtx = null; // { pool, unit, crossUnit, hiddenInput, triggerBtn }
function personPickerRows(pool, unit, crossUnit, query){
  const scoped = crossUnit ? pool : pool.filter(x => x.unit === unit);
  const q = (query||"").trim().toLowerCase();
  const filtered = q ? scoped.filter(x =>
    x.name.toLowerCase().includes(q) || (x.title||"").toLowerCase().includes(q) || unitLabel(x.unit).toLowerCase().includes(q)
  ) : scoped;
  if (!filtered.length) return `<div class="empty" style="padding:28px 0;">找不到符合的人員</div>`;
  let html = "", curUnit = null;
  for (const x of filtered) {
    if (x.unit !== curUnit) {
      if (curUnit !== null) html += `</div>`;
      html += `<div class="picker-group"><div class="picker-group-label">${esc(unitLabel(x.unit))}</div>`;
      curUnit = x.unit;
    }
    html += `<button type="button" class="picker-option" data-id="${esc(x.id)}">${esc(x.name)}${x.title ? `<span class="picker-option-sub">${esc(x.title)}</span>` : ""}</button>`;
  }
  if (curUnit !== null) html += `</div>`;
  return html;
}

// 醫院道路距離（OSRM Table API，router.project-osrm.org 公開 demo server）：
// 只當直線距離之外的加分項，永遠不擋主流程。這台 demo server 官方明講不
// 保證 uptime／延遲，限流 1 req/秒，也可能隨時停用（見 OSRM 專案 wiki 的
// Api usage policy）——所以任何失敗情況（逾時、限流 429、CORS 被擋、伺服器
// 掛掉）一律靜默放棄，不 console.error 洗版、也不跳錯誤提示，直接讓
// matchInfo() 退回原本的 haversine 直線距離即可，使用者本來就看得到那組
// 排序結果，沒有東西「壞掉」。
// 只對「直線距離 50 公里內、最近的前 15 間」算道路距離：一來 OSRM Table
// API 的座標是接在網址路徑上，醫院數一多網址會太長；二來排序前段之外的
// 醫院算不算路程差異不大，沒必要為了它們消耗有限的請求額度。
// 注意 OSRM 的座標順序是「經度,緯度」（跟站內其他地方慣用的「緯度,經度」
// 相反），串網址時要特別小心不要接反。
let roadDistanceReqId = 0;
async function fetchRoadDistances(lat, lng){
  const myReqId = ++roadDistanceReqId;
  const candidates = state.hospitals
    .filter(h => h.lat != null && h.lng != null)
    .map(h => ({ h, km: haversineKm(lat, lng, h.lat, h.lng) }))
    .filter(x => x.km <= 50)
    .sort((a,b) => a.km - b.km)
    .slice(0, 15);
  if (!candidates.length) return;
  const coordsStr = [`${lng},${lat}`, ...candidates.map(x => `${x.h.lng},${x.h.lat}`)].join(";");
  const url = `https://router.project-osrm.org/table/v1/driving/${coordsStr}?sources=0&annotations=distance`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 2000);
  try {
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) return;
    const json = await res.json();
    // distances[0] 是「起點（使用者自己）到每個座標」的那一列，row-major、
    // 單位公尺；index 0 是起點到自己（不用理），index 1 開始才依序對應
    // candidates 裡的醫院。
    const distances = json?.distances?.[0];
    if (!Array.isArray(distances)) return;
    if (myReqId !== roadDistanceReqId) return; // 這段抓取期間使用者又按了一次重新定位，這筆已經過期，不要蓋掉新結果
    const next = {};
    candidates.forEach((x, i) => {
      const meters = distances[i + 1];
      if (Number.isFinite(meters)) next[x.h.id] = meters / 1000;
    });
    state.roadDistances = next;
    render();
  } catch (e) {
    // 靜默失敗（逾時／CORS／限流／任何錯誤都一樣處理，理由見上方註解）。
  } finally {
    clearTimeout(timer);
  }
}
// GPS 座標反查詳細地址（Nominatim reverse geocoding，跟醫院表單「名稱查
// 座標」共用同一個免費公開服務，一樣沒有 API 金鑰限制）。只當「目前定位」
// 文字顯示的加分項，永遠不擋主流程——nearestDistrict 算出來的縣市/行政區
// 才是排序依據，這裡查不到（逾時、限流、CORS、查無結果）就靜默放棄，
// 畫面自動退回顯示縣市+行政區，不會卡住或跳錯誤訊息。
let reverseGeocodeReqId = 0;
async function fetchReverseGeocodeAddress(lat, lng){
  const myReqId = ++reverseGeocodeReqId;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&countrycodes=tw`;
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) return;
    const json = await res.json();
    if (myReqId !== reverseGeocodeReqId) return; // 查詢期間使用者又按了一次重新定位，這筆已過期
    if (json && json.display_name) {
      state.myAddress = json.display_name;
      render();
    }
  } catch (e) {
    // 靜默失敗，理由見上方註解。
  } finally {
    clearTimeout(timer);
  }
}
// GeolocationPositionError.code 對應的中文提示：瀏覽器回傳的 err.message 是
// 英文原文（例如 "User denied Geolocation"），直接顯示看不懂也不知道怎麼
// 處理。retryActionLabel 是失敗後建議使用者重新觸發的動作名稱，「顯示附近
// 醫院」（醫院資訊頁定位）跟「抓取目前位置」（新增/編輯醫院表單填座標）
// 共用同一份訊息，只有建議重試的動作名稱不同。
function geolocationErrorMessage(err, retryActionLabel){
  if (err.code === 1) return `定位權限被拒絕，請到手機設定 → 瀏覽器（或本網頁）的「位置」權限改成允許，再回來點一次「${retryActionLabel}」`;
  if (err.code === 2) return "目前無法取得定位，請確認手機的定位服務（GPS）已開啟，或移動到訊號較好的地方再試一次";
  if (err.code === 3) return "定位逾時，請確認手機定位服務已開啟且訊號穩定，再試一次";
  return "定位失敗，請確認已開啟定位權限";
}

// 哪個行政區（見 nearestDistrict，比只到縣市層級更準——臺中市範圍很大，

window.__locateNearbyHospitals = () => {
  if (!navigator.geolocation) { showToast("此裝置/瀏覽器不支援定位功能"); return; }

    (pos) => {

      state.roadDistances = {};
