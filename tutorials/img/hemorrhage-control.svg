<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="'PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="600" height="300" fill="#F8F9FC"/>
  <text x="300" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#15161B">大出血控制：直接加壓與止血帶</text>

  <!-- direct pressure -->
  <g transform="translate(50,60)">
    <rect width="220" height="180" rx="16" fill="#FFEAEA"/>
    <ellipse cx="110" cy="90" rx="70" ry="24" fill="#FFD9D9"/>
    <rect x="80" y="70" width="60" height="18" rx="9" fill="#C7233B"/>
    <text x="110" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#15161B">直接加壓止血</text>
    <text x="110" y="168" text-anchor="middle" font-size="11" fill="#8A8D98">紗布/敷料直接按壓傷口</text>
    <text x="110" y="184" text-anchor="middle" font-size="11" fill="#8A8D98">持續加壓至少 10 分鐘</text>
  </g>

  <!-- tourniquet -->
  <g transform="translate(320,60)">
    <rect width="220" height="180" rx="16" fill="#FFF2E0"/>
    <rect x="70" y="60" width="80" height="70" rx="20" fill="#FFE0B3"/>
    <rect x="60" y="82" width="100" height="20" rx="10" fill="#B45F00"/>
    <text x="110" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#15161B">止血帶（Tourniquet）</text>
    <text x="110" y="168" text-anchor="middle" font-size="11" fill="#8A8D98">綁在傷口近心端 5-7 公分</text>
    <text x="110" y="184" text-anchor="middle" font-size="11" fill="#8A8D98">紀錄綁紮時間，勿隨意鬆開</text>
  </g>

  <text x="300" y="272" text-anchor="middle" font-size="13" fill="#15161B">直接加壓無法止血、或肢體大量出血危及生命時，才使用止血帶</text>
</svg>
