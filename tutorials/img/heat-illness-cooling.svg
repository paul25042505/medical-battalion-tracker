<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="'PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="600" height="300" fill="#F8F9FC"/>
  <text x="300" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#15161B">熱急症現場降溫要點</text>

  <g transform="translate(60,60)">
    <rect width="150" height="170" rx="16" fill="#E8F1FF"/>
    <path d="M75 30v-8M55 40l-6-6M95 40l6-6" stroke="#0056C7" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="75" cy="70" rx="30" ry="22" fill="#B9D6FF"/>
    <text x="75" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#15161B">移至陰涼處</text>
    <text x="75" y="150" text-anchor="middle" font-size="11" fill="#8A8D98">脫離高溫環境</text>
  </g>

  <g transform="translate(225,60)">
    <rect width="150" height="170" rx="16" fill="#E9F9EF"/>
    <path d="M75 40c0 20-18 20-18 40a18 18 0 0 0 36 0c0-20-18-20-18-40Z" fill="#B7ECC8"/>
    <text x="75" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#15161B">大量降溫</text>
    <text x="75" y="150" text-anchor="middle" font-size="11" fill="#8A8D98">灑水搧風、頸腋鼠蹊部冰敷</text>
  </g>

  <g transform="translate(390,60)">
    <rect width="150" height="170" rx="16" fill="#FFEAEA"/>
    <path d="M50 60h50M50 80h50M50 100h30" stroke="#C7233B" stroke-width="4" stroke-linecap="round"/>
    <text x="75" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#15161B">監測意識與體溫</text>
    <text x="75" y="150" text-anchor="middle" font-size="11" fill="#8A8D98">意識改變立即後送</text>
  </g>

  <text x="300" y="270" text-anchor="middle" font-size="13" fill="#15161B">中暑屬於熱急症最危急型態，意識改變視為後送指標</text>
</svg>
