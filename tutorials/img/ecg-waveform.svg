<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" font-family="'PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="600" height="260" fill="#F8F9FC"/>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#15161B">正常心電圖波形（P-QRS-T）</text>

  <!-- grid -->
  <g stroke="#E7E8EE" stroke-width="1">
    <line x1="40" y1="150" x2="560" y2="150"/>
  </g>

  <path d="M40 150
           L90 150
           C100 150 100 130 110 130
           C120 130 120 150 130 150
           L165 150
           L172 150 L180 90 L188 190 L198 120 L206 150
           L260 150
           C275 150 280 105 300 105 C320 105 325 150 340 150
           L420 150
           C430 150 430 130 440 130 C450 130 450 150 460 150
           L560 150"
        fill="none" stroke="#0056C7" stroke-width="3"/>

  <text x="110" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#0056C7">P波</text>
  <text x="190" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#C7233B">QRS complex</text>
  <text x="300" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#0056C7">T波</text>

  <text x="130" y="200" text-anchor="middle" font-size="11" fill="#8A8D98">心房去極化</text>
  <text x="190" y="220" text-anchor="middle" font-size="11" fill="#8A8D98">心室去極化</text>
  <text x="300" y="200" text-anchor="middle" font-size="11" fill="#8A8D98">心室再極化</text>
</svg>
