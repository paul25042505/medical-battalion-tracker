<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="600" height="340" fill="#F8F9FC"/>
  <text x="300" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#15161B">12 導程心電圖電極貼片位置</text>

  <g transform="translate(210,55)">
    <ellipse cx="90" cy="150" rx="90" ry="130" fill="#F3F4F7" stroke="#D8DAE3" stroke-width="2"/>
    <circle cx="90" cy="20" r="22" fill="#F3F4F7" stroke="#D8DAE3" stroke-width="2"/>
    <!-- limb leads -->
    <circle cx="8" cy="50" r="10" fill="#0056C7"/><text x="8" y="35" text-anchor="middle" font-size="11" fill="#0056C7" font-weight="700">RA</text>
    <circle cx="172" cy="50" r="10" fill="#FF9500"/><text x="172" y="35" text-anchor="middle" font-size="11" fill="#B45F00" font-weight="700">LA</text>
    <circle cx="8" cy="270" r="10" fill="#15161B"/><text x="8" y="290" text-anchor="middle" font-size="11" fill="#15161B" font-weight="700">RL</text>
    <circle cx="172" cy="270" r="10" fill="#177A34"/><text x="172" y="290" text-anchor="middle" font-size="11" fill="#177A34" font-weight="700">LL</text>
    <!-- precordial leads V1-V6 -->
    <circle cx="80" cy="95" r="7" fill="#C7233B"/><text x="80" y="82" text-anchor="middle" font-size="10" fill="#C7233B">V1</text>
    <circle cx="102" cy="95" r="7" fill="#C7233B"/><text x="102" y="82" text-anchor="middle" font-size="10" fill="#C7233B">V2</text>
    <circle cx="120" cy="112" r="7" fill="#C7233B"/><text x="132" y="112" font-size="10" fill="#C7233B">V3</text>
    <circle cx="128" cy="130" r="7" fill="#C7233B"/><text x="140" y="130" font-size="10" fill="#C7233B">V4</text>
    <circle cx="130" cy="150" r="7" fill="#C7233B"/><text x="142" y="150" font-size="10" fill="#C7233B">V5</text>
    <circle cx="130" cy="170" r="7" fill="#C7233B"/><text x="142" y="170" font-size="10" fill="#C7233B">V6</text>
  </g>

  <g transform="translate(30,80)" font-size="12" fill="#15161B">
    <text x="0" y="0" font-weight="700">四肢導程</text>
    <text x="0" y="20">RA／LA：左右鎖骨下</text>
    <text x="0" y="38">RL／LL：左右下腹或下肢</text>
  </g>
  <g transform="translate(430,110)" font-size="12" fill="#15161B">
    <text x="0" y="0" font-weight="700">胸前導程</text>
    <text x="0" y="20">V1：右胸骨緣第4肋間</text>
    <text x="0" y="38">V2：左胸骨緣第4肋間</text>
    <text x="0" y="56">V3：V2、V4連線中點</text>
    <text x="0" y="74">V4：左鎖骨中線第5肋間</text>
    <text x="0" y="92">V5：左腋前線，與V4同高</text>
    <text x="0" y="110">V6：左腋中線，與V4同高</text>
  </g>
</svg>
