<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="'PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="600" height="320" fill="#F8F9FC"/>
  <text x="300" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#15161B">AED 電擊貼片標準放置位置</text>

  <g transform="translate(190,55)">
    <ellipse cx="110" cy="150" rx="110" ry="130" fill="#F3F4F7" stroke="#D8DAE3" stroke-width="2"/>
    <circle cx="110" cy="26" r="24" fill="#F3F4F7" stroke="#D8DAE3" stroke-width="2"/>
    <!-- pad 1: upper right chest -->
    <rect x="118" y="60" width="58" height="40" rx="8" fill="#0056C7" opacity="0.85"/>
    <text x="147" y="85" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">貼片一</text>
    <!-- pad 2: lower left side -->
    <rect x="26" y="190" width="58" height="40" rx="8" fill="#C7233B" opacity="0.85"/>
    <text x="55" y="215" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">貼片二</text>
  </g>

  <g transform="translate(30,80)">
    <text x="0" y="0" font-size="13" fill="#15161B" font-weight="700">貼片一</text>
    <text x="0" y="20" font-size="12" fill="#8A8D98">右鎖骨下方</text>
  </g>
  <g transform="translate(30,230)">
    <text x="0" y="0" font-size="13" fill="#15161B" font-weight="700">貼片二</text>
    <text x="0" y="20" font-size="12" fill="#8A8D98">左側腋中線</text>
    <text x="0" y="38" font-size="12" fill="#8A8D98">（乳頭下方外側）</text>
  </g>
  <text x="300" y="300" text-anchor="middle" font-size="13" fill="#15161B">電擊前確認所有人員皆已離開患者身體</text>
</svg>
